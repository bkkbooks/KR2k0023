body:
  text: 至元嘉禾志卷十六元徐碩撰碑碣録事司重建州學記宋有天下遂以文治至慶厯中仁祖始命郡國立學宫聖聖相授逮崇寧初徽宗皇帝因故業而大之學校始遍天下遐方僻郡莫不興行仁義遵先王之業循前聖之軌與中州之士校功爭能既更兵火郡縣之學率皆湮替不振聖上閔焉乃紹興壬戌二月丁亥制詔諸路守臣興學如故事於是右奉議郎直秘閣知州方滋言郡舊有學在望雪門之西偏建炎中本郡因仍簡陋即州治之東故賔館以為學規模湫隘不足以贏來學之士前臨河渠旁迫治所諠囂混淆失夫古人處士於燕閒之義請更諸舊基以詔令從事四月壬午上尚書省禮部以為宜是年壬戍下其事於州乃審面勢計間楹量功庸慮材用諏日庀事賦諸任職之吏而時視之取財於興利之餘積貲於經用之外屬徒於復作之𨽻凡百工之用售值於官者皆厚於私家上不諗有司下不煩民力功甚大而人得以食其力役踰時而衆無所病其勤作殿於前以奉我聖師築堂於後以講術業齋宿有所弦誦有舍步櫩周垣門庖湢浴莫不備具先是學無書籍乃市書扵四方略備貯之以庫而謹其出内焉屋凡七十有三間髙眀輪奐無限厥初以六月乙亥始事以十月庚申告成邦士大夫羣儒逰士耆稚畢㑹仰視嘆息咸多太守之義曰是能欽天子之詔而承之以敏矣其將以是為風化之原接邦人於道也可不有載乎扵是太守重違其意以書具其事来告願有以記之予辭不能復謂予再官於秀出入四年其獨無情乎因為之記曰夫仁義治化之本禮樂所以文仁義也而學校所以寓禮樂也故大司徒以六徳六行教民而終之以六藝則所以文仁義者有其具矣以六禮六樂為教而必肄之於學則所以寓禮樂者有其所矣仁義無以文之則人不知孝弟之可樂禮樂無以寓之則方且蔵在有司掌於容官何以習民之視聽哉故古者行禮必於學是以鄉大夫既登賢能之書退而以鄉射之禮五物詢衆庶曰和曰容曰主皮曰和容曰興舞説者以為和謂其閨門之内行也容謂其容貌也杜子春以和容為和頌謂其能為樂也葢庶民無射禮獨有主皮之射故卿大夫因行鄉射之禮而覽視之夫既登其賢能而使之有所勸又詢之以禮樂而使之有所慕斯民之從之也無難矣然則學校之教豈徒逮於學士弟子哉雖庶民亦與也為治者可不務乎今太守既能承天子之詔興起黌舍以崇鄉里之化是當有載也太守字務徳世家相廬賢而有文理其為秀治迹甚衆興學校以育人材乃其一事云耳紹興癸亥十月辛酉襄陽張嵲記唐相陸宣公祠堂記古者建學校先聖先師各因其國之故國無其人然後合他國而釋奠焉由漢以来凡先聖先師之位雖定於一然郡邑先賢亦往往祠於學宫猶古意也唐史載陸宣公贄蘇州嘉興人後晉時吳越王允瓘奏以嘉興置秀州城東橋以宣公名者先老相傳公所生之地郡學故有公祠今郡守直顯謨閣東平吕侯正已復緝而新之維秀陪翼行都典治為天下劇侯獨置迎將期㑹之煩表公以風厲多士其知本務矣初公事徳宗入翰林為學士方禁旅四出伐叛公深以根本為慮論居重馭輕之勢至熟悉也未㡬涇卒内訌迄如公憂奉天艱難之際雖號親近而志實不大紓職在書詔因得具著天子悔過罪己之意聞者流涕人心已離而復合以使事抵李懷光於立談頃㧞李晟之軍已而平賊泚收長安獨晟軍是頼官守所及略見一二已足以再造唐室茍帝以國聽焉其所就何如哉起建中厯正元垂二十年離合從違之變繁矣確乎其不移温乎其不懟亹亹乎其不厭所積之厚豈世士所易窺耶晚節為相經世之業出之固有次第始建白臺省長官各舉其屬議輒見格然綱條本末載於章奏者尚可復也既貶忠州闔户人不識其面專以方藥自娛葢畏天命畏大人負罪引慝於幽暗隱約之中其志念深矣雖徳宗雄猜忌刻猶勞問有加非公之忠敬有以發之耶彼謂避謗不著書殆知公之細者也秀維公里雋彦林立公之精緼列於鄉論者舊矣故於祠宇之成誦所聞以質其中否焉淳熈四年四月旦日東莱吕祖謙記府學新創小學記古者學有等序教不陵節自書計誦舞以往所謂流水盈科草木區别截截不可徑詣闕黨速成申戒眀甚小學之設為是歟後世仕進階文藝且經傳子史浸多必於始學培其基本故訓子姪者有戒以潢潦無根勉以月閱一箱等語雖賦姿有利鈍惟穉齒易精通督授以時孰量所到然富窶不齊範師殖學力或弗逮則以公庠代私塾其庶㡬乎淛右密拱行都在在有小學禾興獨闕前後郡博士有志太息良由郡學𥚹隘創置無所糧儲之贏莫可資焉嘉定庚辰鄉同年吳君杜分教初筵亟請於郡廣學宫而新之明年學成規圖宏壯迺即東後廡之屋五楹葺為小學几席用器畧具其秋開補生員遴選職事二人俾主訓道同給於郡前駕部鄭侯定始之今户部朱侯因而樂繼焉學田舊為豪民及浮屠冒占殆數百畆君極力歸復用饍朝暮課程詳於私塾規式倣於上庠於是邦人翕然願以子弟入學誦弦洋洋一改羣聽君之加意士子誠大小畢舉矣噫創學以淑童丱師儒之功也遣子以就教飬父兄之賢也循蹈規程進脩業履以無負於父兄師儒之訓其責獨不在爾子弟乎若乃掛名籍以尚觀美聚嬉戯而虧全功齒日以長後將噬臍是豈先生所望於爾者因書以為戒云又眀年甲寅文林郎國子正髙熈績記重建觀頥堂記凡學校養士各就食於位觀頥有堂獨檇李為然合異而同不相淆亂此意善矣然地本鹺廪常居濕蒸屋老而欹勢且覆壓移食於齋衆不謂宜余視事數月亟請於郡侯莫叔益得錢五十萬撤而新之工徒既畢舊觀復還填然鼓聲少長咸集升降坐起禮儀肅莊乃歌曰厦屋崇成昔陋今盈匪伊我居言依於仁齋厨有食昔枵今實匪飽我粒言飽於徳余聞而進之曰侯之飬士厚矣士亦知所以自飬乎觀頥則易自求口實則難觀頥觀其所養也口實觀其自養也二三子勉之紹定二年己丑嵗十月郡文學黄夢髙記府學承置柴蕩記麟瑞鄉柴蕩秀學之舊物也淳熈四載顯謨吕公典是邦給佃於學吕助都飬計五百餘畆𨽻嘉興或樵或租所得尚薄越五六年地力日盛根苗滋益繁延袤數里葱蒨彌望為蘆而當錢之百者萬束而薪芻不與焉彊有力者實租之不得而擅也收緡錢百有二十除三之一以輸賦去嵗有㫖粥官産前守都大趙公以廩粟不繼將在學所有舉籍以戒令佐毋得估用是晏如無復經念無何狡謀發於不虞濟以黠胥舞權巧為伺郤當貳車攝事復令官估畮錢七百貪民挾多資志於必得増畮錢三千三百一十有一今春朱轓易鎮方應酬紛雜乃變租為佃撓法豪敓若士子若走𨽻無一知者其詭閟如此逮索逋始言讐為己業即以其事列於郡於外臺都運直閣郎中王公提舉秘承黄公咸察其非傳檄持至太守郎中麋公徐為正之㑹兩年節費剔蠧糧用差有餘積規欲葺齋廡補罅漏至是輟以償直為錢五十萬提舉頒公帑二十萬来助倉使閔學校囏匱謂非足用外有此寛䞉州郡合體朝廷優恤意既一時失行不可與齊民爭攘比今以官物歸官養士止令用元估賈而過納之數不復請尋召租視昔增三倍有竒嵗如是利原無窮矣初蕩之失也或勸之以為不必復或沮之以為不可復或哂之以為不能復睥睨其勝負者相半予謂職有常守不為物狥仕而行義不為勢屈茍見善不眀用心不剛切切然私慮却顧次且怵縮為後日濳身避禍地不惟有負於所學其有負於設官之意多矣吾知守吾職行吾義它渠皇䘏虖竟復之雖然蕩則吾蕩也固與學俱存毋患再失而租入豐約則視人為髙下亦惟後之君子加意焉耳姑志始末用垂不朽紹熈四年九月丁邜日從事郎充州學教授尚樸記府學田記嘉禾密拱行都於今為三輔瑞象葱欝流虹繞電葢嘗表重華之符則眂古豐沛湯沐皇上踐阼之初追孝列祖肇新府名越十有三年誅鋤奸凶改元更化闔郡士始霑異恩得以名聞春官而上太常第者彬彬焉豈氣數之運翕合感會霧滃風烈自應爾耶抑聲教所漸涵濡浸灌積久之效有本也郡學自慶厯始頒田養士賦調舊矣縣南渡以来距淳熈癸卯凡再卜遷得地於鹽倉故址蔵脩之所蒸鹵卑潤而衿珮于于日増嵗入每以不繼病趙侯以秀邸孫襲分封符眀於先務甫下車訪學宫益求所未備迺捐緡錢六十萬米石五十俾慮材物障地之濕又括郡之閒田得百七十餘畆以助廩廥學子得侯之賜且念民食既豐而士得所養僉謂續食以久恵尤不可以無紀狀其事屬余叙次欲以告来者嗚呼士必蓄於學而享於時觀時㑹通氣𩔖丕應鄉邦已事之騐方来而未艾矣固有相之者本其所繇至而引之於無窮則非人之所能實天之為也趙侯深長之思將以夀學校之脉而篤皇家之慶則士之報上當何如郡博士陳君光逺孜孜勸率方幸於得師矣自求口實不志於求其飽與安思無負其所學責將誰歸歟則夫相與扶翼以保其勿壞使風化凛凛嚮鄒魯葢士之命也侯之願也郡博士之職也因時述之以逹其義余固不復以鄙陋辭趙侯名希道字君猷嘉定元年十月望日通徳郎秘書郎兼吳王益王府教授陸瓉撰府學重建小學置田記禾興為今右輔阜陵雨露醖淬百年沐徳詠仁思樂泮水鼓昕而袂襜如廡士而誦琅如獨小學為闕嘉定庚辰吳君社典教是邦創學以淑侲子誌未漫也繼弗竟暴者寒矣曠焉㡬五十年咸淳丙寅史君貳卿星諸先生趙公以風教為先務請復舊觀得沒入屋僦直千芝樽浮費益之袤闕厥基樸斵塈塗器席纖鉅如式補生徒額三十延教導二員日課四書月試舉子業嵗而校長陞冠者列行兩載邦羇貫子願就學焉校廩慳懼無以裕来者會畬齋先生王公自民部郎来守下車戾頖以大學詔諸生言政必先及化暇日以是白公喜曰教校官事也養郡府事也力勱於成給芝楮萬學為貿田董以前序度宜立劵至有樂相其事者得肆百陸拾陸畆有畸又撥沒官田七畆三角嵗歛租米石共一百一十六餘提學漕使敷文府卿蒲谿先生常公聞而嘉之撥三十三畆有畸田以助米石二十七有餘於是别為之儲縣學職掌其出入凡小學費辦於政教飬相資庶㡬其可久也士相與言禾校前所未有是不可無志嵗月屬余記之余惟小學古法也塾庠序學之地洒掃進退學之端書記樂誦勺象射御學之序見於曲禮少儀内則弟子職諸篇者學之方毋躐等毋速成範我馳驅安行乎錫鸞和鈴之間習與性俱如人之長日益而不自知此小子所以皆成徳也世非古校衿挑矣園蔬鞠矣教養闕如成小何然人中爽頭角嶄如髫鬌知㢘讓駒齒未落受詩易者非無之養成弗至眀頴者曠莫失其居椎鈍者錮窒擿其塗吁可嘅已朝家風以詩書化自近始宅儒牧興庠序葢右文而重儒也教于始者以立小學之本養於終者以成小學之功總角丱兮範師耨學教我育我不啻父母之於子斯遊斯息盍亦知所自勵否乎此兒荷門基爾勉之十過誦萬言爾進之童子舞雩而歸爾志之溉根食實他日當有可觀是亦先生長者所望於爾若夫縱核心之走犢聚同隊之戲魚業荒於嬉嵗不吾與匪惟二三子之羞抑亦教者之憂因記以為之戒云咸淳五年己巳三月望日廸功郎差充嘉興府府學増差教授方恢記復學田記國家立學徧天下學之制小大不同學士之版衆寡不同然莫不有土田以充儲廥焉葢廸士以教贍士以養可以兩備不可以兩闕倘户外之屨孔多廩人之粟不繼此亦與教者所宜盡心也官有閒田猶將鰓鰓然謀之我疆我里而不知求可乎惟嘉禾眡漢三輔宣徳自近始庠聲序音日増月蕃非下邑遐障等厥田宜與學稱嵗入乃素嗇臺郡每捐羡賦以為助檢柅不恪漁蠧交病比嵗滋以削聞三山蕭君祀主教是邦至之日喟然曰教吾職也而士慊一飽徒教不能以自行盍思為續日計舊田尚可考無多求益惟求其無所損直學袁鎮學諭沈應時善計㑹遂命以簿正搜匿扶伏未易枚算其最甚則六和塔院冒據之田初院僧誘鶡冠顧氏取其田四百六畆虚立賤買券約已而夏姓民稱其家質田㞐十之一僧不應言買詣縣請贖令從之因論所受顧氏田不如律告之郡郡不私有悉沒以與學僧屢訟屢衂特以贖田者非質田子孫有司僅給此田餘在學固無恙會郡博士踐更僧與胥為市乘罅去籍併已沒田揜而有之涉年二十閱儒官六七弗究弗圖稔偽成真至是隱狀始盡白乃疏於郡於臺中及漕叶心主盟詰骨之姦仍歸之學僧怙嚚又訟之部部亦坐僧非是僧遂詘乃合受田之數而歸其半向使潛墮僧計尺田且非我有也穡乃有秋廩食以裕来學雲合教是用興端自蕭君發之學之士徳君甚願有以記屬之至再三弗勌予雖繋官於朝囘首泮芹則丁年弦誦之所也記其奚辭嘗謂凡天地間事事物物失於昨復於今者皆可書㢘浦之珠零陵穴之鍾乳直淺事耳尚侈言之矧田乎故春秋之書歸田曰歸我曰来歸皆志喜也今茲田逃釋歸儒不以養㳺民而養秀民名正言順亶可書矣雖然復田誠士之幸既足以養其口體必將以養其心抑有復性之説一真之地萬善所根成之以學乃存其存情田易蕪學弗加耨外物敓攘失其固有則沿李翺三篇之書進乎大易不逺之㫖朝講夕誨俾為士者皆知所以復其性是猶有待於蕭君也獨此田云乎哉予嘉君之功因以廣君之意吾邦之士其相與勉旃能無負師模之作成斯能無負上之人教飬之盛意薄言采芑扵彼新田庶幾不日見之嘉定十二年三月既望朝奉郎充樞密院編脩官錢撫記復學田記禾興密拱神臯者善流化垂百年士知尊尚詩書来游頖林學廩寡弱弟子員無何春秋有補冬夏有校前後按成比来者不能容相與太息乾道間六和塔有受施田四頃有司詰不應令歸於學尋墮吏奸僧仍久據暨考數故籍得其實已而訟訟而中分僧人抵不法繇部而省不奪不厭殆三數改嵗彼居上流之地且有福田利益等語威動執要附城倚社誰與挈大杜戒諸生物無鉅細各有主虞芮非學校事聽之可也一日吏持部符至全璧歸於我恍然自天而下訪知大理司直楊公刑部郎盧公之筆實主張是嗚呼以持鉢法門務自豐殖又欲包有吾徒虀鹽樂道之奉聞闕拂膺韋邦闕典具遇眀有司彼以力爭我以道勝彼以無厭亡我以無心得顧不韙與杜濫左學事既齋宇改辟規橅寖宏日思廣明時阿沚之飬得是實契初心用増生徒創童學堂屨雲委㡬倍疇曩詎曰一邦盛觀培䕶封殖俾異時成徳逹材由此其選類不負所學以儷前脩者二公之徳也可冺而不書楊公名若宣城人今守清湘盧公名祖臯永嘉人今直北門諸生請録部符以昭不忘眀年七月文林郎充嘉興府府學教授吳杜謹記進士題名序進士題名何始乎始於唐之鴈塔而後碑禮闈以紀同年碑郡縣學以紀同鄉彬彬惟本朝為甚嘉禾行都扶風郡獨欿乎以聞事告郡博士吳君春管君寅午相與謀曰國家自開基以来列聖以道統授受諸大儒金聲玊振至乾道淳熈而大備乾淳天子實毓聖是邦千古英靈剛大之氣天發地育典章文物之懿漙華夏而施蠻貊是邦有遺事可乎迺屬前廡士纂輯書載稽諏㪚逸臚列而刻之石首嵗年次氏名次邑里粲然秩然可挹典型而追步武也渡江之前與宗胄之貫玊牒者或未詳則存位置以竢續補吁是學也昭先登厲後来斯文非小補矣前進士葉隆禮諗諸友作而言曰祖宗以儒立國以科舉得儒吾鄉舉不乏人冠制科者冠廷對者冠禮部試者赫奕相望由是為宰執大臣為侍從顯官無慮數十固有清風竣節一奮不顧攻新法如仇甘貧賤如飴蘇玊局公嘗惙惙憫惜之然遞芳流沃千載下凛有生氣葢未可窮逹計也其他才品之髙下學識之純駁事業之偉劣權衡而取則之方寸中有靈龜在毋徒曰工程文以拾青紫云乃作題名序咸淳元年九月吉日書免解陞甲記皇帝嗣登大寳之三載命臣肖孫出守嘉禾郡越明年丁邜有詔賔興懼亡以稱上㫖郡文學士恢間有請曰郡為阜陸震夙之邦士生斯地沐浴皇澤與河南南陽等寵甚腴也願勒珉以揚景爍㳟惟孝宗皇帝衍豐芑泳羣材翹薪刈楚公卿皆此途選秀是邦者出而柄招摇纒紫微履文石名彪炳於乾淳盛時視他郡為夐絶有開厥兆或者王氣扶輿所暨爾理考篤祐祖烈嘉淑輔藩漙恵賚而洽多士為腆請及紀者免如監再則不以年第進士超一級雖奏名亦與陞等湛恩汪濊士何幸歟鐘鼎簮珂憲憲相望用敷遺於後人者無疆惟休然以阜陵恵士之志待穆陵而始廣則廣穆陵之志葢又於今日有所待於皇聖治柄用元勲作成爾多士者尤至風化醖淬恩絶沕潏英實日蕃以碩非獨禾郡之幸亦阜陵之所深望也抑士之自待者盍亦不負所學思以仰答累朝天涵地育之造此則教養之初意若但曰希恩寵邀利達則非所敢知也咸淳三年朝散郎權發遣嘉興軍府兼管内勸農事澉浦金山水軍陳肖孫記嘉蓮圖記物之自形色於天地間者豈求知於人哉自連理之木合穎之禾人指為瑞物亦以瑞應之天人相與之機果在是乎桞子厚賀嘉蓮有表蓮之瑞始著近世以来證為休祥形諸贊咏葢不一二數也嵗在癸酉禾興鄉校池蓮並蒂子衿動色相慶且圖之以需其騐予謂此邦實唐陸宣公父母之國今天光密邇上徳薰陶寺丞商公又以儒術治郡作成教飬之餘士宜自奮安知無論諫仁義不負所學者繼踵而出乎賔興賢能適時也諸君勉之孟秋既望東陽潘友徳書至元嘉禾志卷十六
