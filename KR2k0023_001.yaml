body:
  text: 至元嘉禾志卷一元徐碩撰沿革嘉興路九域志曰上秀州古揚州之境也周時為吳國釋名曰吳虞也即太伯避季歷之地吳伐越越子禦之檇李檇李即今嘉興也舊有檇李城魯定公十四年春秋書越敗吳于檇李至哀公元年吳王夫差敗越于夫椒報檇李也按此則知檇李者吳越之戰地也周顯王四十六年楚威王伐越破之盡取其地至於浙江之北故此地亦名曰楚杜佑通典云吳滅屬越越滅屬楚是也又吳録地里曰吳王時此地本名長水故嘉興亦名長水秦始皇東巡望氣者云五百年後江東有天子氣始皇至令囚徒十萬人掘汙其地表以惡名改之曰由拳又按寰宇記云始皇東遊至長水聞土人謠曰水市出天子從此過則人乘舟交易應其謠遂改由拳縣又曰故由拳山在縣始皇見其山上出王氣使諸囚鑿此山囚倦並走因號為囚倦山置囚倦縣後人訛為由拳水經云秦始皇改為囚倦亦曰由卷西漢屬會稽東漢屬吳郡吳黃龍三年由卷野稻自生改為禾興志瑞也赤烏五年因立太子和改為嘉興晉宋齊梁因之隋平陳置蘇州廢嘉興入杭州唐武德七年復置屬蘇州八年廢入吳貞觀八年復置屬蘇州晉天福四年錢元瓘病支郡多闕而右藩強大始經邑為州遂奏以嘉興為秀州絶其華亭海鹽二同地附於州乃以境西義和聚為崇德宋政和七年八月二十二日改秀州為嘉禾郡寧宗慶元元年以是邦為孝宗育聖之地升嘉興府嘉定元年十一月因守臣趙希道奏請賜嘉興軍額聖朝至元十三年正月改為嘉興府安撫司至元十四年三月改為嘉興路總管府領府一縣三司一録事司城以內隸焉宋置南北西三廂聖朝至元十三年廢遂置兵馬司至元十四年改為録事司松江府舊華亭縣也唐天寶十年置華亭縣屬蘇州治按新史寰宇記以為本嘉興縣地輿地廣志以為本崑山縣地元和郡國圖志云吳郡太守趙居貞奏割崑山嘉興海鹽三縣為之今四境與三縣接郡國圖志為不誣矣唐僖宗入蜀時郡盜盤結王騰據華亭其後吳越王錢鏐遣顧全武拔之自此地入吳越按通鑑乾寧四年錢鏐遣顧全武取蘇州乙未拔松江戊戌拔無錫辛丑拔常熟華亭是也晉天福五年以嘉興縣為秀州而割華亭隸焉通典寰宇記云地有華亭谷因以為名輿地志云吳大帝以漢建安中封陸遜為華亭侯即以其所居為封谷出佳魚蓴菜又多白鶴清唳故陸機歎曰千里蓴羮未下鹽豉及臨刑嘆曰華亭鶴唳不可復聞又按陸遜傳云遜初封華亭侯進婁侯次江陵侯漢法十里一亭十亭一鄉萬戶以上或不滿萬戶為縣凡封侯視功大小初亭侯次鄉侯郡侯以遜所封次第考之則華亭漢故亭留宿會之所也昔縣有華亭鎮印或者遂謂自鎮為縣不知所謂鎮者唐因隋制置鎮將副以掌捍防守禦之事縣之冗職耳祥符圖經載鎮在西南二百步而元豐九域志則廢矣如自鎮而為縣則新史輿地志諸書不應略而不言也若夫雲間之名則自陸士龍對張茂先所謂雲間陸士龍一語得之也華亭民物稍蕃庶煙火萬家絃誦之聲相聞遂為東南方奧區聖朝至元十四年升為華亭府至元十五年改為松江府領縣一華亭嘉興縣唐史九域志云望嘉興縣輿地廣記敘秀州以為春秋時吳越分境於此杜預曰嘉興縣南有檇李城今之嘉興縣境吳之南境也秦為由拳縣西漢地理志注云柴辟又云就李水經云辟塞皆舊名也漢以後中間沿革詳見本路所載矣晉天福五年升嘉興為秀州寰宇記云嘉興監者今秀州嘉興縣煎鹽之所宋升為監後併為縣而隸秀州焉其先三十二鄉熙寧中析五鄉隸崇德止二十七鄉今仍舊海鹽縣輿地志云上海鹽縣唐地理志曰蘇州海鹽九域志曰望海鹽秦郡縣天下粵二十年甲戌置縣屬會稽郡漢因之地理志云武原有鹽官寰宇記云廣斥鹽田相望即海鹽鹽官之地吳王濞置司鹽校尉居馬嘷城故水經云吳王煮海為鹽於此縣也王莽時改為展武後陷為湖是為柘湖湖中有山生柘樹因名焉今在松江府南七十里金山北移治武原鄉為武原後漢復為海鹽順帝時又陷為湖是為當湖遂移治故邑山為故邑縣晉成帝元康七年復為海鹽縣又移處故為嘷城至陳武帝割屬鹽官唐高祖武德七年復屬蘇州太宗貞觀元年省入嘉興睿宗景雲二年復置先天元年廢二年百姓以應奉塗逺艱於往來又請置明皇開元五年蘇州刺史前黃門侍郎張廷圭奏是年五月敇置即於舊海鹽縣吳禦越城西北立定凖而置縣今縣治也昭宗大順中割歸杭州晉天福五年置秀州縣隸焉宋因之今仍舊崇德縣九域志云崇德縣古越地也輿地廣記敘崇德云有語兒水亦曰禦兒越之北境也魯定公十四年吳伐越越子句踐禦之陳於檇李杜預曰吳郡嘉興縣南有檇李城今禦兒接界吳越春秋句踐五年入臣於吳羣臣祖道至浙江上是浙江之西皆入吳境句踐七年既釋囚反國厚獻吳王夫差夫差悅之賜書增封於是禦兒復為越之北境國語曰句踐之地南至句無北至禦兒韋昭注今嘉興禦兒鄉是也句踐之報吳也徙舍至於禦兒大夫種曰吾用禦兒臨之韋昭注禦兒越北鄙言吳邊兵若至吾以禦兒之民臨敵魏明帝時王景淵諫營宫室亦曰句踐欲廣其禦兒之疆馘夫差於姑蘇釋之者謂禦兒吳界邊戍地名斯可驗矣太平寰宇記敘杭州云越國之西境西北至禦兒分界在吳郡嘉興縣南乃指斯時也句踐滅吳傳六世為楚威王所併地屬楚秦郡縣天下總吳越舊地置會稽郡禦兒為由拳縣之西鄙介於錢塘烏程之間漢武帝時伐東粵東粵使徇北將軍守武林樓船軍卒錢唐榬終古斬之元封元年閏四月封語兒侯孟康曰越中地也今吳南亭是顔師古曰語或作禦其音同考之唐乾符中所立崇福寺二石經幢一云嘉興縣語兒鄉一云語兒市然則語在唐其名如故黃巢之亂豪傑起義兵保護鄉井遂升為義和鎮餘杭吳公約隨董昌禦巢於西鄙奏置都額於硤石兼授義和鎮遏使後其子重裕襲拜西佳鎮遏使兼義和鎮事見羅隱撰吳公約碑吳越有國廢鎮止稱義和市塘左則語兒市三朝國史云有語兒亭故地名語兒按水經載萬善歷曰吳黃武六年正月獲彭綺是嵗由拳西鄉有産兒便能語云天朗河欲清腳析金乃生因詔為語兒鄉非也又嘉禾百詠載舊傳西施産兒於此至能語方去尤可笑也蓋語兒當為禦兒晉天福間始析崇德七鄉置縣於義和市因鄉以名縣五年春三月敕嘉興縣為秀州以崇德縣隸焉宋因之熙寧十年又割嘉興縣梧桐永新清風保寧千金五鄉以益之總十二鄉今仍舊星野周官保章氏以星土辨九州之地所封封域皆有分星以觀妖祥故志邑郡者必考焉西漢地理志曰吳地斗分野也又曰越地牽牛婺女之分野也晉天文志曰自南斗十二度至須女七度為星紀於辰為丑吳越之分野屬揚州費直起斗十度蔡雍起斗六度度又列州郡躔次云丹揚入斗十六度會稽入牛一度由此觀之嘉興乃斗之分野而崇德處吳越之間則獨在斗牛躔度之交按五代史載豫章人有善術者望牛斗間有王氣語錢唐分也宋建炎初國步艱虞是秋占者望斗牛間有紫氣既而移蹕維揚謂其已驗暨冬十月戊寅孝宗虹渚之祥實在嘉興非其明驗歟故備載之以俟知星者道里嘉興路東西三百二十八里南北九十一里至上都陸路四千三百八十四里水路四千一百里自大都登陸路至上都四千九百里至大都陸路三千五百八十四里水路四千一百里四至東至大海二百一十里舊經云一百九十七里西至杭州路二百一十九里南至杭州路硤石鎮界六十里北至平江路吳江縣界三十里八到東南到海九十二里舊經云東南到海鹽九十里西南到杭州路鹽官縣界一百里東北到平江路吳江縣界六十里西北到平江路吳江縣界四十二里陸路東至松江府一百二十里西至崇德縣九十五里五十步東南至海鹽縣九十里舊經云八十里一百步西北至平江路吳江縣一百十一里一十步水路東至青龍鎮一百九十五里西至湖州烏程縣界七十里南至海鹽縣九十里舊經云八十里一百步東北至平江路吳江縣一百一十一里一十步松江府東西一百六十里南北一百七十三里四至東至海八十里西至平江路長洲縣八十里南至海九十里北至平江路崑山縣界八十里八到東南到明州界九十里在海中西南到海鹽縣界六十里兩縣相去一百二十里東北到平江路崑山縣界一百二十里兩縣相去一百二十一里西北到平江路崑山縣界一百五十里兩縣相去二百里陸路西南至嘉興縣界六十里東北至青龍鎮五十四里水路東北至青龍鎮入吳江五十四里西南至嘉興縣界六十里西北至吳江六十里嘉興縣東西七十里南北八十里四至東至松江府華亭縣風涇界六十里西至崇德縣官窑鋪五十里南至海鹽縣莫涇鋪四十五里北至平江路吳江縣界二十里八到東南到海鹽縣界四十五里西南到崇德縣界官窑鋪五十里東北到平江路吳江縣界七十里西北到崇德縣烏青鎮五十四里陸路東南至海鹽縣界莫涇鋪四十五里西南至崇德縣界官窑鋪四十五里舊注云至崇德縣九十里東北至松江府華亭縣界風涇鋪六十里舊志云至華亭縣一百二十里北至平江路吳江縣界遞鋪三十里水路與陸路同海鹽縣東西一百五十九里舊志云一百九里南北一百三十三里舊志云一百三十二里四至東至海五里舊志云三里西至杭州路鹽官縣六十三里南至杭州路鹽官縣界四十八里兩縣相去九十五里北至嘉興縣界七十三里八到東南到海二里西南到杭州路鹽官縣界五十里東北到華亭縣八十九里西北到嘉興縣界松揚涇四十五里陸路西南至澉浦三十六里西北至嘉興縣界四十五里水路東北至當湖五十五里又北行至華亭縣九十里西南至澉浦鎮三十六里西至杭州路鹽官縣六十三里西北至嘉興縣界四十五里崇德縣東西五十四里南北三十五里四至東至嘉興縣靈宿鄉界六十里西至湖州路德清縣金鵝鄉界十五里南至杭州路鹽官縣昌亭鄉界五里北至湖州烏程縣移風鄉界二十里八到東南到杭州路鹽官縣元吉鄉界一十里西南到湖州路德清縣金鵝鄉界二十里東北到嘉興縣靈宿鄉界六十里西北到湖州路歸安縣太元鄉界三十里陸路南至杭州路鹽官縣界五里東北至嘉興縣界五十里舊志云六十里水路東北至嘉興界南谷湖五十里西自縣西長營涇至德清縣界苧里涇一十五里南至杭州路鹽官縣界五里北自縣北長營涇至湖州烏程縣界三十里風俗舊經云罕習軍旅尤慕文儒不憂凍餒頗勤農務題名記云惟秀介二大府旁接三江擅河海魚鹽之利號澤國粳稻之鄉土膏沃饒風俗淳秀文賢人物之盛前後相望百工衆技與蘇杭等方輿勝覽前漢地理志云江南地廣或火耕水耨民食魚稻以漁獵山林為業果蓏螺蛤食物常足故啙窳偷生而亡積聚啙短也窳弱也言短力弱材不能勤作故朝夕取給而無儲峙也啙音紫窳音庾飲食還給不憂凍餒亦亡十金之家信巫鬼重淫祀又曰吳東有海鹽章山之銅三江五湖之利江東一都會也海外鯷人嵗時來見敘吳郡志者曰有太伯辭遜之遺風志會稽郡者曰有夏禹勤儉之餘習至元嘉禾志卷一
