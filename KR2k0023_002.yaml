body:
  text: 至元嘉禾志卷二元徐碩撰城社嘉興路路城按舊經云羅城周回一十二里高一丈二尺厚一丈五尺子城周回二里十步高一丈二尺厚一丈二尺宋宣和年間知州宋昭年嘗更築德祐元年守臣余安裕重修咨議劉漢傑董其役且增築保障聖朝至元十三年羅城平子城見存羅城元有四門東門舊曰青龍門後改為春波西門舊曰永安門後改為通越南門舊曰廣濟門後改為澄海北門舊曰望京門後改為望雲續又改為望吳而門又分為水旱門門各有樓惟澄海水門樓因徐珉作亂遂廢聖朝至元十三年後門樓亦間廢路社壇舊經六子城西北一里八十步今在澄海門內西北一百步松江府府城舊為縣城周回一百六十丈高一丈二尺厚九尺五寸後無之宋紹興乙亥嵗酒務鑿土得唐燕胄妻朱氏墓碑以咸通八年窆於華亭縣城西一里鄉名修竹是唐之置縣固有城矣廢興之由不得而詳焉縣境內西南稱南城亦不可曉古城在華亭縣西六十里按祥符圖經所載也今未詳所在府社壇舊為縣社在華亭縣西北二里嘉興縣縣城按舊經云周回二百二十五步宋淳熙間僅餘一百步今皆無之矣檇李城在縣南四十五里高二丈厚一丈五尺後廢按舊經故戰場在縣南四十五里夾谷中即秦長水縣古檇李城也史記載吳王傷指卒於此吳記曰谷中有城故由拳縣治也即吳之柴辟亭神異傳曰由拳縣秦長水縣也始皇時縣有童謠曰城門當有血城陷沒為湖有老嫗聞之憂懼且往窺城門門侍欲縛之嫗言其故嫗去後門侍殺犬以血塗門嫗又往見血走去不敢顧忽有大水漲欲沒縣主簿令吏入白令令見吏曰何忽作魚吏又曰明府亦作魚遂乃淪陷為谷矣因曰長水城水曰谷水也射襄城在縣東北三十里後廢何城去縣一百里吳王所築後廢東顧西新南于北主四城嘉禾百詠注云吳越戰爭時所築後廢縣社壇舊在縣西南一里一百三十步後移在精嚴寺前壇宇廢圯宋宰李時習修之有舊碑沒於眢井中今止存敗屋為鋪軍所據海鹽縣縣城周回一百七十步高一丈二尺五寸厚一丈後廢古城在縣東南五十步歟城在縣西北一十八里周回一里今止有歟城橋城不存故邑城在縣東北三十六里周回半里縣社壇在縣西南半里崇德縣縣四城在邑境者三官城屬鹽官傳皆吳王所築遺址尚存何城在縣西二里晏城在縣東北二十里萱城在縣東三十里張堯同賦何城曰報越心何壯貪齊意已輕忠言殊不聽何用築斯城縣社壇在縣西二百步入門而南有齋廳三楹廳之南五壇壇各有三級風伯雷雨師繚之以牆廳值宋政和間重修社壇碑記磨滅幾不可讀大率全備敕牒之語敕牒則盡述江東提舉沈延嗣奏請之辭當時按式圖鏤版行下故式圖刻在碑首歷年雖久壇制如式坊巷録事司迎年坊在春波門內名義舊名春波今改是名蓋取迎青帝於郊祈福豐年之義正興坊在朱巷名義舊名永興後改是名蓋取經正則庶民興之義登春坊在春波門內名義通春波門故取熙熙然如登春臺之義宜民坊在嘉興縣前名義通嘉興縣故取豈弟君子宜民宜人之義流虹坊在興聖寺西名義巷有興聖禪院乃宋孝宗育聖之地故取華渚流虹女節感而生少昊之義好德坊在鹽倉巷名義巷有晉歌妓蘇小卿之墓故立是名欲使人知有好色不如好德之義通津坊在府東灣名義坊近水故立是名聨魁坊在倪家橋名義舊名褒孝以宋嘉定十一年里人有陳姓第四子者剖心藥親之疾特立此以褒其孝壬寅冬郡守倪祖常改是名蘭錡坊名義宋于太尉居焉故取吳都賦陳兵而歸蘭錡內設之義碧漪坊在嘉興縣西北名義舊曰集賢通天心湖故改是名集仙坊名義巷通隱真道院因仙人劉高嘗至此故立是名蓋效唐人以集仙名館之義青緺坊名義宋胡安撫居焉安撫名與可子孫皆把麾故取東郭先生傳青緺之義環闉坊名義在府後門之東偏通回環子城之路詩云出其闉闍注闉曲城也故以此名旌烈坊在郡治北名義巷有郡神楊將軍廟故立此名以旌將軍之休烈聽履坊名義西河上宋有王尚書希呂宅故取聽履上星辰之句卿月坊名義宋有趙少尹宅故取卿士惟月之義祥鱣坊名義近郡文學廳故取楊震鸛雀銜三鱣之祥杏壇坊名義在路學前故取孔子杏壇絃歌之義鳳池坊名義宋有婁參政機府故標中書鳳池之榮觀百福坊名義巷通天慶觀故取旱麓受祖申以百福之義封祝坊名義巷通祥符寺乃宋時聖節祝聖之所故取華封人祝堯之義介寧坊名義俗曰陳婆兒巷婆媪乃婦人高年者之稱也故取介爾景福壽考且寧之義尊耉坊名義俗曰老人局故立此名蓋取尊事黃耉之義率育坊名義俗曰楊洗麩巷故立此名蓋取毛詩帝命率育之義斯才坊名義俗曰馬坊巷故立此名蓋取駉詩斯馬斯才之義咸中坊名義俗曰幢子巷乃宋刑人於市之所故立此名蓋取呂刑咸中有慶之義聚桂坊名義舊名神童蓋市心有唐堯臣包時習與弟時中時飛俱中童科後徐聞詩又以童科第進士故也堯臣後人夢符震龍天麟又相繼擢第景定庚申請於郡改是名豐衍坊名義通慈濟倉故以是名美俗坊名義通瓦子故立是名欲以美汙俗也靈光坊在驛巷名義通靈光寺故立是名移風坊名義通西瓦子故立是名欲移風易俗也鄉道坊名義在河道人巷口故以是名通闠坊名義在府後橋之西偏通大市故取吳都賦橫闤闠而流溢之義李周翰注曰闤闠乃市門也織雲坊名義通蔡織紗巷故立是名蓋取天孫巧織雲錦裳之義燕春坊名義巷通酒庫熙春樓故立是名蓋取遊燕之義四騏坊名義宋有馬太尉定逺居焉故立是名蓋取毛詩方叔率止乘其四騏之義鳴社坊名義通社壇李蕭逺運命論里社鳴而聖人出是郡為宋孝宗育聖之地故因社名坊輕裘坊名義宋竇安撫居焉竇常帥襄陽故立是名蓋取羊祜輕裘緩帶之義通明坊在醋坊橋名義舊在顧市橋後移於此路通南門因取離明之義爰穡坊名義俗曰糖巷因取土爰稼穡稼穡作甘之義勸善坊名義通咸中坊刑人之所尚書多方云殄戮多罪亦克用勸孔子傳曰戮衆罪亦能勸善因立此名暨容坊名義通南營因取禮記玉藻戎容暨暨之義天祿坊名義在石獅子巷天祿辟邪乃獅子之類也故以是名閲武坊名義通教場因取春秋大閲之義歸鶴坊名義舊曰華表後改是名蓋取丁令威去家十年今始歸之義清瑞坊名義南通澄海門因取五百年海清瑞應之義格真坊名義通崇道宮因取感格上真之義向葵坊在府治前名義以其東嚮故取葵花向太陽而開之義依蓮坊名義通節推廳因取泛緑水依芙蕖之義望恩坊名義巷口之西有橋曰望恩故以此名寶花坊名義路通寶花寺因以名皇華坊名義宋浙西提舉任清叟居於此故立是名蓋取皇華使臣之義廣平坊名義通廣平橋因以名擁麾坊名義宋有陳知軍宅故立是名敷閏坊名義在油車巷故以是名崇梵坊名義通兜率寺故以是名欽祐坊名義通天寧寺欽奉宋徽宗香火是為祐陵故以是名遺愛坊名義有普寧王廟古傳嘉興縣令有善政天降一銅棺蓋自開縣令入焉吏挽留之遂折臂故名遺愛六一坊名義通天慶觀取東坡天慶觀賦六壯一稚之義或謂六一居士後人居焉或謂宋陳賢良為東坡六客之一世居白牛因名此以表之政桴坊名義在王鞔鼓巷故取善政致和猶桴鼓之義阜通坊名義通稅務因取周禮商賈阜通貨賄之義金他坊名義舊通趙郡王府因取王印金槖他之義燕支坊名義通燕支橋因以是名澄觀坊名義通楞嚴十六觀堂因以名繪麟坊名義通金山大王廟大王即霍光也因取繪形麟閣之義東陵坊名義巷有石井欄象瓜俗曰甜瓜井因取東陵侯種瓜之義繡衣坊名義宋延安撫居焉延持使節故立此名以表繡衣之榮瑞龜坊名義通精嚴寺嘗獲靈龜故立此名流化坊名義通水纂橋水乃流動之物故名流化興賢坊名義在貢院前因取賓興賢能之義後因鄭守定重修貢院而去之改立興賢館今皆廢松江府顯善坊在府東南二百五十步勸義坊在府西南五百四十步名義宋有縣令楊潛因邑有孝義者特表之以感化里俗云石獅巷在府東一百二十步名義巷有石獅故以名石條巷在府東六十步倉橋巷在府東一百步名義舊有米倉在巷北因以名郭門巷在府東一百七十步名義巷以西曰坊郭東曰附郭今名楊賣柴巷鹽倉巷在府西一十步廣明橋巷在府西四十步前巷在府西六十步後巷在府西八十步亭橋巷在府西一百三十步東私路巷在府西二百五十步西私路巷在府西二百六十步福順廟巷在府西三百步莫家巷在府西三百五十步竹木巷在府南二十步城隍廟巷在府南二十步廟巷在府南六十步金山忠烈廟巷在府南七十步石碑巷在府南八十步紀家巷在府東南一百三十步毬場巷在府東南一百五十步石幢巷在府西南一百五十步童家巷在府西南一百八十步陸家巷在府西南二百三十步丘家灣在府東北一百八十步田家灣在府西南三百五十步海鹽縣字民坊在縣前名義縣令乃字民之官故以名聞琴坊在縣東南名義取宓子賤單父鳴琴之義宣化坊在縣西名義前漢董仲舒策云縣令所使承流宣化也故以名定民坊名義取易履卦辨上下定民志之義衆安坊熙春坊迎恩坊在縣西柵名義凡恩詔必於此地迓之故以名起潛坊在福業院前名義福業院有龍湫因取起潛龍之義喜雨坊在福業院前名義福業觀音院乃禱雨之所因取春秋喜雨有志乎民之義甘泉坊是邑舊有坊十名曰海瑞海倉海晏海康海清海安海豐海熙海潤海阜聖朝至元乙酉縣尹顧泳改今名崇德縣狀元坊在崇福寺西趙家巷今廢名義因狀元沈徽學舊居此因以名五桂坊名義以莫氏五子登第建又有蔡氏兄弟居是坊故又立桂華里以榮之襲桂坊名義宋陸氏兄弟子姪聨登第建榮桂坊在塘之東岸入縣庠路今廢至元嘉禾志卷二
