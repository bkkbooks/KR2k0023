body:
  text: 至元嘉禾志卷二十一元徐碩撰南四鄉記開禧三年鑰方挂衣冠又苦􅏓盩之疾卧家待盡孟秋月杪郡以邸報來使兒輩誦之有臺評論嘉興府華亭之四鄉利病深切著明為之矍然而起誦之數過仰嘆曰皇上勤恤民隱宵旰不遑而耳目之官洞察田里之細微徑以徹聞不旋踵而報可古所謂諫行言聽膏澤下於民非此之謂耶於是時仲舅汪文昌之子立中為宰恐其有纍亟以書問之得其報曰此出於殿中侍御史葉公之奏非特為一邑無窮之利立中與同寮亦與有大幸於斯焉士民方相與為葉公立生祠於縣庠因請為記以敘其事始及積弊之實大約邑中嵗造煮醖額止四萬緡紹興十八年有邑宰醖過倍增至十三萬有竒科斂之害自里正市井道釋醫卜下至倡優無有免者吏胥以次差等其長嵗或至二百萬錢賕賂肆行公私交病吏逃民困曽無以塞責動輒科罰重征倍稅日甚一日參政錢公邑人也既登政路盡以告于孝宗皇帝宣諭漕臣韓彥質俾有以寬之先是張涇堰壞海潮大入雲間胥浦仙山白沙四鄉蕩為巨壑漫及蘇湖秀邑不復可耕乾道七年朝廷不憚重費大興修築海患雖除民力愈竭斥鹵未清租稅全失至是嵗久農民漸歸故業可以起賦猶未忍盡復舊貫量估米直使之樂輸會計四鄉夏稅折帛為緡錢二萬苗米近三萬斛斛三緡合為九萬千內以六萬五千三十九貫充一嵗月解之數以補酒額分𨽻發納尚有增額三萬貫有竒皆不可催足之數又盡蠲之自淳熙六年為始兩鄉之賦既輕而易輸三十餘年敷抑之苦一旦洗去感被寬息闔境為之鼓舞今又將三十年而四鄉復成大敝副端舊寓兹邑深知底藴其論年來曲折如燭照數計之明謂既以補額外之酒錢遂分入月解之額府已均定不容少虧春催夏稅夏催秋稅是蠶桑未動而責以折絹銍艾未施而責以折苗殆無此理其尤害者遇有災傷如今嵗既旱而蝗他處皆有蠲減此獨不與而征催益急别置牌引名色至不可縷數欲下漕司及本府措置每嵗别委官專催四鄉二稅徑解所𨽻不許邑官干與仍除去版帳中酒錢之數起催輸納並從條限給鈔無得稽遲災傷均與蠲放民賴以寬錢又無欠邑亦易辨一舉而三利具焉上意開納旋即施行立中到官固已厯究本末無路自達又以四鄉所輸每嵗多不及額邑為補足尤難支吾天假之幸有此際會且俯蒙察其來已久非今日之罪略其前日不得已之過而禁其將來可謂曲當矣官寮吏民交口相賀郡太守程公卓喜斯邑之少寬戒飭上下奉行惟謹葉公名時字秀發嗚呼推此心而廣之皆能如此斯民其有瘳乎龍圖閣直學士通議大夫致仕樓鑰記勝果寺妙悟大師碑銘吕益梁撰師諱希最俗姓施世為湖州人其母感異夢而生乳中遇相者曰是子骨法異常勿染于俗因捨之出家依郡之廣化寺僧寶新為師四嵗遇天禧霈恩祝髮受具足戒十五嵗學天台教於錢塘名師慧才盡傳其學悉眀奧義慧才善之曰天台教門又得人宗風益不墜矣擢居上首緇流競名者愛而畏之號曰義虎治平中遂挈經笥來講秀州青龍鎮隆平之塔院師平日不特講説而已其舉動語默不必與其法相應而後己名實既符道俗咸嚮講塔院者纍年一日不得意于鎮宰即拂衣去之霅川師既去學徒什伍散矣昔之妙香寶華之所一變而為積塵茂草之場信士過之莫不徜徉重惜師之去也鎮宰替師復來則不復主持矣遂買居於勝果寺講説如初寺僧子雲之室夙有祟師乃呪塊土擲於怪室中須臾得片紙書曰今被法難捨法力沒余當復來於是寧息者纍日其後擊物揚火變怪大作子雲惶怖復請師禳之師至怪所詢之曰汝果何物耶得非未離幽壤之苦將丐慧力以求生者耶何為擾人不已耶汝不聞惱法師者頭破七分乎為之講説輪回因緣仍令衆僧聲呪以破其罪障俄而空中轟然有聲視之得朱書數十字自稱有漢烈士沈光大略止悔過謝罪自蒙懴解中夜已生他化矣師謂他化天也嗚呼怪哉余嘗讀髙僧傳至於法蘭精勤經典山中神祗皆來受法人謂得破精靈余竊疑其誕及覩此則知佛慧神通足以斥陰妖之靈響拔重泉之沈魂明暗兩途各獲安利矣夫怪者聖人所不語將為後世好誕者戒也然孔子嘗謂敬鬼神而逺之又曰幽則有鬼神是豈以鬼神為無哉今沈光變見顯顯若此則凡包禍心以欺諸幽者得不聞是而懼乎此余所以雖怪而必書也師臨終尚説法作偈頌優遊坐亡時元祐庚午季秋六日以其年孟冬十八日闍維得舍利數十瑩采陸離臘七十三夀七十六其徒寶覺惠圎惠軫用浮屠法散骨於水因求文以貽不朽銘曰禪律雖殊歸則同揆冰泮雪消俱成一水師之持律古佛是擬聞思惟修小不踰咫講明妙教名流伏膺解破幽障沉魂獲升利物既足坐躋上乘慧績若此宜以銘稱世非無怪也聖人不以語諸人然易曰精氣為物逰魂為變是聖人固己言之矣勝果寺擊石揚火之妖豈非精氣為物逰魂為變者乎宋之天禧距漢已千百載所為烈士沈光者精魄猶未化其可信耶其不可信耶抑他有憑附而然耶最公法師以大乘力濟幽塗若使魂氣有所之而妖怪不復作是亦不可謂難矣其徒刻之石以大其説以永其傳無證修公出以示余且言佛道慈悲其有徴驗者如此故為之書時至元癸未清明後二日承務郎慶元縣尹單慶謹識寒穴泉銘并敘守臣毛滂撰歐陽文忠公為大眀水記云山水上江水次之井為下山水乳泉石池漫流者上然余客東都時日從定力流取井水煎茶此井不知有山泉而味乃與惠山等至衡其輕重則定力之水輕是此井寧肯出山泉下哉至載劉伯芻謂水之宜茶者有七等又載李季卿論水次第有二十種惠山泉蓋居其二文忠公以為不然雖余亦不以為然也蓋水之在天下者人安能盡知之顧可使不知之水又盡居七等二十水之下乎水之良不過甘也一甘而别為二十差為七等又遂以為天下無水而髙之是當欺我秀州華亭縣有寒穴泉邑人知之者鮮縣令姚君汲以遺余余始知之問此邦人則多不知也取嘗甚甘取惠山泉並嘗至三四反覆嘗略不覺有異是就余所知則惠山寒穴相望裁二百餘里間蓋有兩第二泉矣嗟乎論水者談何容易景祐中相國舒王有和華亭縣令唐詢彥猷寒穴泉詩云神震冽氷霜髙穴與雲平空山渟千秋不出嗚咽聲山風吹更寒山月相與清北客不到此如何洗煩酲此泉雖所寄荒寒宜因相國詩聞於時然亦復未聞也余憾前人之論水者既不及知之余欲以告今之善論水者為作銘云泉之顯晦豈亦有數生此寒穴與世不遇美不見録為汲者惜泉獨知冽不計不食書朱象先畫後松陵人朱君象先能文而不求舉善畫而不求售曰文以達吾心畫以適吾志而已昔閻立本始以文學進身卒蒙畫師之恥或者以是為君病余以為不然謝安石欲使王子敬書太極殿榜以韋仲將事諷之子敬曰仲將魏之大臣理必不爾若然者有以見魏德之不長也使立本如子敬之髙其孰敢以畫師使之阮千里善彈琴無貴賤長幼皆為彈神氣沖和不知向人所在內兄潘嶽使彈終日達夜無忤色識者知其不可榮辱也使立本如千里之達其誰能以畫師辱之今朱君無求於世雖王公貴人其以何道使之遇其解衣磅礴雖余亦得攫攘于其旁也元祐五年九月十八日東坡居士蘇軾書至元嘉禾志卷二十一
