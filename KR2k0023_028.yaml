body:
  text: 至元嘉禾志卷二十八元徐碩撰題詠松江府懷土賦陸機余去家漸久懷土彌篤方思之殷何物不感曲街委巷罔不興詠水泉草木咸足悲焉故述斯賦背故都之沃衍適新邑之丘墟遵黃川以葺宇被蒼林而卜居悼孤生之已晏恨親殁之何速排虛房而永念想遺塵其如玉眇綿邈而莫覯徒佇立其焉屬感亡景於存殁惋隤年於拱木悲顧盼而有餘思俯仰而自足留兹情於江介寄瘁貌於湘曲玩通川以悠想撫歸途而躑躅伊命駕之徒勤慘歸途之良難愍栖鳥於南枝吊離禽於别山念庭樹以悟懷憶露草而解顔甘堇荼於飴茈緯蕭艾其如蘭神何寢而不夢形何興而不言贈從兄車騎李善注陸士光孤獸思故藪離鳥悲舊林翩翩遊宦子辛苦誰為心倣佛谷水陽婉孌崑山隂營魄懷兹土精爽若飛沈寤寐靡安豫願言思所欽感彼歸途難使我怨慕深安得忘歸草言樹背與襟斯言豈虛作思鳥有悲音和皮日休吳中即事陸魯望風清地古帶前朝遺事紛紛未寂寥三泖凉波漁蕝動逺祖士衡對晉建帝以三􅍩冬溫夏凉五茸春草雉媒嬌五茸吳王茸各有名雲藏野寺分金剎月在江樓倚玉簫不用懷歸忘此景吳王看即奉弓招回自青龍呈謝師直梅聖俞共君相别三四年巖巖瘦骨還依然惟鬚比舊多且黑學術久已不可肩嗟余老大無所用白髮冉冉將侵顛文章自是與時輩妻餓兒啼無一錢幸得詩書銷白日豈顧富貴摩青天而今飲酒亦復少未及再酌腸如煎前夕與君歡且飲飲才數杯我已眠雞鳴犬吠似聒耳舉頭屋室皆左旋起來整巾不稱意挂帆直走滄海邊便欲騎鯨去萬里列闕不借霹靂鞭氣沮心衰半欲睡夢想先到蘋洲前願君無復更留醉醉死誰能如謫仙逢謝師直昔嵗南陽道中别今向華亭水上逢把酒語君悲且喜流光冉冉去無蹤過華亭摩雲鶴唳幾十隻隔水野梅三四株欲問陸機當日宅而今何處不荒蕪青龍海上觀潮百川頻蹙水欲立不久却回如鼻吸老魚無力隨上下閣向滄洲空怨泣摧鱗伐肉走千艘骨節專車亦何及幾年養此膏血軀一旦翻為漁者給無情之水誰可憑將作尋常自輕入何時更有弄潮兒頭戴大盆來就濕華亭百詠顧亭林許尚旦暮潮流急東西徑路斜無從質疑字共屬野王家顧府君宅即顧亭林雲寺祠堂蕭蕭蘭若地知是府君居祠事今誰奉吾來一嘆吁東菴異跡在顧亭林菴中有忠烈公像近嵗忽地裂數尺中有風濤聲以物探之則應手火起地脈風雷吼人疑湧海潮將軍英爽在何敢物興妖金山激浪聞澎湃山神隂力多風濤歸指顧海若敢誰何安公像昔有僧沈海而死肉身尚存浮鉢來滄海幡然厭世塵補陀崖畔月長照定中身寒穴泉濆湧懸崖下泠泠注不窮將期挹甘冷弱水漸難通蘇州洋又名金闕亭者必闕南舶欲入華闕放蘇州洋蓋闕此屬處舊蘇州已出天池外狂瀾尚爾高蠻商識吳路嵗入幾千艘華亭谷府南三里入松陵瀰漫連迥野潮汐往來頻慣識松陵路重來不問津八角井浚極疑無底丰稜定有因沈沈中夜月照影屬何人陸機茸在谷東吳陸遜生二孫常於此遊獵今名桑陸又名吳王獵場二陸為童日驅馳屢忘歸至今桑柘響禽鳥尚驚飛柘湖展武沈淪後波澄一鑑明桑田復更變觸目總柴荆秦女祠狼秦崇苛政有女亦䝉寃欲弔興亡事神應恥重論唳鶴湖洗蕩雲間路奫淪一水深月光零露重遙聽九臯音三女岡三殮知無有香魂計已銷頻來吟楚些嵗久若為招金山城府南八十五里舊經云昔周康王東遊鎮大海故築此城治盛周康世東遊豈信然城闉亦隳廢門諜漫相傳前京城府南八十五里輿地志云本海鹽縣以地近京故以為名廬落皆無有依稀古堞存登臨認遺跡草樹暮煙昏崑山嵗久阡原變平時草木深英才沒黃壤舊事不堪尋陸機宅在崑山華第今何在千年謾有名披蓁問遺裔寂寞一傷情谷水短櫂經由處風披藻荇香中宵孤鶴唳片月印滄浪秦皇馳道歎息秦皇帝何年此逸遊迢迢大缸路千古為嗟羞征北將軍墓即陸禕墓在崑山有碑村人疲於官吏征索遂碎其碑崎嶇尋古隧衰草隱寒原欲讀將軍事豐碑祇半存鳯凰山鳳德來何代慵歸丹穴藏甘心化為石萬嵗瑞吾皇陸寶山府北二十五里祕寶封堅石山靈謹護藏欲為中帑助時復露光芒佘山祖傳舊有佘氏墓道於此因名焉人與室俱化隂森松竹寒時時見孤鶴疑此守神丹集賢里父老云昔陳陸諸公居此因以為名冠蓋遊從日欣然萃一鄉田原總如昨誰復嗣餘芳白龍洞在橫雲山頂下通澱山湖海風雨夜有龍出入洞中呼吸湖中水山椒寄此身洞門風雨夜電火逐霜鱗石魚雙鯉何年刻悠然鬐鬛全登臨忽懷逺尺素若為傳秀道者塔在佘山秀昔廬此山有二虎侍之後自建闕於山闕畢還積薪自焚止存碑銘辛勤成鴈塔俄赴積薪焚靜夜耽耽影疑來護刻文靈峯菴在佘山池皆金砂後為昭慶禪院路甬金砂地高人此築菴為詢林下客妙語與誰參芥子庵林外三椽建常思愒息時莫教嫌迫窄中有五須彌澱山府北七十里在澱湖之中殿閣輝金碧遐觀足畫圖維舟一登覽誤陟小方壺三姑廟在闕為闕閾水湖中羣蛟競不入廟中神居隂物護闕閾捍洪波莫慮蛟龍怒年來畏叱訶蓮巢在青龍陳氏疏地種蓮為休息之地今已湮廢記得荷香裏蛾眉唱採蓮千年龜欲息不見葉田田鬼書在聖果寺昔嘗顯異於寺僧鬼自稱東漢烈士沈光有書石刻壯士為儒恥捐軀志所甘無名豫青史幽憤亦何堪孔宅在府北七十五里昔有孔子後遊吳居此因名焉又云昔夫子所居忽有先聖闕一碑額曰孔村人怪而碑之廟貌逾千祀泥封古碣昏傳云素王宅真贋與誰論嵩宅府西三十五里昔晉將軍袁嵩居此因名焉疆埸功成後歸來卜一丘當時應種德名字播千秋俞塘府東五里往來之舟皆可揚帆諺有云雖得珠千斛不賣俞塘北延袤三鄉外東流與海通河神屢加惠䑺借往來風鶴坡府東七十里此地出鶴俗呼鶴窠者是也索寞東郊逺仙禽盡此藏夢回明月夜林杪響圓吭砂岡府東三十五里南屬海北屬江入土一丈皆螺蚌殼如是者三所相傳海中湧三浪而成豈誠然歟千里平砂地聨通江海湄謾傳目激浪疑是蚌螺基御史涇府東疏鑿人何在流功幾世餘農氓誦名氏不數鄭公渠滬瀆府西八十三里即松陵江水源出太湖松江之民資灌溉之利泛泛松江水迢迢笠澤通萬年知禹力灌溉有餘功東堂以下三咏並在府治㕔事之側㕔左清閒處金猊罩寶香令君今學道來此吸朝陽思齊堂伊昔絃歌治能聲著海隅升堂想遺跡勵志欲齊驅月榭簷角銜牆固明疏護翠螺公餘秉談麈竟夕對金波濯纓亭府前官亭輿梁斜倚處簷影墜清流往往抽簮者常為孺子羞石獸相傳昔嘗為怪夜則環市而走遂斷其一足以下二詠並府東刻鑿知何代彌年亦有神宵行無足怪一吼亦驚人震橋昔姚庭輝宰此邑謂主位頗虛多宜客人作亭以鎮之又名虹橋虹音降瓦木明丹琧初期鎮此方石梁今欲圮尤益富蠻商小隱園粧㸃林泉趣銷除市井心平生跧伏計到此意偏深姚將軍廟本闕至南宰謂廟門面北闕十土人遂移縣西以南鄉以下二八詠並在府西隂功周邑境南面固宜然毋復論民事神今憚改遷趙店闕有邑之闕市東名趙店今神闕之趙店日日黃塵路喧豗漲市聲神靈自安此不欲變名稱望雲橋父老云立橋日適有瑞雲見因以為名憶昨登臨日卿雲正四翔重來窮目力天末起祥光石幢望雲橋南此地昔有湧泉云是海眼立幢於上以鎮之矻立應千載傳因海眼成蓬萊水清淺曽不見欹傾普照寺晉陸機宅捨為寺高門收畫㦸即此見精藍施豫恩雖在緇流絶不談彌陀閣拄䇿徐徐上回環佛頂遊九山俱在望日斷暮煙浮羅漢院邃宇中何有台山五百尊云何困人力金像總塵昏丁公橋相傳令威由此仙去又名丁行橋令威仙去後遺跡嘆成非華表成烏有何由見鶴歸雲間館郵亭臨爽塏杗廇架修虹我亦輪蹄客心期訪士龍福順廟殿宇之上鳥雀不棲門垣雖蠧壞古屋尚深沈鳥雀猶知避斯民盍致欽東嶽行祠明主東封後龜䝉望益尊巍然此行宇時許薦蘋蘩西庵陳律師菴律師常習儒業蚤為儒冠誤齊心學竺乾而今林下塔夜夜戒光圓白龍潭神物幽潛地滄滄水接空不緣嘗應禱誰識有殊功毗盧菴勾氏香火中有御書閣捫蘿通一徑修竹蔽中籬祇有奎章在龍神暗護持西林林外初晴後斜陽滿芰荷頻來指靈鷲此去路無多陸瑁養魚池即西湖也今為放生池誰得陶朱術修治一水寬皇恩浹魚鱉不復敢垂竿小湖西湖之北一灣名小湖獵獵風蒲外淵淵明月秋詩翁浮短艇彌楫看游倏湖橋瀲灧湖光好荷風六月凉倚欄吟不倦魚鳥亦相忘唳鶴灘湖之東南隅養鶴人何在湖邊水自清喚回中夜夢灘上戛然聲泳波亭湖中吕梁觀已逺沂水浴應難却倚亭前栁時時照影寒風月堂舊市舶司吳使所建夜靜蒲萄皺雲舒玉鑑凉築堂人不見尊酒暗相望湖光亭風月堂之西日暮蝦鬚卷亭中雅燕開微風起蘋末波影動樽罍道院西湖之西後為延氏蔬圃淨館今何在惟餘柏色新棲棲抱罋者不是煉丹人異木舊傳商人嘗夜夢有人自云吾土地神也能祭我令汝冝商每嵗商人夜半祭之往往獲其隂助蟠根知永遠曲幹聳蛟虬閩賈䝉私庇年年此薦羞顯忠廟以下十詠並在府南俯拜祠堂下遙思弼漢功吁嗟孝宣帝忘德太匆匆東寺世傳水陸池有龜數枚聞講經聲則緣波而上罷則復去愛此稜伽土勤修戒行成文龜亦知善來聽講經聲證覺院舊之無礙禪院有人明七淨蝒沒締良因歎惜流光替誰為無垢人棲真庵仙路多官府真人未上升松窗霜月白相對誦黃庭栁園芳草池塘暖東風桃杏繁春歸人亦散寂寞鎖園門陸四公廟又名陸司空晉傑云亡久嘉名未遽湮嚴祠坐遺像猶解福吳民南庵堂壁有六祖畫像施水功成後耽耽梵宇深升堂瞻貌像默㑹祖師心姜庵隂曀楸梧裏鳥鳴落日中九原人不作明贊亦何功望仙橋鶴駕乘風去千年竟不歸石梁憑望處空復白雲飛三洞庵勾曲山頭客遨遊到市塵星冠頂霜月夜半正朝真淨居院昔馬耆法寧住此院故俗又呼為馬耆庵後法寧弟子亦住此庵明眼如何在山門久寂然宗風未遽替還喜一燈傳氷檗菴王道所居鳬舄棲遲地池流一徑斜先生久清苦不肯競紛華圓珠庵定回人寂靜繞鼻碧蓮香却認循簷月摩尼發夜光至元嘉禾志卷二十八
