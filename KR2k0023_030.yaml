body:
  text: 至元嘉禾志卷三十元徐碩撰題于山圓智寺沈遼海天寥寥禾黍秋人籟已息煙霧收數聲鶴唳草堂靜何苦更向咸陽遊雲間野天茫茫秋水清生盡蒲蔍無人耕不知三呉地力壯老鶴空向烟中鳴又蠟屐去陽羡乗桴望雲間腰垂陶令印意在莊生環斯民久困敝何用惠孤瘝子心倘有愧拂衣歸故山華亭秋日張擴隂雲薄薄秋滿輝曉露含光濕翠微旁舍繫牛嘗社酒荒城擣練給征衣淨如掃迹無㡬多不論錢蟹正肥定是水鄊差可樂不應潦倒未成歸過澱山湖昨日過湖風打頭葦蒲深處泊官舟近人烏鳥語聲碎瀕海風煙日夜浮午飯腥鹹半鮭菜客牀顛倒一皮裘平生浪說在家好晚向風波未肯休湖齋朱之純平湖十頃水汪汪得意茅齋且屈藏園種小桃今結子池栽翠菱更聞香六龜已見千年古予在西湖上治圃于桃根獲古龜六枚其小如錢雙鶴看呈八月祥昔時雲間有紅闕往每中秋月夜有仙鶴下人往見之得名以此今闕也手治谷水鄰其地居此翛然忘世味此心先已去龍陽寄題朱氏谷陽園蔡肇陸機異時宅故物無復迹悠悠谷水陽野水空餘碧我觀豪士賦文字豈不白一為功名誤末路真可惜至今風雨夜哀鶴鳴不息千秋得吾人淨眼照阡陌結茅風煙際一悟世網窄古今一丘貉貴賤百年客閉門橙橘香隠几冰凍釋我慙升斗祿矯首望八極人生勞佚間此殆天所激鶴翔赤霄動鯨噴碧海坼為爾具扁舟送此齒髪迫朱氏天和堂朱氏諱模自號天和子黄裳谷水悠悠水天濶綠竹猗猗玉龍活天和堂在翠微中堂上誰誇青𤨏闥二俊昔為才所驅未識危邦何太愚輕抱雄文走西洛漫勞黃耳尋中吳豈謂七百有餘載乃獲夫子營吾廬能向平時脫羈絡為悟浮雲此生錯通道益深醉隠亭載鵬風厚逋遥閣萬累紛紛無處尋須信天和有斯樂彼哉二俊胡不歸空嘆華亭數聲鶴又徐鶚先生晦迹谷水東志趣不與晉賢同遥聽鶴唳笑二陸巢傾穴碎非為工浩然養素逺聲利脫去羈束離樊籠醉隠亭中二十載桃紅李白摇春風感時嘯咏聊自適誰知富貴為窮通羡君髙操超流俗直疑變化稱朱公又楊傑聞說隠君子天和長自如危言莊叟意谷水士衡居窮達命已定利名心頓疎繡溪歸未得吾亦愛吾廬又華亭山水佳秀色宛如畫前賢有遺跡卜築俟來者髙人養天和放浪寄林野安知嵗月徂但喜名利舍傳家得之子隠几興何闕余山普照院上方朱翌篛笠莎衣一釣舟東風吹我此山遊洋洋盈耳松聲亂咄咄逼人山氣浮講罷舊聞花雨墜心清閒與妙香投道人居士忘機久獨抱闗山興未休余山月軒朱伯虎愛月開軒絶頂間屹然危剏壓層巒翦除羣卉當簷盡添得清光滿檻看亂石雲堆秋色冷老松風入夜深寒十年夢寐江鄊景杖履終期日倚欄超果院見逺亭李景元髙僧欲縱目橋上構橫亭野水茫茫白羣山㸃㸃青客帆風送葉漁火夜移星看盡朝昏景天涯一畫屏題縣齋并序朱之純彭城劉侯元祐庚午來宰雲間下車一日先修庠序次立教誡下至簿書期㑹各有條理甫來兼旬一境告治訟庭清明㡬致刑措于是即縣齋之東新其一堂一亭一閣堂曰弦歌亭曰三山閣曰艮閣與士之賢者講論歌詠于其中蓋將有志乎美風俗也然余嘗思之自浙右為邑未有繁劇過此者其境東南濱海西北負江帶湖方二百餘里其户口除浮寄浪居而占于籍者亦不下數十萬比嘉祐初太常丞呉公所治往往三倍其數故生齒日衆情偽滋多而獄訟少有衰息厥後欲鎮以寛者失之慢矯以猛者傷于刻間有嘅然將勤以濟之者雖戴星出入日昃不食力愈勞神愈耗而姦宄鬬很終不能勝是何耶豈其操術本末之倒置歟將意其難治而作聰明之過歟抑亦不能平易而以百姓之心為心歟不然何四十年間民用不静而劉侯之來未㡬而風移俗易之疾耶詩曰豈弟君子民之父母夫豈弟之道凡為政者莫不念此然行之而民不心服者以其作于人為而好惡之私勝之耳使夫豈弟發於天資平心如鑑之應形接物如鐘之待叩雖天之髙地之厚鬼神之無形金石之無情猶且應之况利其仁而樂其義者乎此固為民父母之道也得所以為民父母之道則其子從之之疾又何怪焉宜其遊心三山鳴琴一堂登髙而賦之使人知仁義禮樂之意也予圃隠湖西北有客見過因問邑之治否誦公豈弟出于自然且曰方周盛時齊人五月報政文公猶驚其速况處今之世教化未明而劉君治江海僻陋之地曾未十旬了無可議則是古道復行豈不信哉噫以客之所言證予之所聞則君坐斯堂宴斯亭登斯閣也宜無愧于古人矣客退因序其所聞而為之詩洋洋百里起謳吟惠化薰陶谷水隂明月詩成三島秀清風曲奏一堂深武城浪說言游道單父休誇子賤音政敏誰知過齊國想君真得古人心右絃歌堂俗易風移古道還縣齋疊石作三山因憐席上紅塵少贏得堂中白日閒想見六鼇擎水下坐看雙鶴落雲間何須更叩黃金闕只此幽亭是玉闗右三山亭畫閣峩然冠翠巒更占艮地峙巑岏曉忩髙挹東風暖夜幕低垂北斗寒突兀狀驚青蜃吐徘徊勢若老龍蟠嗟予勁節非徐子那得陳侯一榻看右艮閣題思呉堂并序朱之純思吳堂者初名環碧亭嘉祐中太常丞吳公㡬道所作也公有惠政四十餘年民頌不絶今彭城劉侯來宰雲間採民所譽因至其地見其頽廢毁沒喟然嘆曰昔人思召公愛及甘棠戒之曰勿翦勿伐况此亭中冠一湖呉公嵗時與民所共樂者最為勝㮣當秋分之月夜湧出金波遇春暮之花時變為錦水若乃火雲燀空揖清風而愠解凍雲凝地睹白雪以神清有此佳麗荒而不修良可惜也于是增大基址飛出軒宇環以虹梁徘徊煙波之中浩浩乎誠可樂者乃闢其亭為堂易其舊名曰思吳所以從民望也呉公之來予生方七嵗其教條治目更歴異政不得其詳然猶能彷彿記其去時父老悲啼攀轅不與前進以至空一邑隨之及予壯嵗疑其得民如此乃問鄊人長者因語其施設大畧蓋有惻怛之誠感動冥黙者二三事焉如浙右旱蝗蘇秀為甚公方下車即自痛責遂禱橫山之神而致甘雨蟲亦避境不食其稼至秋大稔乃出教條命民預修水利以待滛潦或停或注達于江海已而水暴至阡陌堅完溝洫既浚復稔如初比及三年風俗既厚天無札夭地無旱潦家給人足歌誦滿路噫此古之所謂遺愛者宜乎去之久而思之深也今劉侯為政豈弟又能孜孜尋訪呉之治迹欲舉而必行之惟恐後時則名斯堂也豈惟從民之望抑亦見其樂取人以為善也然人有疑其名者告予曰詩人思古皆傷今之不然也以劉侯之仁民胥樂之久何呉思之有予應之曰人固有遭其虐政而思昔人之賢以哀今之不見者又有遇其善政而思昔人之賢以幸今之復見者則思古之說豈一端哉當其男以田功之畢女以織事之休内無饑寒之戚外無賦役之勞思以斗酒共相娛樂令于此時為之命僚佐臨清流設玉斚金鼔喧闐于波間管絃嘈噆于堂下歌者舞者形和聲和以觀遊人士女或三或五溶溶洩洩如鷗鳥之浮川鯈魚之戲藻是人之樂也皆相慶曰吳之復睹此也夫政不出此則人之不樂生令此時精耗簿書之冗力疲獄訟之繁事既無窮應示不暇又何能俯清泠之淵笑談終日與之偕樂耶設有勉强為之雖撞鐘擊鼔人聞其聲將蹙額而相告曰欲見吳之莫得也然則此堂之作一游一豫足以為政之勸沮而劉侯之慮有出于此其深得思呉之樂歟荀卿曰欲觀千嵗今日是也以劉侯之賢其樂顯前人之善如此則異時此堂復修予將期後民之所思有甚于今日矣堂成劉侯就予索詩于是序其所聞而賦之詩云畫堂重構一湖中更述民思渤海公自昔三年留惠政至今百里誦清風波間陡覺歡聲别陌上新傳樂事同從此邦人轉懐德悠悠谷水㡬時窮自題三絶船子和尚千尺絲綸直下垂一波纔動萬波隨夜靜水寒魚不食滿船空載月明歸二十餘年江上游水清魚見不吞鈎釣竿斫盡重栽竹不計工程得便休二十餘年坐釣臺釣頭往往得黃能錦鱗不遇虚勞力收取絲綸歸去來題松澤西亭一葉虚舟一副竿了然無事坐煙灘㤀得喪任悲歡却教人喚有多般一任孤舟正又斜乾坤何路指生涯抛嵗月卧煙霞在處江山便是家愚人未識主人公終日孜孜恨不同到彼岸出樊籠元來只是舊時翁華亭道中僧道潛白水茫茫天四空黃昏小雨濕春風五更百舌摧殘夢月到官河柳影中題三女岡白蓮花僧惠日神佛何由測芬陀陸地興素芳呈玉雪梵刹肇丘陵換額從偏霸懸碑自老僧殷勤勸來者期使續千燈又趙崇森舊址來從晉中更㡬廢興一蓮開陸地三女卧岡陵題詠誇先輩流傳得主僧林深鐘梵寂長夜一明燈又髙子鳯地産枝蓮異蓮宫自此興殊祥天不靳竒豔雪堪陵魄化疑吳女碑傳有蜀僧何當尋勝㮣吟斷佛前燈又僧惠日白羽芬葩陸地蓮可曾摇曳水中天肯于素灔分新潔不與紅酣間碧鮮玉井無因期摘實金園有兆必開先應知瑞與優曇並一朶騰芳萬古傳至元嘉禾志卷三十
