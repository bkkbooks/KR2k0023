body:
  text: 至元嘉禾志卷十七元徐碩撰報忠觀置田記淳祐己酉南湖趙公誌於朝願以聽履坊居宅改創道觀以伸區區報君忠國之微忱乞錫報忠為額仍撥長春一菴割本家田十頃𨽻觀常在嵗收租給道士熏修費併贍其徒中書省下之儀曹儀曹下之郡咸言宜䝉聽許越眀年堂帖下迺請四明戴廷圭主觀事已而入為太乙宫髙士義烏宗純一繼之又以選為金庭觀去未㡬公亦蛻塵寰矣二子法曹君崇㤠登仕君崇憖克念厥紹匪懈益䖍亡何登仕君遽早世法曹君恪遵先志弗渝謂純一疇昔從公逰最久且經始預有勞走介鄭重挽致純一亦幡然以来其再領衆也觀事加治圭撮無私焉純一忠簡公五世孫予外弟也法曹君於是介純一屬予為之記予觀世之仕者以問舍求田遺子孫惟日不足為事輪奐照街衢矣膏腴連阡陌矣尺攘寸取猶未盈厭今公獨能捐我庇風雨之廬以餙老氏之宫輟吾供伏臘之粟以飽方外之侣念頭所在切切焉孝於親忠於君而不暇為子孫謀詎容與徼福者同日語哉抑可書也已道家者流清淨自命其髙至於㧞宅騰霄漢絶粒餐朝霞豈必以口腹累人者然日用飲食何莫非道父子君臣之倫道之大端係焉晨薌夕燈稽首萬夀固黄冠師職分當爾上帝之臨女無貳星辰之昭布森列積忱對越一飯不忘惟無愧於是心則亦無愧於公之心矣純一與其徒盍亦勉旃觀之穎末見於文昌陸公所撰記亦詳矣若夫租之斛石嵗之用度則載之碑陰皆不復贅公諱汝琲登朝簿正農扈出佩太守符持使者節葢近時麟振之望法曹君今掾北府通敏而謹粹必能昌其家聲云咸淳五年秋七月朝㪚大夫行太常丞兼樞密院編脩官兼權尚書右郎官黄夢炎記隱真道堂記府治之東南相去二百步有道院曰隱真以来四方雲逰訪道之士是院建於崇寧之間巋然獨存於建炎兵火之後若有真仙為之䕶持者院北兩坊導其所從入之路東榜集仙西標歸鶴或曰紹興初純陽真人曽到單滿不納編葦作舍以打坐聚土成炭以禦寒自是嵗每誕辰有羣鶴回翔其上此其所以名隱真也而不知嗣召公者又有髙尚真人焉紹興嵗在丁邜之七月一道友戴青巾披青氅自言姓劉居濵州留數日而去雲堂柱間題四十有三字曰行方便坐方便諸聖察上天見得道安得身健但能晨朝洗面水不得浪淵起盜玊津能顯九霄雲事劉卞功來仙語隱微衆亦莫曉信道不篤者爪剔木前鈎畫透柱如㸃漆然方争先快覩或水飲其字可起沈疴開瞽曚試者輒效有一醫庸而貪以新易舊刮墨和劑竟不復騐亦足以見真人不肯專利一家矣乾道間真人復來稱姓氏州里如初時既相後人不復識往望吳門外一畫工家自起藁使繪其像晋錢市縑繪成復往觀喜甚約某日齎錢取去問其姓則曰劉問其寓則曰隱真過期繪工来訪則真人已去涉嵗寖逺工以像鬻扵市為伶人王綺所得一夕綺夢真人視像維肖特身形長大爾叱綺曰汝留我在此許時如何綺驚寤訪諸道院至隱真始知顛末遂歸焉道院主人張君倖狹小是院方議改築稠人中有青衣人出曰此乃神仙經行之所所謂福地或遂遷徙此地却作何用議竟寢止脩雲堂創聖殿周以門廡後嗣秀王重為建造良有以也郡人余元輔初入學舘實鄰道院嘗言有一老媪丐諸塗腹大若姙非杖不行止則仆地忽遇青衣人叱起予藥如芥子使吞之有水自腹中出尋即平復問姓不答但云在隱真道院其遁身濟人𩔖如此淳熈初雲水客張寅者道號陽光逸人来自金陵瞻象起敬話及錫山寳文李公謨宦逰河朔以職走濵州訪真人得制誥繪像石刻為家蔵之珍乾道間真人一到其家㑹詩文觴客弗及接題詩塼壁墨滲澈然盖即夷堅志所載日轉庭槐影漸移重門複屋轉呼遲不如拂袖穿雲去惟有落花流水知託言小郄實真人詩耳主道院者方盡得其源委真人居濵之安平鎮徽廟朝屢詔不起守臣奉㫖寫真藁成真人即自讚曰韜光晦迹居環堵閉息凝神事事踈漫許丹青傳道貌難將妙筆寫真如奏上降勅云朕髙古人脩真勵行道興於世今乃見之爾趣操不凡蕭然一室招聘屢往辭避不回宜錫美名用彰清節雖云冲嗇尚克欽承可特授髙尚處士時政和六年八月十九日也今道院主人錢道濟求予文以記其事故為筆之嘗聞髙尚自贊其真影曰真中影充饑畫餅影中真花稍暮春非影非真是謂上人謂非充饑之畫餅則必有濟人之實謂非花稍之暮春則必有先天之靈惟其妙隱顯以莫測是以與造化而長存道濟其心領而意適庶或親逢於上人端平改元巧夕前三日汲古軒關拭表卿記至元嘉禾志卷十七
