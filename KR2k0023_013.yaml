body:
  text: 至元嘉禾志卷十三元徐碩撰冢墓録事司嚴夫子墓在郡治北報恩禪院法堂後考證西漢嚴助也蘇小小墓在郡治東一百步考證晉歌姬也張文潛集及宋百家詩載司馬槱事云墓在錢塘寰宇記云墓在嘉興縣然寰宇記為是今墓正在嘉興縣前西南墳髙三丈有大井在其側舊生雙桃於上宋紹興初衣白以出人多畏之因鎮以塔後宋路分行天心法驅除之遂不復見有片石在通判廳云蘇小小墓豈非家在錢塘而墓在嘉興乎松江府陸康墓在府西北二十里陸遜墓在府西北二十三里陸抗墓在府北二十二里陸瑁墓在府西北三十二里陸凱墓在府西北三十二里陸宏墓在府西北四十里陸曄墓在府西北四十四里陸監墓在府西北一十九里陸景文墓在府西北三里陸獻墓在府西北一十九里潘濬墓在府西北二十里考證按吳志云濬字承明武陵漢夀人也弱冠從宋仲子受學為郡功曹孫權殺雲長於荆上拜為輔軍中郎將有功遷奮威將軍權即位封劉陽侯遷太常赤烏二年薨笮融墓在府東北四十里考證按吳志云融丹陽人初徐州牧陶謙使督廣陵運漕曹公攻謙徐土蕭條融將男女一百口馬三十匹走廣陵今北亭鄉有笮墓涇涇旁有髙壠世稱為笮墓云陸禕墓在府西北二十七里崑山之絶頂考證舊有征北將軍陸禕墓碑今雖斷毁不全而龜趺尚存焉嘉興縣歐陽尚書墓在縣西北一十里考證文忠公之後也其子孫尚有居其傍者劉伶墓在縣西北二十七里考證劉伶晉人也錢氏諱鏐改呼劉為金俗因呼為金伶墓施墓在縣東二十里考證圗經云齊長沙王府長史施修琳墓衛墓在縣西南考證圖經云衛大夫洪演墓也衛懿公為狄人所滅食其肉惟肝在地演割已腹而納焉按漢書魏地今在魏郡黎陽是也獨未曉演墓在此何也周都官墓在縣西與月波樓相對考證先老相傳旱不加髙潦不加沒朱買臣墓在縣東三里羞墓在縣北一十八里考證朱買臣妻羞死之所也今改為秋茂訛也徐偃王墓舊傳在縣西復禮鄉沈演之墓舊傳在縣北望雲門外二十里相林墓在縣東一十里海鹽縣龍母塜在縣南四十里考證陳山之巔上有盤石遇水旱禱祈以酒酹石輒有暴雨洗壇也母冡在縣南一十八里豐山石屋之東南考證昔有村人發之蜂蠆蛇蜴不可嚮邇天女墓在縣東北三十五里乍浦村考證人侵犯即有土蜂黑氣逼人皇后冡在縣南三里考證耆老相傳以為何皇后冡近地有喪靈浦今塞沒矣田橫墓去縣一十八里天子女兒墓在縣西南三十五里六里山考證村人侵犯之即有毒蟲出焉皇象墓去縣東北四十七里髙一丈周回四十步考證輿地志云象字休眀吳廣陵江都人善𨽻書干瑩墓在縣西南四十里髙一丈二尺周回四十步考證舊圖經吳干瑩字眀叔仕吳為立節都尉五行記云晉干寶字令升海鹽人父瑩有寵婢母甚妒之及瑩亡葬之遂生推婢於墓後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父恩情如舊地中亦不惡既而嫁之生子顧安饒墓在縣東北五十里髙一丈三尺周回七步考證顧安饒陳人也仕至鴻臚卿沈景墓在西南六十里考證沈景宋人也叢冡在縣東南三十六里湯山考證宋紹熙間縣令李直養以溺海之尸隨潮而上送至砂磧盡為犬鳥所齧因置叢冡收瘞焉人物嘉興縣西漢朱買臣字翁子吳人家貧好讀書手不釋卷平生不治産業賣薪給食嚴助薦之於武帝拜中大夫後為會稽守上嘗謂買臣曰富貴不歸故鄉如衣錦夜行買臣頓首辭謝遂衣故衣懷其印綬歸郡邸東漢張武吳由拳人也由拳縣即今嘉興縣父業為郡門下掾送太守妻子還鄉里至河內亭盜夜劫之業與賊戰死遂亡失尸骸武時年幼不及識父後之太學受業每持父遺劍至其處泣祭而還太守第五倫嘉其行舉孝廉遭母喪過毁又傷父魂靈不返因哀慟絶命晉韓績字興齊避亂居於吳之嘉興少好文學不交當世由是東土稱焉召拜博士不起卒於家唐陸贄字敬輿吳郡嘉興人年十八第進士中博學宏辭調鄭尉夀州刺史張鎰願為忘年交餉錢百萬曰請為母夫人一日費贄不納止受茶一瓶後又中拔萃選補渭南尉遷監察御史德宗召為翰林學士時年尚少以材見幸天子嘗以輩行呼而不名從幸奉天日發詔書數百思如湧泉下筆如神皆曲盡事情武夫悍卒聞者無不感泣思奮帝頗親倚雖外有宰相主大議而公嘗居中參裁可否時號內相李懷光有異志公請李晟移屯以備徙幸遷諫議大夫還京為中書舍人俄為中書侍郎平章事公在朝論諫數十百篇炳炳如日一本仁義議陳時病每拂帝短或規其太過公對曰吾上不負天子下不負所學遑他恤乎上欲相裴延齡公言延齡僻戾躁妄不可用帝不聽俄而延齡姦佞得君天下仇惡無敢言者公又上書苦諫帝不懌竟以太子賔客罷延齡揣帝意薄讒短百緒帝怒欲誅贄陽城交章論辨乃貶忠州别駕公既放荒逺常闔户人不識其面又避謗不著書順宗即位召還詔未至而卒時年七十有二追贈兵部尚書諡曰宣公有奏議翰苑文集行於世邦人士至今祠之唐徐岱嘉興人也於學無所不通辨論眀鋭座人常屈代宗大厯間劉宴表為校書郎觀察使李栖筠欽其賢書所居為復禮鄉唐丘為蘇州嘉興人事繼母孝嘗有靈芝生堂下官至太子右庶子時年八十餘而母無恙給以俸祿之半及居憂觀察使韓滉以致仕官給祿所以惠養老臣不可以在喪為異惟罷春秋羊酒初還鄉縣令謁之為候門磬折令坐乃拜里胥立庭下既出乃敢坐經縣治降馬而趨年九十六卒宋陳舜俞字令舉嘉興人仁宗嘉祐四年應材識茂異賢良方正能直言極諌科擢為第一是時公已登進士乙科矣復中是選故文章聲名赫然在人上始授光祿丞簽書夀州判官宰山陰秩未滿召試館職不就會朝廷議行青苖法上書力詆且自效因忤執政貶監星江酒稅公在貶所日與大博劉凝之跨雙犢以窮泉石之勝自號白牛居士公直道自信無所回撓遂絶意仕進得著書立言有都官集進卷行於世蔣之竒序東坡六客與焉宋錢顗字安道本無錫人英宗治平末為殿中侍御史王安石行新法顗極論其弊貶監衢州稅徙秀州家貧母老丐貸親舊以給朝晡而怡然無謫官之色東坡集有至秀州贈錢端公安道詩云鴛鴦湖邉月如水孤舟夜傍鴛鴦起者是也宋毛滂字澤民徽宗政和間守是邦因家焉先是哲宗元祐間東坡守杭公為法曺秩滿辭去是夕坡宴客有妓歌惜分飛詞坡問誰所作妓以毛法曹對坡語坐客曰郡竂有詞人而不知某之罪也翼日折簡追還留連數月公因此得名有東堂集十卷行於世宋洪皓字光弼本畨陽人嘗為秀州録事徽宗宣和六年秋大水全活飢民九萬五千餘人州人皆稱為佛子丁父憂奔喪還即留家於秀髙宗建炎三年奉使大金羇留十五年不屈節而歸秦檜不容死於南服諡忠宣有忠宣集行於世宋王希吕本中原人髙宗南渡寓居是邦仕至尚書宋朱敦儒字希真號嚴壑本中原人以詞章擅名天資曠逺有神仙風致髙宗南渡初寓此嘗為樵歌有讀書堂在大慶觀之西宋婁機字彥發幼穎悟日誦數百言長益奮勵該經史百家作文直欲以左氏班馬韓桞為標的孝宗乾道間中進士第及試邑罷稅興學士民德之入輔元良日陳正言正道隨事發明多所禆益年七十乞間不允擢監察御史又除右正言尋除太常卿兼中書舍人時宰欲開邉隙侍御史鄧友龍主議甚力公相時度勢極口沮之以為必敗國事會有旨集議公義形於色略不少變又欲以公宣諭荆襄公昌言曰使慰安人情則可必欲開邉啓釁有死而已不能從也卒以此去國後遍厯省部給舍皆有可紀嘉定改元八月除樞密十月除參知政事公天資忠鯁不畏強禦既坐廟堂未嘗以辭色假人彌縫協恭禆贊維多三年告老以正議大夫資政殿學士致仕年七十有九宋方誼字賔王本桐廬人孝宗乾道四年侍父務德侍郎徙居是邦之北門為朱文公門人文公集中有相與問答語家有希賢齋扁亦文公所書也宋葉時字秀發孝宗淳熙登進士甲科事四朝厯臺省二十年官至開府宋王眀清字仲言本汝陰人寧宗慶元間寓居是邦官至朝議郎有史才嘗著揮麈録及玉照新志宋陳曄字孟華寧宗嘉定間登進士第仕至金部郎官守南劍弟煃字孟眀亦登嘉定甲科仕至宗博皆忠肅了翁後宋李鳴號復山本蜀人也寓居是邦之東門理宗朝嘗為執政公夫公晉其二子也皆典郡宋李曽伯字長孺號可齋本懷州人也丞相邦彥之孫寓居於此自登膴仕早以能稱持繡斧督餉運兩分漕節七開大閫官轍幾遍天下儒而知兵素有雅量所至得將士歡心逺人聞風敬憚戒勿開邉隙天才卓絶為一代偉人有可齋類藁行于世以觀文殿學士歿於家贈少保開府儀同三司宋沈炎字若海號寶臣理宗寶慶間登進士第官至參預宋徐聞詩字子言資性頴悟八嵗通九經理宗朝由童科擢紹興第仕至惠州守宋李景勉字𢡟之號畸翁理宗紹定間由上庠解褐立朝靖共於邉事尤曉暢非但老於文學以太常丞守臨汀卒宋吕重庚字申伯號九山理宗端平間登進士第官至大理正宋焦炳炎字濟父本宣州人也寓居是邦理宗朝初擢右科後朝請淳祐辛丑廷試中進士探花立朝清節挺挺一時嘗居言路論奏纍數百言無不當帝心時宰主括田之議逺近騷動遂痛述其害反覆面奏亦無慮千言上雖為之愀然而括田未即寢繼進故事辨論愈力時宰語人曰非攻田事是攻我也尋除太常少卿命下遂具疏辭免疏上即去國或人遺以詩曰事至諌官言不得身為宰相有何營又自賡故人詩篇亦有迹雖無地著心實有天知一禽從不獲不敢範馳驅之句後除淮東湖憲漕悉不就改吉州太守仍除太常少卿不得已就職後以起居郎右文殿修撰致仕卒宋焦煥炎字海父炳炎弟也以儒傳家幼有聲場屋理宗寶慶初入西雍紹定間廷試冠多士嘗陛對論奏纍數百言皆切中時病生平抱負英略慷慨有大志守邉多顯功仕至鎮江守宋林子善字常甫號西河理宗淳祐間登進士第時里稱純儒守永州改淮西制參卒松江府東漢陸康字季寧吳人少仕郡以義烈稱舉茂才除髙成令以恩信為治寇盜亦息光和元年遷武陵太守轉守桂陽樂安二郡所在稱之拜廬江太守申眀賞罰破賊黃穰等靈帝加其功拜康孫尚為郎中吳陸績字公紀康之少子也年六嵗謁袁術即世傳懷橘墮地者也容貌雄壯博學多識星厯算數無不該覽孫權辟為奏曹椽以直道見憚出為鬱林太守雖有軍事著述不廢作渾天圖志易釋元皆傳於世吳陸遜字伯言少隨從祖廬江太守康在官袁術與康有隙欲攻康康遣遜及親戚還吳吕蒙謂孫權曰陸遜意思深長才堪負重觀其規慮終可大任權乃召遜拜偏將軍召吕蒙屯陸口後克公安南郡拜撫邉將軍封華亭侯又進封婁侯黃武元年為大都督大破蜀兵於夷陵赤烏七年為丞相卒追諡昭侯吳陸瑁字子璋遜弟也少好學篤義州郡辟舉皆不就嘉禾元年公車徴拜議郎選曹尚書孫權欲親征公孫淵瑁再上疏諫權嘉其事理端切遂不行赤烏二年卒吳陸抗字幼節遜子也建興元年拜奮威將軍建衡二年都督信陵西陵夷道樂鄉公安諸軍事鳳皇元年晉羊祐率師向江陵抗使輕兵躡之祐引軍還抗遂陷西陵東還樂鄉貌無矜色謙沖如常故得將士歡心抗嘗遺祐酒祐飲之不疑抗疾祐饋之藥抗亦推心服之時以為華元子反復見於今日二年拜大司馬荆州牧卒子晏景元機雲分領抗兵景字士仁拜騎都尉封毗陵侯偏將軍澡身好學著書數十篇吳陸凱字敬風丞相遜族子也黃武初為永興諸暨長所在有治迹拜建武都尉領兵雖統軍衆手不釋書五鳯二年拜偏將軍封都鄉侯遷蕩魏綏逺將軍征北將軍鎮西大將軍進封嘉興侯寶鼎元年遷左丞相乃心公家義形於色表疏皆指事不飾忠懇內發建衡元年卒吳陸胤字敬宗凱弟也始為選曹郎太子夙聞其名待以殊禮後為交州刺史入界喻以恩信務從招納加安南將軍封都亭侯吳陸喜字恭沖瑁子也少有聲名好學有才思嘗作言道訪論審機古今厯娛賔九思等書吳平又作西州清論傳於世仕吳為選曹尚書至晉為散騎常侍吳陸禕字元容凱子也赤烏六年徴宿衛郎中後遷立義都尉五官郎中騎都尉遷黃門侍郎封海鹽侯加禆將軍行丞相鎮西大將軍事凱沒後入為太子中庶子華核常表薦禕曰禕體質方剛器幹強固董率之才魯肅不過在戎果毅臨財有節初孫皓嘗銜凱數犯顔忤旨後徙凱家於建安天紀二年與從弟式召還建業復將軍侯晉陸機字士衡吳郡人也父抗吳大司馬機身長七尺其聲如鐘少有異才文章冠世伏膺儒術非禮不動抗卒領父兵為牙門將後成都王穎討長沙王乂假機後將軍河北大都督為孟玖輩譖於穎言其有異志使孫秀密收機秀兵至機釋戎服著白帢謂秀曰成都吾以重任辭不獲已今日受誅豈非命也因興𨽻箋詞甚悽惋既而嘆曰華亭鶴唳豈可復聞乎遂遇害於軍中所著文章凡三百餘篇並行於世晉陸雲字士龍機弟也六嵗能屬文性清正有才理少與兄機齊名雖文章不及機而持論過之號曰二陸幼時吳尚書廣陵閔鴻見而竒之曰此兒若非龍駒當是鳯雛年十六舉賢良吳平入洛補浚儀令到官肅然下不能欺市無二價後成都王頴表雲為清河內史轉大將軍右司馬後因機敗亦為孟玖所譖故併為所殺吳陸宏績之長子會稽南郡都尉晉陸曄字士光吳郡人也曄少有雅望從兄機每稱之曰我家世不乏公矣元帝鎮江左辟為祭酒遷太子詹事時帝以侍中皆北士宜兼用南人曄以清正著稱遂拜侍中徙尚書領州大中正眀帝即位纍遷至録尚書加散騎常侍成帝踐祚拜光祿大夫後因歸以疾卒贈侍中諡曰穆晉陸玩字士瑤曄弟也器量淹雅弱冠有美名尚書左僕射領本州大中正及蘇峻反遣玩與兄曄俱守官城玩潛説康術歸以功封興平伯轉尚書令又詔授左光祿大夫開府儀同三司加散騎常侍晉陸納字子言玩子也少有清操貞厲絶俗以尚書吏部郎出為吳興太守至郡不受俸祿頃之徴拜左民尚書應召臨發止有被襆餘並封以還官謝安常詣納納所設惟茶果而已其兄子俶遂陳盛饌珍饈畢具客罷納大怒曰汝不能光益叔父乃復穢我素業耶於是杖之晉陸監字始眀璿之子少而隱靜方直抗烈除後將軍司馬以功封西陽亭侯晉陸景文字叔辨初為安吉令遷太守陳顧野王字希馮吳郡人也七嵗讀五經即略知大指九嵗能屬文嘗制日賦朱異見而竒之十二隨父之建安撰建安地記及長遍觀經史精記默識天文地理蓍龜占候蟲篆竒字無所不通又善丹青及侯景之亂野王丁父憂歸本郡乃召鄉黨隨義軍援都又杖戈被甲陳君臣之義逆順之理抗詞作色見者莫不壯之為臨賀王府記室後領著作掌國史以黃門侍郎光祿卿卒贈祕書監右衛將軍有玉篇三十卷輿地志三十卷符瑞圗十卷顧氏譜傳十卷分野樞要一卷續洞冥記一卷元象表一卷並行於時又撰通史要略一百卷圖史紀傳二百卷未就而卒宋衛仲逹字逹可元名上達徽宗大觀間登進士第御筆改是名仕至吏部尚書宋衛膚敏字商彥徽宗宣和間上舍釋褐仕至諫議大夫禮部侍郎宋錢良臣髙宗紹興間登進士第官至參預宋蓋經字德常髙宗紹興間由舍選登甲科官至中大夫户部侍郎宋衛藻字德章孝宗淳熙間登進士第知武岡軍卒宋衛涇孝宗淳熙間廷試魁多士官至政府弟洙寧宗嘉定間亦登進士第宋衛價字藩叟寧宗嘉定間登進士第仕至軍器監丞知寶慶府海鹽縣晉戴威仕晉為右將軍故宅在縣西一十七步恭帝時因井放光捨宅為寺唐昭宗時修寺古碑尚存其字剝落不可讀唐顧況吳郡海鹽人居縣西南三十里之橫山以詩名嘗有詩云家住雙峰蘭若邊數聲秋磬發孤煙山連極浦鳥飛盡月上青林人未眠宋常同字子正本臨卭人徽宗政和八年賜上舍及第髙宗南渡初除侍御史有直聲尋除御史中丞因忤時宰秦檜意出守湖州郡人有賢眀太守之謠後纍召不起請祠除提舉江州太平觀貧無立錐地徙居是邑之精舍凡十年自號虛間居士紹興十九年以疾薨纍贈少師諡忠毅子洙襟皆典郡有聲宋魯訔字季卿號冷齋髙宗紹興五年登進士第仕至太府卿有注杜詩十八卷行於世宋魯可宗孝宗隆興間登進士第中博學宏詞科纍官至太府卿宋陸埈孝宗乾道間登進士第官至尚書宋常濬孫同之孫也孝宗乾道八年登進士第舉博學宏詞科嘗為福州教授教飬有法閩人士德之至今祠於學官至宗簿宋趙孟堅字子固號彛齋善畫理宗寶慶間登進士第官至太守宋常楙字長孺自號蒲溪愚叟同之曽孫也理宗淳祐間由太學魁别省登進士第自躋膴仕所至以亷稱嘗為監察御史因論天變拂權臣意繼論巴陵事復觸度宗怒出為浙漕以簡御繁權要斂迹尋以宰椽兼刑侍上進故事首論雷雪之變又忤上意丐祠守吳吳人有常侍郎真不要錢之語帥紹興復以刑侍召論期赦敘改法與廟堂爭可否兼給事中封還隆國姪黃進觀察使録黃廟堂傳示上旨俾換黃書行公終始不變遂奉祀歸里德祐元年除吏書繼除參預公天性篤實操行端方晚年杜門養疴至饘粥弗給日以經史自娛遇有感發見之賦詠於詩易研覃尤邃中州人士敬慕之欲一見終不可得病革自志其墓沒後家無餘資人益嘆服公之真清云崇德縣宋江圭字伯特徽宗政和間登進士第厯三院御史吏部侍郎宋沈晦字元用號胥山文通孫也公初名杰徽宗朝坐為人假手奏案至祐陵榻前上閲之云名見四公子傳其人必不凡可從濶略時方崇道教故也遂降旨止令今後不得入科場公倣徨無所往遂易其名曰晦中漕司首選宣和初魁大廷才數月即入館為郎仕至徽猷待制宋王升字逸老本京師人草聖竒偉徽宗宣政間被召入御書補右爵髙宗南渡後寓居是邑之羔羊時上留神翰墨近臣有言其能者召對賜札以書玊音褒賞蒙異眷獨步一時官至正使宋莫琮字叔方杭州仁和人其先隱德不仕徽宗崇觀中三舍法行琮以貢首入京師肄業辟雍復兩預薦書屢升優舍髙宗建炎初避地於是邑因家焉晚以特科一等入仕厯曹娥鹽場四眀三山幕職南嶽祠吏通直郎致仕蒞官行已皆有可紀有子五人元忠若晦似之若拙若沖俱登儒科皆袁氏出琮纍贈中大夫袁氏封大令人袁氏夀康兄弟無故迎侍祿養縉紳榮之邑宰朱軾即所居立五桂坊家有椿桂堂士大夫多賦詩宋木盈字濟之本濟南人避亂渡淮髙宗建炎二年登第於揚州寓居於是邑官至朝議大夫宋輔廣字漢卿號潛庵父逹本河朔人髙宗南渡時居是邑公素不願仕潛心實學從吕成公遊後登朱文公門自辭官歸隱以著書為己任有六經注釋四書問答通鑑説師訓編日新録雜著藁皆藏於家扁其堂曰傳貽蓋傳之先儒以貽後學也邑大夫家之柄為建傳貽書院宋王琮字伯玉髙宗紹興間登進士第以孝友稱官至左司宋莫抃字慶叔世居是邑之青鎮孝宗隆興間登進士第子繹光宗紹熙間亦登進士第官至尚書宋趙汝愚字子直本畨易人孝宗乾道間魁多士寓居是邑之洲錢官至丞相追封福王諡忠定宋蔡開字子眀孝宗淳熙八年登進士第官至憲漕弟闢字子正寧宗慶元間亦登進士第官至國子祭酒宋徐逢家於是邑之鳯鳴孝宗淳熙十四年登進士第官至常德守兼湖北倉憲宋徐龜年字翔甫號雲軒家於是邑之鳯鳴孝宗淳熙十四年登進士第官至監察御史宋陳塏字子爽號可齋本三山人古靈裔也寓居是邑以清節稱官至資政殿大學士賜諡清毅有讀通鑑隨筆藏於家至元間有司請於上表其里曰清節子鑄宋寧宗寶慶間亦登進士第官至都承旨宋陸德輿字載之號魯齋寧宗嘉定間由童科第進士弱冠有文名厯兩制知貢舉官至吏部尚書從祖埈從父鑣相繼世科埈仕至祕書宋張琥字子嚴寧宗嘉定間登進士第宰鹽官仁和倅眀州守台州所至有惠政至元嘉禾志卷十三
