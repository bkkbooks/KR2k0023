body:
  text: 至元嘉禾志卷三十二元徐碩撰題詠海鹽縣題南館張祜故人營此地臺館尚依依黑夜山魈語黃昏海燕歸舊隂楊葉在殘雨槿花稀無復南亭賞髙簷紅燭輝橫山故居顧況家住雙峰蘭若邊數聲清磬發孤煙山連極浦鳥飛盡月上青林人未眠官舍劉長卿小邑滄洲吏新年白首翁一官如逺客萬事轉飄蓬柳色孤城裏鶯聲細雨中羇心早已亂何事更春風南湖送人西上家在橫塘曲那堪萬里違門臨秋水掩帆帶夕陽飛傲俗宜紗帽干時倚布衣獨將湖上月相逐去還歸過橫山顧山人况祗見山相掩誰言路尚通人來千嶂外犬吠百花中細草香飄雨垂楊間卧風却尋樵徑去惆悵緑溪東答陸澧張九齡松葉堪為酒春來釀幾多不辭山路逺踏雪也相過寄凖上人司空曙昨聞歸舊寺暫别欲成年樵客應同出鄰僧定伴禪峻峰秋有雪逺澗夜鳴泉豈藉公卿論人間自共傳寄題壽師塔南軒何昌弼焚修七十齡內外已圓成教相論因果冥心契死生紙忩應自白花砌本無情燕坐觀浮世誰非走利名壽公禪老遊宴不學參禪不學文百年和樂任天真曾聞神定踰三日疑是今生再世人縣學碧瓦鱗差接近郊青青襟佩得同袍欣聞庠序儒風盛不見桑榆太白髙魯國已觀沂上舞漢朝應貨蜀中刀獻酬濟濟升平事泮水從今有辨髦天寧靈山堂示住山祖仁宴坐靈山十二年海雲已契舊因緣我來試問安心法翠竹成隂老樹圓鹿苑寺一擊軒二首本來無物可修治一擊當年何所知拱手問師都不語等間拈起布毛吹列戟排鎗幾百竿森森直節逼人寒從初一擊心方悟篩月吟風盡可觀又李長民我聽風篁是梵音如何俗耳等間聞自來擊處無人會千古知心只此君密密堂堂悟有時懆求那便契精微憑誰舉似圓居士好助香嚴證上機海鹽道中一舸凌風去縈紆度幾村水清魚視子地美稻生孫山近塵埃逺秋晴枕席溫悠悠向何所欸乃武陵源崇德縣題椿桂堂范成大君不見衣冠盛事今猶昔前説燕山後崇德聯翩五組帶天香世上籯金賤如礫他年詩禮到雲來日日髙堂稱壽杯桂長孫枝椿不老却比竇家應更好又葉適九官八士古之良靈椿丹桂後騰芳馮公詩意雖短陋閭里傳誦終難忘君家同生五兄弟短檠伴夜東方啓黃旗兩紀張慶闈紵袍五褫趨文陛辭角標角人力能利名均齊天所興作堂不須棟梁好但種此木髙千層透日垂隂香禾歇滿庭車騎同時列更將磊珂替團圓留與北風觀壯節又王信鄉同子直遊膠庠是時子明居侍旁友于學問相激昂聲華日馳翰墨場仲氏一第如探囊伯氏隨即凌雲翔已快雁塔書雁行君家餘慶未易量二龍三鳯同呈祥一門競爽如圭璋前後繼踵名相望夥為千佛經中光聯翩不羡金華唐會稽何獨誇諸黃世言燕山竇十郎一枝椿老五桂芳君今取此名其堂薦紳榮之富篇章幾與竇氏爭頡頏吾家亦頗推吾鄉自從仲父開天荒五登科第于太常枝分𣲖别各一房敢與君家相比方夫人更喜壽且康嵗時羅列稱壽觴綵衣青紫交焜煌人生至樂見未嘗源深允矣流必長孫枝更接秋風香又倪思早從孟母受詩書晚見飛騰五丈夫桂籍聯名看衮衮蘭陔戲綵極愈愈已酬鍾釡當年志合入衣冠盛事圖教子榮親誰不羡堂成燕雀亦歡呼題資福院平緑軒陳炳瞰水地仍敞開窗望不迷良疇連逺近秀野混髙低曉起煙千樹春耕雨一犁道人深樂此壞衲且幽栖又莫若拙結屋地猶淺鈎簾景盡還嵐光煙樹外野色酒杯間别墅從渠樂清吟屬我間狎鷗時點白機事不相關又輔廣名區與利壠羊腸盡攀躋誰能為芳草四曠成幽棲春風一憑闌秀色無髙低山遙不作障水近何妨隄只恐金氣寒黃枯愛碧萋坐令羣目驚有似七聖迷人心無天遊六鑿相攘擠但于平處觀衆有何端倪日月互賓送景物隨乖暌彼昏如執著惟君試金箆又王用亨塵囂胸次嘗苦隘誰謂一隅天地寬野色供餐來几上山光極目在林端犁耕宿雨春風暖舟撼清流夜月寒却笑賀湖臨水寺閉門不借俗人看又江表祖碧瓦丹稜轉盼成一亭聊復寄間情人如水墨畫中立山向平蕪盡處橫舟入柳隂衝鷺去簷依波面蔭魚行題詩每愧臨流意吟苦那知白髮生又張掞禪窗虛敞瞰西南野色溪光接畫簷雲去碧天無間斷一睂依約見山尖又王益祥丈室無餘地生涯小有天推窗成曠濶俯檻繞清漣載酒日邊客聞歌柳外船隔牆人易與賸著買山錢又曾揆終日勤勞鴈鶩行偶然來訪贊公房扶疏草木四圍合縈繞溪流一帶長倚檻豈能成傑句把杯多是説名方問師乞取安心法宴坐蒲團對佛香又莫柯深林閟嘉趣門徑愜幽居野色通荒阜津流動碧虛日邊山隱隱煙外竹疏疏徙倚怡雙目白雲知故廬世纍苦縈束官間得自便未賡三隱句聊扣二乘禪壯志羞朋舊長歌且聖賢每因休沐地思辦買山錢又陸德輿帶市人煙逺連村野色幽山從天際出水向檻前流茆屋無端礙松醪有意留因懷陵谷感無語對歸鷗趙仁父宴邑官平緑見招莫若沖平緑題詩四十年尋幽不厭水雲邊一犁還又耕春後三白曾來醉臘前自笑挂冠林下客獲陪揮麈坐中賢絶嫌野色撩人思快睹秦州逺接天過崇勝院首嵗融春卜有秋曉行猶自索貂裘身間暫脫微官縛市隱何如此地幽一水相望三里近十年重到片時留買田擬作終焉計真是飄然不繫舟題石門張氏園為米徒勞束帶難當時彭澤便休官髙情曾賦歸來句盡入名園扁署看醜梨出邑之闕貌雖惡風味絶勝闕聞當進御因賦五言陸埈灰貌疑清古霜津溢脆甜面嫌湯後白心慰邑中黔美實鍾寒谷珍嘗近御奩彼姝徒冠玉爭得似無鹽送奚宰二首茂宰慈祥意三年只似初折腰寧為米掣肘固難書機靜鷗浮鳥刑疏網漏魚終然清議在衮闕到公闕失學兒俱懶師資點化闕砭針瘳痼疾膏馥起枯荄授闕方知緒從遊奈溯洄武城門下士應許厠淡臺和奚宰春風樓即事恍然楹桷架虛空意象經營九仭工三載笑談杯酒裏一時人事畫圖中金蘭托契從今始玉燭調和與衆同却笑楚臺雕篆客強生分别詫雄風題崇福寺羅漢閣趙汝能閣上殊因子細看幻成羅漢幾多般休驚五百神通異自是三千世界寬粉壁龍蛇渾欲動石橋雲水亦生寒香消日晚僧歸去無限竒光發夜闌題梵竺卿蓬居錢文梅繞蓬居不計株水仙數畹鬬芳腴竺卿白業二香妙世界紅塵一點無可比逺公蓮社勝應嗟陶令菊園蕪爐薰清鼻茗澆舌月浸松窗對結趺至元嘉禾志卷三十二
