body:
  text: 至元嘉禾志卷十八元徐碩撰精嚴禪寺記佛之道至難學也毁形而苦行割愛而忍辱食以粗糲衣以壞色器以瓦鐡誦經禮佛求師問道從衆應俗登門望施修齋設供土木營造像設修為之事無一不為至於口腹之欲紛華之欲男女之欲凡人道之不可無者一有犯焉則有司得以治檀越得以棄天下之人莫不起而議之佛道之難學蓋如此秀州精嚴寺舊號靈光即東晉選部尚書徐侯熙所施之宅寺鄰於市寺亦為市僧居於市僧亦為市既為而久既久則盛其分房裂户以百數而為之徒者且數百人龎睂皓首畏罪慕善閉户燕坐勤力進修者往往有之而血氣方剛聞道未篤六識所誘一念不固者亦所不免也淳熙四年直寶文閣韓公彥質以黃岡政成聖恩優異付以兹郡公遇事精嚴濟以公正下車未幾姦伏弱直優遊撫馭遂以無事推其治理勤厥外護乃請於朝願以是寺改為十方有旨從之於是籍寺所有得二萬餘緡招一因師俾主其事因資巽愞不任是責侯即喟曰變律為禪欲藥其病變不如初吾且有過乃黜一因命諸山選一道行可以經理者衆以十六輩諗公公於其時擇一永祚師景夀使補其處夀公道學院髙世法亦熟年未五十而十主名剎升座之日法音揚暢舉揚宗旨合因與果演化道俗復以叢林所立規矩先以律身還以導人瞻聽所接內嚴外敬頑革善入一倡百應先信後捨無有齟齬皆順以附緣法既契乃取故老所用之餘計四千緡并前韓使君所施之財與大衆之所施者又為數千緡鳩工匠會竹木商瓦甓給雇直凡為秀王祠堂三間戒壇一所廊廡三十四間法堂一十二間僧堂六間雨花堂五間前資寮行堂共一十三間旃檀林後架二十間為水田二千餘畝嵗得米一千餘石為蘆場二千餘畝嵗得薪五千餘束經始於五年之春三月斷手於六年之夏四月始師嘗曰寺成當求記於王居士既成使其師源以其本末來希吕使謂之曰夫應時有緣悟道有性化荆榛為道場闢市井為佛地易土木為像設改喧鬨為禪觀凡見於有為者是為緣著一盂糲飯聚四方衲子大開不二門共究無生理凡歸於自然者是謂性今師既已奮空拳竭願力了大事破羣疑矣盍亦息乎其所已為而思維其所未為者自緣而修性由性以悟道以上報國恩而次報佛恩乎師曰諾乃為記之復以倡言終之其辭曰佛身廣大充兩儀肉身有壞法者非波旬有請不可違雙林弟子涕淚垂六反震動人嗟咨付與迦葉法與衣其餘佛法得者誰國王大臣專主之檀那有力同扶持維昔東晉咸安時徐侯家居海之湄夜有光怪經天維迫而視之井所為乃請捨宅為佛祠年來井神不能竒蜂房蟻穴生瑕疵既久而變亦其宜韓侯凛凛百吏師有意外護非己私夀公之來乘始基補僝百弊研毫釐以身率人人相隨內嚴外敬自此推始終一律無可疑一唱百和風聲移中堂幻出髙巍巍廊廡繩直逺近齊方丈寮舍相發揮山田水國日用資自起一念不逾期算計見效如所期雖然佛法非一歧傳道應緣實相依靈剎衲子須自知請師開門拈白槌來看兄弟相磨治以篾縳肚捐飽飢説出諸方上上機一洗萬劫貪嗔癡佛法到此尤光輝朝散郎試兵部尚書兼給事中兼修玊牒官兼侍讀王希吕記興聖禪院記嘉定元年九月權發遣嘉興府事臣希道言臣所領郡治嘉興縣縣丞之廳正寢東室實惟孝宗皇帝慶育之所七紀於今丞轉相授與常官舍等無以稱神扈人仰之意臣至之日始徙丞居即加泛掃繚以周櫺崇護之禮懼未宏也粵庠序生徒閭井耋老麋至謁曰往年秀以列州得名為府近者士不繇貢羣試春官亦惟育聖之地樞電所屆昭示渥恩而龍戲之館赤昭之宫獨後表章詎非闕與臣希道竊伏思念忘寢與食爰即故府是諏是稽恭惟藝祖皇帝太宗皇帝赫靈誕聖於汴於洛後即其地咸建佛剎曰應天曰啓聖英宗皇帝由齊州防禦入繼大統州升節鎮是曰興德潛邸為寺亦沿厥名載在䇿書可援為比臣希道猥玷屬籍系為委安僖王曽長孫臣祖嗣王臣伯圭嘗欲建請未及聞上纘成先志責當在臣況復際遇叨守是邦今而不言死有餘罪願即丞廳改創佛寺且以臣疏下之中臺討論舊章賁以名額仍升軍號得偶齊鎮上以慰孝宗在天之靈下以表臣民推尊之敬抑為薄海生聚祈祝請福臣希道謹昧死以聞十月甲午詔禮部太常寺擬定禮部尚書臣時侍郎臣奕太常少卿臣禮奏嘉興府擬升為嘉興軍嘉興縣丞廳宇擬更為興聖禪院十二月戊辰制曰可秀人聞命歡聲如雷郡以制書從事榜揭軍名乃遂庇役撤廳創寺斤工墨師勸力子來明年十月寺告成重扉伉壯兩廡深靚左右復屋棲鐘若經中儼神御前殿後閣列肖諸佛菩薩丈室以居上首閎堂以容緇徒齋寮庖庾凡叢林規橅靡一不具為屋大小合二百餘間輪奐神麗為諸剎甲圜觀和會拜跪瞻依謂宜有紀昭示無極臣機俟罪政府與聞奏請詔報本末禾興又鄉郡也僉諧授簡不得而辭乃拜手稽首言曰惟聖駕生膺圖授籙天實啓之儲祥孕靈地實成之渾淪沖漠妙於天者難以知窺扶輿鬱積發於地者可以誠考瑤光感顓昴宿標禹傳雖不誣驗之無朕至若舜之諸馮文之岐周輿圗昭然千古在目臣子之於君父也坐見於墻食見於羮精誠所存隨寓而著過虛位必趨遭乘車必下因物起敬儼如參前而況地靈所鍾聖迹所肇委置湮汨弗虔弗蠲人謂斯何皇上昭兹神武遹追來孝宵衣菲食必勤必儉立政官人克明克謹設施注措動法孝皇至於恢顯之章尊崇之典事事物物極其豐備矧三朝成憲炳然如日宜乎覽郡守臣之奏詔亟俞之惟恐後也若夫建明之宜奉行之恪經始之審告成之速費不害公役不加民則臣希道之績視公子奚斯為罔愧臣亦既敘次其事俾鑱諸石復拜手稽首為之銘曰於赫孝宗紹隆中興武藏不殺文偉丕平作其即位二十七載德參兩儀仁冒四海在厥初生于胥斯原禦溪之水檇李之城昔在光武濟陽載育嘉禾九穗嵗應大熟昔在髙皇沛惟帝鄉萬嵗之後魂魄不忘惟我烈祖發祥齊􅍇郡名昭符婁協嘉社對越在天神無不之乃眷於秀永言懷思詔作梵宫榜曰興聖遹駿三朝駕方軌並宏址穹隆髙橺飛棘楬虔妥靈來燕來翼像衛嚴飭丹雘華新徼福金仙敷錫庶民禦溪淵淵檇李業業夾輔慶基昌于來葉檇李業業禦溪淵淵匹休宗祊於千萬年通奉大夫參知政事兼太子賔客權提舉國史院實録院權提舉編修國朝會要同提舉編修敕令嘉興郡開國侯食邑一千七百户實封三百户臣婁機撰興聖寺記天以皇朝世有明德惠洽黎民申眷命於髙宗中天立極用再造我區夏孝宗夙自秀邸育質少海以承堯禪祗若慈訓誕保此丕丕基精一執中之傳有光往牒維今嘉禾興聖禪院則上聖載育之地也斗樞繞電而夀丘輯慶赤龍逰河而慶都孕靈帝命漙將百神先後父老傳頌可考不誣慶元更元州升為府逮嘉定戊辰嵗昉因守臣希道之請加賜軍額仍即其所規作梵宫扁以今名所以紀長發之祥示四海以有尊也地接縣治位置𥚹淺無以肅觀瞻甫及四紀而支傾植仆之不暇守土者何以辭其責今皇帝在位之二十八年郡當擇牧上念畿輔股肱烈祖在天之靈不忘顧眷命大臣差擇其可寄以赤子者得太府丞臣與訔奉班列即日佩以章綬始至欵謁廟庭退而諏之僚吏曰漢制郡國得立祖宗原廟我國朝陪京及車駕嘗所臨幸咸即寺觀創殿以奉安神御而洛師之應天啓聖則又即誕生而紀瑞也維兹興聖伯父臣希道實倡之粵四十有五年而臣與訔嗣領郡寄臣與同時持常平使者節按部浙右向之茍有而未全者若有待焉失今不圖人謂斯何往復究度舊基之左右乃牙民産倍其值以償之由殿堂門廡以及庖庫皆革其故而取其新不侈不陋十閲月而崇成捐官莊田地二百七十有七畝合舊田地為一千八百二十有八畝畀寺僧以給齋厨費出於臺郡撙節之餘不以勞民是役也大宗正嗣秀王臣師彌實主其議拜疏闕下上為援筆大字書流虹聖地興聖之寺八大字命鋟梓塗金揭之新剎龍蟠鳯翥日麗星輝耆老聚觀感慕灑泣臣師彌被旨袖香奏告道霅川以圖示臣公許曰此國家盛美若嘗以簪槖陪法從來鉛槧掌內命盍為之記庸詔久逺臣固謝不能而竟弗得辭竊惟藝祖以神武膺圖肇造繼統以太宗而天下以定髙宗以艱勤紹復遜位於孝宗而駿命以凝至公無私與天同運孫謀詒逺配天無極丹書所紀曠古鮮儷小臣固陋何敢妄以管窺惟是隆乾淳熙盛德大業得之靣命心傳見之躬行實踐近接耳目為法可傳於天下者有二言曰仁曰儉而已惟仁故見善明用心剛愛惡是非得其正惟儉故處已約待人恕刑罰賦斂得其平自涉大位以訖倦勤授禹惟日乾乾祗畏於民巖中外敉寧風俗淳厚士大夫咸以禮義廉恥自修飭紹熙慶元之際國家賴以扶顛持危者猶昔日所作成之人才此無他仁儉之德積於躬者厚而化於人者深其培飬之道感移之機自有不期然而然者盛矣哉若夫篤於尊親謙以自牧雖震夙之所未嘗一語及焉逮寧考御圖遹追來孝始克舉行曠典道隆德重而退藏於密業巨事閎而民無能名刻詞豐碑所以侈盛美於無窮示來世以必葺也臣謹拜手稽首而述以頌曰宋受命古帝有十一世篤生孝皇神武哲睿藝祖之孫髙祖之嗣育德青宫揖遜以有帝位丕顯丕承克順克比厥初發祥秀水之涘帝實啓之百靈萃止若昔夀丘樞電薦祉慶都河流赤龍紀瑞有開必先古今一軌於赫梵宫作鎮星紀昔臣希道以宗室子來宣藩條兹焉經始敝弗之圗鮮不心愧臣訔假守臣將指同是肺腑同所出自諏之嗣王典宗正事老臣師彌奏聞九陛皇帝曰吁天命匪易念我烈祖宵旰致理德巨業閎道洽政治積慶有源涵洪演迤施及曽孫式承式繼伸紙濡墨為八大字鳯舞龍蟠星輝日麗欽佇飈逰聿嚴嗣志皇靈赫奕百神翼衛心法所傳仁儉而已矣惟仁足以祈天命惟儉足以承天意於時保之夙夜敢替小臣作頌庸侈休美莫髙匪天莫厚匪地於千萬年作宋元祀淳祐十一年龍集辛亥仲夏初吉謹記中大夫寶章閣待制新知婺州軍州事兼勸農使睂山縣開國子食邑五百户賜紫金魚袋程公許撰重修興聖寺記禹薦益於天至太祖生於汴而後益之子孫始得以有天下太祖薦太宗於天至孝宗生於浙而後太祖之子孫始得以享天下猗歟盛哉天為太祖後生孝宗故為太宗後生髙宗髙宗生與太祖同丁亥此天心也即位同南京改元建炎同建隆此聖心也而人未之知有臣寅亮慨念湯緒知天心聖心矣而不知紅光照室已應於即位改元之冬嘉禾紀瑞又先如漢中興時矣三后在天世德作求如編雅當申以下武之述周者天既生孝宗於浙之右以紹中興之烈復生理宗於浙之左以衍百世之治功初嘉定守臣希道建之淳祐守臣與訔乞扁至是奎文樞光交煥河漢中更寶祐乙邜鬱攸之災官軍士民衛神御惟謹戊午旨頒祠牒若干道為修復計下之郡從嗣王師彌請也郡未果明年景定庚申復以元賜命主僧淨志任貴從嗣王與澤請也申錫無疆及爾斯所如編頌當儕以烈祖之述商者淨志當事自方丈法堂以內規以立咸淳己巳特選主首以僧惟實當事期年兩廡山門以外工以備癸酉春旨奉安神御又從主祀與釋請也新廟奕奕寢成孔安一如祖宗制安居粒食優遊間暇亦便浮屠教夫孔曼且碩萬民是若理之常也乃如之人兮西方之人兮同事釋氏同師偃溪今乃能同力以事君惟實嘗興寺洪都謂叶唐五百年佛讖今乃前作後述復百二十年潛邸盛典至此知人心之天即天心之天也惟德動天無逺弗屆如編書正正當驗之以益贊於禹者謹拜手紀本末以俟編諸詩書之䇿朝奉郎添差浙東安撫司主管機宜文字兼福王府教導官周方記重建慈恩塔院記余幼肄舉子業周逰問學諸郡則憩天慶坊劉氏邸絃誦所餘暇婆娑金魚池月波樓下慈恩塔院比賢樓側吳省郎説所題額及護國保民諸天道場扁愛其書畫婉麗駐目玩視不能去亦愛金魚月波二扁篆古而𨽻雅惜三者輪奐未稱景趣耳自余𨽻東學䇿末第三任從官舊逰夢鬲及兹重來慈恩鼎新改觀佇立唧嗟有老衲祖輝者揖余曰此院以開寶年掘地得石佛石香爐相輪因利而建蓋亦向來之佛院也治平改今額建炎南渡而隳一塔亭亭獨存餘悉就圮余二十年竭力起廢龕經繪藏至庚午秋開軒于塔北辛丑嵗僧堂重創大殿裝嚴丙子至甲申而備庫院徹蓋鐘樓甍飛庚子至癸邜而成洪鐘釁冶於今春四方建場於嗣嵗內外粗具已方圗紀刻君周覽興慨龜趺其屬筆哉因喟然曰王荆國昔紀龍興寺謂孔氏之道易行非若浮屠氏苦身窘形之難也然此每失之而彼得余前未之信也今輝也獨能以三十年不怠志力而中興頺圯舊扁具在典型不泯而金魚月波尺椽片瓦莫加焉公飾闕去舊幾相什伯此失彼得寧不信然其有以闕之歎不自闕者得無啓於斯言淳祐五年上巳日宣教郎知紹興府諸暨縣主管勸農公事兼弓手寨兵軍正趙孟堅記招提教院置田記嘉興招提教院考之紀載則唐刺史曹君之故居也光啓四年捨以為寺敕名羅漢院國朝治平初改賜今額規模雖未大然在元祐間名公巨卿如荆國王公內翰蘇公更唱迭和寄題靜照篇什盈軸靜照即院之一室也能以一室聲聞京師蓋一名剎矣中間一罹建炎之兵火再厄寶慶之震凌殿室廢圯而弗修廊廡傾頺而弗葺紹定壬辰寺鄰吳供檢煥惻然動心自捐已帑鳩工聚材聞者樂助鄉僧懷敞開其端師誼贊其成自山門以至湢室輪奐一新嘉熙己亥繼以懷禮啓請檀那曰規模視昔固已大矣廣其居無以飽其徒可乎於是已施者無倦心未施者皆興念遂得常産以為香積卒嵗之儲由今而始苾芻之供可以繼矣蒲塞之饌當不乏矣懷禮欵門求豫記之並欲列檀那名氏書之碑陰余辭不獲姑為述其大概既而語之曰師亦知夫一飽之不易得乎夫捐金得土以為爾剎綿逺之利檀那不多得也寒耕暑耘以應爾衆饘粥之需農夫亦甚艱也師盍歸語諸徒曰如來積功纍行至現報身於王舍城猶未免持鉢乞食今之為比丘者顧何修而受成若是要當審其因果進其學業諦想其空法窒絶其塵念以祈福祥以酬施惠庶幾可耳毋徒曰我等瞿曇氏之種子也法當受是懷禮曰唯嘉熙庚子暮春既望朝散郎新知雷州軍州事兼管內勸農事借紫徐植記惠安禪院記昔釋迦拈花正眼先付大機大用普遍河沙利及四生功霑九有從窮三際橫亘十方萬象森羅頭頭具足自是慧燈繼照久而彌芳厯代宗師相印兹道同體異用警悟羣迷瞬目揚睂拈槌擊拂交馳捧喝坐斷生死無非得佛心宗悟佛知見嗚呼盛哉若乃帝釋折草梵宇翬飛貝闕珠宫丹楹刻桷長廊廣厦復殿重樓建立於屈伸肘間成就於剎那頃際變化莫測凡聖難窺嗚呼休哉像教肇興聖君出御宏持正法益使流通得折草神通具拈花妙用兼二德者間有人焉南徐焦山成之孫汴京妙慧光之子長水惠安立其名者乃常人也有佛子願力具丈夫身心於逰戲中見殊勝事回狂瀾於既倒銷魔外於已陳體用一如理事無礙遂能鼎新寶社特立叢林斬斬可觀得未曽有見者歎且仰焉方立之未榛也余適取道於此善其道力人事為衆所歸寬猛得中疾徐合度知其必有所就也越三年余守是邦間從賔客過之昔所謂瓦礫者今楹庭雄麗矣昔所謂荆棘者今金碧輝映矣髙堂深邃萬瓦參差鳴鐘鼓之新音唱宗乘之妙旨立於兹方可謂能矣奮掣電之機雖末山總持豈容専美有超師之作使焦山妙慧不殞餘芳於見比丘尼身者皆易得耶一日立偕其徒力請為記嵗月余憫其苦志而喜其有成故為書之惠安本之居也其徒以之聞於州刺史王公浚明請於朝始更禪剎命立來主道場實紹興七年閠十月也今善法雲堂方丈浴室與夫厨庫之屬靡不周足維佛殿尚闕焉會見得髓得皮之人共助出力出財之施矣復何憂哉余識成於京口見光於夷門會立於吳興知之為詳故於營建之外為紀本末尤悉主僧名道立號祖鑑錦城人云紹興甲子四月壬午朝請大夫充祕閣修撰權發遣秀州軍州事主管學事兼管內勸農事交安縣開國男食邑三百户賜紫金魚袋信安劉阜民記至元嘉禾志卷十八
