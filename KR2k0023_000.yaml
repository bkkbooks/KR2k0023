body:
  text: 至元嘉禾志地理類三都會郡縣之屬提要臣等謹案至元嘉禾志三十二卷元徐碩撰碩里貫未詳始末亦無可考其作此書時則方官嘉興路教授也秀州自宋初未有圖經淳熙中知州事張元成始延聞人伯紀創為之後嶽珂守郡復延郡人關栻續修會珂改調事遂中輟僅存五卷至元中嘉興路經厯單慶屬碩纂輯因踵栻舊本續而成之廣其門為四十三而卷數增多至二十有七志中兼及松江府華亭縣蓋元時本𨽻嘉興路明初始析置也其書敘次甚詳每條下間繫以考證尤為典核而碑碣一門多至十一卷自三國六朝以迄南宋凡石刻之文悉全載無遺如吳征北將軍陸禕碑梁秦住山碑唐黃州司馬陸元感陳府君環墓銘宗城令顧謙墓志皆歐趙所未著録吳越靜海鎮遏使朱行先碑吳任臣十國春秋實據以立行先傳其他零篇斷什為耳目所未覩者尚多殊足為考獻徴文之助惟書中但有人物及進士題名而不立官師一志使前人宦績缺然無傳未兔漏略又江海湖泖浦溆溪潭陂塘河港涇溝堰閘分為八類使源流支絡開卷井然體例甚當而樓閣堂館亭宇亦分為三類強析名目未免失之瑣碎是其所短焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4166315fefc0a49af5e29a6d52ed69bbfcab8354fab1d23b36c4117e6663e754
