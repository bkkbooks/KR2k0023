body:
  text: 至元嘉禾志地理𩔖三都會郡縣之屬提要臣等謹案至元嘉禾志三十二卷元徐碩撰碩里貫未詳始末亦無可考其作此書時則方官嘉興路教授也秀州自宋初未有圖經淳熙中知州事張元成始延聞人伯紀剏為之後岳珂守郡復延郡人闗栻續修會珂改調事遂中輟僅存五卷至元中嘉興路經厯單慶屬碩纂輯因踵栻舊本續而成之廣其門為四十三而卷數增多至二十有七志中兼及松江府華亭縣葢元時本𨽻嘉興路明初始析置也其書叙次甚詳每條下間繫以考證尤為典核而碑碣一門多至十一卷自三國六朝以迄南宋凡石刻之文悉全載無遺如呉征北將軍陸禕碑梁秦住山碑唐黄州司馬陸元感陳府君環墓銘宗城令顧謙墓誌皆歐趙所未著録呉越静海鎮遏使朱行先碑呉任臣十國春秋實據以立行先𫝊其他零篇斷什為耳目所未覩者尚多殊足為考獻徴文之助惟書中但有人物及進士題名而不立官師一志使前人宦績缺然無𫝊未兔漏畧又江海湖泖浦溆溪潭陂塘河港涇溝堰牐分為八𩔖使源流支絡開卷井然體例甚當而樓閣堂館亭宇亦分為三𩔖强析名目未免失之瑣碎是其所短焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e3cbcdc3acbc281dc73d866b85ca273e4b9b3b655bcfe9ccef1b43b8a2461229
