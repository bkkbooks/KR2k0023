body:
  text: 至元嘉禾志卷二十七元徐碩撰題詠録事司贈錢端公安道兼寄其弟惠山山人時錢以臺官為秀州監稅蘇軾鴛鴦湖邊月如水孤舟夜傍鴛鴦起平明繫纜石橋亭慚愧冒寒髯御史結交最晚情獨厚論心無數今有幾寂寞抱關歎蕭生耆老執㦸哀揚子怪君顔采却發秀無乃遷謫反便美天公欲困無奈何世人共抑真疏矣毗陵高山錫為骨陸子遺味泉氷齒賢哉仲氏早拂衣占斷此山長洗耳山頭望湖光潑眼山下濯足波生指倘容逸少問金堂記與稽康留石髓和錢安道寄惠建茶韻我官於南今幾時嘗盡溪茶與山茗胸中似記故人面口不能言心自省為君細說我未暇試評其略似可聽建溪所産雖不同一一天與君子性森然可愛不可慢骨清肉膩和且正雪花雨腳何足道啜過始知真味永縱復苦硬終可録汲黯少戇寬饒猛草茶無賴空有名高者妖邪次頑礦體輕雖復强浮泛性滯偏工嘔酸冷其間絶品豈不佳張禹縱賢非骨鯁葵花玉􅙧不易致道路憂嶮隔雲嶺誰知使者來自西開緘磊落收百餅嗅香嚼味本非别透紙自覺光炯炯粃糠團鳯友小龍奴𨽻日注臣雙井收藏愛惜待佳客不敢包裹鑽權幸此詩有味君勿傳空使時人怒生癭寄劉秀川楊大年騎置迢迢阻玉音鱸魚江海遂初心朱絃道直消浮謗春草才多動苦吟震澤折酲千樹橘華亭驚夢九臯禽郡樓晴日東西望幾處甘棠接翠隂題招提院靜照堂蘇軾鳥囚不忘飛馬繫常念馳靜中不自勝不若聽所之君看厭事人無事乃更悲貧賤苦形勞富貴嗟神疲作堂名靜照此語子謂誰江湖隱淪士豈無適時資老死不自惜扁舟自娛嬉從之恐莫見况肯從我為又王安石任公蹲㑹稽海上得招提靜照堂新構幽棲客屢攜飛檐出風雨灑翰落虹霓投老黃塵陌東風路恐迷又王圭身居在城邑趣不落人間門外塵埃滿庭中日月閒潮隨朝梵響雨入定衣班幾欲攜笻去松隂一叩關又鄭獬招提去山逺還似在山家晚日惟歸鳥春風自落花空談消劫火醉墨灑天葩又欲拏舟去清溪月正華又范鎮堂構虛閒處師心靜照中當門是流水滿院來清風趺坐通禪觀高談說性空那知人世上日日有樊籠又牛斗光芒下江山形勝中招提萬法本靜照一堂空花木含春意門庭語古風支郎丐詩什愧匪二南工又韓維道人幽棲地瀟灑臨江湖江湖置外物妙觀造無餘匆匆從世役沒沒已為愚何况毫髮間計畫窮萬殊檻外簷蔔林兒前沈水爐世人欲問道指象聊闕又祖無擇院靜逺囂塵虛堂締構新幾招台嶺客共話沃州春想像山中樂優游物外身公卿詩滿壁雅正日相親又閻詢浙右僧居盛虛堂葺有功迷來隨萬化淨後照三空夜永松軒月秋深竹岸風我心閒已久夢到水鄉中又宋敏求叢林起新構燕坐水雲鄉本自禪心靜能令世纍忘幡花圍晝永鐘梵度宵長歸裓新篇富籠紗映寶坊又吳充人說招提好師從靜照來親攜玉堂句徐叩蓽門開好事能如此題詩豈易哉明年得東守繫舸一徘徊又李大臨地勝堂新構僧閒晝杜門山林誰樂靜城市亦非喧客到空彈指風來不動幡祇應常晏坐對鏡一無言又林億檇李湖山外招提烟靄中靜由諸漏盡照覺萬緣空馬祖傳懷海牛頭住法融誰來訪宗㫖現定即家風又張芻檇李舊禪扉叢林自翠微寺居天外靜僧向日邊歸野水涵齊几閒雲宿釣磯庭前祖來意誰為相依依又馮浩寶坊新搆斷塵飛宴坐朝朝內外宜一自覺來無相見久忘言後少人知天中月滿雲收夜海底珠明浪靜時頓向此間超十地願將安定證羣疑又吳申高簷飛逺發輝光向此心源默坐忘豈憶布金拋舊地便隨飛錫起新堂竹間野鴿聽齊鼓湖上遊人繫夜航却懊未能攀勝境東南雲下欲騰翔又王益柔搆堂幽僻斷塵蹤靜照為名我所通一室可知天下事十方齊見定心中清朝雲散層峯出後夜潮回漲海空檇李禦兒多舊跡幾時煙舸訪支公又王异珍重慧空營妙隱標題靜照作佳名新堂復勝牛車樂舊閣如拋火宅縈慧空舊主精嚴寺居安隱閣經嘉祐丁酉火鞠為煨燼今住招提院復創此堂故有是句萬慮根源塵外息一軒景物鑑中明夜深晏坐心虛寂檀蕙煙微風月清又秦玠物外物何有物心須盡除始能為靜照得到便空虛性理自澄寂世緣終闕飄然飛錫去持此保安居又靜本天之性心因識始明搆堂來善衆傳法立佳名坐見靈禽集閒思土水平我緣簮紱纍未得叩禪扃又羡師遺世網舊隱敞新堂月白秋庭小風清晝榻凉倦遊輕勢利歸夢在滄浪滿篋朝賢句孤雲出帝鄉又選勝搆窗扉朝嵐更夕暉無人清磬度有伴白雲飛洗鉢江鷗下開簾野鶴歸誰能了方寸來此共忘機又錢藻去年秀水拍橋深聞說幽堂緑水臨自愧塵埃逢澤上空思瀟灑太湖隂經臺罷講龕紅雨齊鉢留糧下翠禽應是禪機終息處不須此外覔雙林又聞人安道清虛結宇卜居新寂靜標名欲性純直向萬緣無斷處應為一念不生人風幡震動殊非閙水月澄明未是真宴坐經行惟此地箇中消息與誰親又任恬門掩世人外幽棲向此堂一心能自盡萬事即都忘塵冷孤蟾白庭空異草香何須隱林壑處處可韜光又俞希白檇李招提好新堂向靜開因名求定慧對鏡悟西來夜席常留月寒階暗落梅師歸得真趣無復顧塵埃又牟景先金色成千界毫光燭萬緣堂名斯擬象法眼示通圓座踞軒楹內明觀善惡前吾當除滯見清信奉周旋又劉攽千金買境欲辭喧長日觀心復照昏多少勝緣從靜起為師無意入都門又陸伸閒房增締搆晏座隔囂埃屋木不加飾庭花時自開虛明殊止水寂絶等寒灰齊外無餘事欣逢高士來又聞人安壽名藍幽隱愜高情雅搆堂深豁眼明萬慮已平心可鑑一軒安處道由生花縈寶砌當春盛香馥金爐滿座清復有簮纓乘興賞留題佳句遍雕甍又李常藻户面通漕飛甍出重城堂成未遑息復作千里行塵埃袖短褐䝉暑踏寒氷其求異求食志欲詩編盈寧辭閽吏慢聊為一堂榮都城競名利日出車馬聲誰云方外士奔走亦有營惟靜制衆動自照中乃明胡為撓山水風急帆更輕嵗闌去勿緩恐負新堂名又王存曽過檇李古禪關十五年來夢想間聞說新堂增勝概可憐遊客變衰顔香檀印篆銷晨暮題墨籠紗記往還能了一心隨處靜少須辛苦逺人寰至元嘉禾志卷二十七
