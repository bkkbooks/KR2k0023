body:
  text: 至元嘉禾志卷十二元徐碩撰宫觀道院附録事司崇道宫在郡治南一里考證舊在南城外二里續移入城內古萬夀宫基上初本名崇福宫宋治平元年改賜今額俗呼為南宫宫有一枝堂每大比邦人士用取南宫一枝之讖多㑹課於此今廢止有繼秀堂慵齊拙齊而已天慶觀在郡治西北一里考證本名同元觀梁文眀元年立宋雍熙三年改棲真觀大中祥符五年置聖祖殿六年賜今額天禧元年降到天尊神化金寶牌子紹興元年知州鄧根因兵火復興聖祖殿二十六年再知州奉詔如律而加備焉洛陽朱敦儒為之記嘉禾百詠詩注七賢遺蹟一嚴陵陽焰二蹇子䖍水三葛洪書額四吳道子貌真五張僧繇鷹以致殿宇之上無燕雀巢六顧虎頭神二為巢賊竊去七飛仙失名字遭兵火後並無存者外有唐開元鐘梁朝檜七寶上帝像宋乾道中門齊堂掘得二小石刻其一北極殿記知州宋坦以俸金創殿雍熙三年五月二十七日記其二并銘軍事推官解九臯擬徐鉉茅山許表史并銘為之九臯鉉門下士也雍熙四年立報忠觀在郡治西南一里半考證宋淳祐九年里人趙朝散汝徘捨宅為觀淳祐十二年十月准勑賜今額隱真道院在郡治東南六十步考證宋崇寧間造建炎兵火巋然獨存或謂紹興初純陽真人到此故名隱真紹興丁邜又有仙人劉髙尚夜宿於中晨起援筆題雲堂柱間凡四十有三字曰行方便坐方便諸聖察天上見得道安得身健但能晨朝洗面水不得浪淵起盜玊津能顯九霄雲事劉卞功來仙語隱微衆亦莫曉筆畫透柱如㸃漆然郡人有疾者刮其字煎飲之即愈端平改元關栻記其事劉採為之讚李漢為之跋後庸醫以新易舊刮墨和藥柱因不存異親道院在郡治東北一里半考證宋癸丑間雲遊俞世修患風疾其行匍匐其語蹇澀忽有道人丱角美髯青褐大袖顔貌竒古以手重揮兩膝其疾頓瘳或謂鍾離真人至此也婺州道人毛觀記其事萬夀道院在郡北一里考證里人徐氏建崇奉梓橦真君香火嵗大比邦人士禱焉修真道院在郡治西南一里松江府錢眀宫在府東張塔橋側仙鶴觀在府南二百步考證東晉時創額宋紹興三十一年重建谷水道院在府西南西湖上真靖道院在府西北普照寺後考證俗呼道堂真武道院在府南太清道院在震橋東考證里人衛守宗武舍舊宅為之嘉興縣崇真道院在縣東四里長生道院在縣東一里海鹽縣棲真觀在縣西北五十步考證舊真武廟宋乾道二年道士郭宗諒移請廢額為之崇德縣天清宫在縣西南一百步考證元係東嶽行宫道院道士蘇大亨募緣增建宋紹定四年請額開山崇福宫在縣東北五十八里青鎮考證宋紹興七年道士葉彥球建名奉直廢至二十九年始創殿宇請今額祠廟録事司城隍廟在郡治西一里招提寺西考證元在州樓上之東偏晉天福四年立後移于此地守臣劉炳為之記五聖廟在州樓上之西考證又一在廣平橋又一在糖巷東北又一在郡圃又一在舊抽木場西天王堂在州子城西北樓上考證唐天寶初令州郡於城西北隅置北方毗沙門天王像又置之佛剎舊精嚴寺亦有此堂東嶽二聖廟考證在天慶觀之東南又崇福宫之西資善興福眀王廟在郡治北精嚴寺之西北隅考證本晉徐尚書宅因捨宅為寺遂祠之朝議大夫行開封府司士曹事侯銘為之記曹使君廟在郡治西北二百五十步考證按舊經云曹信當錢氏霸國時為牧守自臨平鎮移蒞嘉興慈惠及民卒邑民追慕之相與列狀乞立祠宇春秋致享又按吳越備史云曹圭也錢氏忠懿乾寧中淮人圍嘉禾圭與族人師魯守之每登樓張樂縱飲石矢交至視之晏如也嘉禾平以功援蘇州刺史今廟有三人碎碑在廟後磨滅不可讀普寧王廟在郡治北一里考證俗呼銅棺廟舊傳嘉興知縣有善政天降一銅棺蓋自開知縣入焉蓋又自閣其棺飛在常州宜興縣山上今為銅棺山當時有一吏人堅挽知縣不可入遂折一臂後塑折臂曹司在其側金山大王廟在郡治北一里半考證本漢霍將軍光也詳見松江府楊將軍廟在郡治北五十步考證乾化元年置王總營廟在郡治西三里通越門內考證王因髙田賊作以身死難故祠之加封旌忠廟靈濟昭烈王廟在郡治西南一里半考證舊在西門外宋德祐兵火後移於此即故知惠州徐聞詩宅也今西門故址尚存松江府東嶽别廟在府西二里靈濟昭烈王别廟在府西三里考證神姓張其英概靈迹載相川神祠碑記中蓋自漢以來江浙多祀之縣之别廟始於宋淳熙之八年城隍廟在府東南七十步考證舊在縣西宋政和四年遷于此唐李陽冰曰城隍神祀典雖無吳越中多祠之今州縣城隍相傳祀紀信云金山忠烈昭應廟其一在海中金山去府治九十里其别廟在府東南八十步考證廟有吳越王鏐祭獻文云以報將軍之陰德吳國備史云大將軍霍光自漢室既衰舊廟亦毁一日吳王皓染疾甚忽於宫庭附小黃門曰國王封界華亭谷極東南有金山鹹塘風激重潮海水為患下民將為魚鱉所食非人力能防金山北古之海鹽縣一旦陷沒為湖無大神力護也臣漢之功臣霍光也臣部黨有力可立廟於鹹塘臣當統部屬以鎮之遂立廟嵗以祀之宋宣和二年賜顯忠廟五年封忠烈公建炎三年辛道宗領舟師由海道護行在所奏加封忠烈順濟且賜緡錢以新廟貌四年加封昭應按霍去病為冠軍將軍而霍子孟為大將軍今備史以為霍光或者吳越祭文不考也廣衛將軍祠在府西普仁寺考證寺有石刻載吳越王祭獻文云晉賢陸機之祖按吳志機之祖遜初拜撫邉將軍又拜鎮西將軍又拜上大將軍吳因漢志雖有雜號將軍而考之遜傳未嘗封廣衛之號若機曽祖紆守城門校尉髙祖馭九江都尉亦未嘗位至將軍陸司空廟在府南三里考證祥符圖經云陸四公未詳所出今俗傳陸機廟按晉史機未嘗為司空為司空者機之從兄弟玩也又原化記云蘇州華亭縣有陸四官廟元和初有鹽船泊於廟前守船者夜於廟中獲光眀珠則又以為陸四官矣築耶將軍祠在府東三十五里考證築耶城晉左將軍袁嵩所築遺址尚存有築耶將軍祠世傳祀袁嵩按晉隆安四年嵩以吳國內史築滬瀆壘以備孫恩明年恩陷滬瀆嵩死境內祠之宜也築耶之義未詳顧侍郎祠在府東南三十五里亭林法雲寺考證感伽藍神記開運元年仲春十有一日寺成僧道中智暉夢二青衣來云陳朝侍郎至也後忽見一人紫衣金魚儀容清秀曰此地吾之故宅荒已久矣師今於上造佛立寺請立吾形像吾當護此寺也可尋舊寺基水際古碑為據眀日二人各言其所夢不異就求之果得古斷碑文字破滅云寺南髙基顧野王曽於此修輿地志二僧於寺東偏建屋立像至今祠焉通濟龍王祠在府東北滬瀆考證故老相傳自錢氏有國已廟食茲土宋景祐五年太史葉清臣為本路漕司因浚盤龍滙禱於故廟神應如響於是復新祠貌有葉太史祭文刻石於廟中蔡侍郎廟在府南八十里白砂鄉考證據通幽記唐貞元五年在嘉興監徐浦下場糶鹽官場界今諸場亦有蔡廟獨未詳何神柘林方廣寺有蔡侍郎祠按寺記云自古相傳蔡侍郎捨宅為寺竟無稽考惟石幢題云唐咸通六年蔡贊造去父母塋九十步去夀域一十六步三代皆當世文儒按貞元則德宗朝也咸通則宣宗朝也貞元中已有蔡侍郎祠矣雖稗官小說未可盡信不應咸通中蔡始造夀塋也豈寺之所祠與蔡場所祠各不同乎姚將軍祠在府西北十五步考證初祠於證覺院宋政和四年始遷于此未詳何神福順延德大王祠在府都酒務西考證未詳何神廟有宋楊景範遷廟石刻云熙寧甲寅到官夢逰福順廟見執簿者臂頽求豫治之未幾以漕命遷酒稅於王故宫之基乃用卜宅于茲土豈神之靈先有以授我耶三姑祠一在府南七十里西北七十二里澱山湖考證按吳地志秦時有女子入湖為神即此祠也柘湖今陻塞為蘆葦之場神亦弗祠其澱山湖中普光王寺三姑祠靈甚湖旁三數十里田者與往來之舟皆禱焉故老相傳秦時人姓邢氏女兄弟三人謂即柘湖所祠也嘉興縣城隍廟在縣治內考證舊在縣西二十步晉天福四年立後移在縣治內之東偏知縣李時習重修蕭王太祖廟在縣西北考證唐贊云梁蕭氏興江左實有功在民故州縣多祠之惠安寺即蕭王故宅也五龍王堂在縣南城外三里考證舊經云在縣西南五里宋天聖二年立隆興元年更創祠宇服色坐位出于俚俗不復討論禱而未應州學録夏公以文選郭景純遊仙詩言五龍事上之州知州姚憲從之遂改正其服位繼而響應祠宇之南偏乃焚化院嘗掘得大通年石佛像奉安之時光眀滿室髙王菩薩廟在縣北三十六里遷善鄉考證髙使君也晉建武中出為監屯校尉領兵三千屯給于此久而鎮靜使君教兵三千耕稼官田嵗遇豐稔公儲有餘於官於私有功有德使君纍遷黃門侍郎司徒左長史并侍中征虜將軍授北海信都二郡太守禾之鎮終於此梁大通年立廟於縣北二百步梁步兵校尉劉績之記後移其廟於此地名江涇村髙豐縣在縣東北一十八里考證唐屯田之所按文粹有嘉興屯田政績記李浣為文其略云浙西有三屯嘉禾為之大乃以大理評事朱自勉主之且揚州在九州之北最廣全吳在揚州之域最大嘉禾在全吳之壤最腴故嘉禾一穰江淮為之康嘉禾一歉江淮為之儉首公選于衆獨當其任有白雀集於髙豐屯廩蓋大穰之徴也則髙豐之祠亦云舊矣今有雀墓村乃白雀之墓也昌武廟考證舊志云不知何代人也吳録異記曰吳士季為吳興令病痁遣人就昌武廟乞斷鬼士季夢一騎縳小鬼去即愈徐偃王廟在縣西二十里考證偃王逃戰之㑹稽嘉興本屬㑹稽人多姓徐王之宗族嘗有散在邑者故後世因有思王功德者為之廟以祀焉衢州龍丘亦有廟韓退之衢州廟記甚詳唐開元元和中徐氏三人相繼作衢州刺史乃王之逺孫也楊姑廟在縣西考證舊圗經云昔有楊氏女篤孝躬耕給飬父母死後鄉里為之立祠許公廟在縣西一百步考證舊經云許公名安仁晉黃門侍郎也隋陳司徒廟在縣西南五里考證唐咸通五年置郎隋陳果仁也唐封忠烈公僞唐册武烈帝常州亦有是廟有碑存焉馬塘廟在縣南七里馬塘堰側嘉禾大王廟在縣北望雲門外蒲白廟在縣西北五里考證舊傳是徐岱也靈宿土地廟在縣西南二十七里本覺寺之東南考證父老相傳始者里社欲立廟本非今處木植既備一夕自移至此水旱禱之無不響應靈顯侯廟在縣北五里考證土神施府君也宋人諱伯成九嵗為神幾百餘年有禱輒應嵗旱潦鄉貢進士聞人剛中等禱於祠下遂獲大雨遂請於朝景定五年九月准勑賜今額今廟之左右皆施族居焉本縣太平橋杉青閘等處海鹽縣東嶽别廟在縣西北一百步考證宋大觀四年造建炎四年正月關將領敗兵入海避敵過海鹽謁東嶽廟關王祠見塑像卒持刀柄離地出舊塑尺許衆畏之不敢為變而去紹興三年縣令李直飬重修别建聖母殿於正殿之東張椂為之記城隍廟在縣南五十步考證廟碑陳文惠公八分書宋乾道七年嵗旱知縣邢銖禱之而雨廣惠别廟在縣南一里考證宋紹熙二年文林郎紹興府察推蔡與義建淳祐辛􅕀知縣何三夀再建金山顯忠别廟在縣東一里考證漢大將軍霍光祠封忠烈順濟昭應公宋宣和間創建紹熙甲寅縣令李直養修陳山顯濟廟在縣東北四十里考證宋大觀三年建舊圖經云以龍祠為大帝典兩曹政和間縣人郭三益為中司以禱祈感應奏請封爵山椒有龍母冡巨石盤陀山半有龍湫水旱不溢不涸崇寧三年詔以顯濟名其廟宣和五年封龍君為淵靈侯紹熙七年六月旱暵知縣李直養因禱於龍君得小龍以歸就縣㕔設醮三日後果雨是嵗大稔聞於朝進封龍君為廣惠淵靈侯龍母為龍君夫人紹熙二年李直飬建新龍君龍母二大殿裝龍君像塑侍衛八軀塑龍母四龍王像置供具繪龍於壁自廟門而下皆一新之紹熙五年勑封龍君為廣惠淵靈威祐侯龍母為慶善薦福夫人又創建興福院於廟之右以廣僧居以嚴香火之奉其詳載廟碑廣順延德大王廟在縣西二里半蘇驃騎廟在縣西一百三十步考證梁大同間立碑圗經云名舉字子羽封烏程侯葬金牛山北宋髙祖嘗夢其神因贈平南大將軍明帝加使持節都督征北大將軍黃郎中廟在縣圃考證耆老相傳以為古之賢令因立此廟後廢宋元祐間何清源公執中重建紹興二十九年林仰修紹興五年李直養重修白馬廟在縣東一十八里海沙場北齊景公廟在縣東南三十六里考證耆老云景公遵海而至此尚胥廟在縣尚胥橋之北考證伍子胥入吳至此後以忠死邦人憐之故并其兄尚祠焉因曰尚胥廟後孟勑封清忠英烈威惠獻王太公吕望廟在縣東一百五十步考證吳地志云太公避紂居東海之濵百姓懷之為立廟今廢秦始皇廟在縣南一十八里秦住山考證吳地記云秦始皇廟失其立廟年代時日山有碑梁天監二年八月二十三日拊山上有秦住泉金牛山廟在縣西南五十里武寧威烈王廟在縣西一里半張府君廟在縣東二里崇德縣東嶽行宫在縣西南一百步考證宋政和間修廟舊碑磨滅猶可讀謂淹時沒久感夢興繕從知建立甚古又云廟屋百楹增修殿宇三所崇興庭臺連東西二所彩飾后嬪供帳與夫百司執事從祀之神靡不備具繹騷之後再創郡志止稱聖帝廟後之規模壯麗有加於前城隍廟在縣西南隅語溪館東考證邑令臧元士增創門道兩廊開路東出丘于祠附於內秦王廟在縣運河東北二百二十步考證舊祠於廣法院後並祠廣忠何律王廟在縣西三里陳王廟在縣北八里射獵廟在縣東南五里打虎廟在縣南七里通靈王廟在縣西北三十里蕭尚書廟在縣東三十里秦王行祠在縣北千乘鄉東嶽行祠在縣北二十二里石門市索度眀王廟在縣東北六十里青鎮考證青鎮土地神也宋宣和間起居舍人周維亨謫蒞鎮事一夕夢有神人謁之曰豫居弊陋幸公惠顧我翼日周訪之叢祠得土像適契夢中所見者遂為修祠宇萬圭為之記舊志謂索度王即吳王孫權之子然鎮西南隅舊有索靖王廟考之唐咸通中王洪所記索靖王實吳王孫權之仲子也未知孰是昌武三王廟在縣北車口堰地名下廟至元嘉禾志卷十二
