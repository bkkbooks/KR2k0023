body:
  text: 至元嘉禾志卷十元徐碩撰寺院錄事司報恩光孝禪院在郡治北一里考證舊施水院也宋治平間本州慕容殿丞請於朝至熈寜元年賜名壽聖院崇寜二年賜名崇寜寺政和六年改名天寜萬壽院紹興七年改名廣孝院紹興十三年改今名精嚴寺在郡治西北一百八十步考證晉成帝時徐尚書别業尚書按舊靈光寺實録名帖今土地記名熈因夜井發光遂奏請捨宅為寺賜名靈光錢文穆王時立山門掘地得一小龜介甲分明尾繞身一匝遂改為靈龜寺天福四年陞縣為州時刺本寺應瑞吳越呈祥天下不許改額復名靈光宋祥符中賜今額元有沙門洪敏靈光寺碑記今石刻不存寺之西北有五臺山内石經屋一十二間刻法華維摩等經又有大藏殿東西塔㕑混室淨土水陸諸院千佛羅漢大悲天王諸堂自建炎兵火後石經獨存餘者悉更新之又有木紋觀音殿咸通年間立至今飛禽不立未鐫造前其木在水濟人遇淨即浮逢羶即沉人知不凡取為尊像鐫製纔畢靣目手指皆有紋彩時人稱為木紋觀音其殿在五臺山西南兵火後移於寺之東廡紹興十一年境内雨暘失時邦人禱之嵗以有年於是鳩工度材而重立之凡遇水旱則郡侯必先率同僚請禱焉以為常招提院在郡治西二里考證唐光啟四年曹刺史捨宅為院賜名羅漢院宋治平四年改今名寺有靜照堂今廢兜率寺在郡治東北一里考證舊放生池也唐乾元元年置名法空寺錢氏改為輪王寺宋大中祥符元年賜名兜率德祐元年廢為教塲今為北營慈恩寺院在郡治西北一里楞嚴寺之西考證唐開寳六年漢南王時攝刺史丁太尉在任買磗塔一所尋掘塔基得石無量壽佛一石相輪一石香爐一舍利一龕一因立為無量壽塔院宋治平年中賜今名普濟院在郡治西北一里慈恩寺之西南考證元名金魚寺以刺史丁元贊得金魚於池而池在寺之前故以名宋大中元年賜今名後移往華亭作衛尚書功德院遂廢楞嚴院在郡治西北二里三十步慈恩寺之後考證本受業精嚴因遺火焚毁元地充米倉有昔許射廨宇宋嘉祐八年百姓鈕咸有地在慈恩塔東因舍入本院熈寜年間有㫖一應寺院未有名額有屋及三十間者並以壽聖為額僧無擇已造至三十四間遂有請於提刑未明闕之於朝存之後僧永和在院講楞嚴經蔡丞相書楞嚴牌掲之門遂以楞嚴為名祥符院在郡治西北二里考證宋乾寜元年置為水陸院大中祥符元年賜今名舊為律寺紹興二十五年守臣林衡奏請改為禪院資聖院在郡治西北二里一十步考證唐㑹昌五年建當年廢大中年間重置其院在城外乾寜三年移入城内有唐宣宗書扁額尚存興聖禪院在郡治東北二百步考證舊嘉興縣丞龎揮麈錄云宋孝宗誕育於此時有紅光燭天嘉定戊辰賜今額理宗御書流虹聖地興聖之寺八字寳祐年間因經回祿不存後再造未完金明寺在郡治西南三里考證宋乾道八年移海鹽縣空閒金明寺額建開禧元年賜今名寶花尼寺在郡治西南二百步考證唐陸宣公宅也大厯中因女叔法興誦法華經感之天花亂墜寶雨兩下外祖秘書監遂捨宅為寺因名寳花法興亦為尼惠安尼寺在郡治西二百五十步考證古傳蕭王捨宅為之唐光化間名興善院宋祥符元年改今名多寳尼寺在郡治西南一里三十步考證唐肅宗朝置本名甘露寺宋治平元年賜今名報天尼寺考證宋郡守劉漢傑夢觀音因得女生數嵗不茹葷遂捨宅為寺松江府普照寺在府西二百八十步考證唐乾元中建名大明寺宋祥符間改今額寺有陸將軍祠世𫝊地本陸氏園亭因祠焉固未可信嘉禾詩文謂陸機捨宅為寺亦妄矣機死於晉大安二年寺建於唐乾元年間豈得為捨宅乎恐子孫捨宅亦未詳晉史世説叙錄機之子蔚復同父遇害於洛中又機故宅在華亭谷東崑山下非今邑中也寺有地方天王祠吳越王加封䕶國石刻存焉沈存中筆談載雷震天王寺屋柱倒書曰髙洞楊雅一十六人火令章凡一十一字内令章兩字特竒勁似唐人書體今石刻尚有即此寺天王堂也寺東北隅有善住教院𫝊賢首宗西北隅有梵修院寶相寺在府西南三百步考證本清禪尼寺唐乾符間造宋大中祥符元年賜今額超果寺在府西南三里考證本名長壽唐咸通十五年心鏡禪師造按唐㑹要洛陽伽藍記武后以齒髪既老造長壽寺於東京改元長壽又高僧傳載心鏡禪師藏奐蘇州華亭人㑹昌廢寺大中復修洛下長壽寺敇奐居焉奐後嘗歸鄉造寺豈此復名長壽寺乎盧仝集訪曦上人詩有三入寺曦未來及含曦答詩長壽寺下壁盧仝一首詩之語上川先生居洛城裏則長壽寺固其常游也今乃以仝詩為在華亭則妄矣宋治平間改今額有觀音大士像寺有石刻六本錢武肅王宮中所祈禱者太平興國中錢氏歸國僧慶依得之未知所適一夕夢白衣人吿曰吾與若偕之雲間既寤乗舟而來將至縣西大士舒祥光下貫超果遂迎以祠焉至今雨𤾉皆禱之寺有天台教院按芝園集雲間超果十方嚴湛創建有陳舜俞為之記寺有見逺亭名公有詩興聖院在府東南二百步考證按孤山閒居集載興聖院結界序漢乾祐二年邑人張瑗之子仁捨宅為寺名興闕長壽宋祥符中改覺𤣥院後改今額寺有宋仁宗嘉祐中宣賜藏經證覺教院在府西南一百五十步考證宋太平興國間立本無礙浴院大中祥符元年賜今額演教禪院在府南二里考證宋崇亨中頭陀張其姓者卜築於此掘土得木雕住母羅漢十有六軀邑人異之遂為施水庵至紹興二十九年正月十八日請今名莫濤為之記淨居禪院在府東北三百步考證宋紹興五年請今額廣化漏澤院在府西南二里一百步考證宋紹興三年請今額延慶教院在府東南三百步考證寺址本施家瀁宋隆興間僧守詳創茅廬且以衆力闕十六觀堂乾道間始賜今額至開禧間悉燬開慶己未僧思恭始議修建自庚子迄丁夘殿閣堂廡㕑庫悉完美又有忠訓陳君文燁因感夢得男又捨所住宅移建於寺西荒址為楹百餘規模甚整備郡境是刹為最縂持寺馬祈寺清修寺普光寺在府西北七十里薛澱湖考證寺在湖中山頂宋建炎元年請今額靜安寺在府東北一百里考證元滬瀆也按寺記吳大帝赤烏中建號滬瀆重𤣥寺佛法入中國雖始於漢而吳地未有寺也赤烏十年僧康會入境孫仲謀始為丘寺建業曰建初建初者言江東初有佛法也豈滬瀆寺相繼創建耶景筠石幢記中間號永泰禪院宋祥符元年改今額釋迦方志云晉建興元年有二石像浮於吳松江口吳人朱膺等迎至滬瀆重𤣥寺像背題曰維衛曰迦葉闕陵集建興八年漁者於滬瀆沙汭獲石鉢以為臼類葷而用之佛像見於外漁者異之乃以供二聖佛與鉢皆在平江府開元寺有毘盧遮那佛吳越王瑜迦道塲中像佛五藏皆書錢氏妃嬪名氏又有陳朝檜皮日休陸龜䝉皆有重𤣥寺雙檜詩圓智寺在府北二十九里于山考證舊名禪居按宗毅寺記唐大中十三年建於邑西南二里晉天福中水壞寺基始遷於此宋太平興國中都水使錢綽始建造堂宇有僧憙蟾入天台韶國師室來住北寺人多歸之精舍始完備朝廷賜蟾師號曰崇惠明教治平中賜今額寶雲寺在府南三十五里考證初名法雲寺在顧亭林市西北隅唐大中十三年建晉天福五年湖水壞寺基始遷寺南髙基即陳顧黄門故宅按亭林法雲寺感夢伽藍神記云開運元年造寺成其夜三更夢二人青衣來云梁朝侍郎至也忽見紫衣金魚儀容清秀謂曰此吾故宅荒已久矣師今造寺於上請立我像吾當䕶此寺明日道珍智暉各言所夢其事不異明夜復夢云但尋舊寺基水際古碑文為記二人明旦求之果見皆文字破滅獨一片分明云寺南髙基顧野王曾於此修輿地志二人嘆曰此寺當興冥感如此遂於東偏别選良材建屋立像并二青衣侍衛是年季冬望日也其夜衆咸夢神來謝曰吾獲其利皆師之故也凡有吉凶無不預報宋治平賜今額後廢遂請是額於俞塘北為尼寺金寺在府西北八十五里地名大盈考證唐太和二年建本法雲禪院宋治平元年易今額紹興間復為禪院寺有陳舜俞經藏記空相寺在府東北八十里考證元龍華寺張仁泰請於錢忠懿王始建宋治平元年改今額西北隅有白蓮教院隆平寺在府北五十四里青龍鎮考證元名報德寺唐長慶元年造勝果寺在府北五十四里青龍鎮考證寺有沈光碑紹聖中吕益柔撰妙悟大師希最塔銘云最學天台教緇林號曰義虎後居勝果寺僧房有鬼物為祟最為講説於空中得朱書數十字自謂漢朝烈士沈光大畧悔過謝罪之語事頗近怪故不詳載白蓮寺在府西五十四里考證宋紹興二十六年請今額寜國寺在府東北四十五里考證宋乾道二年請額大明寺在府西北四十五里考證宋紹興三十一年請今額普門院在府東五十里地名盤龍考證唐大中十二年邑人陸素建本名觀音院宋祥符元年賜今額寺有名天王舊傳因大水漂至人多禱之興塔院在府西南五十四里考證宋紹興四年請今額崇福院在府東南五十四里考證宋紹興四年請今額方廣院在府南八十里柘林考證唐咸通六年造按寺記蔡侍郎功德院宋建隆中賜額延壽院治平元年改今額寺有蔡侍郎祠蔡氏墳塋在寺之左右石幢猶蔡氏故物也法忍院在府西南三十六里朱涇考證即船子和尚覆舟處唐咸通十年建本名建興院宋治平元年賜今額寺有船子和尚夾山會禪師遺像至今祠焉福喜院在府西北九十里地名趙屯考證梁貞明六年僧智道立精舍晉天福二年賜名尊勝院宋大中祥符元年改賜今額明行院在府西北五十里南橋考證晉天福五年里人蔣漢瑊造請於忠懿王始名安和院至宋太平興國八年改賜今額七寶院在府東北七十五里考證元福壽禪院宋大中祥符元年賜今額寺有五代時檜今已合抱明心院在府北三十五里北橋考證元華嚴院按錢武肅王立寺記都水使者錢綽造武肅王以誦華嚴僧居之因以為華嚴院宋治平二年賜今額海慧院在府西六十里白牛鎮考證宋建隆初里人姚廷睿以宅為寺初名興國福壽院治平元年改今額姚即為伽藍神普照教院在府西北三十六里考證本余山東庵宋治平二年賜今額寺本聪道人所居因以為寺有聪道人塔在山頂寺有上方曰月軒衆山環列其前盡絶境也宣妙院在府西北二十四里考證本余山西庵宋治平二年賜今額寺有上方惠日院在府西北二十四里考證本余山中庵宋雍熈三年立治平二年賜今額慈雲昭慶禪院在府西北二十里考證本余山之靈峰庵有馬𡺸禪師塔其銘曰禪師傳雲門正派大闌法席建立精舍復古寺額寺有金沙地芥子庵普寜慧日院在府西北七十里考證在孔宅寺有宣聖祠宋元豐間賜今額舊經云紹興五年也太平興國禪院在府西南四十五里零考證宋紹興二年請今額寶勝禪院在府東四里考證宋紹興六年請今額慈濟院在海中金山絶頂考證宋元豐間釋惠安造紹興元年請額北延恩院觀音慈報禪院在府北八十里考證宋崇寜元年請省額淳熈三年參政錢公良臣請賜功德院永定禪院在府東北七十二里周浦考證宋淳熈十四年請額保安院在府西五十里􅍩西考證宋乾道七年請今額寶藏䕶國禪院在府西南五十四里舊經云六十里考證宋紹興四年請省額大聖院在府東五十四里考證宋隆興二年請今額報恩院在府西四十五里考證宋乾道二年請今額集福保國水陸禪院在府西南六十里白牛鎮東考證宋淳熈九年請今額淨上院在府東北七十里考證宋乾道八年請額延恩報德院在府西五里考證宋紹興甲寅律帥元偉即接待舊址為之守臣劉徽制請於朝賜今額至元嘉禾志卷十
