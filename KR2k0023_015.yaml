body:
  text: 至元嘉禾志卷十五元徐碩撰宋登科題名大中祥符五年徐奭榜聞人侃甲科天禧三年王整榜聞人建甲科吕諤天聖二年宋庠榜吕詢景祐元年張唐卿榜吕評寳元元年吕溱榜聞人安道慶厯六年賈黯榜陳舜俞韓洞皇祐元年馮京榜沈中復王照錢長卿嘉祐二年章衡榜胡誾吕全嘉祐六年王俊民榜朱伯虎弟伯熊嘉祐八年許將榜戴顯甫朱鞏治平二年彭汝榜潘景純朱伯熊兄伯虎郭瑑子三益熈寧三年葉祖洽榜張仲元聞人瑮聞人琳吳公美熈寧六年余中榜梅貢父灝吕奎梅灝子貢元豐二年時彦榜錢著徐之純廖漢卿桞庭俊弟庭傑章粹元豐八年焦蹈榜倪直侯探花杜植崔友直元祐三年李常寧榜吕益柔榜眼陸周張徽言郭三益父瑑元祐六年馬涓榜朱紱榜眼弟紘富開朱之純紹聖元年畢漸榜桞庭傑兄庭俊吕佶紹聖四年何昌言榜張天材元符三年李釡榜錢隨崇寧二年霍端友榜朱紘兄紱吳錞崇寧五年蔡薿榜王篪張甸吕少䝉魯詹弟訔詧子可對陳裴忱大觀三年賈安宅榜桞約兄庭俊聞人宏姚焯張昭陸友諒陳之元周綱董之邵周公彦衞上達黄子服政和二年莫儔榜范遜政和五年何㮚榜衛閆黄鍰兄鎮謝處道黄鎮弟鍰張康朝政和八年李嘉玉榜董蔣韓聞陳確羅彬趙士坦子不愚孫善毅宣和元年王俊乂榜衛膚敏宣和二年祖秀實榜朱炎宣和三年吳渙榜聞人頴立上舍子符富説宣和六年沈晦榜沈晦狀元范閎建炎二年李易榜黄銓甲科張睿蔡宿黄橾紹興二年張九成榜孫彦朝紹興五年汪應辰榜任盡言甲科言兄質朱冠卿樊光逺省元任質言弟盡言魯訔子可宗錢宏祖政中姪萬魯詧子可簡葛温卿紹興八年黄公度榜陳璹陸之淵弟之望董天民紹興十二年陳誠之榜周澂陸之望兄之淵潘旦魯藝紹興十五年劉章榜潘璋甲科張康徐珙陳伯逹魯可簡父詧太史洵武張圖南趙師渙紹興十八年王佐榜林公望張偉張然俞光嶷子建王允恭桞仲永紹興二十一年趙逹榜錢萬中魯􅚇弟璠丁三畏張廷均父昭鄭聞省元陳駢紹興二十四年張孝祥榜徐浚衛稷錢良臣陳禹錫張潛杜申唐鐸徐銳紹興二十七年王十朋榜聞人符父頴立林宗顯周謹思樊抑父光逺朱佾聞人阜民孫仲脩陳師正子允趙汝能趙師文趙彦深紹興三十年梁克家榜許克昌以有官允榜眼葢經甲科魯可封父詹訔叔詧沈揆侍從李芳莫若晦樊廣父光逺林洲桞大雅王眀弼趙希仁弟希傑希仰卜回趙不愚父士坦子善毅善韸錢聞禮張伯垓陳夢鵬侯持國紹興三十二年夀皇登極上舎釋褐錢聞詩隆興元年木待問榜張序陳之方莫抃趙善洙趙汝眀邵褎然張子泳魯可宗吕旦乾道二年蕭國梁榜朱澤之甲科吳伯凱徐玠吳機恭政孔彰王靜趙善調周益陳登陳師堯桞梓徐元莫乾道五年鄭僑榜王觀國陸峻郭嶤林廷瑞趙希仰兄希仁希保孫孟堅趙彦琇弟彦琥魯璠兄􅚇車訥錢文乾道八年黄定榜陳允父師正徐綱常濬孫弟衍孫陳伯揆張槖趙善繩任巖叟莫元中淳熈三年詹騤榜衛藻丁大舉趙伯璝趙彦珖兄彦琇魯幵祖詧父可簡兄珏丁大聲徐晟莫若冲淳熈五年姚頴榜趙師慓張之徳趙彦清兄彦深弟彦濟沈眀逺趙彦濟兄彦清淳熈八年黄由榜陳之純莫茹拙子秀謙蔡開弟闢朱端常桞說陳之綱弟之純聞人綱淳熈十一年衛涇榜衛涇狀元弟洙葉時甲科言陽俞建甲科父光疑兄俞逺石辰之莫似之淳熈十四年王容榜胡林鄉甲科子琚徐逢父浚兄逺常緒沈倫趙彦時祖尚之兄彦伸莫及徐龜年周云莫光朝淳熈十六年光宗登極上舍釋褐林至子革紹熈元年徐復榜陵埈甲科林大章甲科趙希倧兄希仁許興裔趙汝澄徐昻徐邁魯珏父可簡兄幵趙彦伸趙彦㻩兄彦珖趙崇堯趙善毅父不愚趙彦滄李昌宗紹熈四年陳亮榜莫澤趙師兟父伯璝慶元二年鄒應龍榜姜煇甲科上舎錢撫侯允陳保中内舍孔掄周日嚴父去鮑璋内舍陶大章内舍慶元五年曽從龍榜凌次英魯秀頴蔡闢兄開沈忱裴子應髙徐侔徳嘉泰二年傅行簡榜徐逺父浚張淡張渙臣開禧元年毛自知榜陳之經兄之綱干易趙汜夫唐夢符陶洪嘉定元年鄭自誠榜衛洙兄涇婁體仁别院省元輔大章陸鑣潘振子忠恕王用亨魯鐸計朋龜魯䇿劉元晉嘉定四年趙建大榜陶大甄棠衍孫沈禾嘉定七年袁甫榜趙汝郕魯文若弟文伯王尚輔趙崇璋嘉定十年吳潛榜陸徳輿童科尚書趙時倚父汜夫陳華魯文伯趙汝㻂趙崇穡父汝㻂楊元勣嘉定十三年劉渭榜陳煃甲科張琥孫一飛潘忠恕省試經魁趙汝擢方樹趙與生父希兄與理弟與積趙汝訓弟汝弼胡琚父林卿林革父至嘉定十五年慶寳上舍釋褐王熈載嘉定十六年蔣重珍榜平東沈應元沈既濟魯之大趙汝弼兄汝訓趙希庸寳慶二年王㑹龍榜沈炎恭政胡宗儒陳鑄趙與翊趙時勇趙與橡趙垞夫趙孟堅趙漪夫趙瀜夫趙彦秘趙泮夫趙碩夫趙與機趙孟敏趙希檜趙與時趙崇洽趙善韸趙崇趙崇愈趙崇昔趙汝堂趙與曹趙崇趙汝燿趙與善趙崇侑趙窺夫兄宛夫紹定二年黄樸榜趙與橺沈元趙必棣俞仕檀内舍徐聞詩黄英發趙孟握趙汝衡紹定四年慶夀上舍釋褐李景勉紹定五年徐元杰榜趙若炳甲科煇弟若莫之禦趙若煇兄若炳莫季謙父若拙趙時檔趙時樒趙時榟趙汝檂杜從龍蔡直方宋正禮端平二年吳叔告榜吕重庚趙時柷趙與理弟與生平章嘉熈二年周坦榜趙與積甲科兄與生與理聞人仲脩趙時喆趙必髙沈應髙父棐錢宜之錢廙之周光龍淳祐元年徐儼夫榜焦炳炎探花趙孟議上舍蔡廣上舍趙時晜上舎淳祐四年留夢炎榜唐震龍趙孟圭淳祐七年張淵微榜葉隆禮常楙别院賦魁魯鼎卿林子善淳祐十年方逢辰榜陸夢正郭晦朱宗强子安國洪應辰吳閎趙崇籌陵浚魯森婁應元寳祐元年姚勉榜錢拱之郭圭趙孟逮趙必燧上舍趙崇穆婁應新省試經魁吕翊龍婁應庚朱鵬飛平昌潘應大寳祐二年賜進士出身李曽伯寳祐四年文天祥榜趙若誼上舎沈寝龍唐天麟太學吳英發馮夢桂沈逹可開慶元年周震炎榜王允之金鼇葉汝舟桞正孫鄭拊翼景定三年方山京榜錢夢炎甲科張漢撫太學魯天麟聞人珏咸淳元年阮登柄榜趙孟安子由漳趙孟葆祖希倧趙孟華兄孟葆趙孟祖希倧父與曾沈起巖太學趙由漳父孟安沈應子兄應𤼵朱安國父宗强趙必穂趙與鼎趙必弼趙崇昆趙孟秫兄孟趙崇恁趙汝慤趙時趙若埱趙崇暇咸淳四年陳文龍榜徐碩甲科張伯淳父琥沈應發趙孟㻁原學前廊弟孟林咸淳七年張鎮孫榜張應玥咸淳十年王龍澤榜翁自道太學曹應符趙良淧宗學趙奭焧徐夢得至元嘉禾志卷十五
