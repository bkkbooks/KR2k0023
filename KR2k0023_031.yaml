body:
  text: 至元嘉禾志卷三十一元徐碩撰題詠嘉興縣嘉禾百詠及八詠舊志所載也郡縣風物咸備焉難以强分併附于此嘉禾百詠張堯同嘉禾墩寂寞黃龍後紛然壠上碑廢興無處問空詠草離離禦兒溪用此臨吳戰何人為越謀夫差終不悟亡國始知羞檇李城螳蜋方捕楚黃雀遽乘吳交怨終亡國君王到死愚何城報越心雖壯貪齊計已輕忠言殊不聽何用築斯城徐家莊節義窮方見髙名薦玉京一封天子敕千載故鄉榮馬塘堰疑著風波惡民謡却畏人築塘成堰後斬馬祭河神劉伶墓荷鍤從吾後叮嚀死便埋人皆譏嗜酒我獨愛忘懷楊姑廟孝德闕久天然與衆殊生男不能養應合愧楊姑殳山丹竈功成後寥寥掩石扉但聞蟬已蛻不見鶴來歸嚴夫子墓有子如君少終緣叛國亡冡前無後嗣切勿怨張湯古戰場自昔干戈地城空草自荒漁樵懷舊事何敢議興亡河內亭掾死緣非命兒來哭未休舊時亭下淚疑與水長流福順廟老屋無丹雘空階只翠苔繞簷看箭鏃誰記赤睂來月壕入徑深于塢滄波近馬蹄每尋蓮社友咫尺走東西四城吳越爭雄日區區在用兵空餘戰爭地無處不髙城蘇小小墓泉下骨應朽幽魂獨未銷幾番清夜月孤影度南橋穆河溪靜練明田外源流笠澤通不因逢旱嵗誰識濟時功天慶觀寥陽龍已化華表鶴空悲欲問梁朝事惟應老檜知普濟院祗因曾布地往往化為魚一遇丁千騎禪人便結廬兜率寺昔年池滿地今見屋耽耽不結蓮花界龜魚死未甘髙使君廟一暝移藩日邦人昔被恩步兵碑在不功業敢闕韭溪近與雙溪接分流入郭來市橋人影合不解洗塵埃射襄城此地連江海曾經古戰爭干戈今不見空有射襄名施墓蒼苔侵壞道晚雀散空林莫問人賢否浮生一古今宣公橋祗應裴少保功業敗垂成往往橋邊客今猶恨未平霍將軍廟弼漢功非淺讒夫可奈何海神令亦畏安敢布風波衛墓惆悵黎陽客飄流浙水濱定忘空腹恨知是赤心人雪峰庵一語合頭悟師承豈在身戲言廬墓客未是報恩人昌武廟祗因吳士季千載仰公神欲借驅痁術來臨刻木人杉青堰舊吏家何在空尋古柳隄世情今亦爾莫笑買臣妻胥山馬榼浮尸去君王太忍人此山空廟貌何以勸忠臣由拳故城故城人不見擊劔淚空霑一絶悲聲逺今猶說孝亷靈光井玉甃祥光發難藏世上名定多神物護一飲百痾輕目紋觀音目一作木雙瞳分日月睂際一星懸照見人間苦三辰不在天徐偃王廟王有闕夷德千年貌亦存我懷三刺史誰是後來孫滮湖四境田相接煙瀾自渺瀰客來吟此景無或比滮池朱買臣墓世事春風轉榮枯一夢間繡衣人不見孤冡舊家山真如寺家田輕脫屣聊結淨人緣影外香燈寂清風百世傳曹使君廟一笑淮兵却功成未易論豈慚顔刺史詩酒在平原雲門家舍滿篋藏鋒句家傳世幾何逺孫無悟解却笑葛藤多天心湖拍岸浮春淥菰蒲四逺生網羅人不到魚鳥亦忘情景德禪院白毫光未滅闕林泉有古風百步橋舊址依然在荒墟未百年還分一橋水流入幾家田普濟上方古屋深于洞門前種白蓮好尋當日侣重結此生緣周都官墓不識君名字應難問子孫一丘浮水際神怪欲誰論白龍潭呼吸風雲合飛潛自有時只愁潭水淺頭角被人窺泗洲庵宋元豐初有拂臂道者來建塔于地中得一石佛上題報國禪院不知何代六里堰東有報國橋乃知此處有寺舊寺丘墟後重興嵗月賖莫將閒禍福容易託僧伽水陸院白晝重門寂蒼苔古殿深老僧香火罷松柏夜森森菩薩橋片雲初出岫南北自飛揚舊日橋邊路猶聞舄履香南塢此下十首題㑹景亭岸回波曲曲城轉草層層忽見桃花落還如到武陵海棠亭蘚砌迎烟渚花開忽滿枝春風吹爛漫如展蜀川圖白蓮滄波浮四面灧灧玉開花自可除簾幕清香不用遮桃花亭不待東風折池塘已自春試看原上客猶恐是秦人紅薇徑漸放秋風晚花無爛漫香淺深紅似錦散影在滄浪荼溪荼林那復有零落付樵人舊日溪邊叟空悲二月春仙鶴亭杳杳雲間路重重隔翠林數聲清夜後來伴月邊吟芙蓉塘一發連千丈紅雲出素波秋風吹欲老無奈落花何白苧橋遍壠敷青緑桑麻共幾家滿城羅綺子應笑不栽花漁野水連天濶滄波引釣緡寄言溪上叟莫學直鈎人龍舌頭一翕長川靜烟雲忽有無誰看頷底月誤欲探驪珠月波樓天濶冰河淨溪平玉鑑寒捲簾看晚色鷗烏傍闌干列岫亭吾州風物好唯是缺青山忽有洞庭色來從一笑間懷蘇亭猶使尊前客長懷沒後名好風吹逺籟如有笑歌聲跨塘橋路接張涇近塘連谷水長一聲清鶴唳片月在滄浪趙老園公諱衮字希甫以殿丞致仕藏書萬卷歸隱此園景德禪院方丈後故賢良陳公名之藏書幾萬卷歸老此林泉不為尋蓴膾于公亦自賢樂郊亭竹下清風好時來挂幅巾待逢田叟問誰是樂郊人邦藥王菴父老懷遺愛誰傳肘後方藥囊同日葬空憶紫元香村門口昔日荒閒地今聞市井喧人情看促迫無復似當年五柳橋為懷陶靖節無復見其人誰種橋邊柳猶含舊日春三塔石匱埋神物靈光照夜多龍歸天上後無復更風波竹橋腰枕郵亭北橫斜古渡頭風吹雙淚落恨逐水東流長水鄊古鄊也故楞嚴大師子璿作楞嚴疏文謂之長水鄉疏古來名未滅人好水還清一讀高僧疏塵勞悟此生賢良隱居陳令舉也發策名猶在回頭事已非池塘春草緑空憶謝公歸寥陽殿葛洪所書蹟後為郡幕解九皋取去人歸天上去空識舊𤣥冠祕籙藏金匱清風滿殿寒嘉禾五馬來何暮經營指一彈石碑書近事留與後人看徐長者園長者通佛學少好術年八十治圃栽花休老于此丹珠殊未就白髮忽成翁却有憐春意栽花向此中姜庵不入紅塵市安居三十年至今庵下路芳草碧芊芊符姥瑞竹姥修梵行一日觀音燈上有竹一枝宛如生出故人以瑞竹名之一幅霜縑外青青出自然天機何敢議珍重白衣仙嘉禾八詠邑宰陸䝉老披雲閣城角巍闌見海涯春風簾幕暖飄花雲烟斷處滄波闊一簇樓臺十萬家月波樓月移宫闕下銀潢碧轉闌干萬頃光我是水晶宫裏客倚樓猶自羡滄浪金魚池池上春風動白蘋池邊清淺見金鱗新波已縱游魚樂調笑江頭結網人宣公橋當時倉卒倚鴻籌清白堪封萬户侯陵谷已非家世逺畫橋依舊水東流五柳橋五柳先生倦折腰孤眠千載仰風標青衫令尹頭如雪不厭朝昏過此橋㑹景亭清入闌干酒易醒春風楊柳幾沙汀平波抵得瀟湘水祗缺峰螺數㸃青蘇小小墓瑶臺歸去鶴空還一曲霓裳落世間秋雨幾番黃葉落朝雲應缺到香山羞墓玉顔羞見錦衣侯草木烟村雨鎖愁不似田文門下客一貧一富不知羞和嘉禾八詠披雲閣曲闌髙枕子城涯雲霧披開眼界花幾處橋橫流水巷朱樓畫閣幾人家月波樓金波橫浸絳橋潢百尺樓涵午夜光徙倚闌干清刮目濯纓何必俯滄浪金魚池休問汀洲採白蘋觀魚且釣謝池春月光咫尺無多地一簇烟波屬野人宣公橋幾從行處借前籌莫嘆功成廣不侯自昔歸題橋柱後年華冉冉水東流五柳橋嵗嵗春風弄柳腰空懷靖節想清標移栽應自陶彭澤從此人稱五柳橋㑹景亭亭上騷人醉復醒行吟步盡白蘋汀水天千頃琉璃地逺有殳山一段青蘇小小墓小小仙蹤去不還空標遺冡落人間錢塘門地家何在回首臨平隔斷山羞墓當年一棄㑹稽侯大墓烟蕪鎖别愁惆悵不逢郎衣錦至今粉骨尚含羞醉眠亭小小幽亭誰結構山深地僻儘成眠蜻蜓曉立沙頭雨􅗌鶒間衝水上烟蕭條剩有看花眼落拓誰分貰酒錢斜徑偶通南埭路相期同泛釣魚船送友人尉嘉興王禹稱縣前蘇小舊荒墳應作行雲入夢頻猶勝白公尉盩厔庭花剛喚作夫人本覺文長老方丈蘇軾萬里家山一夢中吳音漸已變兒童每逢蜀叟談終日便覺峨嵋翠掃空師已忘言真有道我除搜句百無功明年採藥天台去更欲題詩滿浙東又愁聞巴叟卧荒村來打三更月下門往事過年如昨日此身未死得重論老非懷土情相得病不開堂道益尊惟有孤棲舊時鶴舉頭見客似長言又初驚鶴瘦不可識漸作雲歸無處尋三過門間老病死一彈指頃去來今存亡見慣渾無淚鄉曲難忘尚有心欲向錢塘弔圓澤葛洪川畔待秋深和東坡韻二首文及翁萬壽山闕不二中九峰峰下善財童敲門問竹機鋒觸倚檻看花色界空汝坐蒲團曾有夢我闕芻牧愧無功吳天蜀地元來闕月照峨嵋日又東身滿華嚴法界中香厨底事感天童那知本覺從何覺才悟真空自不空若有相時元說夢到無言處却收功一鈎月上星三㸃汝向西床我面東本覺三過堂王尚書門外驚風吹細沙入門水氣湛清華呼童試向林間看巖桂應開第二花通越門外八九里臨水多佳木茂林以便風不得停舟一賞愴然為詩密樹重籬覆水光珍禽無數語琅琅驚帆瞥過如飛鳥回首風烟空斷腸城外九里有竹搆小橋豫十八年前與友人解晦叔飲别于此今過之景物依然而解生已亡悲歡不足復成小詩蘇舜欽當年共醉此橋邊道舊狂歌至暮天得句旋題新竹上移舟還傍亂花前君埋塵土骨應化我逐風波心欲燃落日長號感人事沙頭寂寞上漁船秀州秋日沈括草滿池塘霜送梅林疏野色近樓臺天圍故國侵雲盡潮上孤城帶月回客夢冷隨風葉斷秋心低逐雁聲來流年又喜經重九可意黃花是處開保聖院陳舜俞闕門深鎖蒼苔地靈育嘉樹闕然烟雲宅不接市朝路茍能灰心居即是古樂處又錢塘僧契元院僻標幽勝清虛絶四鄰門開臨碧沼路斷息紅塵客到應忘慮僧居稱養真杉柳涼退暑花葉暗先春闕臺鳥下頻經忩䝉雨潤詩板待雲新鐘韻沈銀漢茶烟出緑筠我來尋舊友吟賞勿因循城南蔣莊四首舊為遊賞之所今廢李長民愁卧丘亭上蘭時忽過中幽人倦賞物青帝謾施功柳眼依依碧桃梢冉冉紅直須家釀酒一醉百花叢郊居人事絶倦暑每晨興蓮闕池中佛笋供林下僧吟餘厭蟬噪望逺喜禾登朝市忘懷久何勞羡賜冰今旦商飇起蕭然雲氣秋稚蛩工促織老蔓擬牽牛莫賦潘安閣聊登王粲樓家園歸未得孤夢繞松楸寒來惟喜睡忽忽又朝暾地迥霜逾白庭空鵲自喧甑頭烟半吐盞面酒微溫莫問烏銀價晴簷好負暄贈嘉興許明府方干檇李傳聞風俗好重門夜不上重關腰懸墨綬三年外身去青雲一步間勤苦字人愁帝力從容對客問家山升沈路别情猶在不戀鄉中舊往還真如勸農二首吳潛聖主垂衣坐九重不才假守勸農功周家永命由忠厚湯后存心在困窮安得田租成嵗減且將人事兆年豐守宰監州民最近相期清白紹家風百尺髙樓鎮古丘乘閒莫惜小夷猶新楊受日春無際宿麥翻雲嵗有瘳鷹隼圖南天外意江山繞北望中愁世事難知人易老一杯聊復寄沈浮效東坡作醉翁操吾甥法真禪師以子瞻內相所作醉翁操見寄豫以為未工也倚其聲作之寫呈法真知可意否謝山醉吟先生書泠泠潺潺寒泉㵼雲間如彈醉翁洗心逃區寰自期猿鶴俱閒情未闌日暮造深原異芳誰與搴忘還泛聲同瓊樓玉闕歸去何年遺風餘思猶有猿吟鶴怨花落溪邊蕭然鶯語林中清圓空山春又殘客懷文章仙度曲響涓涓清商回徵星斗寒光福寺二首郡侯朱士麟不辭暑汗透官裳亟拜靈祠為亢陽與佛有緣憑佛力于心無愧爇心香崇朝雱霈施零雨千里歡欣飽稻梁老吏兩年䝉潤澤詩成借筆記僧房乍和便覺祛衣裳且駐歸舟傍夕陽連日雨花多聽雨今年香積又炊香幸憑佛力成因果消得詩人詠稻梁殽核已無尊有酒就溪帶水擘蓮房烟雨樓方萬里輕烟漠漠雨疏疏碧瓦朱甍照水隅幸有園林依燕第不妨蓑笠釣鴛湖漁歌欸乃聲髙下逺樹冥濛色有無徙倚䦨干衫袖泠令人歸興憶蓴鱸又樓壓重湖壯矣哉樓前圖畫若天開鷗從沙際衝烟去燕在花邊捲雨來傍柳一橋相掩映隔林雙塔共崔巍闌干倚盡詩無盡晴日須來三四回又葉隆禮傍家亭館占湖東寂寞為鄰祗陸公竹樹一隄如有礙乾坤萬象自無窮棹歌逺入秋波緑塔影中分晚照紅尊酒待遊烟雨景畫圖著我笠蓑翁又朱南杰錦繡囊開城角東規模綿亘境相通一亭舊占梅邊月兩徑新添竹外風山色有無烟變態湖光濃淡雨收功憑闌正好催歸去橫笛數聲蘆葦中又唐天麟百尺樓髙足賞心我來猶記舊登臨四時天色有晴雨一片湖光無古今逺塔連雲知寺隱小舟穿柳覺村深憑䦨多少斜陽景分付漁歌替晚吟又水調歌頭吳潛有客抱幽獨髙立萬人頭東湖千頃烟雨占斷幾春秋自有茂林修竹不用買花沽酒此樂若為酬秋到天空濶浩氣與雲浮嘆吾曹緣五斗尚遲留練江亭下長憶閒了釣漁舟矧更飄搖身世又更奔騰嵗月辛苦復何求咫尺桃源隔他日擬重遊宣公祠四首李曾伯凛凛清規百世師功名僅見奉天時忠謀任起姦諛忌感涕寧無士卒思落日桑榆存舊蹟西風蘆葦護荒祠忠南流落何遺恨留得良方教後醫公不生唐世貞元事若何主恩思報切臣罪忤時多佞舌攻何忍剛腸死不磨倚䦨凝佇久一鷺㸃滄波相唐德業復興隆仁義條陳百奏中正欲諫君令别駕延齡更不念孤忠雙湖真澤國千載相公祠中有釣魚者問之俱不知又林逢子仁義百篇唐孟子排姦徑節凛秋霜人生一死固不免死落忠州骨也香千年往事隨流水一縷香烟弔蜀魂門掩落花人不到野風邀月照黃昏又許棐一編奏議從頭讀字字珠聯玉綴成不是德宗嫌切直自緣唐室未升平諂魂盡逐殘星滅義魄長隨霽月明我亦愛君憂國者年年來一拜先生過嘉興惆悵禾興路三年幾度經雲帆連夜發更鼓隔城聽落月低烟樹秋風冷露螢客懷容易感宜醉不宜醒至元嘉禾志卷三十一
