body:
  text: 至元嘉禾志卷十四元徐碩撰仙梵嘉興縣寶安禪師先住北嶽親運土石於精嚴寺立五臺院師夏氏蘇州常熟人夀八百一十八嵗不衣絲縷寢卧亂草深眀宗㫖終後肉身不壞尋遇沙汰遂即闍維空中飛鶴盤旋化畢祥雲方散尊勝和尚居寺五臺一室三徑四十載不履寺間先輩名儒咸禮之有頌嘆曰毳衣藍縷形容老頂戴蓮經夜行道曉來金地怪無塵四十年來月中掃僧文偃嘉禾人俗姓張氏因出外逰方遂得道於雪峯禪師至韶州康王賜號康真既葬肉身不壞宋太宗賜號大慈雲康真洪眀禪師至今雲門一宗遂傳有雲門井在兜率寺中病者飲其水以療疾楞嚴大師名子璿始以能講楞嚴經邑人有張姓者邀于精嚴寺請講之師自作疏文疏之未作也夢文殊入口既作夢出于口疏成紙為之貴聽者雲集夏文莊公奏於朝號楞嚴大師肉身葬於真如寺長水法師上人也有道行注華嚴經八十一卷跏趺而死以兩甕合之葬於真如寺宋建炎烏珠兵至發之見手爪繞身瘞之而出松江府心鑑禪師按髙僧傳藏奐姓朱氏蘇州華亭人也母方娠及誕嘗聞異香未冠禮道曠禪師出家寓嵩嶽受具戒再詣五臺山入靈㸃大師室參授道要唐大中十二年路下修長夀寺敕奐居焉眀年歸姑蘇舟住眀州棲心寺所在禪者雲集凡入師室者疑難冰釋咸通七年示寂葬於天童山其徒以行狀詣闕請諡賜號心鑑塔曰夀相船子和尚按傳燈録名德誠入藥山洪道禪師室大眀宗㫖與道吾雲巖為道侣自離藥山小舟往來松江朱涇以綸釣度日人號船子和尚時夾山善㑹禪師住京口鶴林寺道吾知其所得尚淺令往參船子㑹造朱涇見誠大契宗㫖辭行再四回顧誠喚㑹回立起撓曰汝將謂别有耶乃覆舟而逝唐咸通十年僧藏暉即其覆舟處建寺焉曽有詩曰千尺絲綸直下垂一波才動萬波隨聽道人按靈鑑塔銘云姓仰氏名德聰初受具戒於梵天寺參請諸方密契心印宋太平興國三年結廬于今山之東峯有二虎名大青少青常以為侍有造之者見挂一書梁間問之此佛經也問嘗讀否曰如人看家書一遍既知其義何再讀為嘗曰古人貴行吾何言哉其他問者皆默然不對天禧元年七月趺坐而逝閲月容貌如生王可交續仙傳云蘇州華亭人也以耕釣為業居松江趙屯村一日擢舟入江方擊楫髙歌忽見綵舫漾於中流有道士七人中有呼可交者頃之不覺舟近舫側有呼可交上舫者道士皆視之一人曰好骨相合仙生凡賤間已炙破矣一人於筵上令侍者傾酒飲之又出與二栗食之甘如飴命黃衣送上岸覔所乘舟不可得但覺風水林木之聲開眼峯巒重叠松柏參天乃在天台山瀑布寺前僧迎問之曰今早離家蓋三月二日僧言九月九日已半年餘矣僧設食可交厭聞食氣自後絶榖挈妻子住四眀山不復出後人時有見之者敬元法師俗姓吳氏華亭縣顧亭林人年十七往湖州十山課觀音年二十獲觀音辨嘗往京師安國寺受戒於遍空法堂感天花墜崇德縣無著禪師文喜俗姓朱氏語兒人也七嵗授禮崇福僧為師參禮大慈山性空禪師送供往臺山參禮禪僧光啓三年吳越王賜號無著光化二年告衆曰三界心盡是涅槃言訖趺坐而化王衷字秉悅崇德人也宋時逰太學以上書直言遭貶後隱於杭之孤山修西方淨業雞鳴而起禮誦達旦風雨寒暑不能一日廢也朝廷聞其清行召之不起賜號悟靜處士紹興五年八月十二日夙興誦經如常久而聲漸低已而不聞就視則端坐逝矣僧慧梵字竺卿石門顧氏子也受具羔羊澄寂院持守有嚴傳宗㫖於天竺如虎子學詩於石室陸維仲性至孝縛茒菴奉母扁曰蓬居居側植梅畦水仙不知數暇日寫二花真亦極其妙得筆法於梵隆茂宗也夀八十九有蓬居集古蹟録事司靈光井在精嚴寺寺本晉徐尚書别業也因井中夜發光遂捨宅為寺成帝賜名靈光故井亦曰靈光井五臺山在精嚴寺之西北昔寶安禪師住北嶽五臺親運土石卓菴居之因名焉雲門井在兜率寺寺僧文偃師雲峯禪師得道遂為雲門祖師嘗居兜率寺有井在焉因曰雲門井今廢梁朝檜在天慶觀枝柯偃蹇竒怪可觀有石刻梁朝檜三字在其下葛仙翁井在天慶觀宋聖祖殿前嘉禾百詠詩注有葛洪書額因遭兵火其書額不存世傳東偏一井嵗有丹浮起因名焉今不復見矣開元鐘在天慶觀其聲甚洪唐開元時鑄今破矣松江府金山城在府南八十五里髙一丈二尺周回三百步舊經云昔周康王東逰鎮大海遂築此城南接金山因名之吳王獵場舊圖經云吳主獵場在華亭谷東吳陸遜生此子孫嘗所逰獵後人呼為陸機茸其地後為桑陸按陸龜䝉吳中書事詩云五茸春草雉媒嬌注謂五茸者吳王獵所茸各有名所謂陸機茸豈其一耶闔閭城寰宇記云袁嵩城東三十里夾江又有二城相對闔閭所築備越處三女祠舊圖經云在縣東南八十里吳王葬女於此吳越春秋及録異傳云吳王葬女於閶門外皮陸詩吳郡圖經則又云閶門外有女墳湖此三女岡未詳秦始皇馳道在府西北崑山南四里相傳有大岡路西通吳城即馳道也輿地志云秦始皇至㑹稽句章渡海經此按漢賈山至言所謂秦為馳道之麗東窮燕齊南極吳楚者非此歟柘湖在府南七十里湖中有小山生柘樹因以為名吳越春秋元和郡國圖志云海鹽本秦縣漢因之其後縣城陷為柘湖移於武原鄉後又陷為當湖宋武帝記云晉隆安五年孫恩北出海鹽帝築城於故海鹽恩知城不可下進攻滬瀆則帝嘗於是築城矣又吳地記秦時有女子入湖為神湖周回五千一百一十九頃其後堙塞皆為蘆葦之場今為湖者無幾陸機宅按陸士衡贈從兄車騎詩髣佛谷水陽李善注引陸道瞻吳地記曰海鹽縣東北二百里有長谷晉陸遜陸凱居此元和郡國圖志云華亭谷在縣西三十五里陸抗宅在其側故遜封華亭侯太平寰宇記云二陸宅在長谷谷在吳縣東北二百里谷周回百餘里谷水下通松江者陸凱居此谷吳地記云漢廬江太守陸康與袁術有隙使姪遜與其子績率宗族避難居于是谷舊圖經云華亭谷水東有崑山相傳即其宅舍是數說觀之則世傳普照寺為二陸宅非也然建康亦有陸機宅建康實録云在縣南秦淮之側李太白題王處士水亭云齊朝南苑是陸機宅按吳王孫皓徙都建康機雲嘗分領父兵為牙門將得非機仕於朝則居建業而華亭乃其里第耶又有八角井按九域志在陸機宅之側陸瑁養魚池唐彥猷華亭十咏注按舊圖在縣西今名瑁湖即陸瑁所居相傳有宅基存焉而大中祥符圖經瑁湖在縣西北三十五里周回九里吳尚書陸瑁飬魚池因以為名今府之西南隅有湖廣袤三里即瑁湖也中有堂基今為放生池黃耳塜按述異記陸機小時頗好獵在吳有家客獻快犬曰黃耳機仕洛常將自隨此犬黠慧能解人語機久無家問為書盛以竹筒繫犬頸犬回吳到機家得答書復馳還洛後犬死還葬機家村南二百步聚土為墳村人呼為黃耳塜按啇藝小說云後分華亭村南為黃耳村以犬塜為號焉獨劉貢父詩話疑以黃耳為僕未知何所據也滬瀆壘舊有東西二城東城廣萬餘步有四門今徙于江中餘西南一角西城極小在東城之西北以其兩旁有東西蘆浦俗遂呼為蘆子城按瀆之有壘舊矣晉史虞潭傳潭為吳國內史成帝時年荒百姓饑饉修滬瀆壘以防海寇又通鑑晉隆安四年冬十一月吳國內史袁嵩築滬瀆壘以備孫恩眀年恩陷滬瀆嵩被害寰宇記以為袁嵩城在縣東百里滬瀆江邉波濤所衝半毁江中築耶城在府東三十五里髙七尺周回三百五步舊圖經曰晉左將軍袁嵩所築遺址尚存袁嵩宅在府西北三十五里舊圖經云昔袁嵩居此因以為名按晉史袁嵩傳嵩陳郡陽夏人未嘗云居華亭也隆安四年為吳郡太守嘗築滬瀆壘以禦孫恩眀年嵩被害於滬瀆或者嵩之後就居於此乎烽樓在顧亭林南按法雲寺記載唐隰州司倉支令問妻曹夫人墓志云葬之顧亭扶市南烽樓之側今亭林南岡阜相望即古者沿邉築臺舉烽燧之地寰宇記南帶海上有烽火樓基吳時望海處遺址尚存世傳亭林岡隴顧侍郎墓非也祥符吳郡圖經顧侍郎墓在吳縣西南三十五里橫山東則當以曺氏墓志為據顧亭林按舊經顧亭林湖在東南三十五里湖南有顧亭林陳顧野王居此因以為名焉後為寶雲寺寺有伽藍神記云寺南髙基野王曽於此修輿地志世傳以為顧野王讀書墩陳朝檜在滬瀆靜安寺殿廷之左右陸龜䝉皮日休有重元寺雙檜詩即此也宋政和間朱勔圖以進有㫖遣中使取之時中使欲毁三門而去一夕風雨震雷忽碎其一今殿右者尚存葉夢得避暑録以為宋冲畫者取平江白樂天手植檜與華亭悟空禪師塔前檜皆唐時故物石林以為悟空禪師塔前誤矣按臨安志悟空塔亦有雙檜東坡詩所謂當年雙檜似雙童者乃在鹽官也王可交升仙臺在隆福寺前遺址尚存按續仙傳可交初居松江南後入四眀山不復出初無上升之事或傳為王淡交淡交不事繩檢能為詩語多滑稽似傲世者然江上有感行詩石刻云王可交升仙壇則或者之說又未然也寒穴泉在金山上山居大海中鹹水浸灌泉出山頂獨甘冽朝夕流注不竭毛澤民作寒穴泉銘以為與惠山泉不可分等差王介甫唐彥猷梅聖俞皆有詩白龍洞在橫雲山西南絶頂洞口濶三丈其深不可知山之半有祭龍壇方丈許嵗旱嘗禱焉按朱之純集云宋皇祐中吳亮公宰華亭浙西旱蝗蘇秀為甚公禱橫山之神即致甘雨蝗不入境白苧城在府南四十里髙一丈周回一萬步舊經云地生野苧因以為名俗云白苧匯古岡身在府東七十里凡三所南屬於海北抵松江長一百里入土數尺皆螺蚌殼世傳海中湧三浪而成其地髙阜宜種萟菽麥朱伯原吳郡圗經所謂瀕海之地岡阜相屬俗謂之岡身此天所以限滄溟而全吳人也孔宅在府北七十五里海隅鄉宋淳熙間居民浚河得一碑云天寶六年黃池縣令朱氏葬於崑山縣全具鄉孔子宅之西南孔宅之名舊矣其地有夫子廟在慧目院側淳熙間院僧疏廟陾渠得寶玉凡六事三璧二環一簪藏之縣庠舊圖經云昔有姓孔者逰吳居此蓋吾夫子未嘗適吳以闕里譜系考之孔氏二十二代潛後漢太子少傅避地㑹稽遂為郡人二十九代滔梁海鹽令三十二代嗣晢隋吳郡主簿三十四代貞隋蘇州長史豈孔氏子孫有僑寓宦逰於吳而遂居華亭者耶亦猶建康有孔子巷乃聖亭侯所奉之廟蓋子孫即所居立先聖廟耳今廟側又有梁紇廟其為子孫奉祀之地眀矣所瘞璧玊簪珮之屬意其孔堂之遺寶得非子孫葬先聖衣冠寶璧於是地乎然其旁有宰我墩顔淵井此則因孔子宅之名而遷合傅㑹未可知也舊圖經又云晉鄒湛亦嘗居焉亦名鄒孔宅按鄒湛傳南陽新野人湛嘗見一人自稱甄舒仲乃悟曰吾宅西有積土敗瓦其中必有死人檢之果然厚加斂葬初不言宅在何地湛未嘗仕至吳中姑存此以闕疑嘉興縣雲峰井在縣南四里真如塔院昔雪峰和尚在此住菴因名焉三過堂在縣西二十七里本覺寺方丈之東偏宋蘇東坡與文長老逰三過於此東坡第三詩有曰三過門中老病死一彈指頃去來今故住山古潭元澄作堂名三過僧北澗為之記檇李亭在本覺寺左傳越敗吳於檇李即此地也景德泉在魏塘鎮景德禪院之西偏烹茶無比世傳以為常州惠山泉之次也白龍潭在縣西南五里景德寺前詳見溪潭門白龍潭注海鹽縣教義里在縣西十八里吳地志云歟城里人李祥興晉將軍袁嵩築壘於滬瀆禦孫靈芳為賊所害祥突白創收嵩歸葬因為教義里晉何后宅在縣南三里輿地志云海鹽縣南三里烏夜村晉何凖寓居焉一夕羣烏啼噪乃生女後選入宫他日復夜啼推之乃穆帝立后之日也按晉史穆帝何后諱法倪廬江灊人也以名家選應升平元年冊為后元興二年崩年六十六縣南一大冡耆老相傳為皇后冡近地有名喪靈浦者堙塞久矣謂穆后歸葬開此浦以通舟豈后崩於僞楚之時歸葬於此耶馬嘷城在縣東南一百步髙一丈二尺周回二里二百二十三步越地記云吳兵至此道逢大風陳敗馬驚因名今廢歟城在縣西北十八里髙一丈周回一里今廢故邑城在縣東北三十五里髙一丈周廽三里吳地記云海鹽縣順帝時陷為湖移於故邑山下龍湫在縣東北四十里陳山詳見溪潭門凖髙僧塔在縣西南三十五里法喜禪寺飛鳥不棲時有舍利放光髙僧名良凖唐司空曙有詩寄之宋宣和四年正月自東廊移就西廊袈裟忽飛去集僧誦楞嚴衣復歸塔有頌刻於塔云宣和年中重移塔舍利乘空暫騰躍衆諷楞嚴呪得歸永隆佛日輝無著戴將軍井在縣西十七步資聖寺本東晉右將軍戴威之宅一日井中發五色光遂捨宅為寺黃巢弄在縣南三十六里茶院之南有石屋皆巢舊巢穴也六里山石刻在縣西南二十五里金粟山上刻云天册元年旃䝉協洽之嵗孟冬陽月日維壬寅朔石簀神遺忽自開發拾得青玉璽蔣文吳直皇宫共三十八字唐太和四年閠十二月蘇州刺史崔蔇帖縣取此石攝令程豫差人送州今不復存石屋在縣南十八里豐山耆老相傳以為秦始皇屯兵之所孟姜女搗衣石在縣東南三十六里乍浦淡井在縣西大寧寺南邑中水多鹹惟此水淡故名柏泉在尉㕔泉上有柏因名伯牙臺在縣南二十步臺基坡陀如在耆老云伯牙鼓琴于此臺側有聞琴村聞琴橋顧況宅在縣西南五十七里橫山禪寂寺寺側祠況為伽藍神況嘗有詩云家住雙峰蘭若邊是也崇德縣何城在縣西二里張堯同賦何城云報國心何壯貪齊意已輕忠言殊不聽何用築斯城晏城在縣東北二十里世傳晏子所築萱城在縣東三十里世傳此以上三城皆吳王所築今間有遺址紀目坡在千乘鄉髙千丈周回三百步環以水邑士朱天麟幼時見坡側鍾生家運土得舊石碑斷缺磨滅大約謂吳王夫差募兵五千人教飬於此由是築之上置亭以候烽火名曰紀目者立綱紀而有條目也此非春秋之文殆後世復營繕於是坡乃追述之辭也走馬岡洗馬池在永新清風接境地名官窑父老相傳正吳越分疆之地今為平野南長營在塘東烽火樓在塘北千人坡在千金鄉世傳此以上三處皆越王宿兵之野今無之石門在縣北一十八里越王纍石為門以為限界之所梧桐鄉鳳鳴里故老相傳有鳳棲梧桐之上因名焉殳山在縣東晉道士殳基尸解於此上有銅棺冡范蠡塢在顧村世傳范蠡曽逰於此至元嘉禾志卷十四
