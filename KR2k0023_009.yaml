body:
  text: 至元嘉禾志卷九元徐碩撰樓閣録事司璇星樓在郡治內東偏近民樓在郡治西舊西通判廳於城上熙春樓在郡治地五十步今為驛月波樓在郡治西北二里城上下瞰金魚池考證宋元祐甲午知州令狐挺立又一甲午知州毛滂修樓成置酒其上乃為之記云望而見月其大不過如盤盂然無有逺近容光必照而秀澤國也水濱之人起居飲食與水波接令狐君乃為此樓之名月波意將攬取二者于一樓之上也建炎兵火廢圯乾道己丑知州李孟堅重修未及落成李解綬去知州徐蕆踵成之規模湫隘不及舊日逺矣風月無邊樓在於城上東偏舊名披雲葵嚮閣在郡治東舊東通判廳海鹽縣熙熙臺在縣圃之東考證舊名月樓李直養易是名崇德縣春風樓在縣東南三十步考證宋知縣奚士達以觀風亭改建歷五十餘年梁柱朽腐欲壓知縣黃元直重修樓下瀕河之室以備士夫艤舟易地之地傍街設朱欄以為公家揭示之所堂館録事司禾興堂在郡治內浩然堂在郡圃內西北考證取沈存中浩然詩意米芾書扁并記渙堂在郡圃內東北修齊堂在郡治內舊名同頴宋守俞浙改是敬信節愛之堂在郡治公廳後考證舊名清香堂宋守俞浙改是名平易堂在舊通判廳之東坐嘯堂在郡圃西偏同宣堂在舊府判東廳志隱堂在郡府判西廳今為織造局順觀堂在郡府判西廳今為織造局環聚亭在郡圃內最宜亭在郡圃內留春亭在郡圃內玄玩亭在於城上翠涼亭在郡圃內風月無邊樓下水香亭在郡圃瞰荷花池嘯鶴亭在舊東府判廳碧漪亭在舊西府判廳雪香亭在舊西府判廳杯水亭在舊西府判廳敬簡齋在舊東府判廳秀逺齋在郡治內舊名三几換衣亭在大慶觀東三十步今為軍鋪鏡香亭在慈恩寺南二十步今為營松江府招鶴亭在府治東偏琴堂在府治西偏考證舊名盡心堂莫詳建立年月宋政和間姚舜明為邑撫摩其民無所不盡其敬嘗以元豐元符斷獄之制書而揭之獄乾道八年令程明始移置堂之中榜曰盡心蓋取吾夫子所謂刑者侀也侀者成也一成而不可變故君子盡心焉之意且自為之記其後葉仲英始改曰琴堂樓鑰書亦足堂在舊造船場考證宋乾道間孫紹逺創并記思堂在舊丞廳考證宋章楶建東坡記今廢嘉興縣三過堂在本覺寺考證宋蘇東坡與文長老遊三過於此第三詩有曰三過門中老病死一彈指頃去來今因名其堂僧北澗為之記海鹽縣遺愛堂在縣治考證至元戊寅縣尹王澤丘扁景魯堂在縣治之東考證宋紹興辛未縣令祝閔建以秦師坦曾肄業於縣宇名曰將覺紹興丙子縣令林仰易曰相隱縣令李直養以縣治已有相隱齋到官方大旱一禱而雨重修名喜雨後易為景魯雙穟堂在縣治考證邑侯史彌回立扁含暉堂在金粟山廣惠院秦溪館考證宋紹興元年縣令陳祖永修縣令李直養名亭宇齋屋附録事司來月亭在郡治內舊府判東廳考證舊名花月宋倅張子野創此亭取雲破月來花㺯影之句垂芳亭在郡圃內玉明亭在郡圃內觀德亭在郡圃內考證舊名射弓亭蓋取射以觀德之義平逺亭在郡圃內子城上荷屋在郡圃內靜照堂一名寂照堂在招提寺考證名公有詩見嘉禾百詠松江府芳蘭堂府治之中堂也考證宋政和中縣令姚舜明為之記思齊堂在府治之東考證舊曰弦歌堂宋元祐庚午縣令彭城劉鵬新其堂後改思齊今為萬户府東堂在府治之東偏考證舊曰三山堂亭下有三山在水中朱之純有三山亭詩即此也其後有改曰貽牟者宋紹興中陳祖安為令溫大著革為易是名溫有東堂詩鳴琴拂榻此逰衍作詩何止誇釐牟即此堂也今為水坫考證舊曰艮閣朱之純有詩曰書閣峩然冠羣巒更瞻艮地特巑岏今曰招鶴未詳改易年月見逺亭在府西三里超果寺名公有詩海鹽縣深樾亭在縣圃考證依樾木作茅亭下瞰清池縣令李直養取韓文公詩守縣坐深樾為名崇德縣義和亭在縣治光華亭在縣南一百步水流亭在縣北二百步至元嘉禾志卷九
