body:
  text: 至元嘉禾志卷十九元徐碩撰碑碣松江府文宣王廟記至矣哉先儒之稱夫子也子貢則喻諸日月孟子則冠於生民通其祀則韓吏部以社稷為非嚴無其教則杜子美謂庶民之不若是皆傑出意表垂範將來抉狂簡之肺腑判冥頑之耳目膚淺庸鄙又何加乎若乃誦聖籍以知歸服儒衣而不變以嚴師為己任將尊道為士先茍得其人不繋乎位華亭縣者嘉禾郡之劇邑也當土敝水煩之地屬風頽俗雜之餘民無堅正之心世尚剽狡之氣淫神以邀其福佞佛以逃其禍先王之教咸罔聞知廟貌之靈宜夫委頓自錢氏納土宋運有開年厯寖深邑長相繼殊未思政理以五常為本五常由夫子而眀必有所宗是宜崇奉率視如弁髦之敝孰能存愛樹之心介於刹梵之隅甚非尊禮之意今天子眀神所勞禋享聿脩典册攸存牲幣靡闕而況褒成教本位極真王通邑之祠不絶如綫非所以副國章之舉廢俾鄉校之知方少傅劉君是以有志於斯也劉君世編官族代傳素風養勇久負扵一鳴適道無辭扵寸禄下車而姦盗屏假印而獄訟清胥尹伏從閭里競勸當其至止首謁聖師撥蠨蛸而入户庭履蔓草而升堂陛致美且慚於黻冕改為奚及於緇衣列像隳殘侍坐跛倚徘徊瞻覩俯仰咨嗟不易新規曷成大壯爰求隙地得扵縣東營爽塏之基委諸薙氏度中伐之木命以梓人民忘悦使之勞吏謹不愆之素由是重門秘殿敞大厦以耽耽東序西廂亘文㮰而翼翼後乃殖庭之宇用鋪講藝之筵旅楹既閑陋斗室之非度縮版以載見宫墻之特髙而又約奉身之資捐計日之俸儼晬容而允穆餙華衮以鮮輝入室之賢侁侁侍坐陞堂之衆濟濟負墻置孝愛之一人與配侑而兼列如在之威神備矣致誠之典禮敦焉爼豆常聞風雨攸除嗚呼大道既隠眀王不興儒雅之儔沒沒無愧矧夫王猷允塞文令闡揚夫子之英煥然獨久豈獨行於萬里長幼之序有倫如能達彼四方齊魯之風可變執古性惟樂善學媿親師聖難言誠甘取誚互鄉與進冀許偕行直書内疚於無文不朽幸刋於美石時天禧二年嵗次戊午閠四月十有一日陳執古記華亭縣學記元祐五年夏四月辛丑左宣徳郎知秀州華亭縣事劉侯初視事越三日癸邜謁先聖廟顧新學有左廡而闕右廡食無庖爨居無什伯之器垣墉不立犬彘得以㳺處而無虞劉侯惻然環視彷徨歸則發政以恵民徐以善言風諭邑内邑内欣喜莫不奔走以承命扵是學始繕完又風諭得衞氏子買國子監書以資諸生乃屬其佐劉發為之記且曰新學之建吾無與也必為記不忘前人之功力耳已而發解官劉侯又以書見速且曰學始謀於陳侯卒建扵陶侯無以吾厠於二人之間劉侯之意固忠厚矣而事在衆人之耳目非可誣也輒廣記而備言之華亭大縣也旁小縣皆有學獨華亭無之葢浙西善事佛而華亭尤甚民有羡餘率盡以施浮屠故其他有所建置莫易以成就先聖廟故在縣治側湫隘卑陋旁不可以為齋館自吳侯為宰已嘗有意遷易然而勸導率不就後三十年而陳侯謐復議建學是時邑人衞公佐率先願獻縣之東南地且求獨建先聖殿歸即築土治木預為户牖加漆飾以湏期㑹期㑹未定陳侯以事去議又罷久之浮屠氏從公佐乞所治材為佛宇公佐曰此材可使之朽腐必欲移用則不可相繼陶侯鎔為政而公佐死浮屠氏又從其子弟求其材為公佐祈福其子弟則今買書者也固執如公佐之意於是邑子朱朱伯揆周揚許洙白之於陶侯使侯因之白州郡監司曰州郡監司見從吾無不從者四人者乃率衆士人詣郡太守又詣轉運使皆得請遂擇日鳩工而四人實董其役邑人素願盡力者固已各實其言矣而他無助成其事者故積久卒成於劉侯葢若有待焉夫致治不可不先學校雖庸人孺子皆知之學士大夫方士布衣必以是說應有司之求及其入官則背之果何以哉蓋上之有程督者嘗在獄訟簿書而考績不急於教化故也以文盛之時建學校於多士之地或有其意而不能遂其議或遂其議而不能致其事或致其事而不能成其功故發詳記其實以為上下之勸使後之觀者知成功如此其難無致於廢而不治云華亭縣佐劉發記記縣學序拜儀雲間士藪也其于道徳之化近於禮宜習顧有因陋未皇革者嵗元日至相與㑹拜浮屠之宫雖至不可得而序期而不至者多有開禧二年汪侯來蒞茲邑纔累月政成博咨風土之舊或舉以告侯慨然曰齒尚於鄉禮眀於學古也吾學於鄞里人講是禮於州校雖異爵者率序以齒倣而行可乎於是陽復之翼日薦紳冠帶總序黌字序立大成殿下潔豆籩釋菜俾士之髙年者主其事禮竟循廡而陞布席進徳堂相嚮而拜少長從其次子弟則列父兄後魚貫雁行誾誾雅雅侯與僚佐盛服觀禮嗣嵗之二日亦如之邑子諸生退而合謀曰是其可不書尊師具儀敬也示化􅍇俗仁也貴老順長義也一舉而三善具侯誠知治本歟迺命林卿誌嵗月詔来者林卿昨典番學聞范文正公出守時政用名教厚俗為先州人慕嚮久之不變後進於長者脩慶朔之拜惟謹彭公器資之言實然侯今小試一邑心惟范公是師諸父兄弟盍世守之以無忘鄒魯是邦之意侯名立中故敷學尚書適齋先生之子嘗舉外臺進士官今通朝籍假五品服云亦修挺抜俗人也豈可量哉胡修卿記布金院經藏記布金院去邑七十里有上人曰清已者其行淳白善䕶其法所謂慈恵精進者嵗既久閭里莫不嚮焉邑人顔氏子乃首施錢二百萬書其凡所藏經又相與營大屋為輪而環積之其後工未就於是人無逺近爭投以財越二年而告成函以文木襲以綈錦載以華輪瞰以藻閣繚以朱貝負以蚪龍覆以隆厦周以廣廡方琢圎磨眀怪幽巧塗金間碧嚴飾雜繪總用錢千萬前後施者畧數百人煥乎盛哉夫西方之書生滅之極談也生滅者周流而無窮周流之謂迹無窮之謂性迹有去住性無前後萬物見義莫妙乎輪輪之名有二一曰法輪佛之所乘也智慧解脱以動之戒定悲忍以行之小而入乎㣲塵而有餘大而御乎虚空而不能容擬諸形容而莫之能名法輪也其二曰苦輪衆生之所乘也動之以煩惱貪著行之以嗔亂罪害上驅乎天中馳乎人下轉乎地㪚而入乎鬼神之都禽獸之鄉而莫知其歸擬諸形容亦莫之能名苦輪也噫在佛為法在衆生為苦有衆生乃有佛非佛不能度衆生然佛之度衆生也未嘗脱吾輪而載之葢即其所乘而指其所嚮故能方軌同轍而出乎無窮之域焉耳然則凡所論輪者可以普正諸苦随法流轉亦㡬於佛矣輪之成也上人以予善解其義其文足以申贊嘆見屬者不逺千里云嘉祐丁丑嵗十二月壬辰陳舜俞記隆平寺經藏記青龍鎮瞰松江上據滬瀆之口島夷閩越交廣之途所自出風檣浪舶朝夕上下富商巨賈豪宗右姓之所㑹也事佛尤盛方其行者蹈風濤萬里之虞怵生死一時之命居者嵗時祈禳吉凶薦衞非佛無以自恃也故其重楹複殿觀雉相望鼓鐘梵唄聲不絶頃寺之𨽻鎮者三獨隆平蔵經未備治平四年邑人陳守通乃始出貲購書而棲經無所沙門道常即法堂舊構合衆力植巨軸貫兩輪納匭五百倣雙林善慧之制藏所謂五千四十八卷者始熈寧五年之季秋成六年之孟春而髹漆繪事所以為莊嚴者垂十年功不克就元豐四年曹侯永逸王侯景宗之来也憫其垂成而廢因籍藏之所入發其端更其徒行清主之未㡬城邑區聚由廬逺而下凡十人不謀而赴隨力之厚薄皆有以相其事規模法象即其畫皆合髙下度數按其體皆可考袤二丈有二其崇加三上為諸天宫者八下為鐡圍山者二承以藻閣覆以重簷八觚竿竦方匭鱗比雲葢雨華繽紛䝉蔽法從導衞循繞環匝翼以天神扶以力士欄栱欒􅎝欀牖扶柱皆雕縷刻琢塗金錯采材致其良工盡其巧靡麗侈富言不能既而見者知焉經之費凡三百萬材之費者十之二工之費者十之三髹漆之費者十之四塗繪之費者十之五越眀年元朔合黑白二衆落成之左旋右轉聲蔽鐃鼓觀者為之目眩聞者為之耳徹於是人知方等一乘圓宗十地之為可依也始如来以一大事因縁出見於世曲狥根器巧説譬喻最後乃云四十九年未嘗以一字與人而秘密法藏獨示扵靈山拈花之時則知無説無示者是直說法無聞無得者是直聽法所立文字假名權實是以尊者迦葉之集四筐大智文殊之結八蔵近傳五竺逺被八荒其感應顯異則有若士衡投火而不焦賊徒盗葉而不舉其功徳博大則有若聞一偈而入佛初地待一經而生天七返葢經典所在則為有佛書之虚空天葢上衞況嚴持奉事如此之至哉嗚呼竭大海水盡妙髙山雖筆墨有窮而不能及佛一句少分之義以余之淺陋何以語此而行清數来請文所願贊其成也於是乎書元豐五年春正月馮翊陳林記之襄陽米芾治事青龍賔老相過出此文愛而書之至元嘉禾志卷十九
