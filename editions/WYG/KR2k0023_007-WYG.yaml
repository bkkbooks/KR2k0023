  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0023_WYG_007-1a, image: WYG0491/WYG0491-0056c.png}
body:
  text: 至元嘉禾志卷七元徐碩撰學校廟以崇先聖學以明人倫郡邑廟學大備於唐中廢於五代宋慶厯中始議州縣皆立學崇寧間著為令此州縣學廢興之由也唐元和間衡州李寛於石鼓創書院南唐昇元中白鹿洞建學館宋太祖朝潭守朱洞首於嶽麓創書院真宗朝又於應天府創書院號天下四書院此書院創置之由也是邦俗素尚儒斯文至今不墜而州縣學書院咸備焉嘉興路路學舊在望雲門内之西偏宋建炎中因更兵火移於州治之東偏即故學館以為之規模湫隘紹興壬戌二月丁亥詔諸路守臣興學如故事知州方滋於通越門内二百步立學裒陽張嵲為之記嘉定十三年守臣鄭定復以興學為先務殿宇堂廡廪廥垣墉營創繕修華奐皆踰於昔又闢地於西築六齋其上寶祐丁巳守臣恕齋謝堂闢大門於廟西偏䟽鑿璜池増建泮橋創明德堂於西改觀頤堂於東咸淳丙寅守臣星渚趙景緯重建小學於廟之東生徒額三十日課四書月試舉子業長陞太學懼無以養或置或撥得米一百九十餘石令學職專掌之丙子兵火廟學幸僅存亦非舊時規模聖朝至元丙戌四明陳紹在分教是邦里人徐碩副之相與謀曰學久廢盍撤而新之於是有請於郡郡侯嘉其志聞於省許以學廪葺其廢陳紹在徐碩又樽浮損薄俸以佐之學有御書閣將壓而復整今改名尊經閣之上以貯竹籍閣之下則奉安先聖燕居像兩旁則祠十先生焉濂溪洓水康節明道伊川南軒横渠上蔡晦菴東萊學前有一井創亭其上因以育德名蓋取䝉泉育德之義嵗久亭幾廢而井亦堙矣悉從而修浚之垣墉塗塈為之一新舊有八齋曰上達立道思誠體仁教睦連茹輔德朋來教睦本以教宗屬也已改為正誼矣連茹乃學優而仕之事非學者所宜先因倣紫陽先生諭職事諸生養心之說為據月有書季有考朔朢三八有講講堂名正禮舊矣蓋取荀子師者所以正禮之義宣公書院在今錄事司之東宣公唐相陸䞇也嘉興人論諫數百一本仁義城南鴛鴦湖之上舊有三賢堂三賢公居其一也宋郡侯黄大卿始為立祠趙公與􅭌嘗撥田土欲建書堂而未遂景定壬戌郡侯謝奕燾始搆堂繼廪焉落成郡侯率諸生祭菜於宣公曰吾聞聖賢之道率五百嵗而後行由唐至於今亦五百餘嵗矣始克立堂以祠公豈非時乎時至矣道其行矣夫其後復遭兵火祠宇頹壞聖朝至元丙子邦人士以堂燬白於郡遂以太初堂為書院里人徐碩職教於此畢力經營而兩廡從祀十哲像貌悉皆完美堂曰仁義之堂紫微史大參為之書宣公書院之扁亦紫微筆也齋四曰時習敏求思齊景行皆存舊名至元甲申以小學為闕典請於郡侯増置一齋曰蒙正以教鄉人之少俊者松江府府學在府治東南二百步宋開禧間有夫子廟而已湫隘卑陋旁不可為齋館後六十有五年陳侯謐始欲興學邑人衛公佐公望獻縣之東南地且自度殿材為買國子監書以資諸生如是數年至令劉鵬始克就緒紹興以來楊壽亨同楹待其銓相繼修闕而學舎始整好學廪視他處為厚講堂舊名進德令楊潛改明倫齋五曰居仁由義隆禮育才養性端平丙申縣令楊瑾以學廟卑隘闕地舊址之南鼎而新之廟堂廊廡齋舎庖廥闕一具備堂改明善齋併為四曰體仁集義志道進德施退翁又改創齋廬作東西序中置泳仁亭今亭不存矣後有觀頤堂舊屬縣學今以陞府因為府學焉燕居書院在今府學教授㕔之左即舊縣學基而為之今仍舊嘉興縣縣學在縣西南三里按舊經縣有夫子廟在縣西北一百步後廢附於州學縣學址更為郡社壝宋咸淳五年八月縣令張材以縣無學為闕典有請於邦侯本心文先生以西城舊驛舎為縣學邦侯出帑佐費大尹高墅潛先生聞之喜又撥緡為助殿宇齋序門廡庖舎悉整偹令又捐圭租畝百漕郡且相繼撥田為繼粟地邑民士復爭以田租來助而學始成矣堂名明倫堂齋二曰省身尚志今仍舊海鹽縣縣學在縣東南百步按舊志文宣王廟舊在縣東二百步宋太平興國中主簿攝縣事召知一建景德二年縣令翁緯以舊廟逼農田移就縣南重建真祐八年縣令褚程以先聖舊廟久弗葺願易其地増置學校遂立學於縣東南程自撰記言之詳矣紹興十五年朝廷興太學州縣學復修舉縣令徐光實一新之堂曰務本齋四曰處仁好義復禮近智乾道二年縣令劉銓遷學於縣之南是嵗疫歉僅立宣聖廟及講堂明年縣令魏汝功始蓋廊廡庖湢周備易講堂曰𫝊道李大下繼之繪七十二賢於東西壁増學糧試補諸生淳熙十五年邑丞李直養裒衆力一新廊廡紹熙元年李自丞遷令以月得餐錢修大成殿及重裝宣聖十哲像立小學置書籍祭服復修堂名為務本四齋皆用舊名後扁其堂曰明倫年久寖壞殿宇廊廡盡成頹垣迨聖朝至元乙酉始令學掾鳩傭慮材凝土度木自采芹橋至殿閣廊序悉葺而新之今垣墉塗塈亦茍完矣崇德縣縣學在縣東南一里半宋元豐八年令吳伯舉始創縣學為諸邑先沈括存中為之記米芾元章為之序學在縣南運河之西岸於方臘令黄揚移建縣之東南隅規粗立而未備其後令之賢者相繼増廣堂曰成德亭曰采芹齋二曰致道育德堂東西序列四先生闕有亭曰魁星令奚士達建嵗久摧圮尚書陳塏捐緡錢重創令黄元直撥田衍學廩而士有養矣今仍舊𫝊貽書院在縣學之西二十步宋潛菴輔先生廣紫陽門人也自祠官歸隠語溪題讀書堂曰𫝊貽咸淳五年闕令家之柄建就扁今名堂一曰木文齋二曰書味師𫝊朱文公亦祠焉科舉嘉興素號多士冠廷對者有人應制舉者有人登甲科者亦有人以科舉得人視他郡為最三嵗大比則羣試於貢院貢院在今北門衆安橋之西宋宣和五年罷三舎法每科舉取八名南渡後有流寓七十五名解一名紹興丙子皆歸土著則解十名矣端平元年守臣趙與􅊸以是邦為孝宗虹流之地援紹興例有請於朝増解額為十三名著為定制理宗篤昭祖烈復覃恩霈請及紀者永免聨請者不以年第進士者陞一甲特奏名亦陞等咸淳三䙫郡侯鄭肖孫為之記學舊有貢士莊經始於無隋趙端明迄成於菊陂趙都運而退菴吳大參又撥没官田為之助凡貢士之上春官者分送各有差所以佐桂玉之費也今科舉之法廢而貢院亦壞矣貢士莊僅存廨舎嘉興路總管府衙在於城内舊府治也譙樓外有舊宣詔班春二亭東西嚮鎮守萬戸府衙在郡治東二十步舊府判東㕔也經歴司在郡治㕔西偏司獄司在郡治南五十步舊司理院也錄事司在郡治西北二百步舊監倉東㕔也管軍鎮府所在郡治西南三十步舊節推㕔也松江府府衙在普照寺東舊華亭縣衙也有宣詔班春二亭東西嚮鎮守萬戸府衙在府治東舊思齊堂也浙江鹽提舉司在府治西南一里半舊買納鹽場也嘉興縣縣衙舊縣治也在郡治東北二百步華亭縣縣衙在松江府西七十步舊簿㕔也海鹽縣縣衙在縣城隍廟北三十步有舊宣詔班春二亭東西嚮崇德縣縣衙在天清宫東北五十步舊縣治也有舊宣詔班春二亭東西嚮院務局附嘉興路安養院廣惠院都稅務都酒務織染局造作局漆作局松江府在城酒務在城稅務安養院大盈務南橋務北橋務青龍務蟠龍務亭林務上海務嘉興縣風涇白牛務魏塘務新城務陶莊務海鹽縣在城務澉浦務當湖務廣陳務乍浦務崇德縣在城務石門青鎮務沙渚務倉庫錄事司嘉興倉外三倉平准庫軍資庫松江府在城際留倉上海太平倉永豐庫海鹽縣際留倉崇德縣縣倉徼巡嘉興縣巡檢司六處新坊陶莊魏塘風涇白牛新城王江涇華亭縣巡檢司七處金山戚漴杜浦澱山湖青龍上海鄒城海鹽縣巡檢司三處故邑蘆瀝澉浦崇德縣巡檢司三處皂林石門安丘官驛馬驛計馬九十疋馬戸八百三十戸嘉禾驛馬五十疋馬戸四百四十八戸錄事司馬二疋馬戸一十九戸松江府馬三十二疋馬戸二百八十戸嘉興府馬一十六疋馬戸一百四十九戸崇德縣馬四十疋馬戸三百八十二戸嘉興縣馬四疋馬戸四十戸海鹽縣馬二十四疋馬戸二百二十八戸崇德縣馬一十二疋馬戸一百一十四戸水驛船八十隻船戸七百六十戸西水驛船三十隻船戸三百戸松江府驛船一十隻船戸八十戸風涇驛船五隻船戸四十戸上海驛船五隻船戸四十戸皂林驛船三十隻船戸三百戸至元嘉禾志卷七
