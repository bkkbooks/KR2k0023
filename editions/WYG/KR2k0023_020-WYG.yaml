body:
  text: 至元嘉禾志卷二十元徐碩撰明行院記華亭圖牒載春秋時夫差三女子墓田曰三女岡聲詩則播諸唐令尹詢并荆公王介甫都官梅聖俞邇岡之刹曰安和晉天福五年蔣漢瑊環堵中芬陀刹花擢於陸聚族而謀曰是八吉祥六殊勝處盍施諸釋梵家遂基此刹楨幹於是者曰本立病潮齧岸址白漢瑊議徙於此改曰明行用淮海王錢中令歸朝所請之額堂宇樓殿金碧輝燦雲棲鴛瓴月行璇題具如經説凡所當有罔不具藏乘二千餘卷棗栢大士華嚴合論在焉鐘梵壓萬􅄜為一方宅心紀想之地遷善逺罪者咸知鄉方一燈長眀四檀委輸規矩凖繩有條而不紊五季方中水立晝昏真人應期民登袵席聖聖授受幾三百年未聞識載固自若也云胡慧日求記述為日曰故國喬木其大蔽雨其髙垂雲可無封殖日冀茂長風雷之鼓盪雨露之膏沐而至此也一刹百堵容數千指功倍封植恵戒剪伐人天之所瞻龍象之所愎不啻故國喬木㒺知創建之艱難則將怠乃訓盍講明以詔後世不亦可乎因其說係之以辭辭曰五季中民迍邅沸如麋號無天中令君吳越錢奮一旅國萬全玉節勁金城堅土海國遮中原振義聲開福田空寂崇經象傳幢刹建泉貨捐為帡幪持危顛誓子孫銘肺肝摛錦繡包山川闕歸徳同永年帶如河礪如山與竺乾無黨偏勅差臨安府凈慈光孝禪寺住僧北磵居簡記明行院結界記余作三女岡明行院記於嘉熈初元越二年結大界相成薦請紀其事其説曰天可陟吾疆不可入地可陷吾疆不可犯不吉祥及諸惡律儀自退舍扵廣莫之野而無何有之鄉且夫天地之大八荒之廣縱而無際横而無朕雖吾廬千柱萬礎磅礴川谷包絡平野𦕈而眎之一撮耳吾身小天地淵乎方寸者心也至微也至幽也出入無時莫知其鄉三灾彌淪心為本根不絶其根滋蔓㒺既乃扵是中自燔自溺然則界相在此而不在彼曩記錢塘大雄院創建之顛末嘗究其説矣今此舉行墜緒補有寺以来闕典故申言之且嘉其事法精至而秉法攝僧攝衣攝食唱相羯磨與波羅提木人絲毫不忒皆寺之傳教比丘慧日講明而奏厥功乃䇿其勲而係之以辭辭曰善乎明行大界相之結也瀰滿清淨於其内他莫我干也噫結固易與爾守難乎哉傳曰重門撃柝以待暴客備禦侮也非撃柝戒嚴於其外則猾闕狡􅎿强侵暴陵重門果何恃譬夫倚界相之固不希勝進般樂怠傲習宴安之鴆自以為安室利處忘自求多福則非吾所敢知僧北磵居簡記福善院鑄鐘記昔皇帝命伶倫氏鑄十二器葢鑄之始也召從律之器掲治世之音上同和扵天地下協贊扵神人暨西域聖人化寝中國海貯真教星羅梵宫方袍之士佛肆之間亦建鐘焉大者數萬斤小者數千斤或謂振豐隆之響鼓鏗鯨之聲警六合之衆息三途之苦天下之人信服斯語悉務蠲施曽無間然矣福善院屬秀州華亭縣之西北隅内熏浦之陽偽吳貞明六年之所建舊曰尊勝皇宋大中祥符元年肇錫新額斯院也樓殿輪奐廊廡完備像設孔嚴緇徒櫛比惟鐘闕如院主沙門遇来大師幼脫塵網素演竺書内行醇明外貌芳潤忽一日喟然嘆曰凡燕居蘭若式逺郛郭茍無鐘梵之音曷為我晨昏之號命耶遂命門弟子紹諲與耆宿僧徳成厯冒風霜徧誘檀信隴西董仁厚欣然樂善首施淨財三十萬由是近者逺者靡不悅隨天禧四年冬十月諲乃抵郡薦状乞聞天庭尋詔下許輸錢易銅以鑄斯器明年值洪水方割下民昏墊亟就兹縁時不我與洎天聖二年嵗之豐和俗稍蘇息諲復率衆聚財再聞郡政乃命青龍鎮廵檢侍禁太原王公繼贇涖而鑄之公芳猷蘭馥峻節霜明幹局有聞從事無曠十二月己巳鳬氏設良冶而鍛鍊焉境邑士女觀者如堵銅既山積火亦烟熾洪爐啟而祝融奮怒巨槖扇而飛亷借力凝煎沸騰翕赫霄壤俄而烟飛焰歇豁然中度華鐘告成厥功斯就掲珍䑓而彌奐發鯨作而大鳴激起人天聲聞遐邇不亢不鬱不摦不窕匪獨導我之真侣抑亦聰彼之羣聾縱使漢宫千石感崩山而發秀豐岫萬鈞應嚴霜而振響豈得同日而語乎諤下制滁陽退居江左承命叙事牢讓弗遑謹直書其實云爾時皇宋天聖三年二月十五日吕諤記延恩寺律師行業記律師諱元偉俗姓陳建溪官族也世業儒大父朝請考教授皆以明經擢髙第母張氏嫻扵婦道處家有成法二弟元仲元傑俱有俊聲皆嘗兩預薦書師以塲屋困躓心形勦瘵傷世締之益靡悟嵗時之易流謂不得扵此必得扵彼乃割愛離親捐妻棄子遂為浮屠氏之歸投華亭超果法師慧道為師即姑蘇北禪梵法上之髙弟也受具足戒既務進律脩已甚苦日不再食衣不再絲不澡身者凡三十年蓄蟻蝨而不殺施水火以淨戒晝夜作禮曽不少休至扵起居食息之頃細戒密行未易悉數見者甚難師持之如一日也自圓頂以来凡淨髪堕爪悉聚而歸之先隴以見不毁傷之意道公謂曰汝持律甚嚴殊不易得正恐難為爾師胡不舍是之律師曰諾敬受命乃如杭習律扵靈芝元照律師未㡬所學甚充别同志曰吾儕小人不蠶而衣不耕而食何為其然是葢伏吾教以取給於人耳誠能推廣其心勞苦其力作不貲之利事上不媿扵佛祖次無忝扵飽食煖衣之施迺扵紹興甲寅即嘉興之華亭縣西訪得接待舊址建屋數楹憧憧往来之旅以將以迎復經營膏腴地以為糧糗之需俾負者得息苦者得憩宵無所依糧有不給者皆得仰焉霅川思溪王氏以好施名師嘗謁之王亦喜聞其戒行且識其營建塔廟悉有條理遂設清淨供留連數月就所居旁以縁事屬之師云此吾志也欣然領畧扵是樓閣翬飛丹堊煥爛閲嵗而就過者嘆仰咸謂龍天化成曽不是過即今圓覺寺及經坊浮圖是也向使業履有虧不足服人何所至輒就若是亟耶師行化闡教利物素志既酬一日集衆弟子告曰吾祝髪越鄉井以大事因縁風饕雪虐㡬徧江湖筋力已倦至扵死生去来予照破既久聊為諸君異日佳話遂命設髙座陞之敷揚宗旨彰明性根句句超詣且謂其弟子法安曰予生固無歉死亦何憾惟兾汝軰協力同心不墜吾志若死當就歸予身扵此以閱道塲之興盛言訖而逝實紹興乙亥二月癸未也及其闍維烟所到處始有異熏襲人道俗無逺近悉皆合十指爪以謂平時戒定善果之報俗夀六十五僧臘三十一度弟子十有五人信俗企敬願執弟子禮者又數人迄今殿宇佛像法器供具無一不備優婆夷塞得度者亦不下三五軰願力深重神識洞明密有以尸之耶予之生也後不與師接其孫道材裒師戒行逺以記請顧予何堪然斯刹之建實大父徽制守禾興日以師行業為請扵朝畀延恩報徳為額則扵予又安能無情勉為詮次用紀其實非以文為也嗚呼人生世間如露如電沉迷沒溺惑扵應酬内磷性真外健物欲其能洞燭此理者十亡二三至扵捨易趨難百不一二師方勤事菽水日有妻孥兄弟之娛田園温飽之樂矍然擺脫世網扵淡泊寂寥地乃爾甘心是皆宿植善根不忘佛受記故能宏大像教所向利益如此今亡矣為其徒者盍勉之哉慶元丁巳人日從事郎前寧國府旌徳縣尉劉百福記白龍潭記華亭在三輔為壯縣環邑皆水交錯於中其流濁而不深有一水焉獨深而潔可瀹可仰於衆流之間者白龍潭也潭以龍名舊矣按圖經在縣西北三里非若青龍名者葢以吳嘗置青龍戰艦而得名然此則實有龍蟄其下嵗或旱暵祈澱山不雨則必来乞靈扵此潭隨禱輒應應必雲霧四集田野晦㝠潭水上湧而甘澤霈然不有神靈安能致是哉自昔迄今龍之功茂乎而古祠不存扵祀事為闕典紹興初有華嚴道塲扵潭際諸方之老禪宿師莫不造焉厯時滋深地亦變遷蕩為民業邑有黄道者自童丱出家天資朴茂梵行精潔久逰方外廣叅知識踰四十年頓釋䝉滯盡得其要領而後歸每慨江湖禪衲鮮有放包之所且佳其山川旁舍雲岫滿目勝㮣如此以為神龍潛躍升騰變化之區是必福地迺超然有㧞俗之志遂卓錫誅茅結廬其上息心安禪時説偈言若己得解脫知見出世間法者然扵是邑人尊其徳髙其行相與捐金助成其志不閱數年而精舍益葺堂廡莊嚴皆徹而新之嘉定丁丑歳鄉閭之樂善學佛者為其落髪被伽黎受具足戒法因其名也後因天台僧隆磊雲㳺来此聞龍神感通之異因公築室之難歸語舶官吳越錢沆迺故相國成公季子也錢具大信根聞而嘆曰凡龍神所居多建佛塔廟而鎮安之如北五臺南徑山是也一日至潭上奉先世所藏佛牙五色舍利分施之凡二百餘顆歸作龍供忽青蛇出現衆所共覩嗚呼異哉嘗聞諸釋典龍性剛猛有怒有喜怒則為物菑害非但嵗功農事而已然其性亦喜佛乘故如来世尊菩薩羅漢因天龍之所敬嚮調伏其性從而化之歸證道果昔北䢵上人洞窟有瞿波龍王居焉佛知龍怒乃運神足往彼龍王見佛歡喜怒心遂息佛為説法授以不殺戒自是國王城邑永無憂患由是觀之舍利佛牙之所自出持以奉龍云胡不喜則於利澤生民保我穡事夫豈小補哉此舍利之所由施也抑又聞佛滅度後有舍利八斛四斗天龍八部皆興奪心迺分如来舍利為三而龍神分受其一然則舍利供龍亦尚矣豈獨扵今為然耶葢一物衆生皆有佛性同一法性皆能成佛況於龍乎況嘗得佛之舍利乎此所以不寳其所可寳不藏其所可藏而樂施於龍潭也宜矣夫舍利之為物如金剛堅梵云設利羅令訛而畧云舍利不壞之義也自佛入滅三昧火光之餘令流布扵人間世者亦不多見非相門未易致如此其富也又烏知不自龍宫海藏而来其来也如是其歸也亦如是此聞有靈循其故步即返其故歩物理則然物將求得所歸雖欲不置諸龍潭之上不可得也因公將營浮圗而奉安之上以祝六龍無疆之萬夀下以祈一切有情之百福所願年穀順成雨𤾉時若雖使龍君超果此潭揚塵阿僧祗刼如此舍利堅固勿壞塔以永存毋俾五臺徑山獨盛扵斯世則華嚴比丘續佛慧燈於不滅矣其廬名以舍利義葢取此迺實録也洛人范開久客錢門逺陪東閤目撃勝事因公以記文見囑又惡得而辭焉姑述見聞之有可書而書焉若夫地之廢興與夫龍之隱見神竒凡耳目所不接而不可詰者皆畧而不書君其問之水濱嘉定己邜夏五望竹洞翁記重開顧會浦記禾興郡領邑四號繁劇者華亭居其首唐天寳中祈吳郡東境而置焉負海控江土為上腴其魚鹽之饒版圖之盛視他邑之不若也國朝重馭民之官宰是者非名通閨籍秩在京寺則未始輕授慶厯辛巳嵗夏六月彭城錢君以九棘丞来更縣章君再調百里二君皆有治績政或有因循未皇者輒思諗窮之顓扵改為如恐不及直縣西北走六十里趨青龍鎮浦曰顧會南通漕渠下達松江舟艎去来實為衝要平疇芳甸傍羅迤邐灌溉之厚民斯頼焉自簳山之陽地形中阜積瘀不決漸與岸等每風潮吐納纔及半道而止者垂三十年康定建元之後愆澤仍嵗川澤不通榜人其咨捨舟而徒錢君惻然有濬浦便民之志首建其議明年春由青龍睨江瀾所来圗上其狀遂以議白府會府公集仙錢侯偃籓之初銳於振舉周覧風俗憫時灾㓙期扵順成刻意溝瀆樂聞斯議深然其請乃籍新江海隅北亭集賢四鄉之民得役夫三千五百五十人府教以尉孫君専董其役既授成算乃克濟美興役之始患榖髙民飢又重費官廪募邑之大姓洎瀕浦豪居力能捐金以助庸者意其豐約䟽之于牘誘言孔甘喜捨叢来凡得錢一百三十六萬計粟之直頭會而晨敷之由是揆日戒告標明部分定役臚呼荷鍤雲集澤門廢不勉之抶東山賦忘勞之詩興三月辛酉訖四月己丑始於邑郛終於江澨増深四尺㮣廣八丈無慮役工十萬二千九百五十畚土平道者不與焉距縣半里舊設堰埭壅其上流今則仍貫按圗經縣管塘浦十而居其最者五顧會是其一焉次曰盤龍曰嵩塘曰趙屯曰大盈而嵩塘首源與顧會合俱支流股引環漬民壤錢君又諭墾田若干頃農之隙户出丁壯咸至顧會疏導之其或嵗苦淫雨水沴且作則敗去防庸縱其溢漫自浦而泄匯於大川若驕陽盛怒藴隆為虐則瀦亭潮波分注疆甽由浦而入潤溉千頃夫然則隂陽慘舒之權嵗畸豐穰之候可移於人手何水旱之足慮哉爾其大堤屹起素波盛滿烟霞澄滅萬状奫淪流行無滯一切行商力穡者各隨其便挐音壤歌而歡騰其間扵是邑明之耋老鼓舞聚而言曰兹浦之堙為吾儕病久矣曩時字人者雖㢘得利害而嗇於經費豈物有通否必待其人耶今吾宰以和恵浸人髓以鍼石去民瘼興壞起廢易扵轉環是舉也靡困乎私㒺耗於公因民所欲而利之則圗大垂久之治孰愈扵是哉噫蒲榖之爵風化所繋昔人之以最課異績美在青史者不可勝紀今之為縣者雖有通人之才囏於施用而易扵韜晦卒不過循蹈常轍飭身飬望為榮名之漸坐守嵗華幸而代去其扵建利除害㡬何哉觀是浦也則錢君為治之淑慝從可知矣僝工之辰命僚宷浮舟以落之峴職當載筆宜識其事聊紀嵗月以示来者云慶厯三年嵗在壬午四月二十九日章峴記重開顧會浦記三江東注震澤介其間潦集川溢畎澮皆盈而浙右數被水患蘇秀湖三州地形益下故為害滋甚紹興甲子夏大水吳門以東没壤之區悉為巨浸部使者飭郡邑詢求故道導源決壅以洩水勢於是監州曹公以身任責慨然興歎曰吾嘗巡行屬邑講問民瘼亦既有得扵此顧未有以發之也觀雲間之為縣連亘百里彌望皆陂湖沮澤當春農事方興則桔橰蔽野必盡力於積水而後能種藝是宜地勢愈卑當有支渠分導瀦水而納之海乃厯覽川原考視髙下訪扵父老謀之邑僚得顧會浦自縣之北門至青龍鎮浦凡六十里南接漕渠而下屬於松江按上流得故閘基僅存敗木是為旱潦潮水蓄洩之限復得慶厯二年脩河記於縣圃而知兹河廢興之嵗月與夫淺深廣狭之制役徒錢榖之數判然察其恵利之實有在於此矣蓋厯百有六年河久不濬而淪塞淤澱行為平陸遂以狀請於朝籍縣之新江海隅北亭集賢四鄉食利之民以䟽治之官給錢糧而董以縣令簿尉公偃冒風霜率先僚屬興工自十月二十有六日役三月而河成起青龍浦及於北門分為十部因形勢上下為級十等北門之外増深三尺而下至鎮浦極於一丈面横廣五丈有竒底通三丈據上流築兩挟提因舊基為閘而新之復於河之東闢治行道建石梁四十六通諸小涇以分東鄉之渟浸不浃旬水落土墳由是自簳山東西民田數千頃昔為魚鼈之藏皆出為膏腴豈不美哉役工二十萬用糧以石計七千一百為錢以緡計二萬五千若其他凡見於前記者兹不暇録訖工之辰憲臺以常平官復視公與邑僚泛舟從逰還謂炬當盡其實以刻於碑之陰毋事於誇也炬安敢不勉遂識其嵗月及其功利而不復為之文紹興十九年嵗次乙丑三月望日楊炬記華亭縣浚河治閘記皇帝克肖天徳剛健精粹髙明悠久夙夜於治道日月以照之雷風以動之小大之臣迺震乃肅丕應傒志奔走率職智不敢閟謀勇不敢愛力成順致利㒺不從欲以能大宅天命照彰光堯之盛烈羣生雍雍焉惟蘇湖常秀四郡經渠數百畆澮數千脉絡交會旁注側出更相委輸自松江太湖而注於海而所入之道嵗久填閼雨少過涯則泛濫瀰漫決齧隄防浸灌阡陌迺隆興甲申秋八月淫雨害稼明年大饑上臨朝咨嗟分遣使者結轍於道發廩賦粟以活饑者迺博謀於庭曰惟雨暘之不時予敢不懋於徳然使水旱之不能灾者寧無人謀或曰巨家嗜利因嵗旱乾攘水所居以為田則雖以鄰為壑而不恤既瀦水之地益狭則不得不溢盍盡覈所占而鑿之以還水故宅庶民病其少瘳乎上曰是固有之然不可悉鑿也寧䟽水下流而導之會有言蘇秀勢最下華亭尤近海十八港皆有堰捍湖可一切決之四湖所瀦水宜為斗門以便節減上覽而異之亟命兩浙轉運副使姜詵與今丞行視其宜姜侯開明强濟誠愛果達有仲山甫匪懈之節既受㫖即馳布徳意諏訪故老周覽川野窮源委度髙下審順逆取衝要盡得其便利以聞曰東南瀕海之地視諸港反髙雖有神禹不能導水使上也盡開諸堰適能挽潮為害閘湖以瀦水可矣將以決洩而下流猶壅則無益也今宜浚通波大港以為建瓴之勢又即張涇堰旁増庫為髙築月河置閘其上謹視水旱以時啟閉則西北積水順流以達於江東南鹹潮自無從入也上稱善即丐以常平之帑贍其役且與守臣鄭間會其事制許焉則相與集徒揆日賦材計功一木一石一夫一工皆窮校研覈纎悉周密費而有節既具以授之縣令侍其銓侍其亦健吏也始協謀終盡力威以柅姦說以使人一木一石一夫一工必手自賦給不可廋匿檢程視作弗容茍簡乃浚河自簳山達青龍江口二十有七里其深可以負千斛之舟因其土治髙岸䕶青墪傍故水所敗田數萬畆還為膏腴為閘於邑東南四十有八里增故土七尺甃巨石兩趾相距常有四尺深十有八板板尺有一寸月河之長三千三百五十有五尺廣常有六尺凡浚河之工萬有一千二百金工石工木工畚築之工伐助運致之工總其數概七倍於浚河靡錢緡九千三百五十四粟石二千三百有九十始於仲冬之朔凡五十有五日而畢蓋歛未嘗及民而民亦若不知有是役也於是耕夫野人相與来言曰昔也十日不雨吾倚鋤而待澤十日而雨吾捧土以増之今四州之人自是知耕歛而已雨暘惟天可也此吾君之澤而二三大夫之力吾儕鄙人也持牛尾抃蹈而歌嗚嗚言語下俚不可聽也盍為我文之克昌竊迹前事鄭白之渠成而關中沃野無凶年其民歌之班固志焉於今盪耳且也今天子仁聖勤儉宫中無一椽之營獨念稼穡之艱難遇灾而懼食不甘味寢不奠枕務以興天下之利而忠恪之臣畢智慮展四體迄此成功乃野人之歌不足以被管絃垂汗青倘太史氏又以為主上盛徳大業固已不可勝載兹特一方之細故恪而不悉則是使四州之大利曽不得齒於關中之二渠垂光萬世此承學之罪也乃為歌五章以遺斯民使扣角撃壤以極其鼓舞歡愉之情用發揚聖徳亦使知自今農為可樂而招之反本云若夫念圖功之孔艱嗣美績於無窮修治於未壞時浚而勿壅尚屬諸来者其詞曰水横流兮無津涯浩浩洋洋兮誰東之帝不寧兮謀臣来謀臣兮夙夜水滔滔兮迤而下不搴茭兮但耕稼君王智兮如伯禹川后雨師兮莫余敢侮且决且溉兮介我稷黍我受一㕓兮終善且有汝行四方兮曽不足以餬其口易歸来兮君王錫汝以萬金之畆帝謂兮三臣錫之福兮慰汝勤報吾君兮嵗後天施我孫子兮彌豐年乾道二年十二月二十五日許克昌記至元嘉禾志卷二十
