body:
  text: 至元嘉禾志卷五元徐碩撰浦溆松江府顧㑹浦在府西北七十里考證案宋慶厯重開顧㑹浦記直縣西北走七十里越青龍鎮浦曰顧㑹南通漕渠北達松江因簳山之陽地形中阜松江潮至半道輒回簳山之旁沙塗壅積故自慶厯辛巳紹興乙巳乾道乙酉一再開通未幾輒淤滯紹興乙丑因浚塘又於北門築兩堤依舊基為閘以時啟閉復於浦之東闢治行道橋梁四十六以通東鄉之渟浸盤龍浦在府東北四十五里考證自府東北達扵舊江以其委蛇曲折如龍之盤得名續吳郡圖經有盤龍滙者介於華亭崑山之間步其徑纔十許里而迴穴紆緩逾四十里江流為之阻遏盛夏大雨則泛濫淪稼穡壞屋廬殆無寧嵗自宋乾興以來屢經䟽決未得其要范文正公守平江嘗經度之未遑興作寶元元年太史葉清臣按漕本路遂建議濬為新集道直流速其患遂沮崧子浦在府東北五十里考證按舊圖經崧子浦在東北五十里崧子塘在北一十五里分而為二者蓋北一十五里崧子浦之口東北五十里者下注於舊江口宋慶厯開顧㑹浦記以為嵩塘蓋此浦與顧㑹浦同流而異𣲖皆瀉水於松江大盈浦在西北七十里考證南接澱山湖自白鶴滙以達松江浦濶三十餘丈宋慶厯開顧㑹浦記論華亭浦溆五而大盈居其一王介甫詩云徒嗟大盈北浩浩無春秋即此詩也趙屯浦在府西八十里考證南接澱山湖北達於松江北浦濶五十餘丈即王可交遇仙處内勛浦在府西七十里直浦在府西北七十五里南澥浦在府西北六十八里梁紇浦在府西北八十里艾祁浦在府東北六十五里華潮浦在府東北六十五里郭巷浦在府東北六十五里小來浦在府東北三十五里新涇浦在府東北八十里上澳浦在府東北八十里西蘆浦在府東北八十五里大蘆浦在府東北八十五里上海浦在府東北九十里南蹌浦在府東北一百里下沙浦在府東九十里考證宋紹興乙丑通判曹泳開海鹽縣澉浦在縣南四十五里考證水經云谷水於縣出為澉浦以通巨海元熙元年有毛人三人集於縣蓋泛於風也今番舶皆輻湊焉横浦在縣東二里濶一十二丈考證東北通故邑西通賁湖南入海石亭浦在縣東北八十里考證通華亭東一十五里入海蘆瀝浦在縣東北七十里考證宋元祐八年本路提刑羅適開地中得古尼寺碑移置松江白牛寺乍浦在縣東北三十五里藍田浦一名魯公浦在縣南長一十八里考證浦有藍田廟宋咸平六年知縣魯肅簡公宗道重開有利於農因名橋為思魯橋其浦為魯公浦面濶一丈七尺紹興三年縣令李直養重濬又自藍田廟開浦一十八里至鮑郎鹽塲以便監運以灌農田溪潭松江府白龍潭在府西北三里考證世傳有龍蟠伏於中嵗旱嘗禱雨焉嘉興縣韭溪在縣南八里考證寰宇記載虞仲翔川瀆記云太湖東通長洲松江水南通烏程霅溪水西通義興荆溪水北通晉陵隔湖水東通嘉興韭溪水凡五通謂之五湖故嘉興有韭溪焉穆河溪在縣西北三里考證此水接上谷湖入太湖白龍潭在縣西南五里考證景德禪院前以白龍穴於此故行舟飄溺居人作塔埋舎利以鎮之後遂無害今寺之伽藍神乃順德龍王也宋淳熙改元秋大旱知縣李時習知龍潭在此遂以太平廣記載南中攪龍事請於知州張元成而張又驗之蘇文忠公徐州起伏龍行頴濱先生邢山潭詩聽之不疑隨車霶霈嵗果豐稔李作記鐫之石攪龍之法無他以長繩繋虎頭骨投有龍處且既得雨偶取虎頭稍遲雷電繞於郡治聽訟之所移時不止張速遣人取旋即晴霽今婺州圖經亦載攪龍之事則此法果不誣矣海鹽縣秦溪在縣南三十六里考證溪通豐山港接運河法喜寺有碑鐫秦溪二字龍湫在縣東北四十里考證陳山之巔有水極澄清洞見鬚髮大旱不涸大水不溢縣有水旱令躬至靈湫請水至縣㕔禱祈無不感應宋紹興間六月縣令李直養祈雨得小龍子歸既得雨送小龍連四龍子歸靈湫徑入石罅四龍子亦不見陂塘松江府沈注塘在府西五里考證南接運河北接大盈浦蓋自檇李城下水流東北則此塘所以瀉上流之水也往時嵗旱浚之還澣漲則亦可以引松江之水以資灌溉古浦塘在府西考證行二十七里以達於泖嵗旱亦可引三􅍩之水以資灌溉鹽鐵塘在府東南長三十里考證世傳吳越王於此運鹽鐵因以為名舊瀚海塘在府東南考證西南抵海鹽界東北抵松江長一百五十里杜浦塘在府東八十里嘉興縣廣濟陂在縣南八里南北三十五丈東西一里一百步運河塘在縣西南九十里通崇德縣三十里北接吳江縣界漢塘在縣東一十五里考證新唐書地理志海鹽注云西北六十里有漢塘太和七年開然此塘自海鹽西北直通嘉興故總為漢塘華亭塘在縣東一十五里考證通松江府華亭縣故名横塘一名海鹽塘在縣南五里考證自南湖轉路馬塘廟而上南至海鹽縣謂之横塘故劉文房詩云家住横塘曲是也章戀塘在縣東北七十里東通長泖長水塘在縣南六里通硤石市考證吳錄地理曰吳王時此地本名長水故嘉興亦曰長水又始皇東遊至長水聞土人謠曰水市出天子從此過見人乗舟交易應其謠遂改為由拳縣冬瓜湖塘一名宋郭湖塘在縣北三里海鹽縣貯水陂在縣東南五十里官塘在縣西二里半考證自天寧寺橋至常豐閘計三十三里二百七十四步宋淳熙九年守臣趙善悉重濬招寶塘在縣西南二十五里考證宋淳化三年開淳熙九年守臣趙善悉重濬烏坵塘在縣西陶涇塘在縣西考證二塘並宋淳熙九年守臣趙善悉重濬太平塘舊名捍海塘在縣東二里考證西南至鹽官縣界東北接華亭縣界防海水漲溢故名捍海塘聖朝至元甲申縣尹顧泳重修改今名立扁於上横塘在縣北四十里考證即常豐閘北通南湖滸見嘉興縣横塘注漢塘在縣西北六十里考證唐太和七年開接嘉興縣界崇德縣范蠡塢考證舊經云塢水陂也在顧村范蠡曽遊於此因名旁有洗足灘運河塘在縣東南接鹽官縣界北接嘉興縣界河港浜灣附松江府運港在府東西運港在府東沸井浜在滬瀆考證東西有蘆浦中間一水相通有數尺許特深如井然水騰涌晝夜不息或云海眼也嘗有戲浴於中者二三尺以下其氣稍温嘉興縣運河在縣西南通崇德縣北接吳江界考證隋大業六年勅開江南河自京口至餘杭八百里面濶一十餘丈擬通龍舟樂天詩云平湖七百里沃壤兩三洲謂此水也支河考證舊經云父老謂支家掘河因名日河在縣北二里死亭灣在縣北考證寰宇記云朱買臣妻初見夫貧棄夫改嫁杉青堰吏買臣為内史衣錦還鄉其妻羞死於此故號死亭灣海鹽縣清通港在縣西五十里涇溝松江府鸌涇黄姑涇張戀涇老兒涇何家涇善涇張涇徐家涇邵家涇新開涇招賢涇管家涇戚家涇丫义涇吳塔涇蔣家涇嘉興縣車溝在縣西七十三里二百步濶六丈深四丈考證連接烏程縣入震澤海鹽縣古涇考證三百一所唐長慶中縣令李鰐開通小舟崇德縣語兒中涇一名語溪自縣東五十里達嘉興南谷湖考證禦兒之名尚矣左傳國語吳越春秋等書皆然史記中獨年表字作禦逮西漢則易為語而年表又作蓹後人疑之附㑹其說水經載萬善歴曰吳黄武六年正月獲彭綺是嵗由拳西鄉有産兒便能語因詔為語兒鄉殆枝辭也宋元豐中樂圃朱長文續吳郡圖經又舉俚俗之言曰范蠡獻西子於吳道中生子至此而能語既辨其妄併以語字為訛然朱亦未之思也班孟堅諸君子豈徇俗以言者竊意漢人以其名言之匪順𩔖曾子回車之嫌故取其音相近者易之耳若或禦或御亦此意也今俗多稱語兒溪長營涇自縣西一十五里達德清及烏程縣界堰閘松江府運港大堰濶三十丈深三丈六尺厚二十一丈九尺鸌涇堰濶一十五丈深三丈五尺黄姑涇堰濶五丈深一丈五尺張戀涇堰濶一十二丈深三丈老兒涇堰濶二丈深一丈何家涇堰濶一十一丈五尺深二丈吳涇堰濶九丈深二丈六尺張涇堰濶三丈深一丈徐家涇堰濶九丈深一丈八尺邵家涇堰濶九丈深一丈八尺新開涇堰濶九丈深一丈八尺招賢涇堰濶一十一丈深二丈八尺管家涇堰濶三丈深一丈四尺戚家涇堰濶六丈深二丈五尺丫义涇堰濶五丈深二丈二尺吳塔涇堰濶一十丈三尺深二丈六尺蔣家涇堰濶七丈五尺深一丈六尺考證舊有堰一十八所宋政和中興修水利盡決諸堰而巨海鹹河竟入為害於是東南四鄉民流徙乾道七年守臣太博丘公崈以新涇塘潮勢湍急運港距新涇二十里水勢稍緩議移新涇堰入運港遂募夫經始於九月二十六日畢上於十二月二十七日堰成併築堰外港一十六所港之兩旁塘岸四十七里二百八十五丈有奇明年正月二十一日上遣監察御史蕭之敏相視又捐四鄉民租九年以招復流民又明年正月遣中使宣諭守臣張元成増築二月特置監堰官一員招土軍五十又置司顧亭林巡邏以防鹽運私發諸堰之患自是三州之田始得免鹹潮之害矣竹岡堰在府東六十里砂岡堰在府南七十里張涇閘在府東南四十八里考證宋隆興甲申八月本路漕臣姜詵奏請於張涇堰増庳為高築月河置閘其上甃巨石兩址相距常有四尺深一有八板板尺有一寸以時啟閉故鹹潮無自而入月河之長二千三百五十有闕六尺許克昌為之記鹹塘岸考證運港東塘岸自運港堰至徐浦塘計二十四里一十七丈西塘岸自運港堰至柘湖二十三里嘉興縣杉青堰在縣北四里冬瓜湖堰在縣北三里考證舊堰官張祐死後時裴洪慶命其子領之張祐之子守冬瓜此事詳見於金華子雜記柵堰在縣西北三里六里堰在縣東五里白苧堰在縣東南三里學秀堰在縣西南九里考證舊傳西施學繡於此故名學繡今為學秀訛也姑兩存之馬塘堰在縣南七里廣四丈高二丈五尺長七十步考證舊經云秦始皇三十七年東巡至此改長水鄉為由拳鄉遏水為堰以厭水市之謠其隄既立斬馬祭之而去九域志同杉青堰在縣北四里海鹽縣張泥菴新朱涇錢涇堰周大堰許家堰徐涇堰落滙堰朱莊堰右𨽻開濟鄉干涇堰錢家堰丁滙堰朱涇堰練浦堰淘涇堰白塔堰孔家堰右隷永寧鄉徐涇堰鐵城堰黄泥堰高峯堰大王堰小華家堰大華家堰東吳市堰西吳市堰右隷長水鄉北横涇堰彭村湖堰楞巷堰馬家堰滕家廟堰倪家堰龎家堰楊家堰衛港堰六里堰三里堰孫家堰湯家堰右隷德政鄉十八里堰白馬堰李家堰孫堰沈駝堰孫三堰馬廏堰右隷武原鄉土山堰小山涇堰鍾礬堰湖口堰小黄泥堰代埄堰清水墓堰李塔堰沈墓堰東裴塔堰西裴塔堰立沈堰馬垜堰楊瀆堰東閘堰墓埄堰右隷齊景鄉西閘堰祗園堰俞家堰大芒塘堰麥塔堰西黄泥堰朱洞堰楊蕩堰俞家堰夏角堰姚星堰翁莊堰沈福莊堰志公堰大孫堰右隷華亭鄉戴堰馮奥堰錢家堰許洞堰月河堰右隷大易鄉常豐閘在縣北四十里閘口濶一丈二尺兩堍各高一丈六尺五寸考證海鹽海奠其東水無源流獨藉官塘一帶以灌十鄉之農田十日不雨車戽之聲一動則其涸可立而待而又下通太湖松江水傾注而去猶居高屋之上建瓴水也是以堰閘之設視他邑尤為急務自宋嘉祐元年縣令李維幾植木為閘及置鄉底堰三十餘所後亦漸廢元祐四年河清源公執中為令恐閘之木不可久遂易以石淳熙九年守臣趙善悉興修水利増築鄉底堰共八十一所每嵗二月築堰九月開通淳熙十五年縣令李直養重蓋閘屋易閘板自是農被閘堰之利頻嵗得稔後間廢至元嘉禾志卷五
