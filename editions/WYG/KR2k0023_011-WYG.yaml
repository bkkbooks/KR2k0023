body:
  text: 至元嘉禾志卷十一元徐碩撰寺院嘉興縣景德禪院在縣西五里考證舊志云元焚化院宋建炎三年守臣程少卿奏改今額按本院碑記其初寺基下是白龍潭凡遇風濤危難或遇天晴有白光三道其僧行雲積土填潭造塔三座於光起之處時人稱為三塔灣嘉禾百咏詩注云昔有白毫光髙數丈民以為祥乃作寺有白龍潭在寺前龍潭事詳見溪潭門兹不復載東坡昔過此畫竹於壁題詩云聞説神仙郭恕先醉中狂筆勢瀾翻百年寥落何人在只有華亭李景元李亦畫竹於此以詩和之詩傳不全有一聨云野人不識天人靣知是虞皇第幾元李華亭名士也又按本院碑記錢氏賜額為保安院宋景德年間每州各立景德院遂以保安院改今名宣和年間燬大觀年間重建真如院在縣南四里考證唐至徳二年立大中十年裴相休舍宅為寺改為至德院無着大師住持而雪峯和尚住庵庵有雪峯井宋大中祥符元年改今名有蔡元長周開祖范德鎮留題小石刻建炎初知州趙叔近龍圖以王事死殞於中因鐫贈䘏之詞於僧房鄉人為立祠宣和庚子兵火其寺僅存遺址後拆為三南則立為賢首教院淳熈二年僧戒月又建華嚴閣於其西閣下為十六觀堂焉商逸鄉為之記慶元三年十月又建寳塔於其北鮑義叔為之記其餘基址官立為寨後廢丙子兵火賢首教院亦間燬東塔廣福教院在縣東六里考證舊大聖塔院也宋政和六年因在城壽聖教院改為天寜萬壽寺郡聞於朝以壽聖教院名就塔院立之紹興三十二年改今名按揮麈錄孝宗初時嘗登鐘樓誤行至中間竟墜於地旁觀失色孝宗屹然不動本覺禪院在縣西二十七里考證舊名報本宋宣和年改神霄玉清萬壽宫建炎元年復舊額此正檇李之地今有檇李亭東坡與文長老往還嘗遊於此有東坡館按東坡集有秀州報本禪院鄉僧文長老方丈詩曰每逢蜀叟談終日便覺峨眉翠掃空洎再過之則文長老以老病而退院復有詩云愁聞巴叟卧荒村來打三更月下門三過之則文長老已卒詩曰三過門中老病死一彈指頃去來今故寺有三過堂惠寂院在縣東一十八里考證唐乾元間創㑹昌間廢咸通六年復立咸通九年為光福院長興三年有寜海僧栖法紹光聞於吳越文穆王重立宋治平元年十月賜名惠寂崇奉靈感觀音大士香火聖像得於杭人張嵩家藏昔石晉天福間有僧道翊一夕見天竺山間光明得竒木命匠者孔仁謙刻觀音像吳越忠懿王夜夢白衣仙人求治其居左右曰天竺觀音白衣像也乃一新道塲此鄉耆舊相傳惠寂觀音大士與天竺同一木既聖像自杭得之則不為無所事矣邦人嵗遇潦祈之必應與天竺均此靈感宋慶元丁巳澶淵王浦之來牧是邦時適閔雨甞迎請大士入州治未至而雨已霑足繼命僧師源冩相述記併刋諸石嗣是邦之守臣凡遇雨𤾉豐凶無不隨禱而應逺近賴之丙子兵刧一燬無幾僅存山門水陸院而已昔之題詠碑刻皆亡近寺僧了悟等模倣雕刻架造殿宇隨宜具體規製不古矣能仁院在縣西北二十七里考證舊名福業院唐武宗㑹昌五年廢宣宗大中二年給元額五代石少主開運二年改為報國院宋真宗大中祥符元年改承天院徽宗政和七年改今名智覺院在縣南二十六里考證舊為營田都務宋開寳八年立為梵刹咸平六年賜太平天壽院治平元年十月二十七日改今名淨相寺在縣東南三十六里考證梁武帝賜額為梁福寺後廢漢南王重立天福七年武肅王重修祥符戊申改今名保聖院在縣東南二十七里考證唐至德二年立寺基獲石佛四軀因置石佛院宋天聖元年五月賜今名興善院在縣東南三十里考證梁天鑒二年置周顯德五年改報恩院宋治平元年改今名淨衆寺在縣東四十里考證宋乾德二年百姓李德榮捨宅為大聖寺治平二年十月改今名淨土院在縣東三十六里考證邑人陸求宅基也曾收得唐咸通十二年石幢至清泰元年奏漢南王捨宅為安福寺宋祥符元年賜今名内有亭名碧鮮竒絶聞人郎中安道常作詩以紀其事云植竹敞虚亭清幽滌襟慮盛暑生涼陰窮冬見蒼翠我愛主人賢堅如筠箭美願師持此心與境長無魏陳賢良亦有詩云瀟洒闌干碧玉叢昔來游賞是兒童縈迴修竹探繁影刻劃新詩逸翠筒十載雪霜林色改幾畨風月酒尊空子猷老去心長在終擬為鄰作醉翁大聖院在縣東北三十六里魏唐鎮考證宋熈寜八年四月開山元豐二年立紹聖元年有大聖菩薩在寺放光明崇寜二年八月八日省符改是名今廢慈雲寺在縣東北二十六里魏塘鎮考證唐大中十一年立名保安寺宋治平元年十一月改今名景德院在縣東北三十六里魏塘鎮圓通寺在縣東三十六里考證元有荒廢寺基周顯德五年百姓茒承翰申漢南王乞於古跡寺基立名寜國寺宋治平元年十一月改今名白蓮接待院在縣東八里考證郡城元有白蓮寺舊傳有知州為士人時過此求湯水寺僧不允後果典是邦遂廢此寺後為趙倅雋之錦莊宋紹興二年郡父老請於朝因以是額立於此泗州大聖院在縣北四十五里考證宋熈寜間有僧智微在永州兜率寺受業其僧母張氏年九十四嵗造庵一所名泗州大聖庵知州吳司文聞於朝得曾太后㫖賜老人粟帛僧智微同母將所賜粟帛并衣鉢貨易造泗州大聖像及佛殿紹興三年智微從弟奉珍以其狀申州轉聞於朝准禮部符改今名永興禪院在縣東三十里胥山上考證宋隆興元年李觀察捨俸資為寺以胥山郷永興禪院舊額請於朝立之淨因院在縣東二里考證宋建炎兵火此院獨存天台寜海尉聞人偲紀其事云湖海浮家二十年重來春色尚依然杏花籬落噴紅霧楊栁林塘䕶綠烟草煖邦人出遊地鳩鳴刺史勸耕天覺塲獨在三災外試問支郎第幾禪漏澤院在縣東二里三十步考證宋崇寜三年置賢良陳舜俞孫捨基為之龍華寺在縣西北一十里今廢海鹽縣資聖寺在縣西五十步考證舊經云本普明院舊記云昔右將軍戴威之宅一日井中發五色光威以為竒遂捨宅為寺司徒王詢建為伽藍神得名光興事見吳郡陸崧塔記乾祐中改重光宋祥符中改普明天僖二年改今額悟空寺在縣西南四十里考證本永安寺宋治平元年改今額德藏寺在縣北五十五里當湖市考證唐㑹昌元年立光啟初廢後唐清泰中鄉民丘邵請即故居新之名曰寳興宋大中祥符間改今名景祐初復葺之隆興二年重修廊宇魯衢為之記普明寺在縣西南三十里考證本僧伽院宋治平元年改今名法喜寺在縣西南三十里考證本通元寺宋祥符元年改今名紹興九年改禪寺有準髙僧塔其詳載古跡門政和間有村媪捨幡入寺寺僧以無挂旛錢遣去過寺西橋忽遇貧僧問而憐之為入寺引臂挂旛於刹竿隨即無蹤相傳以為羅漢顯化鹿苑禪院在縣西北三十五里今廢考證本金明寺宋治平元年改賜今額寺有一擊軒及何源清公應夢羅漢景德中魯簡肅公諱安道初宰此邑夢胡僧來迎叅政及瞻羅漢像與所夢符合施俸修寺因榜曰應夢尊者後竟叅大政以是立祠有無為楊傑留題進士聞人闕嘗作詩紀其事云郡邑相望路半停屹然香刹聳林坰罷叅釋子忘情久應供胡僧入夢靈東去無情水繚繞西來有意柏葱青定知俗駕經過少月上松扉不用扃青蓮寺在縣北四十里考證本名石佛寺宋治平元年改賜今額祗園寺在縣北八十里考證本建明寺宋治平元年改額大寜永祚禪寺在縣西三里考證本禪院宋宣和二年改今名福業教院在縣西南二里考證本華嚴庵焚化院宋紹興五年改今額普照院在縣東北九十里考證本僧伽院宋治平元年改今名萬壽院在縣東北九十里考證本保國勝刹院宋大中祥符元年改今名寜海院在縣西二十五里考證宋紹興六年改今額禪悅院在縣西南三十六里考證本行香庵宋靖康元年改今名福臻院在縣北四十里考證宋紹興六年改今名南塔院去縣三十五里考證本觀音所禱去處宋建炎四年三月改今名淨業院在縣西南一里考證本無礙浴院宋治平元年改今名廣福教院在縣北七十步考證本施水院宋熈寜元年改壽聖隆興元年改今額廣惠禪院在縣西三十六里金粟山考證宋開寶己巳錢武肅王號施茶院祥符元年改今名紹興二十五年七月内降下御書法帖一十軸於本院奉安禪寂院在縣西南五十里横山考證本興福院宋治平元年改賜今額祠顧況為伽藍神況舊居寺側故也況詩云家住雙峰蘭若邊西林院在縣北五十里考證宋紹興五年改賜今額興福院在縣東北四十里陳山考證宋紹熈四年縣令李直養既鼎新龍祠又移廢寺額創立伽藍以廣僧居以祠龍居淨福院在縣西一里考證本西焚化庵宋銘熈四年移請廢額立焉海寜院在縣西南二十里考證宋紹興十四年就法喜寺闕賜是名今廢崇德縣福寺在縣西八十步考證梁天監二年名常樂寺唐會昌年廢大中十年重立宋大中祥符二年改為悟空院天禧二年六月十五日改今名建炎兵火廢後重立有唐無着禪師贊寜碑記師嘉禾禦兒人也寺東北隅有九品觀堂廣法寺在縣東北三百步運河東考證唐咸通九年建名修證宋治平元年改今額寺有景祐元豐法堂浴堂碑記建炎乙巳之艱茲寺巋然靈光也南廣福尼寺在縣東南二百步運河東考證本梁朝天監古寺唐開平二年置名寳壽宋治平元年改壽聖紹興三十二年改今名北廣福尼寺在縣西北二百步考證本梁朝天監古寺晉天福八年修置名妙善宋治平四年賜名壽聖紹興以後次第重建壬午上徽號名同者易之淳熈四年改為十方禪刹西常樂教寺在縣西北三里考證宋建炎兵火廢紹興五年重建祗園寺在縣西北三十五里洲錢村考證舊經云本梁朝天監古寺周廣順三年修置為大喜寺宋大中祥符元年改今名殿西南隅有梁朝檜皮剝殆盡堅逾鐵石虬枝奮起若爪距拏攫附根於榦倒偃蒼蓋竒偉特甚朱勔之黨嘗加緘䕶㑹臘冦作而止丞相趙福王祠在廡東密印寺在縣西北六十里青鎮考證梁朝置名吳德寺宋大中祥符元年改今額舊有梁昭明太子祠蓋烏鎮普靜寺本梁相沈休文父墓也當武帝時休文貴盛每嵗春一來拜掃其反也帝必遣昭明太子迎之逺郊因就築館宇休文不自安遷葬金陵而舍墓為寺昭明亦以館為密印寺其後二寺各祀以為䕶法伽藍神寺有華嚴圖髙一十二丈古有聖僧入定遊華嚴境界寤筆諸圖妙入神品兩曾宣入經御覽今藏在寺藏經亦異古有士子一十人忽來願書經既畢不吿而去妙智寺在縣東北五十里考證宋嘉定間建觀音資福院在縣西南一里考證西廡有軒瞰流扁平綠淨慈接待院在縣北一里崇勝院在縣東南三里考證晉開運二年吳越陪臣徐頵捨宅為之名法華宋治平元年賜今名靈濟院在縣東北三里考證元謂之馬􅡙庵宋嘉定移請今額福嚴禪院在縣東北一十二里考證唐乾符三年置為千乘院宋大中祥符元年改今名先是真覺禪師志添雲遊至京師徽宗時在潛邸陳太后病目真覺呪水治療有功許其指占名山住持真覺乞來此是為本院第八祖所賜金環磨衲袈裟一條上題遂寜郡王陳美人願福壽延長施真覺道者當來同成佛果二十三字師有草庵歌元祐乙巳黄山谷為之書今皆藏在院又真覺請到汀洲定光佛專為祈禱道塲雨暘之愆請禱輙應舊有七級浮圖久廢後重建澄寂院在縣西北一十二里羔羊村考證梁天監二年置為靜林寺開平二年改為雙林院宋祥符元年改今名演教院在縣東一十八里考證晉天福八年置為保安院宋治平元年改今名順慶院在縣北二十里東田村考證宋淳祐間建勝因尼院在洲錢南獅子墓考證宋淳熈間建徑山廨院在縣北三十里大沐村考證宋開禧間建證聖院在縣北三十里錢林村考證吳越錢王鏐㣲時有舊舘於此後貴改為祖祠已而道𢎞師庵於祠側王聞其道行孤高乾寜二年建寺居之曰寳林方丈後園亭扁清樂亭舊有池種千葉蓮園多語兒梨千乘無核棗嵗獻錢王宋大中祥符元年改今名廣福塔院在縣西北七十里青鎮考證宋慶厯二年建為多寳佛塔至和中改為講院接待熈寜元年又改壽聖塔院紹興壬午改今名參政陳簡齋舊肄業於院既貴建閣以讀書名之簡齋與西庵大圓師洪智鎮士葉懋天經友善且命子洪從天經學閣遭鬱攸不存惠雲院在縣北四十里鳳鳴市考證周廣順二年漢南王建名鳳鳴院宋治平改今名承平時有東京三藏道法師被㫖奉真身佛牙遊化至至本院欲求舍利永鎮一方爰集緇素䖍禱三之日丁夜舍利現人皆竒之雨𤾉有禱即騐寜國院在縣東北四十里考證元龍吟寺本淮海王祠祖置為龍翔寺宋大中祥符間改今名寂照院在縣東六十里千金鄉屠甸村考證經始不知何代晉天福間重建名國清報恩院宋治平間改今名寺有二石佛温潤如玉頂冠冕被縵衣制度不凡古傳自海浮來𩔖吳中開元迦葉維衛二如來像至元嘉禾志卷十一
