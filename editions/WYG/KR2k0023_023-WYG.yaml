body:
  text: 至元嘉禾志卷二十三元徐碩撰碑碣海鹽縣縣學記夫子之道孟子稱之曰生民以來一人而已後之碑夫子廟者雖引天地日月山川鬼神為之比考其至未有出于孟子是知聖人之門難乎其言也才非命代宜不復為姑記其事海鹽秀之屬邑于吳為東鄙地平下積洿而不注其俗少識者自李唐至于聖宋無登科從政者先有夫子廟屬正朔不流藩臣稱霸以儒為戲厥制遂亡國家富有寰區勃興文教太平興國中主簿石知一權縣事始立之知一明經入仕任意卑而不度景徳二年京兆翁緯以試校書郎領邑視事三日謁先聖于縣東壊屋兩楹葢圯像而已即日召民吏可教者喻之曰若所以有親親之義長㓜之節褒衣束帶生養死葬異于禽獸者夫子之教也今日廟貌不支祭祀㡬廢若完居而聚食雖曰無罪吾必謂之罪矣遽命新之既而以嵗飢乃止明年水潦害稼又明年秋九月嘉榖告登始有成議以舊廟逼民田不得大其制縣南隙地形勢爽塏四隅相望若有所待者乃表基之于是揚言曰財羨于屋歸予于瓦本力餘于農輸予以土功縣尉張用丕實同斯役既唱而和無翼之聲不日而四達憧憧遝遝川流市合畚鍤斧斤晨趨夕奔工不誡而自勤物無脛而來臻經之營之越月而告畢廣殿雲聳袤軒翼迥敞修廡而傍引呀重門而前達繚垣屏周巨塹環䕶初廟南窪下就出土以備用穴之及泉因成方池闕中出池之陽作移風亭以臨之皆授制于工者廣袤有度髙下相輝正殿被衮之右偏亞聖在焉閔損以降九人左右行列其餘六十二人繪諸屋壁自炎漢而下巨儒碩生别序餘堵六代禮樂周旋廊廡崇巖秘邃雖無取于天下與夫江左之邑亦可謂之稀矣矧冠葢赫奕器服輝映窺其墻望其門者不威而可畏不約而自恭是使海隅之民識吾儒之大將思其道而奉其教鄒魯之風可期一變也夫民無自化在有位以化之非其人弗克有其教故廟亡僅二百年卒屬于我葢張吾道集能事世之所難乎後之莅縣者設不以訓民成俗為意目兹壯麗亦將知其難而奉之潔户牖易蠧朽區區忽怠于其間則能吏也如其不可我亦無媿時大中祥符改元之二月二十九日試校書郎知縣翁緯記修學記夫子有廟廟有學所以奉春秋祭祀而教民以道藝其規摹制度講求明備漢唐以來未有如我宋者也故自京師達于郡縣莫不飾祠宇聚生徒命官擇師以廣教育洋洋乎絃誦之聲際天接地可謂盛矣今上即位紀休揚烈聖才睿㫁新民耳目萬㡬之暇玩心經史觀古治亂葢將激勸羣下終始典學同底于善真聖帝明王之操術也為守令者不宜有以述上徳廣教化而稱其職乎海鹽縣𨽻嘉禾郡生衆萬計濱海而居魚鹽之利僅以自給士其業者纔數人而已昔之為令若參知政事魯公宗道而下其修舉職業間有人焉然廣學訓民之意猶闕如也非諸公之意不及于此葢嵗多饑饉民力凋瘵拊循拯救日猶不足奚暇治庠序哉雖然後之繼者或處可為之時而因恬不慮退讓未遑非所以述上徳廣風化也去年夏四月予始官於此僚佐相與語曰夫富而後教古之道也兹邑地勢髙而瘠土衆若嵗差旱則禾盡槁而人食貧矣能備其患然後可以議教於是周眂四境凡可以瀦水溉田處悉鳩衆力以浚之既而境内豐穰民用給足皆遷思回慮靡然有鄉善之心一日邑之父老造庭而言曰宣聖舊祠壊久弗葺願易其地增置學校誨我子弟庶㡬有立凡一材一物之費悉自營辦予從其請乃得勝壤於縣之東南隅冬十有二月經始明年夏五月訖工廟像尊嚴學舎閎邃講有堂齋有次賓位小學列于西偏饍爨澣沐處之東廡祀物什具罔不完備將以延先生碩儒傳道授業使學者日見所未見日聞所未聞而業廣道充可與俟朝家之選用也予與邑僚暨諸生既落成咸丐予文以識嵗月因為之記時嘉祐八年季冬二十有七日朝奉郎尚書屯田員外郎知縣事兼管勾鹽塲騎都尉賜緋魚袋禇埕記重修學記海鹽為邑在州境東南百里而近地形髙卬潮汐之至不甚猛悍非有山谷隄防之阻也而人居以安其土黄壤其井泉甘魚鹽之利既薄又溝澮之水不可瀦蓄故民皆服田力穡利于早熟市㕓編户往往家給人足喜教其子弟以詩書士大夫之裔亦各世守其業地既斗絶一隅舟楫人跡罕至無竒貨異産動其耳目故能安習而不遷先是境内民物凋敝學校未修初建廟以祀夫子嵗久廟壊邑人願易其地乃更築祠宇稍廣東西廡以處諸生而庠序之教寖興焉崇寜改元推三舎法於天下士皆繇縣升于州絃歌之聲洋洋盈耳根角奮張生徒墮業不習俎豆之事垂二十年矣聖主中興光濟大業文治煥然復修紹興癸亥春既建大學為首善之地廷人獻言欲郡縣士由鄉校以進明詔從之守令承流各舉其職惟邑之東舊學斯在瓦裂桷腐將就傾圮弗時即功士頗聚議知縣事左承議郎徐光實視事之初奉承詔旨靡敢遑暇鳩工度材親督其役經始于夏五月至秋八月告畢然後堂殿門廡髙明宏大職掌有舎肄業有齋土木之功赭堊之色圭潔崇麗煥然一新餼廪器用罔不備具明年春行鄉飲酒禮預者百餘人又訪求中朝畫本改飾先聖先師十哲及鄒國公像儀形克肖可瞻可仰與夫二三予侍側之容庶得如親見之丙寅春上丁行釋奠禮籩豆静嘉盥薦嚴謹己事諸生願有紀述以貽永久竊謂海隅小邦光被盛化得賢令宰夙夜究心修舉舊典可謂善矣故為之書紹興十六年二月十日左朝奉郎大夫充徽猷閣待制提舉臨安府洞霄宫平原縣開國伯李正民記新修學記秀州海鹽既修縣學掌學官四員職事十員齋主三十員合辭遣介走二千里以來索文具言本末而知縣事李侯之功有不可不記諤思己酉夏備數朝籍客有從彼至者己言留侯意于兹況今嵗又三易葢侯初來為丞嘆學之敝而縣有不暇丞欲自任其勞未㡬諸司以才推擇得旨徑綰銅章於是經營不愆于素況侯之祖紹興甲子寓居於此邑力賛邑宰奉議徐公光實修之于前且為之記與齋銘矣侯竟述初志夫州縣有學非他也為治以教化任守令學所以與多士為求仁之地也有生之初仁固惟所有也失其固者有因也衆之人不知有以求之政之人不知有以因其求而導之仁則晦也于是聰明睿智之君倡于上而下自應州縣之學所由以建或者怠乎是非怠乎學也怠乎仁也今斯邑也辟雍首善近在咫尺教化當易以舉乃有李侯為之鼎新乎求仁之地俾圜冠方屨得以藏修乎其中即是以求堯舜禹湯文武為政之𫝊稷契伊尹周召為仁之佐孔孟為仁之言六經為仁之書五典五教為仁之方家而國國而天下為仁之序俾居乎學者日之所見升降揖遜無非仁焉弦歌管籥無非仁焉簠簋尊罍無非仁焉殿堂門廡無非仁焉如充棟宇如汗馬牛如參于前如倚于衡朝夕寒暑仁必在是顛沛造次仁必在是上之以仁而可以致君下之以仁而可以澤民窮而以仁可以善其身達而以仁可以兼善乎率土之濵仁之妙用可以塞乎天地之間而不可名經曰為仁由已又曰我欲仁斯仁至矣智者論之求之于學其獲則易故學之為效明禮樂移風俗召和氣而致太平有不難者若乃雕鎪乎文字㿋癖乎誦習競争乎末節緣飾乎虛名是又學之淺者君子之所畧焉且侯資仁而心仁心仁而術仁仁于堂而風住仁于野而春如因乃祖之權輿即是而本之仁其祖矣所以謂學為求仁之地而孜孜焉竟底其成凡學之文物無一不備以為未也復建小學發其仁之端侯意若曰屋有限員有數必整整焉所以領袖百里之内耳目習慣父教其子兄語其弟長老訓其後生循循然惟仁之歸侯之意豈不廣哉若乃侯自捐俸金民不告勞亷而有法政之善也不可不併書侯名直養世家維揚官從事郎乃祖則任左朝散大夫充徽猷閣待制平原縣開國伯諱正民今學經始于紹興元年冬明年三月即工六月告成三年四月壬寅朔煥章閣直學士朝奉大夫提舉江州太平興國宫清江縣開國子食邑六百户賜紫金魚袋謝諤記并書小學記三代之學莫盛于周里有序鄉有庠序以明教庠以行禮㓜童八嵗入小學學六甲五方書計之事始知室家長㓜之節十五入大學學先聖禮樂而後知朝廷君臣之禮嗚呼古之人所以教人者善矣後世小學僅見于辟雍今郡邑非惟不存其實併與其名失之矣海鹽為秀支邑維揚李君下車期年既修治學宫羅致一邑之士而教之一日顧謂諸生曰小學之設所以因其良心而訓迪之今獨無有宜其習俗日薄此無它喪失其良心也諸生奉教曰善迺擇教諭朱沆主之其始進也或通經或詩賦選吝而公師嚴而尊於是里巷之間弦誦之聲相接無智與愚皆以子弟入學為美事李君可謂善教人矣小學之興自李君始棐濫吹主學實與李君相與維持之因摭其闓端之意刋之石君名直養以佐邑最還為令宜兹舉也賢而法哉紹興四年六月修職郎監秀州海鹽縣砂腰催煎揚施棐記縣學講堂齋銘李正民仁為道逺行莫能至究其本原在孝與弟孝弟之性誠矣無偽擴而充之為仁甚易右務本堂里有仁焉擇之而處顛沛造次不離其所蓬因麻直絲以染遷漸磨而化物我皆然右處仁齋質直無邪所存在義行而宜之勿放於利無適無莫匪驕匪吝推之邦家其達可信右好義齋湛然一性中有覺知感物而動私欲害之約之以禮勿順乎非不逺而復顔氏庶㡬右復禮齋仲尼之聖顔子之賢好學不厭智斯在焉勉強師之其徳日起知之而好斯近智矣右近智齋法喜寺政十方記西竺之教流於震旦其來尚矣摩騰法蘭𫝊其經曇摩迦羅演其律羅什而降翻譯滋多然後半滿之字華竺之言溢于簡册儲于寳藏緇褐之流誦其文講其義可謂萬善之源府總持之林苑也然善現談無得之宗毗邪明不二之旨于一法中闡無量義學者能因教以明心者鮮焉機縁已熟達摩西來直指心源不立文字離名相之端絶能為之迹此教外别𫝊之要典也爰自少室曹溪以來多寓律寺雖居别院然于說法住持未有制度至百丈山大智禪師慨然嘆曰吾之祖道欲誕布元化豈當與阿笈摩為隨行邪乃創制規式别立禪居賓主問訓激揚宗要由是名山勝地列刹相望建方外之叢林萃苾蒭之游處歴時滋久其流益盛矣聖朝襲前代舊章為佛法外䕶廣設度門崇信般若凡大迦藍闢律為禪者多矣且著令云應甲乙寺宇其待衆有罪聴改作十方住持所以澄汰冗流肅清海衆者也紹興九年春秀州海鹽縣始以法喜舊寺革為禪林掃螻蟻之封疆蕩狐兔之窟穴剖剔藩籬徹除蔀屋開户牖正堂奥變昏暗以為虚明廓狭隘以為廣大三門洞啟于前正殿磅礴其後凡僧堂丈室鐘樓經藏庫厨舎寮為屋一百五十楹皆因其故而鼎新之人不知斧斤之勞户不聞版築之聲恍如神施鬼設徒見其變化之速如此金剛為地衆寳嚴飾前日所有荆棘瓦礫坑坎之舊迹忽然不見觀者駭愕莫不合掌讃嘆曰嗚呼善哉昔未曽有也堂頭和尚懐培深明實相善說法要不慕虚名晦迹藏用昔於此地曽種善根杖錫而來為第一代凝神宴坐四衆歸仰于是襲方袍曳革屣者雲集于斯信參學之道塲矣寺之建立久不可考自梁及唐題榜屢易聖朝祥符中始錫令名増崇像設代不乏人且載十舊碑今特紀其改革之始尚俾來者有攷云紹興十四年二月一日左朝奉大夫充徽猷閣待制提舉江州太平觀平原縣開國伯李正民記資聖寺佛殿記昔佛在舎衞國演說正法誨導羣生時有給孤獨長者為求祗陁園林欲營精舎請佛居之祗陁未之許也長者乃顧左右輦取庫金側布于地祗陁驚喜即以奉施然後精舎立焉按毗奈耶律云西域佛堂曰捷陀俱脂此云香室未有堂殿之稱也然佛之闡化或居天上或在人間四衆歸依人天畢集有稱普光明殿者有稱善法堂者蓋神道變化梵譯所𫝊豈名象可得而擬議哉逮夫像教流通入于震旦白馬名于漢建初起于吳歴代相承益修齋戒緇流雲集列刹相望殿宇之制極于尊崇厭以鴟尾塗以丹雘巍巍乎王者之居無以加矣惟時斥鹵之地乃海鹽縣治所資聖寺當邑之中晉右將軍戴咸施宅為之歴年滋久興廢不常皇明承平垂二百年其徒日加營繕凡所以為浮屠壯觀者靡不備具建炎乙酉兵革之難及于海隅屋數百楹一夕煨燼越三載有比丘茂實可舒請于其師履常曰是大迦藍乃古道塲異時過門者莫不瞻禮今為瓦礫荆棘之區寜能弗恤邪常曰吾慮之久矣顧衰老不能舉事汝等其勉之于是二比丘奔走四方徧求檀越道路傾心咸思喜捨迺以紹興乙夘秋八月丁未初建大殿軒昂前敞基陛隆峻又闢齋堂于其後為屋合五十有四楹命東都孟道一造釋迦世尊一㑹七像於殿普門大士于堂自剏謀七年而殿成又七年而像設備凡為錢三千一百萬有竒由一金一縷之施積累以成其視向之祗園精舎功興齊而力實倍之于是儀相端嚴棟宇宏麗金碧輝映觀者肅然皆嘆其落成之速而莫知經營之勞嵗月之久也若夫妙證三身圜成四智水中應物形而現所謂具足諸相不可以見如來也然優陁延王初以旃檀刻佛形像佛告之曰汝今於佛法中創為軌則未來世中有信之人皆因王故而獲利益故如來滅後後五百嵗于娑婆世界現千億身在在處處建阿蘭若自非教通幽顯道濟生死為苦海之舟航揭昏衢之日月則何以人人心悅而歸嚮之哉佛之為教如此其徒又多材智強敏之士咸能勤苦服役忍辱謙下執心堅固不可回奪宜乎所求必獲所為必成矣是殿之建始終効力者惟實及舒恊心緣化者知白道成法澄師肇善休傾巾鉢而助成之者履常也今觀兹寺故迹毁廢者尚多使其至誠不息遲之以久則復還舊觀因緣果滿歘忽變現若化成然何難之有予方僑寓于是邦庶㡬及見之紹興十五年十二月辛未朔左朝奉大夫充徽猷閣待制提舉江州太平觀平原縣開國伯李正民記浄業院結界記深山大澤草木之所依附而魚龍之所泳游蓋天地既付物以生而動植之所安息在是也若夫毒龍猛獸妖蛇怪蜃雜處其中則山或童而不得茂淵或涸而不得深美玉明珠含泳于其間則光明精粹之氣充溢輝散然後山淵之物得完其生而草木之瑞魚龍之靈俱昭則水懐珠而川媚石韞玊而山輝者矣佛法之在世何以異此如來大慈建立三寳欲使其法久住于世在人以持戒為入道之始在處以結界為證道之基建大伽藍安立比丘念十方法界夫土石瓦礫之所成就不有妙法禁結其地則衆魔外道得以乗間而肆毒故重解重結即穢而浄寓其法於四隅而隠妙相於秘密之中夫惟法之所照非特珠之光明輝散也界之所立非特玉之精粹充溢也而魔黨破漬非特猛毒妖怪之奔伏逃竄也比丘處其間茍能精進明悟行道不懈當有神物念念䕶持然而不能成就聖果者抑未之見秀州海鹽浄業院久為僧坊而界相不具元照律師從衆請以秉持法事儀範既圓屬余為之記于是書以告諸學者云元祐元年五月甲予通直郎知廣徳軍廣徳縣事葛繁記題維摩像昔有僧至龍潭問云久嚮龍潭及到龍潭也無龍也不見潭云却是子親到來余寓海鹽聞金粟之名久矣暇日陪二公泛扁舟由支流㫁港而至乃見此寺在山林間松桂蕭森金碧輝映真伽藍勝處也周行殿堂欲見如來推求尋覓了不可得退坐丈室㝠心息慮瞬息之頃維摩現前復見師子之座乗空而來香積之飯應念即至心生歡喜頓還舊觀因問老人曰如來即己見了未審此處金粟之名何自而得答曰經云凡所有相皆是虚妄故三世諸佛皆以假立名字引導衆生只據土俗所傳乃金玊山也玉與粟聲相近語轉而然余因念大隠堂中曽命畫師作浄名像不若將錯請此居士來主此山中使游觀者瞻仰禮拜發恭敬心一念回光則可入不二法門矣毗邪城中何逺之有宫使顯學中丞常公提宫太丞陸公偕游時紹興壬戌十月望日也大隠居士李正民題至元嘉禾志卷二十三
