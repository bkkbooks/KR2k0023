body:
  text: 至元嘉禾志卷十八元徐碩撰精嚴禪寺記佛之道至難學也毁形而苦行割愛而忍辱食以粗糲衣以壞色器以瓦鐡誦經禮佛求師問道從衆應俗登門望施修齋設供土木營造像設修為之事無一不為至於口腹之欲紛華之欲男女之欲凡人道之不可無者一有犯焉則有司得以治檀越得以棄天下之人莫不起而議之佛道之難學葢如此秀州精嚴寺舊號靈光即東晉選部尚書徐侯熈所施之宅寺鄰於市寺亦為市僧居於市僧亦為市既為而久既久則盛其分房裂户以百數而為之徒者且數百人龎睂皓首畏罪慕善閉户燕坐勤力進修者往往有之而血氣方剛聞道未篤六識所誘一念不固者亦所不免也淳熈四年直寳文閣韓公彦質以黄岡政成聖恩優異付以兹郡公遇事精嚴濟以公正下車未㡬姦伏弱直優㳺撫馭遂以無事推其治理勤厥外䕶迺請於朝願以是寺改為十方有㫖從之於是籍寺所有得二萬餘緡招一因師俾主其事因資巽愞不任是責侯即喟曰變律為禪欲藥其病變不如初吾且有過迺黜一因命諸山選一道行可以經理者衆以十六軰諗公公於其時擇一永祚師景夀使補其處夀公道學院髙世法亦熟年未五十而十主名刹升座之日法音揚暢舉揚宗㫖合因與果演化道俗復以叢林所立規矩先以律身還以導人瞻聽所接内嚴外敬頑革善入一倡百應先信後捨無有齟齬皆順以附縁法既契迺取故老所用之餘計四千緡并前韓使君所施之財與大衆之所施者又為數千緡鳩工匠㑹竹木商瓦甓給僱直凡為秀王祠堂三間戒壇一所廊廡三十四間法堂一十二間僧堂六間雨花堂五間前資寮行堂共一十三間旃檀林後架二十間為水田二千餘畆嵗得米一千餘石為蘆場二千餘畆嵗得薪五千餘束經始於五年之春三月斷手於六年之夏四月始師嘗曰寺成當求記於王居士既成使其師源以其本末來希吕使謂之曰夫應時有縁悟道有性化荆榛為道塲闢市井為佛地易土木為像設改喧鬨為禪觀凡見於有為者是為縁著一盂糲飯聚四方衲子大開不二門共究無生理凡歸於自然者是謂性今師既已奮空拳竭願力了大事破羣疑矣盍亦息乎其所已為而思維其所未為者自縁而脩性由性以悟道以上報國恩而次報佛恩乎師曰諾迺為記之復以倡言終之其辭曰佛身廣大充兩儀肉身有壞法者非波旬有請不可違雙林弟子涕淚垂六反震動人嗟咨付與迦葉法與衣其餘佛法得者誰國王大臣專主之檀那有力同扶持維昔東晉咸安時徐侯家居海之湄夜有光怪經天維迫而視之井所為迺請捨宅為佛祠年來井神不能竒蜂房蟻穴生瑕疵既久而變亦其宜韓侯凛凛百吏師有意外䕶非己私夀公之來乘始基補僝百弊研毫釐以身率人人相隨内嚴外敬自此推始終一律無可疑一唱百和風聲移中堂幻出髙巍巍廊廡繩直逺近齊方丈寮舍相發揮山田水國日用資自起一念不逾朞算計見效如所期雖然佛法非一歧傳道應緣實相依靈刹衲子湏自知請師開門拈白槌來㸔兄弟相磨治以篾縳肚捐飽饑説出諸方上上機一洗萬刼貪嗔癡佛法到此尤光輝朝散郎試兵部尚書兼給事中兼脩玊牒官兼侍讀王希吕記興聖禪院記嘉定元年九月權發遣嘉興府事臣希道言臣所領郡治嘉興縣縣丞之㕔正寢東室實惟孝宗皇帝慶毓之所七紀於今丞轉相授與常官舍等無以稱神扈人仰之意臣至之日始徙丞居即加汎掃繚以周櫺崇䕶之禮懼未宏也粤庠序生徒閭井耋老麋至謁曰往年秀以列州得名為府近者士不繇貢羣試春官亦惟毓聖之地樞電所届昭示渥恩而龍戲之館赤昭之宫獨後表章詎非闕與臣希道竊伏思念忘寢與食爰即故府是諏是稽㳟惟藝祖皇帝太宗皇帝赫靈誕聖於汴於洛後即其地咸建佛刹曰應天曰啟聖英宗皇帝由齊州防禦入繼大統州陞節鎮是曰興徳潛邸為寺亦沿厥名載在䇿書可援為比臣希道猥玷屬籍系為委安僖王曽長孫臣祖嗣王臣伯圭嘗欲建請未及聞上纘成先志責當在臣況復際遇叨守是邦今而不言死有餘罪願即丞㕔改創佛寺且以臣䟽下之中臺討論舊章賁以名額仍陞軍號得偶齊鎮上以慰孝宗在天之靈下以表臣民推尊之敬抑為薄海生聚祈祝請福臣希道謹昧死以聞十月甲午詔禮部太常寺擬定禮部尚書臣時侍郎臣奕太常少卿臣禮奏嘉興府擬陞為嘉興軍嘉興縣丞㕔宇擬更為興聖禪院十二月戊辰制曰可秀人聞命懽聲如雷郡以制書從事榜掲軍名乃遂庇役撤㕔創寺斤工墨師勸力子來明年十月寺告成重扉伉壯兩廡深靚左右複屋棲鐘若經中儼神御前殿後閣列肖諸佛菩薩丈室以居上首閎堂以容緇徒齋寮庖庾凡叢林規橅靡一不具為屋大小合二百餘間輪奐神麗為諸刹甲圜觀和㑹拜跪瞻依謂宜有紀昭示無極臣機竢罪政府與聞奏請詔報本末禾興又鄉郡也僉諧授簡不得而辭迺拜手稽首言曰惟聖駕生膺圖授籙天實啟之儲祥孕靈地實成之渾淪冲漠妙於天者難以知窺扶輿鬰積發於地者可以誠考瑤光感顓昴宿標禹傳雖不誣騐之無朕至若舜之諸馮文之岐周輿圗昭然千古在目臣子之於君父也坐見於墻食見於羮精誠所存隨寓而著過虚位必趨遭乘車必下因物起敬儼如參前而況地靈所鍾聖迹所肇委置湮汨弗䖍弗蠲人謂斯何皇上昭兹神武遹追來孝宵衣菲食必勤必儉立政官人克明克謹設施注措動法孝皇至於恢顯之章尊崇之典事事物物極其豐備矧三朝成憲炳然如日宜乎覽郡守臣之奏詔亟俞之惟恐後也若夫建明之宜奉行之恪經始之審告成之速費不害公役不加民則臣希道之績視公子奚斯為罔愧臣亦既叙次其事俾鑱諸石復拜手稽首為之銘曰於赫孝宗紹隆中興武藏不殺文偉丕平作其即位二十七載徳參兩儀仁冒四海在厥初生于胥斯原禦溪之水檇李之城昔在光武濟陽載育嘉禾九穂嵗應大熟昔在髙皇沛惟帝鄉萬嵗之後魂魄不忘惟我烈祖發祥齊􅍇郡名昭符婁協嘉社對越在天神無不之迺睠於秀永言懷思詔作梵宫榜曰興聖遹駿三朝駕方軌並宏址穹隆髙橺飛棘楬䖍妥靈來燕來翼像衛嚴飭丹雘華新徼福金僊敷錫庶民禦溪淵淵檇李業業夾輔慶基昌于來葉檇李業業禦溪淵淵匹休宗祊於千萬年通奉大夫參知政事兼太子賔客權提舉國史院實録院權提舉編脩國朝㑹要同提舉編脩勅令嘉興郡開國侯食邑一千七百户實封三百户臣婁機撰興聖寺記天以皇朝世有明徳恵洽黎民申眷命於髙宗中天立極用再造我區夏孝宗夙自秀邸毓質少海以承堯禪祗若慈訓誕保此丕丕基精一執中之傳有光往牒維今嘉禾興聖禪院則上聖載育之地也斗樞繞電而夀丘輯慶赤龍逰河而慶都孕靈帝命漙將百神先後父老傳頌可考不誣慶元更元州陞為府迨嘉定戊辰嵗昉因守臣希道之請加賜軍額仍即其所規作梵宫扁以今名所以紀長發之祥示四海以有尊也地接縣治位置􅄶淺無以肅觀瞻甫及四紀而支傾植仆之不暇守土者何以辭其責今皇帝在位之二十八年郡當擇牧上念畿輔股肱烈祖在天之靈不忘顧眷命大臣差擇其可寄以赤子者得太府丞臣與訔奉班列即日佩以章綬始至欵謁廟庭退而諏之僚吏曰漢制郡國得立祖宗原廟我國朝陪京及車駕嘗所臨幸咸即寺觀創殿以奉安神御而洛師之應天啟聖則又即誕生而紀瑞也維兹興聖伯父臣希道實倡之粤四十有五年而臣與訔嗣領郡寄臣與同時持常平使者節按部浙右向之茍有而未全者若有待焉失今不圖人謂斯何往復究度舊基之左右乃牙民産倍其值以償之由殿堂門廡以及庖庫皆革其故而取其新不侈不陋十閲月而崇成捐官莊田地二百七十有七畆合舊田地為一千八百二十有八畆畀寺僧以給齋厨費出於臺郡撙節之餘不以勞民是役也大宗正嗣秀王臣師彌實主其議拜疏闕下上為援筆大字書流虹聖地興聖之寺八大字命鋟梓塗金揭之新刹龍蟠鳯翥日麗星輝耆老聚觀感慕洒泣臣師彌被㫖袖香奏告道霅川以圖示臣公許曰此國家盛美若嘗以簪槖陪法從來鈆槧掌内命盍為之記庸詔久逺臣固謝不能而竟弗得辭竊惟藝祖以神武膺圖肇造繼統以太宗而天下以定髙宗以艱勤紹復遜位於孝宗而駿命以凝至公無私與天同運孫謀詒逺配天無極丹書所紀曠古鮮儷小臣固陋何敢妄以管窺惟是隆乾淳熈盛徳大業得之靣命心傳見之躬行實踐近接耳目為法可傳於天下者有二言曰仁曰儉而已惟仁故見善明用心剛愛惡是非得其正惟儉故處已約待人恕刑罰賦斂得其平自涉大位以訖倦勤授禹惟日乾乾祗畏於民巖中外敉寧風俗淳厚士大夫咸以禮義㢘恥自脩飭紹熈慶元之際國家頼以扶顛持危者猶昔日所作成之人才此無他仁儉之徳積於躬者厚而化於人者深其培飬之道感移之機自有不期然而然者盛矣哉若夫篤於尊親謙以自牧雖震夙之所未嘗一語及焉逮寧考御圖遹追來孝始克舉行曠典道隆徳重而退蔵於密業鉅事閎而民無能名刻詞豐碑所以侈盛美於無窮示來世以必葺也臣謹拜手稽首而述以頌曰宋受命古帝有十一世篤生孝皇神武哲睿藝祖之孫髙祖之嗣毓徳青宫揖遜以有帝位丕顯丕承克順克比厥初發祥秀水之涘帝實啟之百靈萃止若昔夀丘樞電薦祉慶都河流赤龍紀瑞有開必先古今一軌於赫梵宫作鎮星紀昔臣希道以宗室子來宣藩條兹焉經始敝弗之圗鮮不心愧臣訔假守臣將指同是肺腑同所出自諏之嗣王典宗正事老臣師彌奏聞九陛皇帝曰吁天命匪易念我烈祖宵旰致理徳鉅業閎道洽政治積慶有源涵洪演迤施及曽孫式承式繼伸紙濡墨為八大字鳯舞龍蟠星輝日麗欽佇飈逰聿嚴嗣志皇靈赫奕百神翼衛心法所傳仁儉而已矣惟仁足以祈天命惟儉足以承天意於時保之夙夜敢替小臣作頌庸侈休美莫髙匪天莫厚匪地於千萬年作宋元祀淳祐十一年龍集辛亥仲夏初吉謹記中大夫寳章閣待制新知婺州軍州事兼勸農使睂山縣開國子食邑五百户賜紫金魚袋程公許撰重脩興聖寺記禹薦益於天至太祖生於汴而後益之子孫始得以有天下太祖薦太宗於天至孝宗生於淛而後太祖之子孫始得以享天下猗歟盛哉天為太祖後生孝宗故為太宗後生髙宗髙宗生與太祖同丁亥此天心也即位同南京改元建炎同建隆此聖心也而人未之知有臣寅亮慨念湯緒知天心聖心矣而不知紅光照室已應於即位改元之冬嘉禾紀瑞又先如漢中興時矣三后在天世徳作求如編雅當申以下武之述周者天既生孝宗於淛之右以紹中興之烈復生理宗於淛之左以衍百世之治功初嘉定守臣希道建之淳祐守臣與訔乞扁至是奎文樞光交煥河漢中更寳祐乙邜鬱攸之灾官軍士民衛神御惟謹戊午㫖頒祠牒若干道為脩復計下之郡從嗣王師彌請也郡未果明年景定庚申復以元賜命主僧淨志任貴從嗣王與澤請也申錫無疆及爾斯所如編頌當儕以烈祖之述商者淨志當事自方丈法堂以内規以立咸淳己巳特選主首以僧惟實當事期年兩廡山門以外工以備癸酉春㫖奉安神御又從主祀與釋請也新廟奕奕寢成孔安一如祖宗制安居粒食優㳺閒暇亦便浮屠教夫孔曼且碩萬民是若理之常也乃如之人兮西方之人兮同事釋氏同師偃溪今乃能同力以事君惟實嘗興寺洪都謂叶唐五百年佛䜟今乃前作後述復百二十年潛邸盛典至此知人心之天即天心之天也惟徳動天無逺弗届如編書正正當騐之以益賛於禹者謹拜手紀本末以俟編諸詩書之䇿朝奉郎添差浙東安撫司主管機宜文字兼福王府教導官周方記重建慈恩塔院記余幼肄舉子業周逰問學諸郡則憩天慶坊劉氏邸絃誦所餘暇婆娑金魚池月波樓下慈恩塔院比賢樓側吳省郎説所題額及䕶國保民諸天道塲扁愛其書畫婉麗駐目玩視不能去亦愛金魚月波二扁篆古而𨽻雅惜三者輪奐未稱景趣耳自余𨽻東學䇿末第三任從官舊逰夢鬲及兹重來慈恩鼎新改觀佇立唧嗟有老衲祖輝者揖余曰此院以開寳年掘地得石佛石香爐相輪因利而建盖亦向來之佛院也治平改今額建炎南渡而隳一塔亭亭獨存餘悉就圮余二十年竭力起廢龕經繪蔵至庚午秋開軒于塔北辛丑嵗僧堂重創大殿裝嚴丙子至甲申而備庫院徹葢鐘樓甍飛庚子至癸邜而成洪鐘釁冶於今春四方建場於嗣嵗内外粗具已方圗紀刻君周覽興慨龜趺其屬筆哉因喟然曰王荆國昔紀龍興寺謂孔氏之道易行非若浮屠氏苦身窘形之難也然此每失之而彼得余前未之信也今輝也獨能以三十年不怠志力而中興頺圯舊扁具在典型不冺而金魚月波尺椽片瓦莫加焉公餙闕去舊㡬相什伯此失彼得寧不信然其有以闕之歎不自闕者得無啟於斯言淳祐五年上巳日宣教郎知紹興府諸暨縣主管勸農公事兼弓手寨兵軍正趙孟堅記招提教院置田記嘉興招提教院考之紀載則唐刺史曹君之故居也光啟四年捨以為寺勅名羅漢院國朝治平初改賜今額規模雖未大然在元祐間名公鉅卿如荆國王公内翰蘇公更唱迭和寄題静照篇什盈軸静照即院之一室也能以一室聲聞京師葢一名刹矣中間一罹建炎之兵火再厄寳慶之震凌殿室廢圯而弗脩廊廡傾頺而弗葺紹定壬辰寺鄰吳供檢煥惻然動心自捐已帑鳩工聚材聞者樂助鄉僧懷敞開其端師誼贊其成自山門以至湢室輪奐一新嘉熈己亥繼以懷禮啟請檀那曰規模視昔固已大矣廣其居無以飽其徒可乎於是已施者無勌心未施者皆興念遂得常産以為香積卒嵗之儲由今而始苾芻之供可以繼矣蒲塞之饌當不乏矣懷禮欵門求予記之並欲列檀那名氏書之碑陰余辭不獲姑為述其大㮣既而語之曰師亦知夫一飽之不易得乎夫捐金得土以為爾刹綿逺之利檀那不多得也寒耕暑耘以應爾衆饘粥之需農夫亦甚艱也師盍歸語諸徒曰如來積功累行至現報身於王舍城猶未免持鉢乞食今之為比丘者顧何脩而受成若是要當審其因果進其學業諦想其空法窒絶其塵念以祈福祥以酬施恵庶㡬可耳毋徒曰我等瞿曇氏之種子也法當受是懷禮曰唯嘉熈庚子暮春既望朝㪚郎新知雷州軍州事兼管内勸農事借紫徐植記恵安禪院記昔釋迦拈花正眼先付大機大用普遍河沙利及四生功霑九有從窮三際横亘十方萬象森羅頭頭具足自是慧燈繼照久而彌芳厯代宗師相印兹道同體異用警悟羣迷瞬目揚睂拈槌撃拂交馳捧喝坐斷生死無非得佛心宗悟佛知見嗚呼盛哉若乃帝釋折草梵宇翬飛貝闕珠宫丹楹刻桷長廊廣厦複殿重樓建立於屈伸肘間成就於刹那頃際變化莫測凡聖難窺嗚呼休哉像教肇興聖君出御宏持正法益使流通得折草神通具拈花妙用兼二徳者間有人焉南徐焦山成之孫汴京妙慧光之子長水恵安立其名者乃常人也有佛子願力具丈夫身心於逰戱中見殊勝事回狂瀾於既倒銷魔外於已陳體用一如理事無礙遂能鼎新寳社特立叢林斬斬可觀得未曽有見者歎且仰焉方立之未榛也余適取道於此善其道力人事為衆所歸寛猛得中疾徐合度知其必有所就也越三年余守是邦閒從賔客過之昔所謂瓦礫者今楹庭雄麗矣昔所謂荆棘者今金碧輝映矣髙堂深邃萬瓦參差鳴鐘鼓之新音唱宗乘之妙㫖立於兹方可謂能矣奮掣電之機雖末山總持豈容専美有超師之作使焦山妙慧不殞餘芳於見比丘尼身者皆易得耶一日立偕其徒力請為記嵗月余憫其苦志而喜其有成故為書之恵安本之居也其徒以之聞於州刺史王公浚明請於朝始更禪刹命立來主道塲實紹興七年閠十月也今善法雲堂方丈浴室與夫厨庫之屬靡不周足維佛殿尚闕焉會見得髓得皮之人共助出力出財之施矣復何憂哉余識成於京口見光於夷門㑹立於吳興知之為詳故於營建之外為紀本末尤悉主僧名道立號祖鑑錦城人云紹興甲子四月壬午朝請大夫充秘閣修撰權發遣秀州軍州事主管學事兼管内勸農事交安縣開國男食邑三百户賜紫金魚袋信安劉阜民記至元嘉禾志卷十八
