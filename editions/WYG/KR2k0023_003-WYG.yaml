body:
  text: 至元嘉禾志卷三元徐碩撰鄉里錄事司五福鄉管里四羅廟巷望廣平嘉禾鄉管里四作兒朱巷紙行華表由拳鄉管里四甘露社壇南宫秤花勸善鄉管里四青雲輪王棲真東塘時清鄉管里一甘露右五鄉凡十有二界天慶上界鹽倉下界天慶下界大悲東界鹽倉上界大悲西界府東界薛嚮界府西界南宫界韭溪界界南菓子松江府集賢鄉在府西北二十里三保五村管里四集賢萬安美賢清德華亭鄉在府東北四十里三保七村管里二華亭亭修竹鄉在府西九十里三保十二村管里三濮陽儀鳳驅塘考證舊傳云修竹本谷陽鄉廢易年月未詳胥浦鄉在府西南五十里三保九村管里五胥浦壇浦平江朱涇治宅風涇鄉在府西南六十里三保八村管里三風涇涂繆養民新江鄉在府北七十里三保十二村管里二新江崧宅北亭鄉在府東北八十里四保十六村管里三崧子北亭封林考證唐顧府君墓誌葬北平鄉以道里考之北平今北亭也海隅鄉在府西北九十里四保十一村管里二藴土漢成高昌鄉在府東北一百二十里九保十五村管里四高昌盤龍横塘三林長人鄉在府東九十里六保十二村管里三長人將軍高陽白砂鄉在府東南一百二十里三保十村管里三白砂九稜横林仙山鄉在府東南三十里三保六村管里六仙山顧亭新涇杯湖少平臨湖考證唐丘府君墓誌葬昌唐鄉以道里考之昌唐今仙山也雲間鄉在府東南一百里四保十村管里四招賢白苧雲間小平右十三鄉鄉有五十二保保又分為一百三十三村按祥符圖經元豐九域志華亭管十三鄉寰宇記云舊十鄉今十七鄉考今之諸鄉與舊經九域志同嘉興縣德化鄉在縣東二十里管里四𤓰舎高豐吳涇朱涇胥山鄉在縣東六十里管里八石雲葛趙三捍墓舊廟當湖姚塔錢村感化鄉在縣東三十里管里三秋塔杜莊籬林移風鄉在縣東五十里管里三葛澳漢全秋澳履仁鄉在縣南五十里管里五張村張宅秋塔東周楊滙新豐鄉在縣東南四十里管里七松陽莊奥蕭墓莫村顧墓嶽朴栁莊永豐鄉在縣東南二十里管里四朱墓衢林戴澳清墓白苧鄉在縣南一里管里四六里磨塘南界代北界代大彭鄉在縣南一十里管里四朱塔刀林陳浦梅㑹長水鄉在縣南三里管里三桃花梨㑹落塘象賢鄉在縣西三里管里三至德深葉桃花考證象賢在唐為來蘇鄉邑仁里宋乾道間村人掘得唐碑一片乃乾符五年禇府君墓碑正在象賢二十二都嘉㑹鄉在縣南一十二里管里四魯奥梅㑹朱巷張滿靈宿鄉在縣西北一十二里管里四闕雲泉郷在縣西北三十五里管里二王安莊塔柿林鄉在縣西北三十里管里二桃莊宋耆伏禮鄉在縣北二十里管里二九里吳㑹永樂鄉在縣西北十五里管里二朱涇羞墓思賢鄉在縣北三十里管里二吳後平塔遷善鄉在縣東北四十五里管里五松墩曹澳楊澳江涇斜塘麟瑞鄉在縣東北三十六里管里三殿林射城魏塘永安鄉在縣東北五十里管里三黄巷胡受巡院奉賢鄉在縣東六十里管里三白牛屠涇新城右二十二鄉鄉别為四十都海鹽縣海鹽鄉在縣東南郭下管里四長年東城聞琴大周考證唐開元間劉府君墓誌云葬縣南三里地號烏夜鄉名海鹽又太和元年杜府君墓誌云葬甘泉鄉夜原二誌皆文宗時嵗次前以烏夜為海鹽鄉後以烏夜為甘泉鄉抑亦當時鄉分有改𨽻耶烏夜啼古琴曲名縣今有聞琴里舊縣學在烏池鄉後併為海鹽鄉甘泉鄉在縣西南管里四永和瑞井馴雉東姜開濟鄉在縣西一百步管里四歟城保壽合穗稟化大易鄉在縣西北一十五里管里四新進淘涇擊壤蕭墓德政鄉在縣西南二十里管里五金牛延德檇李斤林歸仁長水鄉在縣西一十八里管里四横山徐涇招賢甘雨永寧鄉在縣西二十里管里四秀歧崇教永昌崇仁考證舊為永泰後改是名武原鄉在縣北二十里管里四永福弦歌鄰鶴馬廏華亭鄉在縣北五十五里管里五招賢新安魚所谿里烏社齊景鄉在縣北四十里管里五當湖惠安埭隆下亭羊墅考證有齊景公廟在焉或云孟子載齊景公曰吾欲觀於轉附朝儛遵海而南也以景公嘗遊於此舊有碑磨滅不可讀又唐貞元十四年太子左贊善大夫吳郡陸府君夫人汝南縣君周氏墓誌銘云附於嘉興縣東界海鹽縣齊景鄉青墩原西北塋則齊景鄉舊有青墩原矣右十鄉鄉别為二十三都按九域志上海鹽十有一鄉後為十鄉唐德宗貞元十一年八月六日蘇州刺史于順奏以所管十鄉為十五鄉昭宗乾寧五年以戸口數少併為十鄉崇德縣南津鄉在縣西郭下管里八孝義清化大義桂華嘉福長營進安永豐語兒鄉在縣東郭下管里六堈城邵林孝義南陽通賢宣化考證漢法十里一亭十亭一鄉凡封侯則視功大小亭鄉縣郡各有差或謂語兒在漢為亭轅終古之封止是亭侯迺證以孟康吳南亭之注是蓋不然春秋戰國時檇李禦兒無望地縱横廣袤亦相等秦易檇李名由拳且以為縣則禦兒為鄉無疑武帝銳於賞功終恡於後故襲爵者少纔六年莊侯終古死而國除矣孟康魏人恐於吳地不能訂其詳吳南亭者特指語兒十亭之一耳募化鄉在縣東三十五里管里四義政尊賢永新清平千金鄉在縣東六十里管里四新政大麻得義覩谷崇德鄉在縣東北一里管里六和義知和神墟上莫石闕崇新千乘鄉在縣東北一十二里管里九紀目羔羊上蔡遊屯錢林令墅五社雙林新城考證吳王夫差養兵放牧於此故名積善鄉在縣西北二十里管里八宣風仁化嘉善生賢崇政萬年大通西河石門鄉在縣北二十里管里六六塔長濠通賢上林從信含仁保寧鄉在縣三十里管里四尊賢鵲宿白馬義安清風鄉在縣東北四十里管里四化遷清和高田衆安永新鄉在縣東北四十九里管里四集賢靜安翁林下塔梧桐鄉在縣東北四十九里管里五梧桐鳳鳴永泉邵莊善衆考證集賢舊經云二鄉接境有官窑父老𫝊正吳越分疆之地今有走馬岡洗馬池在二鄉又有平原之野右十二鄉鄉别為三十一都都又分為十保按古志縣元管七鄉又寰宇記云九都鎮市松江府青龍鎮在府東北五十四里考證舊為海商輻凑之所鎮之得名莫詳所自惟朱伯原讀吳郡圖經云昔孫權造青龍戰艦置之此地因以名之宋景祐中置文臣理鎮事以右職副之後止文臣一員政和間改曰通惠高宗朝復為青龍今鎮治延袤有學有獄無復海商之往來矣嘉興縣魏塘鎮在縣東三十六里白牛鎮在縣東北六十里考證宋賢良陳舜俞為東坡六客之一嘗居於此自號白牛居士故以名舊為市聖朝至元十三年立為鎮陶莊市在縣北新城市在縣西二十七里永樂市在縣西南二十七里海鹽縣寧海鎮在縣東考證唐天寶十年太守趙居貞置宋淳化二年移置今廢澉浦鎮在縣西南三十六里廣陳鎮在縣東北九十里當湖市在縣東北四十里半邏市在縣西北三十五里鮑郎市在縣西南五里崇德縣青鎮市在縣東北五十八里與烏鎮市相對分東西岸東曰青鎮屬本縣西曰烏鎮屬烏程縣民物蕃阜塔廟橋道宅地園池甲他鎮戍語兒市在縣東南隔運河三百步後均為縣市矣縣市即古義和市也石門市在縣北二十二里考證市有二張居焉鄉里稱善人篤於教子諸孫悉有文聲皂林市在縣北四十里鳳鳴市在縣東北四十里考證市居徐族為多登進士科者相望視他聚落為僅有洲錢市在縣西北二十七里考證宋南渡初士大夫來寓者殆二十家贈太師申國趙公不求父子寓踰一紀申國自號守一道人慶公善應字彦逺詩翰尤妙丞相福王實生於寺橋南之民舎蘇計屬師德仁仲呂顯謨正已仲發迭主詩盟即祗園精舎為簪盍之所故詩人沈文伯有翠娥環坐憶洲錢之句至元嘉禾志卷三
