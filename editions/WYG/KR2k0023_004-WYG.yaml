body:
  text: 至元嘉禾志卷四元徐碩撰山阜松江府崑山在府西北二十三里高一百五十丈周迴八里考證陸士衡贈從兄士況車騎詩云髣髴谷水陽婉孌崑山陰注引陸道瞻吳地記曰海鹽縣東北二百里有崑山陸氏父祖葬焉輿地廣記云崑山陸氏之先葬此後機雲兄弟有辭學時人以玉出崑岡因名之征北將軍陸禕墓在山巔機山在府西北二十里考證因陸機得名山下有村曰平原亦因陸平原名之平原内史即機也千山圓智寺記云所謂機山者往往排巒别嶺㮣為陸氏之家山總而名焉横雲山在府西北二十三里髙七十丈周迴五里考證本名横山唐天寶六年易是名與機山相望僅五里許或云因陸雲名之有白龍洞在山頂之西南其深不可計山下有祭龍壇澱山在府北六十里薛澱湖中周迴三百五十步高三十丈考證山形四出如鼇上建浮圖下有龍洞屹立湖中亦落星浮玉之𩔖傍有小山初年僅兩席許久之寖長寺僧築亭其上榜曰明極金山在府東南九十里周迴十里高一十七丈考證吳地記云有平坡可容二十人坐北有寒穴其泉甘香余山在府西北二十四里高八十丈周迴一十八里考證舊傳有姓余者居此因名焉按姓苑余姓出南昌千山在府西北二十九里高七十丈周迴五里考證舊圖經云昔有千氏居此圓智寺記云兹山後皆千氏所有故以為名薛山在府西北二十四里高九十丈周迴七里考證吳地記云薛約道居此因以為名城山在府北二十里高八十丈周迴五里考證舊經云山狀周環如城因以為名細林山在府西北一十八里高五十丈周迴七里考證本名神山唐天寶七年易是名土山在府西北二十五里高二十丈周迴一里九十步秦山在府南六十里高二十八丈周迴一里九十步達岸山在府東南一百六十里海水中周迴八里高二十五丈竹嶼山在府東南一百八十里海水中周迴六里高五十丈許山在府東南二百五十里海水中周迴五里高五十丈簳山在府北三十里周迴三里高五十丈遮山在府東南七十里周迴二里高五十丈浮山在府東南一百里海水中周迴一里一百步高十丈蘇山在府東南一百六十里海水中周迴一百五十步高二十丈嚴山在府西北三十七里周迴四里二十二步高四十丈鳳凰山在府西北二十八里陸寶山在府西二十五里考證本陸氏家山嘉興縣胥山一名張山在縣東南三十里高一十五丈周迴二里考證舊經云伍子胥伐越經營於此地故名胥山按史記吳太宰嚭讒子胥吳王賜子胥劍因自剄死吳王聞之取子胥尸盛以鴟夷革浮之江中吳人憐之為立祠於江上因命曰胥山水經所載與此畧同吳録曰胥山在太湖邊去江不百里故曰江上又曰吳王殺子胥投之於江吳人立祠於江上故名胥山寰宇記曰蘇州吳縣有胥山在縣西四十里吳地記曰夫差十二年既殺子胥死後浮之君臣臨江作塘設祭奠百姓緣為立祠故張堯同詩云馬革浮尸去君王太忍人此山空廟貌何以勸忠臣又唐杭州刺史盧元輔有胥山銘而言子胥廟貌故今杭州之吳山亦名胥山然則胥山非一矣今此山左有石龜凝望涇水自高而下有欲趨赴之態昔風雨中有老農見其行疑其為怪潛命工鑿傷一目右有吳王磨劍石長可三四丈直指西下劍痕在焉宋隆興元年觀察李君有請於朝捐已俸以營此山因有之後李氏廢守臣復有請於朝撥𨽻郡學而郡學又以荒山皆石無出産利竟為樵牧之地後鄉人士陳氏鑿石結廬讀書於此名胥山書堂遊覽者多留題今堂猶存殳山在縣西南五十七里高十丈周迴七里考證昔道士殳基隠居學道於此後尸解焉因以名海鹽縣故邑山在縣東北三十六里高八十丈周迴二十里考證輿地志云山下有城唐志云舊縣治漢順帝二年因縣淪陷為湖移置此山下後為故邑巡檢司秦住山在縣南一十八里高一百六十丈周迴二十里考證輿地志云秦始皇遊登此山因以名之後魏酈道元注水經云縣南有秦望山秦始皇所登以望東海故得名焉晉樂資九州志曰縣有秦逕山秦始皇逕此美人死葬於山下有美人廟考舊圖經則為秦住今㑹稽則有秦望始皇刻石紀功之所望虞山在縣東南二十二里高九十丈周迴一十二里考證舊經云以隔海望會稽上虞縣因名長牆山在縣南三十五里高八十丈周迴一十九里考證按舊經云秦始皇東遊登山望海以其孤聳遙望勢如堵牆因名泊櫓山在縣南三十五里高一百五十丈周迴四十里考證輿地志云秦始皇東遊候潮渡海泊櫓此山下因名金粟山在縣西南三十五里高九十八丈周迴六里考證一名六里山按吳地志云有石篆書三十八字天册元年刻碑舊在知縣㕔後廢山有廣惠禪院白塔山在縣東南二十里海中考證山上有白塔因名舊有港通魯浦名曰白塔潭海舟多泊焉潭塞舟皆歸澉浦北戸錄曰唐至德初徐正字薿於海鹽縣白塔山沙渚之上得桃核片可容一升則知草木在山海間有瑰形殊質者多矣宋建炎四年春賊將徐大刀艤舟山下見林木茂盛有兩道人奕棋登岸就之不見遂不擾海邑而去夾山在縣西南三十五里高七十丈周迴七里考證舊圖經云山居金牛金粟二山之間因名金牛山在縣西南五十里高一百三十六丈周迴四十里考證吳地志云昔有金牛村民臯伯通與弟隨之牛穴此山而入二人鑿山而入山崩兄弟皆死遂名金牛洞寰宇記亦名骸山九州要記古有金牛入此山臯伯通兄弟入鑿此山取牛山頺二人同死穴中因名㑹骸山沈山在縣西南七十里高三十五丈周迴七里考證舊圖經云宋臨海南陽二郡太守沈景葬於此因名唐屬蘇州海鹽縣昭宗大順中割歸杭州今沈山即鹽官縣硤石鎮之東山陳山在縣東北四十里高八十一丈周迴一十五里考證按舊經云有龍潭顯濟龍王廟是也百姓禱之隨有感應郡中每遇旱暵取水祠之雨即霶霈宋建炎初加封是名横山在縣西闕三十里考證顧況所居唐縣令劉長卿有過横山顧山人詩山有寺曰禪寂院雅山在縣東北三十六里考證山多怪石俗呼為惹山地中得磚記云雅山紫雲山在縣南三十二里豐山在縣南一十八里高一百三十丈考證耆老相傳云秦始皇屯兵於此山有石屋三所昔有發之者蜂蠆蛇虺不敢近崇德縣陳山在縣西北三十里高一十三丈周迴一里殳山在縣東六十里高一十三丈五尺周迴二里江海松江府松江在府北七十里考證其原始於太湖口而東注於海書曰三江既入震澤底定韋昭以為三江者松江浙江浦陽江是也今浙江浦陽江與震澤不相入韋說非也續吳郡圖經據酈善長云松江自湖東北逕七十里江水分流謂之三江口吳越春秋云范蠡去越乘舟出三江之口入五湖之中謂此也庾仲初揚都賦云云太湖東注為松江下七十里有水口分流東北入海為婁江東南入海為東江與松江而三今松江自吳江縣過甫里逕華亭入青龍鎮自湖至海凡二百六十里若夫有新江舊江之别者宋嘉祐中吳中水災時李兵部復圭為轉運使韓殿省正彦宰崑山開松江之白鶴滙如盤龍之法其後崇寧中漕使郟亶又浚治之遂為民利嘗詢之父老所以然者松江東注地曲折自白鶴滙極於盤龍浦環曲而為滙不知其幾水行迃滯不能逕達於海今所開松江自白鶴滙之北直㵼震澤之水東注於海畧無迃滯處是以吳中得免水患滬瀆江在府東北一百一十里考證吳郡記松江東瀉海曰滬海亦謂之滬瀆廣韻滬水名也白虎通發源而注海曰瀆陸魯望漁具詩序列竹於海澨曰滬吳之滬瀆是也皮日休吳中苦雨詩全吳臨巨溟百里到滬瀆海物競駢羅水怪淨滲漉即此地也江側有滬瀆壘蓋虞潭袁崧防海之處兩旁有東西蘆浦瀉於瀆江海在府東八十里南九十里考證是郡東南並鉅海自柘湖陻塞遂置堰以禦鹹潮往來宋政和中提舉司官興修水利欲涸亭林湖為田盡決隄以泄湖水是郡地勢東南益高西北益卑大抵自三泖五浦下注松江以入於海雖決去諸堰湖水不可泄鹹水竟入為害於是康南四鄉為斥鹵之地民流徙他郡中間州縣官雖知其害復故隄堰獨留新涇塘以通鹽運海潮汐衝突塘口歪濶三十餘丈鹹水延入蘇湖境上乾道七年八月右正言許公克昌請於朝時太博丘公崈除秀州陛辭之日因奉孝宗聖訓亟來相視以運港水勢較新涇為稍緩遂移築新涇堰於運港後堰外隨潮沙凝牢不可壞三州之田始得免鹹潮浸灌之患海鹽縣海在縣東五里南纔二里考證與明越二州相對耆老云深夜籟寂時越上鷄犬之聲相聞海瀕舊有鎮海樓海月樓龍王廟有岡十八條為海潮之限因潮汐漂蕩日久今皆為魚龍之宫無復存矣岡僅存一在縣南五十步南抵澉浦三十六里番舶萃焉東北抵乍浦商舶間至湖泖水附錄事司天心湖一名天星湖在縣東五十步考證舊經云其池東西二十四丈南北濶五十四丈池口濶五十四丈舊傳亦係秦始皇掘地為水之所水草不生亦一異也舊有文宣王廟在其前今已廢易松江府薛澱湖在府西北七十二里考證湖之中有山湖之西有小湖南接三泖其東大盈浦其北趙屯浦蓋湖所以受三􅍩及西南諸港之水自二浦以瀉於松江也舊圖所不載止有小湖在西北六十里周迴三里吳郡圖經云西北有白蜆馬騰谷瑇瑁四湖舊圖谷湖在縣西北五十三里馬騰西北六十里白蜆西北七十里今白蜆湖在長洲界所謂馬騰谷瑇瑁相去五七里間澱湖周迴幾二百里茫然一壑不知孰為馬騰湖孰為谷湖也此湖古來鍾水之地近者如白蜆湖皆成園田湖之四旁下有築隄為田者嵗有水潦則瀦水者益便矣錡湖一名洋湖在府西北三十五里周迴二十里考證舊經云湖有陸錡宅因以為名又府東南六十里亦有洋湖徑十餘里後皆為蘆葦之塲鶯竇湖在府東三十里周迴五里來蘇湖在府南七十里周迴一十七里唳鶴湖在府南四十五里周迴五十六里永興湖在府南四十里周迴三里考證右三湖載之祥符舊圖今未詳所在三􅍩考證按廣韻􅍩水名華亭水也陸龜䝉詩曰三􅍩鯨波魚蒓動注曰吾逺祖士衡對晉武帝三􅍩冬温夏涼蓋謂此也祥符圖經谷泖縣西三十五里周迴一頃三十九畝半古􅍩縣西四十里周迴四頃三十九畝今􅍩西北抵山涇南自􅍩橋出東南至廣德又東至當湖又東至瀚海塘而止朱伯原續吳郡圖經曰湖在華亭境􅍩有上中下之名􅍩之狹者猶且八十丈又按海鹽之蘆瀝浦海鹽即武原也行二百餘里南至於浙江疑此即谷水故道水經以為入海而此浦入江蓋支𣲖之異也俗𫝊近山涇為下􅍩近􅍩橋為上􅍩或者其與陸士衡朱伯原之論合按縣圖又以近山涇􅍩益圓曰圓􅍩近􅍩橋􅍩益濶曰大􅍩自􅍩而上縈繞百餘里曰長􅍩此三􅍩之異也或以須顧􅍩謝家􅍩為三􅍩此二者在縣之東南一陂澤爾與古所謂三􅍩者相去五七十里殊不知泖自有上中下之名也須顧􅍩在府東南二十里謝家􅍩在府東南二十里􅍩北有􅍩涇谷水在府南長一百五十步考證陸士衡詩髣髴谷水陽婉孌崑山陰陸道瞻吳地記云海鹽縣東北二百里有長谷昔陸遜陸凱居此谷水東二里有崑山父祖葬焉水北曰陽山北曰陰則此水在崑山之北也寰宇記谷名華亭谷水下通松江祥符圖經華亭谷水東有崑山元和郡國圖志在縣西三十五里朱伯原續吳郡圖經本之酈善長云松江東南行七十里入小湖自湖東南出謂之谷水南接三􅍩陸士衡詩所云即此水也至元嘉禾志卷四
