body:
  text: 至元嘉禾志卷二十四元徐碩撰顯濟廟記秀州海鹽縣乍浦之陳山有靈湫居山之半水旱不涸不溢山椒有大石盤陀嵗三月十有八日吳之陽山及此多雲霧晦㝠雷雨之變俗𫝊白為龍君以是日生於陽山而歸靈其母子於焉立廟祠事甚嚴州邑旱潦致禱先必置酒石鼎新像設且列四神象于後以表四龍子之異迺四月龍見于龍母殿自空而下其大如柱光采奪目觀者震悸不敢仰視五月殿僧夢神人告將迎龍淮上有日計海邑之雨可支兩旬爾自是開霽復雨之日果再旬也又明年三月直養遣工繪龍于壁至則壁尚濕不可為也念且歸其夕夢金冠白衣神人曰令俾爾畫龍龍實難畫工曰畫非難壁濕耳應曰乾矣東作行雨自西而歸仍有珠乃成龍更語而令它日謁雨當誦華嚴袖出經一卷顧其後四神人云此亦而令所致也工起視壁果已乾如戒而龍成有蜿蜒正白復見神座睨視壁間久之躍而入花壺四月郡守趙不迹以梅雨愆期親作文以禱其應立至六月直養請于郡徙興福院剏廟之右以廣僧居而嚴香火直養狀如此以屬楚國龔頤正紀于麗牲之石夫龍之為神變化無方與天為徒孰能測識上古之世為人豢擾有道之時游其宫沼迨其後來雖渺焉弗覿而乗雲御氣開闔化樞呼吸風雷主持暘雨司民大命克配君徳有不可誣者今兹龍君之神應暴著一時聳動觀聴春祈秋報斯民是怙閲千萬禩宜無厭斁頤正不敢沒其實姑櫽括比次如左而系之以迎享送神之詞云海波奫淪兮海山巃嵸其下潜通兮君之宫時思其母兮來舂容菖葉生兮杏蔕融君之來兮雷隆隆雨我田兮秧芃芃我之懐兮無初終君稅駕兮光采嶙峋皷鐘廟享兮列鼎重茵君之宫兮屯雲蕙肴蒸兮紛紛我黍我稌兮抑亦薦其萍芹君明其衷兮無吐芳新吹洞簫兮望極浦君之歸兮雲在下十風兮五雨佑我海邦兮汙萊斥鹵君之不來兮使我心苦千秋萬嵗兮為民所怙嶽廟記五嶽各于其方配天作鎮靈粹所宅亦各有攸司或主人民死生罪福之事或主鬼神山川水土鳥獸草木之𩔖是于覆載之間為最隆最巨者也然自古帝王告成受代升中紀徳之盛必于泰山而四海之民朝獻祈禬皆不逺萬里不能至者各隨所處建立行宫以為請命之地豈非神靈顯赫威徳盛大為生民宰制尤可畏而仰哉章聖皇帝東封申嚴帝號以彰洪徳允答元功順天休命典册具存是于今日尤為尊崇非諸祠廟所得擬議也或者嘗謂行宫散處遐僻而有禱輒應如在其上如在左右其理安在蓋不知人之精爽沒為貴神則所謂聖而不可知者未始或亡寂然不動感而遂通近在俛仰之間逺周四海之外猶風行于空招之則來而風實無體猶日麗于天有照則現而日不來比陽燧取火方諸取水從容掌握之間引𩔖太清之上患心之不精誠之不至爾況以天孫之貴方嶽之尊風馬雲車倐忽萬里杳㝠之際蠁斯右又何疑之有哉昔人有言心即神明發意動念猶如影響固其理也海鹽陋在一隅其民謹信而淳樂善而畏神前此嵗有朝獻之社間以憚逺莫能至者熙寜中邑人相率始築兹廟殆今三十餘載迺克有成自三門兩廡前後大殿聖母眷屬凡為殿五官曹司典侍從監衞塑像儀物莫不畢備是為一方尊事瞻嚮稙福依歸之境俾善人是賴而愚者不敢為非實非小補又春秋祭獻咸以佛事薦羞惟素茹不宰牲牢而神亦安之豈非所享在誠而不在物耶故首讃神徳備論饗答之理以信斯民于不疑之地千秋萬年無敢怠忘是不可以無紀也時大觀四年七月日奉議郎權通判杭州軍州管勾學事陸周記修嶽廟記海鹽去岱宗道阻且長里且千計而有嶽帝行祠葢經始于熙寜中至大觀四年迺克成將歴百年瓦腐桷圮至于上雨旁風寢無所葢障尸之者假修崇為私計簿有獲而未嘗畧支傾填漏邑大夫李君為政纔一年又三數月即裒衆力葺之殿鉅細有五其一妥聖母者圯甚而重創其諸殿廊廡之屬藩㧞級夷棟楹梁桷丹碧黯昧或蠧或折貌像多剥一旦晦于塵垢者莫不赫然一新自昔何其難而今何其易耶葢神以民為主欲致力于神必成民以先之可也不然雖薦饗亦吐之矧土木之功極勞費神豈樂其若是而相其成也哉李君自丞遷令使家及州家劵外征求悉若子産争承力丐裁減而寛之夏秋稅租前政雖有心于仁民者亦迫于版賦預借于民以紓目前未及省限里長已深苦催科之虐困于棰楚糟丘鬻膠纔上棧即強諸胥分勒抱諸輸司錢終嵗需索乾没強半徒費鞭撻此等積弊甚于膏肓之疾不可救藥乃一切剗去以召和致祥于是雨𤾉應祈蔴菽麥稻嵗洊豐稔成斯民若是而後致力于神洋洋然如在其上者安得不樂歆其薦饗方其啟掲䖍妥靈之心入其祠致植僵興仆之力即若有以相之茲其所以易歟一邦士民有不靳其資力助葺是宫者豈皆澹然無欲薦享于神之心覬幸饗答迹其祈禳之願若待豚蹄盂酒祝穰穰滿家者耶夫山嶽淵海之神古惟天子望而祭之諸侯則祭在其境者齊人將有事於泰山必先有事於配林不敢遽也如此季氏旅於泰山宣聖責冉有弗救而有誰謂泰山不如林放之嘆不可僣也又如此今士民欲事乎嶽帝而恊力葺其來假來享之宫若有相之者知由乎令君成民之政有以動之可也或各自謂吾足以享之欲神之格思豈不難哉世之為不善者薄有薦于神往往不惟覬幸其罪即渙若氷釋抑又過望乎神降之福殊不知聰明正直之神執福善禍滛之權公而行之無毫釐私而不可奪移凡不應庇貺者雖豐潔其粢盛肥腯其牲牷者雖多其酒醴加之以玊帛三日齋七日戒以祭之猶不可覬其畧安風馬之下況希其轉禍為福乎如欲禍之轉移遷善可也詩不云乎自求多福李君以所葺既新美屬予為記予辭不獲命乃併欲士民共知之者書之李君名直養其先維揚人大父侍郎紹興間嘗寓居此邑後徙於苕霅紹興三年五月既望從政郎新知州軍事推官張禄記并書金山順濟廟英烈錢侯碑文夫聰明正直謂曰神靈膺國褒封饗世血食歴祀不冺主福主災赫然炳靈人恒斯畏豈偶然哉克孝克忠為國犯難生昭直節歿助隂靈者也英烈錢侯所以身陪正祠封受顯號其以斯乎紀石傳芳示垂奕世請從具載寜厭纎委西浙諸州禾興最為邊海華亭縣小金山者又在郡東插脚滄溟峻岸截起驚濤四浮吳國備史載漢博陸侯霍公附小黄門謂吳主曰國之疆土東齧海濤虧蝕侵尋臣漢舊輔今當為神駐小金山為禦海斥使不衝蕩全䕶國封當為建祠于彼金山示所旌顯自時厥後封祀不絶今為忠烈王順濟廟焉維英烈侯家閩氏錢行位居七航海而商舶帆經從入廟致禮儼觀威爽雪浪東來一山若峙巖巖殿宇卓冠山椒地勢神靈軒赫斯稱又諗王忠存漢社稷歆生敬慕若曰浮沈罔利膠轕迷塗汨淟塵中何終厎止没事忠臣愈浪生死猛念倐發幽明同符玊立廡間乂手瞠視不歆不倚窅然化歸異哉于是驚怪顯迹為廟部臣老宿祖傳㡬百年矣季夏之月卄一日維侯生辰沿海祭祠在在加謹廣陳馨香金山祠祀尤嚴常嵗是日鹽商海估寨伍亭下社鼓喧迎香花羅供然前無位號未應國經伏隊弓刀遥稱太尉殆几野廟殊闕聲猷屬青齊向化之年敵人雖弱猶競東鄙興師侯能助順虚無之際神證困彰霧消雲飛隂兵千萬排空而下旌旗著號華亭錢太尉才識昭明逮及交鋒敵勢披靡風驅電掃冥助維多主兵上之公朝訪尋允合爰加封勅諡以英烈庸畣靈庥端笏垂紳榮被章服從飾仗衞一變魚雅孟堅母弟孟淳今嗣秀安僖王曽元孫曩居里日常謂余曰英烈侯神靈國勲如是其偉兄志于文盍為紀述其永聲聞當備樂石以奉刻詞兹以書來石既就礱紀弗可後乙巳上春甲子熏篆滌毫寓誠歴叙因作言曰夫所謂聰明正直謂神者豈誣哉忠烈王功成漢祀雖世禄不嗣于當時而廟食乃存于異代蓋忠誠勲迹迄莫冺亡英烈侯初焉非衣縫掖道先王者一念向正即𨽻明祠惟王與侯蠁相應如斯至者心公忠耳故侯卒能效順佐邦殄夷敵使侯居廟堂而職臣事殺身成仁夫豈難能切鄙夫身縻好爵徒事齷齪當言不㫁口若置箱䑕計自營盻視同列茍利飲啄縮縮循墻鬼蜮斯靡何有何無若拜侯祠有泚其顙孟堅疇昔之夕囑記嶽神節仗旋歸繽紛肅截壁月當午蕭次喊空文繡兒郎粉黛優人畫燭椽列夾道東行敬拜奉安一無醉懈顧而問曰此嬰臼社稷臣也心實歆焉曰有親在無代言曰人死留名豹死留皮丈夫大節雖死猶生睢陽之忠常山之操平原叱希烈太尉擊朱泚讀史凛凛恨九原之不作也侯之為神其以是夫因述侯事遡頌王忠夙心忠鯁不覺宣露為之銘曰正直為神維忠維孝國有常經祀典崇報博陸在漢擁昭立宣雖曰世禄不我以延逮及異朝血食廟祀為禦提封叱悍潮水毋使侵齧虧厥疆理至於今世靈畏若存英烈錢侯起身七閩浮舶而商致禮英靈惟公與直志合心傾一誠黙孚旋𨽻部下拱立廟廡杳然㝠化東海之濵奉祀畢䖍位號封崇若有待然南風不競東鄙興師維侯助順若響之隨神兵千萬隂雲擁之敵勢旋靡電掃風披昭靈顯功褒號英烈服爵儀位一變綿蕞我為銘石匪事夸雄寓勸若人知孝而忠為食君禄當勇於事事依違者將焉用彼致忠於君奮不顧身身死不死其名永存史傳紀績廟食薦馨吁嗟鬼域狗茍蠅營彛齋趙孟堅記魯浦亭記昔史起決漳以溉遂富河内之民鄭莊引渭而漕益肥闗中之地故仁人之言也其利溥循吏之愛也其思深來譽焯于無窮豐功流于可久慮事終始豈徒然哉茂苑之東偏禾興之近鄙邑居之盛海鹽在焉先是地非五達之郊物殊一都之㑹林鹽攸産聚庸實繁城郭雖存居人無㡬墝确之田弗藝富庶之教未孚民將疇依時思俾乂景徳初今參政扶風魯公來莅是邦實綰銅章公琰社稷之器誠謂屈材子游弦歌之聲此焉静洽一日詢耆舊之說采溝洫之制得白㙮古港于縣之東南隅曽砂堙積灌叢紛錯剪為鼪鼬之逕寢沮朝夕之池修利闕如因循孔甚公􅏌然奮發濬復是圖相其方而有初諗其衆而胥悅先庚之令既下獻力之徒坌集量期令役書以授帥曽未越月洪波乃道自海口達邑中凡十有八里而逺其清可以流惡其潤可以䝉福疏之可以道其氣瀦之可以鍾其美浸灌之益嘉禾惡種無不猥大也遵涉之利浩商善賈無不駢集也向之編菅把桿之陋販脂賣漿之㣲卒有廣厦之居間多阜財之積環邑之内變為豐泰厥後二十年間公入奉論思乃參衮政而負海之氓䝉賴其利蔽棠之野風謡如新遂指其港謂之魯公浦焉天聖丙寅伍君佑由佐著局為縣大夫且嘉其陸社之風愛澤陂之饒衍乗敏政之暇鳩僝工之材作為新亭于浦之上因池而名識其事也觀夫華榱鏤檻麗丹雘之竒茂林修竹蔚澄凝之趣雖為造適之所實侑清幹之機將俾夫登豫章者想孺子之風遊魯山者懐紫芝之化斯亦廪廪庶㡬仁智之用心矣落成之始監郡集僊李君縣詒書狀實匄文刋紀勤請之辱叙讓弗遑聊摭梗㮣以附于民謡之末時天聖六年正月日朝奉郎宋秘書丞騎都尉黄鑑撰叢冡吾邑東薄鉅海每當濤風暴怒多有溺者之屍乘潮而上潮退暴露沙際須臾大烏啄齧以盡遺骸蕩析隨亦滅沒久矣余聞而哀之也昔嵗六月人有以所見言縣尹者縣尹為之惻然曰噫人孰無死死而不幸至于是余職統一邑其獨忍聞此而不為之所可乎哉乃亟按官籍得縣治之東北三十六里曰蕩山置冡塋焉收瘞之浮屠氏師俊實顙董斯役遂因山勢髙山夷為三級廣輪五畆周以垣墻深其竁穴俾安以固首以其事上屬部常平使者張公且請所為瘞埋之費期久行之不以累縣計張公慨然從之帖縣之常平庫凡一屍給錢千置歴以稽其付受其它報發文移號集里伍等事悉據條令以行就命師俊專司之自經始建今未募年凡瘞一百四十六人矣念無以告後來者不可屬余書而刻之石嗟夫仁人君子之用心隨所寓而見顧今為邑老往往困于牒訴之紛委且瘁心于斂積以應大府之追湏為急務日力常不給其屬意于斯者㡬何人哉然則縣尹之賢於人逺矣縣尹姓李氏名直養字無害惟揚人始為丞吾邑用當路薦特改命焉紹熙元年五月既望奉議郎新知建康府江寜縣事陸竣記秦住山碑梁天監二年八月二十三日樹今破碎失字不知何人作其可攷者有云前覧灼灼後聖茂哉始皇乘天越授帝命業超上古殱周滅鄭七雄靡餘六國是併功齊太古道深前王將炎均昊美冠顓黄通靈七伐敬構商堂縱聖凝神將紀百㡬菴藹餘輝飛聲萬祀至元嘉禾志卷二十四
