body:
  text: 至元嘉禾志卷二十九元徐碩撰華亭十詠唐詢華亭本吳之故地昔附於姑蘇佩帶江湖南瀕大江有觀望之美焉歴吳晉間名卿繼出風流文物相傳不冺閭里所記遂為故事景祐初元八月予被詺為縣至部且一年而囹圄多囚繫簿書嬰期㑹蠠没朝夕精疲意殆凡山川風物在境内者未嘗一日得講求焉粤今秋邑人有訟古􅍩湖者持舊圖經詣庭以自直因得而究之凡經所記土地人物神祠墳隴所書甚詳行部之餘輒至其地因里人而咨焉多得其真代異時移喟然興歎即採其尤著者為十詠皆因事紀實按圖可見將以誌昔人之不朽存舊俗之所傳云爾顧亭林顧亭林湖在東南三十五里湖南又有顧亭林相傳陳顧野王居此因以為名焉華林標大道曽是野王居舊里風煙變荒原草樹疎湖波空上下里閈已丘墟徃事將誰語凄凉六代餘寒穴金山北有寒穴清泉出焉其味甘香絶頂干雲峻寒泉與穴平還同帝臺味不學隴頭聲夜雨遙源漲秋風顥氣清誰云柘漿美纔可析朝醒吳王獵塲在華亭谷東吳陸遜生此子孫嘗所遊獵後人因呼為陸機茸今其地為桑陸昔在全吳日從禽耀甲戈百年嘗載羽一日舊張羅地變柔桑在原荒蔓草多思人無復見落月下山坡柘湖在府南七十里湖中有小山生柘樹因以為名吳越春秋海鹽縣淪没為柘湖吳地記秦時有女入湖為神因祀之世歴亡秦逺湖連大海瀕柘山標觀望玉女見威神渺渺旁無地滔滔孰問津何年化魚鼈彷彿歴陽人秦始皇馳道在府西北崑山南四里相傳有大堈路西通吳城即馳道也秦徳衰千祀江濱道不修相傳大堈在曽是翠華遊玉趾如將見金椎豈復留悵然尋舊跡蔓草蔽郊丘陸瑁養魚池在府西今名瑁湖或云即瑁所居相傳有宅基存焉代異人亡久滮池即舊居未移當日地無復故時魚蒲藻依稀在風波浩蕩餘水濱如可問一為訪庭除華亭谷在府南瀠行三百里入松江深谷彌千里松陵北合流岸平迷晝野人至競方舟照月方諸泣迎風弱荇浮平波無限逺極目漲清秋陸機宅華亭谷水東有崑山相傳即其宅陸機詩云彷彿谷水陽婉孌崑山隂今其地尚存舊諜傳遺趾悠然歴祀深人無令威至門異下邽箴谷水當年溜崑山昔日隂魯堂那復見絲竹若為尋崑山華亭谷東二里有崑山陸機祖葬於此因生機雲時人以崑山出玉因名此山以美機雲焉昔有人如玉兹山得美名巖扃銷積翠谷水㫁餘聲喬木今無在高臺久已傾如何崧嶽什獨詠甫侯生三女岡在府東南八十里相傳吳王葬女於此岡一作趾淑女云亡久哀邱尚著名九原誰可作千載或如生青骨何時化荒榛此地平室餘圖諜在不復啟佳城和華亭十詠前人顧亭林寥寥湖上亭不見野王居平林豈舊物嵗晚空扶疎自古聖賢人邑國皆坵墟不朽在名徳千秋想其餘寒穴神泉冽氷霜高穴與雲平空山渟千秋不出嗚咽聲山風吹更寒山月相與清北客不到此如何洗煩酲吳王獵塲吳王好射虎但射不操戈匹馬獵廣塲萬兵助遮羅時平事非昔此地桑麻多猛獸亦已盡牛羊在田坡柘湖柘林著湖山菱葉蔓湖濱秦女亦何事能為此湖神年年賽雞豚漁子自知津幽妖窟險阻禍福易欺人秦始皇馳道穆王得八駿萬事闕其修茫茫千載後復此好逺遊車輪與馬跡此地亦常留想當治道時勞者尸如丘陸瑁養魚池野人非昔人亦復水上居紛紛水中游豈是昔時魚吹波浮還没競食糟糠餘吞舟不可見守此嵗月除華亭谷巨川非一源源亦在衆流此谷乃清淺松江能覆舟蟲魚何所知上下相沈浮徒嗟大盈北浩浩無春秋陸機宅故物一已盡嗟此嵗年深野桃自著花荒棘徒生箴芊芊谷水陽鬱鬱崑山隂俯仰但如昨遊者不可尋崑山玉人生此山山亦傳此名崖風與穴水清越有餘聲悲哉世所珍一出受欹傾不如鶴與猿棲息尚全生三女岡自古世上雄慷慨擅功名當時豈有力能使死者生三女共一丘此感亦難平音容若有作無乃傾人城和華亭十詠梅聖俞顧亭林鄉林空林水不見古人居猶尋古人跡更與古人疎昔為賢豪里今亞蘆葦墟湖邊夜夜月光彩波上餘寒穴山頭寒泉穴淨若鏡面平慰齒敲氷冷貯缾微玉聲傍有野鹿跡上啼林鳥清何由一徃挹况復方病酲吳王獵塲孫氏有吳國四海未息戈獵以耀威武平野萬騎羅英雄魏與蜀貔虎一何多世事異莫究但見桑麻坡柘湖柘土久陷没千嵗嗟水濱不復吳鹽邑空有秦女神浩蕩吞海月曠濶迷天津扁舟誰能徃旦暮逢漁人秦始皇馳道秦帝觀滄海勞人何得修石橋虹霓㫁馳道鹿麋遊車轍久已没馬跡亦無留驪山寶衣盡萬古空塚丘陸瑁養魚池來觀瑁湖水乃是陸生居春塘草幾變誰膾此中魚莫容科斗應亦有魯王餘不隨蛟龍飛神鼈未可除華亭谷㫁岸三百里縈帶松江流深非桃花源自有漁者舟閒意見水鳥日共泛觥籌何當騎鯨去一去幾千秋陸機宅我思陸平原廢宅荒草深才高乃速禍事徃不可箴饑鳥噪樹巔野䑕窟庭隂黄耳亦已死家書無復尋崑山陸氏幾世祖葬此生令名猶如産美璞遂爾傳嘉聲寒岩蓄奇秀源水日東傾何言千載間二子不更生三女岡吳王有三女因留此岡名已化彼粲質合有蘭蕙生嬋娟夜月照掩靄朝霧平古魂如未冺不逺闔閭城次唐彦猷顧亭林韻胡松年海山盪佳氣千載傳古居平生讀書地竹柏靜以疎忠義貫白日名不埋幽墟苖裔今幾何誰能譜有餘又春明宋輝昔時高士宅今日梵王居棲影銜山逺鐘聲隔岸疎風流嗟徃事精爽閟遺墟回首烏衣巷凋零兵火餘又四明汪思温雲間更深處獨見古人居想像風猷逺荒寒景物疎書成千卷帙徃事一丘墟惟有清名在流行百嵗餘又南豐曽輝之煙雨二家市黄門卜此居著書千紙在祠宇幾椽疎潮汐成今古牛羊有里墟舉兵鉏逆節風烈照無餘又李端民當時讀書地卑陋亦安居問字誰人到觀瀾興不疎古今如夢寐城邑變郊墟偶此同彌勒圓龕自像餘又張堯幹蘭若王家像相望博陸居衣冠塵易暗簫鼔祭全疎草色侵花徑潮聲過夕墟遺風猶可想弔古一觴餘又水村有亭林黄門舊曽居海山凝逺翠草木自蕭疎豈見讀書處遺跡但荒墟獨留名不朽傳之千載餘題李景元畫蘇軾聞說神仙郭恕先醉中狂筆勢瀾翻百年寥落何人在只有華亭李景元景元名甲本儒家子落魄詩酒間尤善墨戲米元章畫史嘗及之徃來松江上不知其所終醉眠亭李行中簷低檻曲莫嫌陋地僻草深宜晝眠代枕莫憑溪上石當簾時借屋頭煙倦遊拂壁畫山徑貪醉解衣還酒錢一水近通西浦路客來猶可棹漁船行中字無悔築亭青龍江上東城名之曰醉眠諸公皆有詩醉眠亭寄韓憲仲廷評野徑荒亭草没腰一眠聊以永今朝放懷不管人間事破夢時聞夜半潮玉柱劉义詩未獻金龜太白酒難招知君有意尋安道咫尺何時弄畫橈趙明叔未識醉眠亭先貺佳篇要識荒亭路不賖浦西橋北對漁家窻嫌日曝新栽竹蔬占畦長未種花壁上客來堆酒墨籬根潮過積寒沙被人誤號陶潜宅也學門前五栁遮醉眠亭蘇軾已向閒中作地仙更於酒裏得天全從教世路風波惡賀監偏工水底眠君且歸休我欲眠人言此語出天然醉中對客眠何害須信陶潛未若賢孝先風味也堪憐肯為周公盡日眠枕麯先生猶笑汝枉將空腹貯遺編又蘇軾是非一醉了無餘惟有胸中萬卷書已把人生比蘧傳更將江浦作堦除欲眠賓客從教去倒卧氍毹豈暇舒京洛舊遊真夢裏秋風無復憶鱸魚又李常陶公醉眠野中石君醉輒眠舍後亭人知醉眠盡以酒不知身醉心常醒衆人清晨未嘗飲已若醉夢心㝠㝠淫名嗜利到窮老有耳亦不聞雷霆醉石雖頑委山側苔痕剝蝕誰與扃牧童樵叟亦能指卒以陶令垂千齡危簷弱棟倚荒渚海霧江雨穿疎櫺勿謂幽亭易摧折勉事偉節同明星又陳舜俞酒膽長輕六印腰醉中一枕敵千朝興亡藐比榮枯栁聚散看同旦暮潮酣法本應塵外有醒魂徒向水邊招已聞佳士過從約不似東風泛去橈又張先醉翁家有醉眠亭為愛江堤亂草青不聴耳邊啼鳥喚任教風外雜花零飲酣何必過此舍樂甚應宜造大庭五栁北窻知此趣三閭南楚謾孤醒又王觀松陵江畔客築室從何年世路徒紛紛不知季子賢在彼既不知不如醉且眠聲名衮衮誰知命醉非愛酒眠非病長江渾渾無古今羣山回合來相映呼奴沽酒不可遲買魚斫膾煩老妻何必紉繩繫飛兔百年長短空自知直將裩蝨視天地𡨕㝠支枕窮四時九衢足塵土朱門多是非秋風老蓴鱸扁舟何日歸又秦觀醉來豐瘁同眠去身世失二樂擅一亭夫子信超逸杯行徂老春肱枕頹外日壯志未及伸幽願良自畢又張景修樽前從客笑夢裏任花飛野鳥喚不醒家童扶未歸有榮還有辱無是即無非萬事藏於酒先生亦見機又韓宗文萬慮中來攪不眠醉時一覺自陶然㝠㝠固已㤀天地豈向杯中覔聖賢得酒休論飲得仙醉中遺物為神全世間反覆無窮事吏部難㤀抱甕眠昔有遺賢世所憐滄浪亭下醉時眠松江變酒難終得却對殘燈理短編又蘇棁疲人思向醉中眠物我悠然萬慮閒渴飲蔗漿勞隠几吾身自足草萊間楚陽渴鹿背清泉之子名亭取性便適意中間却無事期君㤀醉亦忘眠又晁端佐瀟洒松陵江上亭醉來一夢傲雲屏生前笑語君須惜世事紛紛不用醒盤石幽亭樂未央是非窮達兩相忘塵寰下望如何許爛醉高眠自有鄉塵埃收得一身閒飲盡春瓶曝背眠醉耳猶嫌山鳥聒夢魂終日上高天一枕雙壺意浩然狂歌酒盡即高眠吾身久與時相棄好逐君歸作二仙又晁端彥人生有出處兩事固希全達則都廊廟致君堯舜前聲名喧宇宙指顧生雲烟不然早晦隠縱意樂當年第一莫如醉第二莫如眠無晦水鄉士子瞻稱其賢埋照不干世作亭臨清泉歡來即痛飲酣謼竟長筵陶陶非假寐冺絶平生緣盡得杯中趣常為枕上仙影從明月照名任清風傳願君遂此志其樂更相先醉無三日醒飲盡百斛船境界如古莽魂夢遊鈞天莫學不佞者狥祿遭纒牽進無濟世志退無負郭田獨醒少意緒寡睡多煩煎風波驚性命鞍馬積胝胼未得立籬下應難卧甕邊區區為寡仕短詠愧非妍又晁端禀吏部甕間眠先生窻下卧夜偷綠醑飲晝喜清風過人為清風快於酒擺落煩襟洗塵垢吾知醉寢勝閒睡可以寄天真兮㤀世累溝瀆超江漢幕席視天地蝴蝶不知緣變化黄粱未熟虚營利從來閒處得閒樂何者功成與名遂隴西夫子稱世賢世家自是酒中仙作亭占得松陵地東坡名之為醉眠醉後眠兮眠復醉頥養鄒軻浩然氣賢人為濁聖人清昏昏夢寐都㤀形花影滿身猶未覺竹風吹面不知醒憶昔樂天貪醉吟吟哦未免勞其心不如醉睡了無事其樂陶陶得趣深我身走塵埃羈鞅殊未息有所思兮在高軒欲徃從之路艱塞無緣一榻同醉眠空禿千毫揮醉筆又闗景山杜老顛狂尋酒伴經旬只走出空牀輸君縱飲還高卧長有生涯作醉鄉貧饒北海杯中物靜勝長安市上眠滿地春風吹不醒功成合以酒為仙又楊蟠江花可醉草堪眠細想人間底處便客散樽空欲歸去此身還被月留連江上聊遊我未能羨君長醉卧高亭不因鶴唳破殘夢還有凉風吹酒醒清簟疎簾一醉身寂寥不稱咏詩人春風亦有憐才意故擺殘花作繡茵又嘗聞李謫仙飲酒興無盡醉來卧空山天地即衾枕當時放迹遊流俗不可近君今外形骸與世不拘窘寸心合處曠萬事一以冺開亭向幽圃朝夕事醉寢茅簷落日欲醒時起對嬋娟拂瑤軫至元嘉禾志卷二十九
