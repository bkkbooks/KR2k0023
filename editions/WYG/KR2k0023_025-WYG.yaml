body:
  text: 至元嘉禾志卷二十五元徐碩撰碑碣崇徳縣縣記縣治自羅建炎兵火鞠為茂草乃寓于邑之廣法院所謂囹圄帑藏案籍吏舎紛雜莫辨無庭除以别官曹訟輩氣息相屬每郡吏追呼徑造屏間如是者葢二十有四年揚始至旬日慨然欲遷之方積逋日支俱不給奚能侵于官是嵗適澇常賦輸且艱其忍裒諸民朝思夕慮鳩工之計藐始也一日院僧如琳等數輩執幅紙郤進退若無所措狀問之則曰縣居寄此久矣齋粥無炊㸑之所夏臘廢戒律之儀僦諸民間與俗何異願以殿後重屋之屬移為縣宇小大餘五十間蓋前百年之良材也揚嘉其言而納之乃涓日相視舊址首度土功繚以垣墻先剏圜扉次立㕔事及旁吏舎中門環廡于是粗備豪右助金者一千七百餘緡助材者鉅細一百七十餘事凡傭食之費取諸其間出納之數具如案籍有司掌之故興作而民不知始謀而郡弗沮究其所自則如琳輩之功也揚何力焉來者願毋擾廣法之衆使揚無媿于永久幸矣紹興乙亥六月甲申右文林郎知秀州崇徳縣主管勸農公事黄揚記縣樓記環百里而為邑視古子男由唐以前事權之重至得擅生殺本朝約四海於禮制之中一民一物皆聴命於上守將之權輕則縣令之權尤輕然有人民社稷教化政令之所出獄訟財賦之所繫人生安危休戚之所始則權雖輕而任實重故縣令之所治不肅則吏民不威凡縣邑門皆有樓樓設鼓若刻漏所以授天時聳吏治嚴晝而警夜者也崇徳自晉天福中得七鄉為縣地褊而版計繁又適當孔道舟車旁午將迎應接之費十倍它邑前後令往往以罷輭不堪任譴間號有材力者亦不過埋頭于簿書期㑹僅僅辦集膳三年去則已矣其出而聴政入而安身之所猶得以逆旅傳舎視之況斯樓乎寳慶乙酉東陽樓君實來敏而有吏能始至則究極源流疏剔弊蠧發為條教具有繩凖粤明年財用沛饒積逋宿負悉上于府則以餘貲躬自程廣啓心聚財創樓于縣門之上首丙戌孟冬迄丁亥二月落成朱甍雲齊畫棟山峙雕欄綠楯髹窻堊壁外掲巨扁中立大鼓晝刻宵漏一毫不忒既成復撤新東序而枕河流導堙為通石梁跨河去庳為崇於是邑人之往來者載觀忻如儼如不意父母之邦忽有此新美也夫天下之理公則一私則萬殊一則事舉而無不宜萬殊則欲動而輒礙今君以官事興役不取之民不斂之吏人知其役而不知其費此非天之生財豐于今而嗇于昔也公與私之間耳邑人嘉君能起數百年之曠闕新一縣之耳目屬余為記顛末余應之曰君子莫大乎與人為善余也何敢不揚令之善而慰邑人與善之思乎於是為之記君名演字伸甫襄靖公之曽孫云紹定二年四月望日承議郎行秘書省校書郎吳潜記新建行衙記語溪拱天闕百里而近使星次舎無弭節所頗失事上之禮臺府幕屬臨莅寢餗託諸僧舎令佐解龜徯代則或僦或假尤弗稱也市南臨衢瀕河官有敗屋數間丞廨廢蹔寓上漏下濕欲壓既遷新居令黄君相地之宜差二月己亥之榖興工改築為行衙揖客有㕔燕息有堂主廊翼室庖湢悉備對門越街繚以短垣又有登艦之亭尉張君思政顓董其事不踰月而落成迺俾巖穴士為之記辭弗獲因即而問之吾邦財計素匱號難治去年夏君始來即修學校興建課㑹尋訪故實彚次圖志它如春風一樓欲仆久矣遊者疾趨而過指顧而雄壮猶昔皆非空拳可致今茲役作而民不知輪奐而邑壮觀其道果何以君笑曰吾以家事為之則易以傳舎觀之則沮夫一縣之嵗計闕惟𣙜酤逋積不支豈可但諉之民醨薄不售先當反之於已戴星倉庾㡬嵗月㮣平而樂輸是知其良心固存也麯􅐕泉齊有攸司任専則弊革是以酒止之易舉也竭心思以堕姦委僚友以共濟上供俱辦課息微衍不蓄不獻隨事力而為之耳愚也聞之矍然而起曰命之矣君名元旦字致君㑹稽人尚書宣獻公之孫也平易近民庭無留訟囹圄久虚是皆可書者抑聞之宣獻公昔宰嘉興以蕞闕猶在葢其家有縣圃云淳祐十一年三月初九日㕓下吟隠錢達善記主簿㕔記山房周先生與余家二父同舎同年余羣從多師焉慕元鯉之問對友茂洪他年茂洪屬其子孺文于余從兄而事之至于今不替甫踰弱冠主語溪簿凛凛懼弗勝每事問若振䇿于邁而未知津者迪之寖明而其氣亦勇吾兄每稱之曰周文卿克充厥知且有志推行之矣質諸事猶信㕔廨舊在邑西南燬宣和間寄梵宇㡬有年最後徙就民居嘉定初得之闕地卑濕滋易敗曩廷評下君璹昉建西㕔事餘將盡新之未及為而去低簷腐柱岌岌如初端平乙未冬文卿始至勾稽惟謹不敢議也事久乃曰卑官矮屋宜也抑吾有未安者吾奉板輿處沮洳地晨昏懼將壓得為孝乎是心慊然明年改嘉熙時向暑亟捐俸五十萬為屋三楹于堂西偏體慈意植萱焉官卑而見彌髙屋矮而心甚長自是葢益明習矣職兼竹木務乃稽溢額之無歸者銖積之盡三嵗無㡬何復佐以奉與前此市材鳩工而悉創之以二年戊戌良月己未成端治事㕔前敞崇軒夾以修廡東附挟屋後列過道三而隆其中為庭以屬之堂通為屋二十一間謂舊堂猶可支葺之咸増基二尺惟門始仍其初翼乎棟甍煥乎紛雘其下百具亦至是備精好與屋稱未知宣和間規模若何今之來者無棲枳歎矣既竣役以書屬余記余謂屋之成有數存文卿正諧其數耳其尤可欽者仕與學相發以充所性而推之于事也昔孟子言之以能充其𩔖善推所為曉來世其教宏矣知之而不能致其明行之而不能致其勇藉使問而得通津其能有進乎文卿言語恂恂佩服舒舒乃獨蚤夜孳孳以䇿其進見愈晰則為之愈果殆未易量也秩滿矣行益顯願益勉之移孝於忠就其大者逺者以昌厥先祖父之學非余兄弟之望歟書此復之非記也如欲劖之以詔後人似非無益之談從政郎行太學正釣臺洪揚祖撰縣學記韓退之為處州孔子廟碑曰自天子而下得通祀而徧天下者惟社稷與孔子然其祀事皆無如孔子之盛所謂生人以來未有如孔子者此其效與昔嘗以謂退之失言祀事之盛衰其得失在後世孔子何與焉使孔子無一豚肩之饗于􅇕墻之間何損其為聖人以舜禹之巍巍不得有天下至孔子乃待祀事然後尊與其智足以知聖人孟子獨稱宰我子貢有若如子路親事孔子而師之然猶有所不說知孔子為難則譽孔子固宜難也治天下國家其上至於無以加下至於匹夫販婦得有其四體髪膚者捨孔子之道不可此天下所共知者聖人之迹也至其卓然有所立雖顔子欲從之而有不能者故先王擇天下宿艾舒火之才以為公卿郷老使率其屬以興四方之俊異禮樂法度秋陽江漢以曝濯之猶懼其不能進茍為不至乎此而僅存其末迹則道或㡬乎息矣吳越多山而湖澤闕涯渚之間不辨牛馬崇徳居山澤之介孔道四出戰國之時闔閭勾踐嘗大戰于檇李禦兒之間裂其地而守之至今墟壠綱絡稻蟹之利轉徙數州元豐八年括蒼吳君伯學為是邑也始為築宫廟以祀孔子聚學者擇經師而教之以義理行能不茍使之為文章誦習務中有司之程而已倍髙為堂燕有二室繚以環廬豐約稱事四方士聞令賢皆來學惟恐在後崇徳為逺邑縣令為小吏興材賦工動觸吏禁非篤誠自信強有材者不能任也此其成就之難又未若持之之難也僨犀象決鴻鵠之器非深山大谷則無以養其材執規矩而求之者不視其材視所養則耽耽之室執規矩者所視也養之以先王之所待以興者而不徒循其末迹則其為役也不為茍美矣朝散郎守光禄少卿分司南京騎都尉沈括撰縣學田記天下事無不可為利不主於己則慮之必精處之必當行之必力茍反是則目睫之見遑恤其他惟志于得寜論非據顧護征營首䑕弗確事之小者猶不可為而況望其可以為大乎甚矣利心之不可有也一國一家一身皆不可以利言自其貪慾熏灼患福相挺則前日之所謂利者皆害之藏也為士者修身勵行以為常隆師親友以求益朝廷為之設郡縣之學為人上者必思厚其廪給使之不以口腹之念分其理義之營此所以學必有田不可廢闕由以養士而士之有位于學者能盡心焉則千嵗之日猶一時也輔公廣為崇徳縣主學以其躬行君子者倡率其徒以其師友淵源者出而浸灌之謂學田之稽其隠漏誠不可以已然亦不可近于擿伏非學之政葢慮田之僅存者久復詆讕當籍其數以防欺又將有惡其害已而去其籍遂復勒之石以期不渝公可謂知所處而勇于行矣嗚呼公能私淑一邑之士俾其深知理義則斯石其可久否雖豐碑插棟疾視在旁乘罅排推不去不止恨不得駕十牛而仆之亟耳是區區之尋尺者果足恃乎贍學舊凡八百斛司存為蠧邑改以𨽻其庾氏輾轉吏謾益漫漶不可考慶元四年有主學木君曇白之縣遣部曹行根括之令所存僅八之一士無以養何責挑達其時邑之由進士選者莫公元忠號先達與今知昭武蔡公開知歴陽陸公埈合辭嫓力從漕倉兩司乞撥沒官田若干學又自置民産若干今悉刋其畆步之所至斗斛之所入與租户若而人詩不云乎我心匪石不可轉也後之人能知輔公之用心則其行也逺矣嘉定六年五月初一日朝散郎權知嘉興軍府兼管内勸農事商逸卿記魁星堂記國朝自崇寜行三舎州縣嵗貢辟雍逮宣和甲辰貢士復合試于科舉詔春官増省額其得以名徹奏篇寘之科甲者八百有八人徽學沈公由秀之崇徳充賦京師為天下第一進士之選莫盛于是公之居室舊寓廣福精舎南抵通衢嘗以狀元目其坊中更亂離故實堙廢里居之士每相與歎息慮其久而冺易也宣城奚君以儒學長斯邑垂意鄉校行且報政振其餘力營東西二齋以漸恢教養之規僉謂先賢駿蹟鬱而未彰殆無以起人心而助風化于是蒐舊聞訪遺像朋盍而請於縣置祠序室仍卜地于東北隅培土巋然建亭其上命之曰魁星爽塏翬飛面勢軒敞前撫平疇萬耦分塍旁瞰漕渠千艘順䑺吾邑勝㮣恍然皆㑹於楹檻几席之間一旦與倫魁之耀發越呈露開豁心目其殆數使然歟夫一氣浮乎太虚輝粲森列在朝象官在人象事昭昭不誣也昔陳太丘偕子姪造荀氏英俊參㑹精發于天徳星有亭猶見圖志況地靈人傑裒然特起其上動躔緯正如左角之于賢者少微之于處士東壁之于君子掲名斯亭以表類應豈非桑梓之偉事哉觀公奉大對于廷揲之以䇿絣之以象參伍錯綜窮極窈𦕈而終始乎體道用數之說越三舉而得張公九成再得汪公應辰雖紓詞闡義自出機軸而條貫本末舉㑹于一者葢自公指授之故横浦謂公呼玉山為嫡孫詩不云乎以似以續續古之人今吾邑里冠葢相望或以名第奮或由閥閱顯至于父子繼科兄弟同榜未易一二數而莫氏五桂華蕚連枝世尤鮮儷詩書禮樂相輝相扶里之秀民家之良子弟無不風厲于學髙山景行勉企前修聨鑣利賔必有嗣公之嫡者斯固邑大夫與鄉先達祈望士友之意也公諱晦字元用皇祐初大父嘗䇿廷魁以郊社齋郎遂為馮京之亞公又自禮闈前列臚傳龍道大其家聲見于褒綍官簿履歴登載國史若立朝大節則横浦祭公之文為詳今讀之凛凛生氣其表見于世而託諸不朽者又不止于科名云慶元戊午上元日文林郎新滁州州學教授陸埈記傳貽書院記有宋受命肇基立極藝祖皇帝一日洞開諸門曰此如我心少有邪曲人皆見之識者謂得三聖傳心之妙又一日問世間何物最大時元臣對以道理最大識者謂開萬世理學之原猗歟盛哉自時厥後天下設立書院通今學古之士彬彬輩出慶歴間詔州縣皆立學道化大明儒風丕振至濓溪周子建圖著書㣲顯闡幽明道伊川二程子實得其傳程門髙弟如楊如游如尹如謝皆天下英才中原板蕩載道而南楊游尹謝數子實大有力焉龜山楊文靖公一傳而羅仲素再傳而延平朱文公受學于延平見之師友問答可攷也文公門人遍天下中吏偽禁嵗寒松栢疾風勁草磨湼而不磷緇者絶無而僅有于時潜菴輔公獨立不懼遯世無悶自祠官報罷歸隠語溪題讀書之堂曰傳貽葢將以傳之先儒貽之後學為己任著書滿家易書詩春秋禮記有注釋大學論語孟子中庸有問答通鑑有說師訓有編日新有録雜著有稾襲藏于家至今語溪之人薫其徳而善良不知其㡬祠而奉之尸而祝之宜也嘗謂太極一而隂陽分有陽則有隂有善則有惡有君子則有小人以孔孟大聖大賢不免臧孫臧倉之毁元祐諸賢而指為姦元符上書而指為邪慶元道學而指為偽嗚呼此未定之天也乃天者定人者冺元祐諸賢元符上書慶元道學至今光明碩大照耀汗青一時憸壬萬世遺臭剥爛復反否極泰亨君子小人之界限事久論定此潜菴褒贈之典日星垂而河漢流也崇徳縣大夫家之柄以元祐同門元符上書故家習聞詩禮及見典刑洋洋擾之竊以為知此則知為治之道無他術焉不擾而已撫民若烹小鮮擾之則潰御衆若牧羣羊擾之則亂此理較然可見矣且治出于郡守縣令令之職與民最親豈不知豈弟之化原于此乎然世有能吏有良吏雖為政不同同期于治而優劣有間矣或者擅聰明而變故常任術數而尚察意立威名而峻刑罰務在出竒立異以待旦暮之功能則能矣又安知良吏之用心耶世之人徒見其在位典職為無為事無事酬酢應接漫不介意及其功成效立然後知其不求顯顯之名志于善俗安民故也夫以簡册所載參訂所為有可得而言者大率裁決有餘裕不必戴星以出也俯仰無愧怍不必祝嘏以禱也罰當其罪闕挺挺祖風于簿書期㑹整暇之餘思所以彰善癉惡表厥宅里樹之風聲此傳貽書堂所繇建也堂成移書謁記敢拜手稽首對揚我朝道學源流之盛以諗同志庶學者于善惡之途正邪之别義利之判人心道心之危微天理人欲之消長知決擇而定趨向焉不至為君子之棄小人之歸其于國家化民成俗之意豈曰小補之哉若夫講習堂規書糧上築剏造嵗月詳記備載則有司存春秋之法常事不書賢者識其大者而已咸淳五年陽生十日朝請郎直華文閣權知嘉興軍府兼管内勸農事節制澉浦金山水軍文及翁記至元嘉禾志卷二十五
