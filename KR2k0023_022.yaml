body:
  text: 至元嘉禾志卷二十二元徐碩撰碑碣嘉興縣嘉興縣學記縣有學古黨庠遺意也記禮曰古之教者家有塾黨有庠術有序夫五百家為黨黨下於遂或者猶後世所謂縣乎秦始分郡縣至漢縣邑有校經師唐上中下縣有博士皆是官也我朝縣學始於慶厯弟子員更定於熈寧主其事簿若丞官未專置理宗皇帝三十九嵗始詔天下悉差主學於是薄海内外皆夫子宫牆矣檇李甲右扶風附庸邑曰嘉興學久廢其址更為郡社壝士藏修無所校官至虚設令尹資中張君汴喟然嘆曰設庠序以化於邑尚矣今朝以主學命官名具而實冺令獨不愧子衿詩乎迺亟請於邦君本心文公公曰興學吾志也曷敢不如請令迺相度西城廢館白於郡而址焉邦君許之則出帑佐費鳩僝功大君髙墅潛公聞之喜撥緡為助經始扵咸淳五年八月眀年正月告成禮殿業騀公堂翼嚴齋序環向門廡庖舍靡不整備其前則河流縈帶據浪泄上京之源觀先利賔跬步津要多士之藻思葢與桃桞俱新也先是學有田寄諸泮宫未復令曰均之飬士奪彼予此非吾志也迺捐邑圭租畆百漕郡又撥鹿苑廢寺中次田地凡若干畆為繼粟地邑民士復争以田租来助郡侯嘉之悉與蠲賦稅免繇使菁菁莪沚仁飬沛然是可以教思無窮矣嗚呼邑以嘉興名而學之廢獨久廢興之數天乎哉令守屬也而分師帥之責槖籥天理機籟人心葢有興起之先務焉然而鮮道義之味者不能興困囂倥之塵者不暇興能矣暇矣而為之長者請焉而不聽聽焉而弗力孰主張是孰隆施是又烏可興今令君以詩禮名家邦伯以道徳文章為時望化民成俗之志節合而桴應㡬年廢閒之大事一旦粲然復興之天耶人耶抑學興矣魚魚雅雅来逰其間豈徒異筆以為邀利達計興仁遜以範其趨興禮樂以陶其飬使嘉魚之賢由此烝罩於亨嘉之世則於師帥作興之初意庶乎其無負矣邑人屬記嵗月以寓祠石室像益州之心扵是乎書宣教郎宗學博士兼福王府教授梅應發記真如教院法堂記壬辰嵗夏四月有僧清辨踵門来告曰清辨秀州真如草堂僧也真如故有講堂卑狭不足以庥學者清辨與同術恵宗治而新之今髙顯矣願得子之文刻諸石以諗来者光謝曰光文不足以辱名刻加平生不習佛書不知所以云者師其請諸他人曰他人清辨所不敢請也故維子之歸而子又何辭光固辭不獲乃言曰師之為是堂也其志何如曰清辨之為是寺也屬堂中之人而告之曰二三子苟能究明吾佛之書為人講解者吾且南嚮坐而師之審或不能則將取扵四方之能者皆伏謝不能然後相率抵精嚴寺迎沙門道歡而師之又屬其徒而告之曰凡我二三子肇自今以及於後相與協同力志堂圯則扶之師闕則補之以至於金石可弊山淵可沈而講肄之聲不可絶也光曰師之志則美矣抑光雖不習佛書亦嘗剽聞佛不為人矣夫佛葢西域之賢者其為人也清儉而寡欲慈恵而愛物故衣敝補之衣食蔬糲之食巖居埜處出妻屏子所以自奉甚約而憚於煩人也雖草木蟲魚不敢妄殺葢欲與物並生而不相害也凡此之道皆以清潔其身不為物累葢中國於陵仲子焦先之徒近之矣夫聖人之徳周賢者之徳偏周者無不覆而末流之人猶未免棄本而背原况其偏者乎故後世之為佛書者日逺而日訛莫不侈大其師之言而附益之以淫怪誣妄之辭以駭俗人而取世資厚自封殖不知厭極故一衣之費或百金不若綺紈之為愈也一飯之值或萬錢不若膾炙之為省也髙堂巨室以自奉養佛之志豈如是哉天下事佛者莫不然而吳人為甚師之為是堂將以眀佛之道也是必深思於本原而勿放蕩於末流則治斯堂之為益也豈其細哉皇祐四年館門校勘同知太常禮院司馬光記真如教院華嚴閣記嘉興之南門外數里所有精舍曰真如湖光塔影映帶搖蕩絶無俗塵合是佛境繋船其下登臨靜深傑閣在巔俯瞰荒忽至其棟宇精密化樂天宫之幻成歩履安平堅牢地神之擎戴金碧晃曜位置森然晨香夕燈霧横星燦信一方之殊勝也閣距地凡㡬布丈六金身繪象併其旁之西方聖人者二如懸度然每嵗之春有般若之㑹少長咸集以數千計衆宣佛號隠雷盤旋皆諸閣之所覆也匪假神運可想人力戒月之志勤矣予勸農真如所謂戒月者其主僧也兩目巉巉宜有强幹故人黄君安止交逰餘二十年昨得之扵武昌去載再見於都城今来此則戒月囑其求余記黄固佳士月亦非庸俗緇徒矣真如為賢首十方教院唐至徳時號至徳院本朝大中祥符改賜今名偕之言云然寺有題名石刻建中靖國之初郡守領客自資聖禪院過真如烹茶賢首教院則其間固鼎峙也真如繼是當以閣夸𫝊道嘉興而問僧坊之盛願梯雲者誰勇往寺自紹興間有僧用智者草草重葢扵兵火之餘號智華嚴令戒月自淳熈二年為主席遂有意建華嚴閣心不退轉迄臻扵成凡五間濶六丈二尺髙六丈五尺深四丈九尺他如廬舍那殿十六觀堂及僧之居處一新之至其具體有不可闕者總為屋四十八間戒月謂未嘗持䟽登人門特以講説所得襯施不為己有摶塗塞海始若茫然聚毛成裘久乃見效為費約十萬四千餘緡寺無常産戒月又辦田嵗可收米三百斛今之仰食其香積者已百五十餘人月不為誑衆眼具知予不溢美隨喜涉筆嘉定壬申八月旦日朝散郎權知嘉興軍府兼營田勸農公事商逸卿記真如寳塔記中土自摩騰竺法蘭以經来華人固知有經也菩提達摩以法来華人固知有法也阿育王以佛滅度後一日之中造浮圗八萬四千此西方殊勝事華人未之知也逮吳赤烏二年康僧會擁錫至建業大帝使求佛舍利既得之即為造塔自是浮圗始建於中土而吳中特盛焉隋唐以来名山勝地表刹相望赤珠夜眀亮光晝現四種八種三意六意瓶沙發願窣堵正名衆生不見心不見身者如暗而迷仰觀斗極無感不應無應不神所謂塔廟莊嚴徧於四維上下矣檇李為郡實今輔藩臯陸四周平夷洞達宜有標植用鎮陬隅雉堞離方真如般若薌雲覆地華雨彌空嘉祐壬寅嵗有法師自南者嘗建仁王䕶國般若寳塔善導衆生脩崇梵福宣和庚子適值兆亂焚蕩無餘僅存地宫治銀塔像佛牙舍利光彩如新厯年既多因循廢墜今比丘上首智炬夜夢觀音大士有所告語於是猛勇精進捐財施力復有長者檀波羅衆捨己愛樂無量數計共成佛事鳩工扵淳熈十年仲冬二十九日落成扵慶元三年孟冬之六日雲壁八面絢爛凌空露盤七層巍峩出地東際滄海䀛爽光眀西瞻都畿佳氣葱欎南極於越濤江轟豗北頫吳㑹太湖汗漫介日月之間出雲雨之上十通大用三界無邊統萬有於微范視億載於晷刻猗歟偉哉誠迦維之妙利羣生之指南也作是語已有一居士長跪問言昔聞如来談法華扵鷲峰時有七寳塔湧出現前其中發大音聲又休胥國道合尸羅扵指端出浮圗十層有僧執爐葢旋繞而行以此較彼孰真孰幻夫萬法生滅孰非妄幻幻身既妄物物非真作如是觀名無為法不取於法無得而脩法固無為相有真實現前三昧如丘山髙福不隐滅亦復如是如来方便提引衆生勤力脩行成就幻力空即是色道不虚行出世楷梯故應頂禮是嵗陽月朔五日奉議郎新知紹興府上虞縣主管勸農公事賜緋魚袋永嘉鮑義叔記東塔廣福教院記嘉禾郡之東偏距關五里而遙有廣福賢首教院幽閴僻左居無囂塵僕記少時偕伯仲氏肄業扵斯比竹茨草之室不支風雨魚皷罷響齋厨弗充並院西南相界之内僅有廢塔二級餘悉神林鬼冡蛇虺所孕育汙莱不治多厯年所僕既長立宦學飄零二十年家居官居足跡未始一踵舊逰也側聆里閈士女相謂是院旬嵗典刹得人輪奐日新龍象雲集强僕往臨視之至則清照法師清雅肅客而入外敞三門金篆髙掲天魔鎮守萬法之要關也門内即塔院露盤匝地風鈴韻天羣迷之標指也塔院直北建大悲寳閣浮空百尺俯瞰日星清淨之目毋陀之臂具足妙相普現聲聞正覺之道塲也寳殿八楹枕閣前軒鑿池引流芙渠自然可以建齋行道燒香散花精於佛寺之宇也閣後飛橋跨空過華嚴堂髙廣宏曠金碧璀璨猊座巍峩寛廣周繞敷演聖言之所也堂後輦土為臺以建上方燕安身心瓶錫是寄東闢一軒軒外鉅竹千挺扶踈晝陰人天尊仰之所也廊廡臂伸齋房指列窗牖虚眀巾單整潔諸教比丘體用雙脩之地也西則有大天龍背負踴起輪藏在焉東則有香積妙供苾蒭芬芳庫司在焉以至綱統之竂伊蒲之舍澡滌之室溷湢之軒莫不崇深壯麗甲乙扵諸山其他小物細故動欲垂示久逺未嘗茍且僕既周逰觀覽乃嘅嘆而謂雅曰昔黄太史有毁中民百家之産而成一屋奪農夫十口之飯而飯一僧之語況受供於日中託宿於林下續禪床於斷薪繞飢腹以三篾皆師宗門之故事也向者敗屋數區不猶愈乎雅炷香合爪言曰毗盧遮那宫殿樓閣充遍十方無所分别一彈指頃三昧現前詎與夫人間世經紀究度規畫措辦然後成就者之比哉是刹故基墝埆卑陋貍䑕庭除蝸蚓几席誠不可與一朝夕雜處也況欲闡揚宗風安集徒侣其可耶茲地爽塏髙眀故命工撤修之凡棟楹梁桷葢瓦級塼之具皆長者自為布金舍己愛樂無所靳惜領徒以来檀信施人悉助其費不銖黍留故能奮其憊於創殘摧敗之餘而無厲民駭衆之舉適嵗旱澇此方貧弱不自存者厚以役直使食其力俱知心競不至告勞亦我大雄氏慈憫方便之一也居士以斯言為信其為證眀之僕曰有是哉汝佛如来嘗示不誑語之戒僕儻未信而言於心有負故摭實以為之記師崑山人也純直簡古於華嚴宗旨川流電激學者坐夏無慮千指是豈特能繕弊支傾而已云慶元庚申二月己未日承議郎新僉書江陰軍判官㕔公事賜緋魚袋永嘉鮑義叔記東塔置田度僧記吾鄉州近城有教院曰賢首住持僧曰清雅院久傾欹風披雨沐僅支數椽雅不堪陋捐施金一新之寳殿雕楹繡􅎝鏤楶次舎甲乙步櫩周流叢林規橅色色差備囏勤經始至矣又念嵗入無銖粒寸産僧供不贍苦行相與精進佛事不祝髪受戒以繁其徒祖印不傳無以善後扵是置常住田置度僧局吾鄉之人往来習聞其㮣不知孰何一旦書来乞記反覆顛末信其言尤詳曰清雅入院更十有八夏極力苦心辦緣為鐘魚主省帖舊以嫡枝差次住持不容異派旁睨雖吾祖師浮雲太空受十方施無所執著吾去就非所計第院故貧陋僅僅苛全非如名山大禪林施厚力豐可易置如傳舍院事一失主盟焚脩不䖍苴漏不補私所有以自膏潤輕去迭来則日就淪落故往年尚書郎王使君慨念之復理前語丁寧申曉刻之堅珉以為表經先是有持僧牒一道不著姓氏欲以佐工役費清雅不敢私轉以累吾徒則施狭院固貧自若因出意合道人各持緡錢予焚香探籌以取之以其為求田根蘖或相繼出力助施得租糧以斛計者㡬四百就以先所有鮑氏諸家田米嵗二百餘斛歸度僧局籍淨人氏名鱗以髙下持帖為據知事僧掌之給先出局者披度禮本院為師有贏金勿擅支與以濟私用不幸有殞歿則以次繼承取米十斛為送終費院間有儉㓙或公私百費弗得造為名色耗用没隠不償設有是許持據與所刋碑鳴之有司以請凡度僧局之贏金儲以増田足十年則盡歸公以給僧供惟所用此清雅所為規式示山門俾遵守者如此幸為清雅書之機憮然曰自金僊氏入中土老氏與吾儒之教鼎峙吾儒常貶釋氏謂其憑虚恍洋無所考詰引繩批根麾使不得近吾扵中常持衡焉世變日久澆詭日滋吾聖人語不及怪不以幻異示人而後釋氏禍福之説行葢為權以濟經之所不及指異而歸同要使人遷善逺罪而已見不必偏況人居天地間孰不喜生惡死釋氏獨以寂滅為樂覺觀湛然不種愛根不淪慾海其事為甚難世人重財纎嗇倍力為巧市賈則爭分銖飢丐在側靳一錢不與而精舎山立棊置備極莊嚴朱碧煥爛率借資於人以廣費傾郡邑有餘貲者不命而獻力不祈而薦貨輪運輻集色無留難其致此必有道彼釋氏納輕皆其徒致之無一切世間苦樂愛慾締歡喜縁宜無毫髮固恡心而或者蜗旋繭裹用財自衛一鉢一衣之儲植豐矜隆甚至割衆施利以肥已是謂無達識者清雅刻以大慧自奮孤立一意視所居院如世之欲持其家者務使經久悠逺囊槖無遺餘不顧也豈為釋者難之世葢亦鮮矣機與雅相習知自官中都譽言日聞每傾駭浮慕恨不即聳瞻磬折龕僧燈一道故舊為笑樂因其有請於是乎書嵗次甲子仲夏初吉中奉大夫行秘書省著作郎兼資善堂小學教授兼權駕部郎官婁機記本覺禪院記本覺創自李唐逮今數百載中更兵火巋然如魯靈光之獨存刹以古故尊我朝熈寧間命蜀僧文長老来此主禪席蘇文忠公三過門而三賦詩地以人故勝寺距城西南不一舍平疇迴野一水環抱層樓傑閣𣺌立於蒼烟白葦之中閴然有山林氣象亦檇李之竒觀也惟廪入素薄嵗上熟猶不足以給衆率應縁助之嘉熈庚子旱魃為虐有司勸糴㡬徧國中寺僧竭力以應自是饘粥弗給緇徒星散異時主首數更坐席曽不待暖叢林規矩蕩不復存過者惜之淳祐辛亥太監趙公與訔来守是邦禮請三塔宗逺遷住兹山始至相其所旁穿上漏四壁蕭然如逃人家逺老願力宏深推所以理三塔者理斯寺爰以眀年春稍募衆力排蓬藋輦糞壤塞垣墻之闕嘗為人所徑者以杜往来治煬竈鑄巨鑊歛薪米闢一堂以聚其徒然後聚工鳩材葺重門步廊法堂方丈為屋八十楹葢覆而塗塈之又眀年鼎新長生庫廬捐衣鉢所有以營子本之入始甃荷池復蓮界舊觀舟楫之敝且漏者補之墁之器具之垢且闕者飾之完之凡齋鼓鐘魚禪床單席靡不畢備又明年展闢齋堂増髙加大上架重屋旁建房竂為西廡使與東序稱扁其堂曰大圓覺海寮曰妙心於以舍羣僧之焚誦與行童之侍使者虚眀軒豁若幻成也嗚呼難矣哉余嘗慨近世大禪刹號稱領袖往往視如傳舍占一席於偏廡以茍朝夕顧視囊中貲聚足以易善地望豐報而心猿意馬已坐馳於南北東西數千里之外以故鐘鼓不鳴庭無葢障不蔽風雨金僊梵帝樓觀丹青之飾塵煙晦䝉脫粟藜莧之供無以繼在在皆然也逺老攻苦食淡銖積寸累不以一毫私其身勤勞三載起廢而一新之凡昔所有者皆具所無者始有之可謂能矣今中産之家謀及一廬斬木陶瓦必數嵗經營乃就逺老以虚拳自奮舉意造事計日而成是必有相之者加以嵗月則金碧輝煥照耀大千又豈止為一方之信向云余故勉其進而為之記寳祐已邜中和節朝奉郎前差通判昭信軍兼管内勸農事徐聞詩記本覺禪院三過堂記或謂東坡因鄉里道故舊若逃虚喜跫然為文闕逰本覺是豈知公者耶公以熈寧五年攝開封府推官乞外適守杭州之眀年有事扵潤道過檇李尋訪焉而峨睂翠掃形於聲詩抑見文固有以致公者後六年自徐移湖再過焉文病且老又十年自翰林學士累章請郡除龍圖閣學士知杭州又過焉文死矣所謂三過門間老病死於以見於注意於文甚深慶元初蜀僧本覺来住山得公第三詩於禮部尚書楊公汝眀家遂集帖字同前二詩登諸貞石尚書西歸題字扵賢良鄧公諫從之左至今樵䜿牧兒能指㸃詫行路人而言曰東坡三過此賦詩而去公負剛眀勁正之氣與奸邪並進爽㧞不可干若千崖髙秋松桂精神草木凜栗助寡忌衆直行徑前危機屢施命亦㡬殆烟江瘴海至輒忘反虵鄉常落縱浪吟嘯不知死生患難為何物然則頡頑翔鳴物莫我攖不足為之榮羇窮窘局動與旤觸不足為之辱汎乎水盈科浩乎雲無心至今望之邈在天上住山元澄作堂曰三過補山中闕文而以致其思是記刻舟之迹而語人曰劍在此予又為之記與尋劍何異哉澄行吾法中猶子也號古潭嘉定甲申潼川北磵居簡記恵寂院觀音記補之猥以踈庸䝉恩假守到郡之初時適閔雨既視事徳薄不能召和遍祈靡應於是㳟請恵寂行道觀音致禱焉未及城而雨至優渥霑足農不失時他郡雖接壤亦不及非大士之力而誰歸行殿闕典創而新之以嚴將迎香火之所涓日奉安已訖厥事雖然祈而必報人事固不敢不盡若智慧無邊豈一物所能報哉因命祥符主僧師源恭寫瑞相刋諸樂石以廣其傳不特以祈豐年且將記圓道感格之速以堅後来之信或謂大士與上天竺靈感聖像同出而異體故雨𤾉之應若出一軌斯言必有自来故併書之使一方知所歸嚮云慶元丁巳閏月望日朝奉大夫知嘉興軍府事澶圃王補之書三塔白龍潭記漕渠出通越門直西三里斗折以北面其曲為今景徳寺前有三塔枕其流流之深倍左右四尺龍之所宅也寺有伽藍祠號順徳龍王葢嘗有封爵莫考其所以始舊俗云風檣雨櫂淪溺不測往来者謂險跡江湖間乃相與硺石韞舍利建浮圖鼎足鎮之所謂三塔者也塔初成炅光夜眀險害乃已豈其依佛慧力易暴以仁如華嚴經所言遂以福徳有此珠宫貝闕耶圗經亦不載始末元豐己未嵗有張君勝者作三塔白龍潭詩其序云爾或云近嵗有艤舟河上夜半風雨晦眀遷之數十步擢夫㡬殆然皆以此非深山大澤且不考知其故意故易之淳熈元年夏五月潭之所大雨雹殆陽不克也克必過過則為旱已而不雨至扵秋七月孕者待雨秀發莢者待雨堅好有㫖禱羣望最後築壇刑白鵝坎血以祠藴隆如故郡刺史毗陵張公元成顧曰將何以拯民憂時習曰嵗旱取虎顱骨納之有龍湫潭中可以致雨法用長綆繋之雨足即出之先大夫嘗行之京口雨旋至請加之扵三塔之潭公曰諾獻議者疑之夫事既亟矣知之而不能行欲行之而不勇不誠謂吾民何扵是綿蕝如法己未公從僚吏出禱小雨隨之越三日丁酉禱畢蜿蜒雲端不終朝大雨翼日又雨雹繞佛廬震而人虩虩然如在其左右不涸不流不萎不蘇嵗以大熟邦人大喜嗟夫十日不雨則饑五日不雨則饉今饑饉不作盜賊俱無人以為是故然孰知龍之自乃即廟貌寵新之命車命服始追用王儀丕宣厥靈客有過之者為時習言川澤之物莫智於龍上古之世有以龍名官者官脩其事則禱雨其艱哉厥後不能紀逺乃紀於近近而民事為民師者今或日所不給又烏暇議龍之智矧曰天地陰陽之事其言似有㫖故併書之十月九日通直郎知秀州嘉興縣事毗陵李時習記唐中宗皇帝御製華嚴宗主賢首國師真讚宿植眀因專求正真庵園晦迹蓮界分身闡揚釋教拯濟迷津常流一雨恒淨六塵辨圃方開言泉廣濬䕶持忍辱勤脩精進講集天華祥符地震運斯法力殄茲魔陣爰標十觀用契四禪普斷煩惱遐祛葢纒心源鍳徹法鏡澂懸慧筏周運慈燈永傳名簡紫宸聲流紺域梵衆綱紀僧徒楷則鎮洽四生曽無懈息播美三千傳芳百億唐文宗皇帝御製華嚴疏主清凉國師真讚朕觀法界廣閴無垠應縁成事允用虚根清凉國師體象元門奄有法器我祖聿尊教融海嶽恩廓乾坤百新二疏㧞濯幽昏間氣斯来拱承佛日四海光凝九州慶溢敞金僊門奪古賢席大手名曹横經請益仍師巨休保余遐厯爰撻頴毫式揚茂實真空罔盡機就而駕白月虚秋清風適夏妙有不遷緣息元化邈爾聖儀煥乎精舍易庵寂照講師推公塔記并銘師諱清雅字少南圜囘之法嗣可堂之裔孫也姑蘇常熟人家業儒應其姓祝髮於崑山之慧聚夏臘五十九世齡七十五嘉定甲申三月二十六日澡沐更衣跏趺坐偈而寂茶毗舍利璀璨其徒啓東奉師遺事願銘塔石師妙圎頓宗了第一義五鎮叢席所至一新秀之東塔廣福杭之南山慧因起廢興衰殆若逰戲故今分其骨於兩山者旌厥徳也嘉定癸未茂陵兩召便殿問法講華嚴經賜號易菴寂照講師并書華嚴經閣四字以賜之賢首一宗多盛西北奏以崇先光福普眀開元四刹悉肄教額聖恩俞允光被泉石宗風大振至今頼焉丞相衛王史公參政忠簡先公皆一時朝貴咸樂敬鄉知省鄭公尤與師契合一見相得如平生歡中外歸依佛法増重師色厲而仁行峻而周見處明白宗説演暢平居簡素紙衾布褐裕如也素專淨業嘗效廬逺嵗建蓮社講下常千人五十年間景從日廣度緇白以萬計口授心傳者何啻十百燈燈無盡盡未来際拯迷導昏難可度已嗚呼休哉銘之曰皎心月兮圎眀印香水兮澄渟月不降兮水不升湛流光兮應羣情竟化事兮遐征析金鎻兮閣靈紀琬琰兮徳之馨綿浩刼兮垂典型至元嘉禾志卷二十二
