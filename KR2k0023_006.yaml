body:
  text: 至元嘉禾志卷六元徐碩撰戶口嘉興路總計四十五萬九千三百七十七戶儒一千八十八戶僧四千二百二十八戶尼三百三十四戶道一百五十一戶民四十五萬三千四百二十九戶急遞鋪一百四十三戶録事司六千五百八十戶儒四百八十三戶僧四百三十四戶尼五十二戶道一百八戶民五千五百四戶松江府二十三萬四千四百七十戶儒一百九十二戶僧一千三百七十二戶尼七十戶道一十二戶民二十三萬二千八百二十三戶此至元十三年報省民數也中更兵難戶口減半今實管僅一十二萬餘戶而已嘉興縣一十二萬七百二十三戶儒一百五十戶僧九百九十一戶道一十六戶急遞鋪八十五戶民一十一萬九千四百八十戶海鹽縣四萬二千二百五戶儒一百五十三戶僧五百三十戶尼四十九戶道一十戶民四萬一千四百六十三戶崇德縣五萬五千四百戶儒一百一十戶僧九百一戶尼一百六十六戶道六戶急遞鋪五十八戶民五萬四千一百五十九戶考證按三朝國史戶凡五萬一千八百六十三按九域志主戶凡一十三萬九千一百三十七客戶無舊經則云主戶四萬九千八百五十九主丁九萬八千三百九十五舊圖則云戶一十六萬三千四百一十五口三十萬二千八百八十五今民數已蕃息矣茲非生聚涵育之明效與物産榖之品稻粳糯黍粟麥麻豆穄稗油麻帛之品絲綿綃綾羅紗木棉剋絲紬絺綺繡已上多出崇德綌海鹽者佳布松江者佳貨之品鹽出松江海鹽藥之品枸杞蛇床瓜蔞牽牛菊花香附子菖蒲瞿麥薄荷薏苡車前子紫蘇海鹽者佳天南星麥門冬忍冬藤荆芥松江者佳半夏草烏澤蘭良薑茴香艾夏枯草火炊草苑香葛果之品桃李梅杏橘橙柚棗柿梨枇杷林檎石橘蓮藕菱芡芋荸薺茨菰山藥葡萄甜瓜菜之品菘芥䓤韭薤蒜薺芹莧蒿生菜甜菜苦蕒萵苣蘆蔔波蓤葫蘆冬瓜蕱瓜茭白茄筍胡蘿葡木之品松柏檜杉楊栁榆桃椿朴楝桑楮冬青草之品苑茭蒲荻葦蒹葭竹之品淡筀紫筯篾桃枝筍竹禽之品雞鵝鴨鴻鴈鸛燕雀鴿烏鵲鳩鶉鷗鷺鷹鷂雉雞野鳬黃雀鴣㨶啄木鴝鵒獸之品牛羊豬犬貓魚之品鱖鯽鯉白鮎鱸鯿鯖鰷鱓鰌鰻蟹蝦龜鱉銀魚黃顙蚌蜆鰛此以下出海鹽松江路勒鰵石首海鱸海鯔蟶蛤梅魚蝤蛑蟛蜞蠣青蝦白蝦黃蝦白蜆水母白蟹是郡號為澤國原野衍沃田宜麥禾陸宜麻豆他有資於生民日用者煮水成鹽殖蘆為薪地饒蔬茹水富魚蟹而已至若草木禽獸果實藥品之類亦他郡所有絲綿絹帛視苕霅則次之賦稅嘉興路額管糧六十八萬一千五百五十二石一斗六升六合一勺米六十八萬一千三百三十五石八斗六合一抄七撮豆一百三十一石六斗九升五合小麥八十四石六斗六升五合一勺嵗減公田二分米七萬九千二百六十六石二斗一升六合二勺四抄實徴糧六十萬二千一百八十五石九斗四升九合九勺四抄七撮米六十萬二千六十九石五斗八升九合闕勺四抄七撮豆一百三十一石六斗九升五合小麥八十四石六斗六升五合一勺松江府額管糧二十五萬一千九百四十一石七升一合三勺米三十五萬一千七百四十一石一斗五升五合豆一百一十五石二斗五升一合二勺小麥八十四石六斗六升五合一勺嵗減公田二分米四萬五千九百二十二石三升一合六勺八抄實徴糧三十萬六千一十九石三升九合六勺二抄米三十萬五千八百一十九石一斗二升三合三勺三抄豆一百一十五石一斗五升一合二勺小麥八十四石六斗六升五合一勺嘉興縣額管糧一十九萬八千七百一十四石八斗六升二合四勺八抄七撮公田嵗減二分米二萬六百六十二石二斗七升五合九勺八抄實徴米一十七萬八千四十八石五斗八升六合五勺七撮海鹽縣額管糧八萬一千六百七石八斗三升五合八勺米八萬一千五百九十一石三斗九升二合豆一十六石四斗四升三合八勺公田嵗減二分米七千四百一石四斗一升三合五勺四抄實徴糧七萬四千二百六石四斗二升二合二勺六抄米七萬四千一百八十九石九斗七升八合四勺六抄豆一十六石四斗四升三合八勺崇德縣額管糧四萬九千二百八十八石四斗四合七勺公田嵗減二分米五千二百七十六石四斗九升五合四抄實徴米四萬四千一十一石九斗九合六勺六抄征𣙜嘉興路嵗辦總計一萬五千四百七十七定一兩九錢一分四釐酒課一萬一千二百五十八定三十五兩醋課四百九十五定三十二兩四錢稅課三千四百八十六定一兩六錢河泊課二百三十六定二十三兩四錢一分四釐本路在城辦三千四百二十定三十八兩六錢六分酒司酒課二千二百六十定醋課二百五十二定稅司稅課九百二定三十八兩六錢六分河泊課六定松江府辦五千四百四十三定二十三兩四錢九分四釐酒司酒課一千九百一十定一十三兩醋課一百八十定稅司稅課五百九十七定三十六兩四錢八分河泊課六定九兩六錢大盈務酒課六百一十八定一十八兩稅課八十五定二十六兩九錢二分河泊課二十三定二十二兩三錢八分南橋務酒課一百四定二十二兩稅課五十一定三十四兩五錢六分河泊課二定四十六兩四錢北橋務酒課一百九十一定四十八兩稅課三十四定四十六兩三錢六分亭林務酒課一百四十三定一兩四忽稅課二十四定一十三兩三錢五分河泊課二十四定四十六兩四錢青龍務酒課七十八定稅課二十五定一十八兩二分河泊課一定八兩八錢二分四釐蟠龍務酒課三百三十五定三十二兩稅課二十五定四十七兩五錢六分河泊課五定二十七兩二錢上海務酒課四百七十二定四兩稅課一百七十九定二十五兩七錢四分河泊課六定三十四兩八錢風涇三鄉酒課三百二十四定九